body:
  text: 卷之一醫學或問凡五十一條或問醫學源流自軒岐以來以醫術鳴世與夫著書立言俾後人之可法者幾何人哉請明以告我曰予嘗閱故學士宋公景濂之文而得其說矣請陳如下夫黃帝內經雖疑先秦之士依仿而作之其言深而要其旨邃以弘其考辯信而有徵是當為醫家之宗下此則秦越人和緩和緩無書可傳越人所著八十一難經則皆舉內經之要而推明者也又下此則淳于意華佗佗之熊經鴟顧固亦導引家之一術至於刳腹背湔腸胃而去疾則涉於神怪矣意之醫狀司馬遷備志之其所謂迥風沓風者今人絕不知為何病也況復求其治療之深旨乎又下此則張機之金匱玉函經及傷寒諸論誠千古不刊之妙典第詳於六氣所傷而於嗜欲食飲罷勞之所致者略而不議兼之文字錯簡亦未易以序次求之也又下此則王叔和叔和纂岐伯華佗等書為脈經敘陰陽內外辨三部九候分人迎氣口條陳十二經絡洎夫三焦五臟六腑之病最為著明惜乎為高陽生括以膚陋之脈歌遂使其本書不盛行於世也又下此則巢元方其病源候編似不為無所見者但言風寒二氣而不著濕熱之文乃其失也又下此則王冰冰推五運六氣之變撰為天元玉冊周詳切密亦人之所難苟泥之則局滯而不通矣又下此則王燾孫思邈思邈以絕人之識操慈仁惻隱之心其敘千金方翼及粗工害人之禍至為憤切後人稍闖其藩垣亦足以其術鳴但不制傷寒之書或不能無遺憾也燾雖闡明外臺秘要所言方證符禁灼灸之詳頗有所祖述然謂針能殺生人而不能起死人者則一偏之見也又下此則錢乙龐安常許叔微叔微在準繩尺寸之中而無所發明安常雖能出奇應變而終未離於範圍二人皆得張機之粗者也惟乙深造機之閫奧而擷其精華建為五臟之方各隨所宜謂肝有相火則有瀉而無補腎為真水則有補而無瀉皆啟內經之秘尤知者之所取法也世槩以嬰孺醫目之何其知乙之淺哉其遺書散亡出於閻孝忠所集者多孝忠之意初非乙之本真也又下此則上谷張元素河間劉元素睢水張從政元素之與完素雖設為奇夢異人以神其授受實聞乙之風而興起者焉若從政則又宗乎完素者也元素以古方今病決不能相值治病一切不以方故其書亦不傳其有存於今者皆後來之所附會其學則東垣李杲深得之杲推明內外二傷而多注意於補脾土之說蓋以土為一身之主土平則諸臟平矣從政以吐汗下三法風寒暑濕燥火六門為醫之關鍵其治多攻利不善學者殺人完素論風火之病以內經病機氣宜一十九條著為原病式閫奧粹微有非大觀官局諸醫所可彷彿究其設施則亦不越攻補二者之間也近代名醫若吳中羅益滄洲呂復皆承東垣之餘緒武林羅知悌丹溪朱彥修各挹完素之流風又若臺之朱佐越之滑壽咸有著述未易枚舉嗟呼自有內經以來醫書之藏有司者一百七十九家二百有九部一千二百五十九卷亦不為不多矣若夫歷代名醫今但舉其最者言之耳豈能悉具於斯乎或問醫學授受之原既得聞命矣未審吾子之學何所適從傳曰醫不三世不服其藥或謂祖父相承謂之三世或謂善讀三世之書則為三世之醫子讀三世之書歟為祖父相承之家學歟請明言其故可乎曰草莽之學其可云乎然醫不止於三世而其書又奚止於三代哉當取其可法者言之耳予同邑丹溪朱彥修先生上承劉張李三家之學而得羅太無為之依歸以醫道大鳴於當世遐邇咸取法焉予故曾叔祖誠齋府君幸與丹溪生同世居同鄉於是獲沾親炙之化亦以其術鳴世故予祖父相承家傳之學有所自來予惟愧夫才疏質鈍而不能奉揚箕裘之業為憾耳奚足道哉或問亢則害承乃制之義何如曰王安道論之詳矣其間猶有未悉之旨請陳其略如下黃帝曰願聞地理之應六節氣位何如岐伯曰顯明之右君火之位也君火之右退行一步相火治之復行一步土氣治之復行一步金氣治之復行一步水氣治之復行一步木氣治之復行一步君火治之相火之下水氣承之水位之下土氣承之土位之下風氣承之風位之下金氣承之金位之下火氣承之君火之下陰精承之亢則害承乃制也制則生化外列盛衰害則敗亂生化大病夫五行之木土金水各一惟火有二曰君火曰相火在地理分布六方在歲時分為六氣初氣自醜至卯始於大寒而終於春分厥陰風木主之二氣自卯至巳始於春分而終於小滿少陰君火主之三氣自巳至未始於小滿而終於大暑少陽相火主之四氣自未至酉始於大暑而終於秋分太陰濕土主之五氣自酉至亥始於秋分而終於小雪陽明燥金主之終氣自亥至醜始於小雪而終於大寒太陽寒水主之夫所謂顯明者指方位而言日出於卯之地也少陽君火始於此而右遷故曰顯明之右蓋天地左旋六氣右旋故曰退行六位之下各有己所不勝者承之於下王氏曰承猶隨也而又有妨之之義以下奉上故曰承其五行之道不亢則隨之而已一有所亢則起而克勝之也或曰制者制何事也害者害何物也制者制其氣之太過也害者害承者之元氣也夫所謂元氣者總而言之謂之一元分而言之謂之六元一元者天一生水水生木木生火火生土土生金金復生水循環無端生生不息六元者水為木之化元木為火之化元火為土之化元土為金之化元金為水之化元亦運化而無窮也假如火不亢則所承之水隨之而已一有亢極則其水起以平之蓋恐害吾金元之氣子來救母之意也六氣皆然此五行勝復之理不期然而然者矣制則生化者言有制之常如亢則制而生化不息何害之有外列盛衰者言所承者力衰而所亢者極盛制之不盡耳在天地則為六淫在人身則為六疾害則敗亂者言無制之變也所承者衰甚而無氣故所亢者其勢縱橫而不可遏也在天地則大塊絕滅在人身則病真而死矣大略如斯未盡詳也學者宜參考安道之論斯備矣或問丹溪先生格致餘論云陽常有餘陰常不足氣常有餘血常不足然先生所著諸方每云有氣虛有血虛有陽虛有陰虛其所以自相矛盾有如是者其義何歟曰其所謂陰陽氣血之虛實而以天地日月對待之優劣論之其理蘊奧難明非賢者莫能悟其旨也請陳其大略如下夫陽常有餘陰常不足者在天地則該乎萬物而言在人身則該乎一體而論非直指氣為陽而血為陰也經曰陽中有陰陰中亦有陽正所謂獨陽不生獨陰不長是也姑以治法兼證論之曰氣虛者氣中之陰虛也治法用四君子湯以補氣中之陰曰血虛者血中之陰虛也治法用四物湯以補血中之陰曰陽虛者心經之元陽虛也其病多惡寒責其無火治法以補氣藥中加烏附等藥甚者三建湯正陽散之類曰陰虛者腎經之真陰虛也其病多壯熱責其無水治法以補血藥中加知母黃柏等藥或大補陰丸滋陰大補丸之類經曰諸寒之而熱者取之陰熱之而寒者取之陽所謂求其屬也王注曰此言益火之源以消陰翳壯水之主以制陽光也夫真水衰極之候切不可服烏附等補陽之藥恐反助火邪而爍真陰元陽虛甚之軀亦不可投芎苓等辛散淡滲之劑恐反開腠理而泄真氣昧者謂氣虛即陽虛止可用四君子斷不可用芎莘之屬血虛即陰虛止可用四物決不可用參耆之類殊不知東垣有曰陽旺則能生陰血此陰陽二字直指氣血言又曰血脫益氣古聖人之法也血虛者須以參耆補之陽生陰長之理也惟真陰虛者將為勞極參耆固不可用恐其不能抵當而反益其病耳非血虛者之所忌也如王汝言之通達亦未明此理其所著明醫雜著謂近世治病但見虛證便用參耆屬氣虛者固宜若是血虛豈不助氣而反耗陰血邪是謂血病治氣則血愈虛耗又曰血虛誤服參耆等甘溫之藥則病日增服之過多則死不治蓋甘溫助氣屬陽陽旺則陰愈消又曰婦人產後陰血虛陽無所依而浮散於外故多發熱止可用四物湯補陰血而以炙乾姜之苦溫從治而收其浮散使歸依於陰亦戒勿用參耆也丹溪曰產後當以大補氣血為主既曰陽無所依而浮散於外非參耆等藥何以收救其散失之氣乎噫汝言之論何其與東垣丹溪俱不合耶世之膠柱調瑟者比比皆是予不容不辯也或問古有四診之法何謂也曰形聲色脈四者而已今人惟效脈法但知其一而遺其三焉請陳其理如下夫形診者觀其形以知其病也經曰形氣不足病氣有餘是邪勝也當瀉不當補形氣有餘病氣不足當補不當瀉形氣不足病氣不足此陰陽皆不足也當急補之不可刺刺之重不足重不足則陰陽俱竭血氣皆盡五臟空虛筋骨髓枯老者絕滅壯者不復矣形氣有餘病氣有餘此陰陽皆有餘也急瀉其邪調其虛實故曰有餘者瀉之不足者補之此之謂也又曰形肉既脫九候雖調者死又曰頭者精明之府頭傾視深精神將奪矣背者胸中之府背曲肩垂腑將壞矣腰者腎之府轉搖不能腎將憊矣骨者髓之府不能久立行則振掉骨將憊矣凡此之類皆形診之謂也夫聲診者聽其聲以驗其病也經曰聲如從室中言是中氣之濕也言而微終日乃復言者此奪氣也衣被不斂言語善惡不避親疏者此神明之亂也叔和云久病聲嘶者死小兒病忽作鴉聲者死東垣曰言語先輕後重高厲有力是為外感有餘之證言語先重後輕沈困無力是為內傷不足之證凡此之類皆聲診之謂也色診者視其面之五色以察其病也經曰赤欲如帛裹朱不欲如赭白欲如鵝羽不欲如鹽青欲如蒼璧之澤不欲如藍黃欲如羅裹雄黃不欲如黃土黑欲如重漆色不欲如地蒼又曰青如草滋者死黃如枳實者死黑如炲者死赤如衃血者死白如枯骨者死此五色之見死也青如翠羽者生黃如蟹腹者生赤如雞冠者生白如豕膏者生黑如烏羽者生此五色之見生也生於心如縞裹朱生於肺如縞裹紅生於肝如縞裹紺生於脾如縞裹栝蔞實生於腎如縞裹紫此五臟所生之外榮也欲觀五臟之五邪當辯四時之令色經曰從前來者為實邪子能令母實也從後來者為虛邪母能令子虛也從所勝來者為微邪妻乘夫位也從所不勝來者為賊邪鬼賊為害也自病者為正邪本經自傷也假如春令木旺病者其色青而帶赤是為實邪雖病易治法曰實者瀉其子其色青而帶黑是為虛邪病亦易治法曰虛者補其母其色青而帶黃是為微邪尤為易治法曰微者逆之謂正治也其色青而帶白是為賊邪難治故多死法曰甚者從之謂反治也若但青如蒼璧之澤乃是正邪本經自病勿藥而愈四時皆仿此而推又四時皆帶紅黃為吉青黑為凶若此之類皆色診之要訣學者其可忽乎或問傷寒之邪中人固無定體然手足各有六經何故只傳足之六經而不及於手之六經乎劉草窗謂足六經屬水土木蓋水得寒則冰土得寒則坼木得寒則葉落枝枯手之六經惟屬金與火蓋火勝水而能敵寒金得寒而愈堅剛其理甚明將何以議之乎曰言似近理而實不然者也請陳一得如下蓋人之有身頂天履地身半以上天氣主之身半以下地氣主之是以上體多受風熱下體多感寒濕其為六節之氣前三氣時值春夏其氣升浮萬物生長故人之身半以上應之後三氣時值秋冬其氣降沉故人之身半以下應之自十月小雪之後為六氣之終太陽寒水用事房勞辛苦之人其太陽寒水之氣乘虛而客入於足太陽膀胱之經同氣相求故也又曰熱先於首而寒先於足其義亦通寒邪鬱積既久次第而傳於陽明少陽以及三陰之經皆從足經傳始而漸及於手之六經而已矣此人身配合天地之理不期然而然也何疑之有哉或問三焦為腑有以心胞絡為臟者有以命門為臟者脈訣云三焦無狀空有名或謂三焦與心胞絡皆有名無實之腑臟而其位俱在胸膈之中或謂心胞絡乃胸中之脂膜又或謂之裹心之肉凡此議論不一其孰非而孰是歟請明以告我曰其理蘊奧甚矣難言雖然若夫天人之理不明其可謂之醫乎請略陳其梗槩如下凡萬物之有形質著乎地者必有象以應乎天也且以五行之理論之如在地有木火土金水之五行在天則有風熱濕燥寒火之六氣蓋人肖天地其五臟六腑之具於身者與天地造化生成之理若合符節是故在天為風在地為木在人臟腑為肝為膽在天為熱在地為火在人臟腑為心為小腸在天為濕在地為土在人臟腑為脾為胃在天為燥在地為金在人臟腑為肺為大腸在天為寒在地為水在人臟腑為腎為膀胱五者之外又有相火遊行於天地上下氣交之中故合為五運六氣人身之相火亦遊行於腔子之內上下肓膜之間命名三焦亦合於五臟六腑丹溪曰天非此火不能生物人非此火不能有生夫內經以心胞絡為臟配合三焦而為六臟六腑總為十二經也其兩腎本為一臟初無左右之分越人始分之亦未嘗言其為相火之臟玉叔和始立說以三焦合命門為表裡亦有深意寓焉蓋命門雖為水臟實為相火所寓之地其意蓋謂左屬陰右屬陽左屬血右屬氣左屬水右屬火靜守常而主乎水動處變而化為火者也然而相火固無定體在上則寄於肝膽胞絡之間發則如龍火飛躍於霄漢而為雷霆也在下則寓於兩腎之內發則如龍火鼓舞於湖海而為波濤也或曰嘗聞人身之有腑者若府庫然能盛貯諸物之名也若大小腸胃膀胱膽五腑皆有攸受而盛之者未審三焦為腑何所盛乎曰三焦者指腔子而言包函乎腸胃之總司也胸中肓膜之上曰上焦肓膜之下臍之上曰中焦臍之下曰下焦總名曰三焦其可謂之無攸受乎其體有脂膜在腔子之內包羅乎六臟五腑之外也其心胞絡實乃裹心之膜包於心外故曰心胞絡其系與三焦之系連屬故指相火之臟腑皆寄於胸中此知始而未知終也其餘諸說皆輾轉傳訛之語耳管見如斯顒俟知者再論或問東垣用藥多以升陽益胃目之而悉以升麻柴胡之類佐之何歟曰夫天地四時之令春夏之氣溫而升浮則萬物發生秋冬之氣寒而降沉則萬物肅殺人肖天地常欲使胃氣溫而升浮而行春夏生髮之令不欲使胃氣寒而降沉而行秋冬肅殺之令耳又升麻能令清氣從右而上達柴胡能令清氣從左而上達經曰清氣在下則生飧泄濁氣在上則生䐜脹是以清氣一升則濁氣隨降而無以上等證又參耆等補劑皆味厚而氣滯者若不以升柴等藥提之何以得行於經絡肌表而滋補哉或曰東垣生於北方天傾西北陽氣下陷此法固宜恐東南方土不宜也曰地不滿東南土氣下陷故脾胃之氣不升脾胃之氣不升則上脘不通穀氣不行而內傷之病作矣是以此法尤利於東南方也學者不可不知此意或問內傷發熱之證其為有痰有食胸中迷悶者固不敢驟用補氣之劑其有察脈審證明白知是虛損內傷之候而投以東垣補中益氣湯等遂致胸中滿悶難當醫者其技窮矣若此者又將何法以治之乎曰此蓋濁氣在上而清氣不能上升故濁氣與藥氣相拒故耳宜以升柴二物用酒製炒更加附子一片以行參耆之氣及引升柴直抵下焦引清氣上升而濁氣下降則服參耆等補藥不致滿悶矣學者其可不知此乎或問六淫之邪當從內經六氣之太過為是也昔醫和對晉平公之文不曰風寒暑濕燥火而曰陰陽風雨晦明何也曰辭雖異而理實同焉彼謂陰淫寒疾者即太陽寒水之令太過而為寒疾也陽淫熱疾者即少陽相火之令太過而為熱疾也風淫末疾者即厥陰風木之令太過而為末疾也雨淫腹疾者即太陰濕土之令太過而為腹疾也晦淫惑疾者即陽明燥金之令太過而為疫疾也明淫心疾者即少陰君火之令太過而為心疾也或曰陰陽風雨即為寒熱風濕之疾彼此固脗合矣所謂晦淫惑疾與明淫心疾二者似不相符請明以告我曰歲金太過燥令大行久晴不雨黃埃蔽空日月冒明當為疫癘之疾山嵐瘴氣是也惑當作疫傳寫之誤耳君火太過熱令早行火為離明之象故曰明淫如內經所謂天明則日月不明是也少陰君火司令故曰心疾春分至小滿時太熱也有釋明為晝明晦為夜晦惑為蠱惑心志皆非也夫晝明夜晦天道自然之理何淫之有其蠱惑心志者亦非天地之淫邪也學者宜再思之或問飲食同入於胃而水穀二者何如而分乎且如膀胱止有下口而無上口其水固可出不知從何而入乎又何其如是之清乎曰經曰飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五行陰陽揆度以為常也夫胃為倉廩之官無物不受全借脾土轉輸而運化焉蓋水穀入胃其濁者為渣滓下出幽門達大小腸而為糞以出於穀道其清者倏焉而化為氣依脾氣而上升於肺其至清而至精者由肺而灌溉乎四體而為汗液津唾助血脈益氣力而為生生不息之運也其清中之濁者下入膀胱而為溺以出乎小便耳其未入而在膀胱之外者尚為濁氣既入而在膀胱之內者即化為水是故東垣有曰飲者無形之氣正謂此也蓋肺屬金而復乎脾胃之上即如天之復於地之上也經曰清陽為天濁陰為地地氣上而為云天氣下而為雨水入於胃輒化氣而上升亦猶天降霖雨於地倏焉化氣上騰而為云又復化為霖雨而下降也或曰老人與壯年者飲水無異多寡壯年小便甚少而老者小便甚多何也曰壯者如春夏之氣升者多而降者少老人如秋冬之氣降者多而升者少耳或曰降多即小便多升多者未見其為何物而出於上竅焉曰經曰清陽出上竅濁陰出下竅清陽發腠理濁陰走五臟清陽實四肢濁陰歸六腑各從其化也夫大塊之為器不可論其涵容之量人之氣化亦猶是也賢者宜再思之或問人之壽夭不齊何歟曰元氣盛衰不同耳夫人有生之初先生二腎號曰命門元氣之所司性命之所繫焉是故腎元盛則壽延腎元衰則壽夭此一定之理也或曰今見肥白之人多壽夭元氣反衰乎瘦黑之人多壽延元氣反盛乎曰丹溪謂白者肺氣弱黑者腎氣足又曰肥不如瘦白不如黑或曰四方之人皆同乎曰不同也內經五常政大論云陰精所奉其人壽陽精所降其人夭又曰東南方陽也陽者其精降於下故右熱而左溫西北方陰也陰者其精奉於上故左寒而右涼王注曰陰精所奉高之地也陽精所降下之地也陰方之地陽不妄泄寒氣外持邪不數中而正氣堅守故壽延陽方之地陽氣耗散發泄無度風濕數中真氣傾竭故夭折或曰常聞天人之理同一揆也今見於天地之四方者既得聞命矣而具於人之五臟者未之聞也請申明其說可乎曰西北二方在人為腎水肺金所居之地二臟常恐其不足東南二方在人為肝木心火所處之位二臟常恐其有餘難經曰東方實西方虛瀉南方補北方等語即此之義也夫腎水既實則陰精時上奉於心肺故東方之木氣不實而西方之金氣不虛此子能令母實使金得以平木也是故水日以盛而火日以虧此陰精所奉於上而令人壽延也若夫腎水虛弱則無以制南方之心火故東方實而西方虛其命門與胞絡之相火皆挾心火之勢而來侮所不勝之水使水日虧而火日盛此陽精所降於下故令人夭折也大抵王冰主天地之四方言越人主人身之五臟論皆不失內經之旨同歸於一理也學者詳之或問經謂清氣在下則生飧泄濁氣在上則生䐜脹夫病在上者法當用木香檳榔等藥以降之病在下者法當用升麻柴胡等藥以提之理宜然也其或泄痢脫肛後重大孔痛不可忍是為氣下陷也法當舉之以升麻柴胡和之以木香檳榔若夫四藥同劑不無升降混淆奚有歸一治病之功邪曰天生藥石治病各逞其能如張仲景制大柴胡湯用柴胡大黃同劑以治傷寒表裡俱見之證然柴胡升而散外邪大黃降而泄內實使病者熱退氣和而愈今用升麻柴胡自能升清氣而上行木香檳榔自能逐邪氣而下降故使脫肛舉而後重除故可同劑而成功矣何疑之有哉欲用藥者宜仿此而擴充之可也或問人身之兩腎猶車之有兩輪其形同色亦無異不知王叔和何所見而獨謂左腎屬水而右腎屬火又指右腎為命門以配三焦之經嘗聞有生之初胚胎未成之際先生二腎即造化天一生水之義今以水火岐之冰炭相反何歟曰予嘗私淑丹溪而得其說矣按內經以心胞絡為三焦相火之配而並行於經也其兩腎本為一臟初未嘗有左右之分而越人始分之亦不言其為相火之臟叔和立說以三焦合命門為表裡亦有深意存焉蓋謂腎屬陰而本主乎靜靜則陽孕於其中陽既孕矣其能純乎靜而無生氣之動歟若經所謂腎屬水受五臟六腑之精而藏之是陽歸之陰而成孕者也又謂腎為作強之官伎巧出焉陽出之陰而化生者也是故腎為一臟配五行而言者則屬之水矣以其兩腎之形有二象而言者亦得以左右分陰陽剛柔而命為五臟之根元也以左為陰右為陽陰為水陽為火水為血火為氣於是左腎之陰水生肝木肝木生心火右腎之陽火生脾土脾土生肺金其四臟之於腎猶枝葉之出於根也雖然但不可獨指右腎為命門耳經曰太衝之地名曰少陰少陰之上名曰太陽太陽根起於至陰結於命門按王注靈樞經云命門者目也抑考明堂銅人等經命門一穴在脊中行第十四椎下陷中兩腎之間夫兩腎固為真元之根本性命之所關雖為水臟而實有相火寓乎其中象水中之龍火因其動而發也愚意當以兩腎總號為命門其命門穴正象門中之棖闑司開闔之象也惟其靜而闔涵養乎一陰之真水動而開鼓舞乎龍雷之相火夫水者常也火者變也若獨指乎右腎為相火以為三焦之配尚恐立言之未精也未知識者以為何如或問內經所謂壯火之氣衰少火之氣壯壯火食氣氣食少火壯火散氣少火生氣何謂也曰王太僕已有註文但未甚詳耳請陳一得如下夫壯火之氣衰少火之氣壯者言造化勝復之理少而壯壯而衰衰而復生循環無端生生不息經雖不言衰而復生其理實在其中矣壯火食氣者言元氣見食於壯火也氣食少火者言元氣見助於少火也壯火散氣謂耗散元氣少火生氣謂滋生元氣此二句申明上文二句之言耳蓋火不可無亦可少而不可壯也少則滋助乎真陰壯則燒爍乎元氣陰陽造化之理無往不復夫火壯而亢極則兼水化以制之經曰亢則害承乃制也又曰制則生化故壯火衰而少火復生是以陰陽調和萬物生旺四時生長化收藏之道即此理也以人論之胚胎未成之初先生二腎以涵養真陰是故名為元氣天一生水之義焉然後肝心脾肺以及五腑相繼而生五臟五腑之外又有胞絡相火遊行於三焦之間故以三焦為配二者皆有名無實之腑臟蓋相火無定位故也抑考先哲有曰天非此火不能生物人非此火不能有生言其不可無也此非少火生氣之意乎又曰火與元氣不兩立一勝則一負言其不可亢也又非壯火散氣之謂乎管見如斯未知是否或問越人難經第一難中所謂十二經皆有動脈獨取寸口以決五臟六腑死生吉凶之法又曰寸口者脈之大會手太陰之脈動也夫寸口一脈何以能決臟腑死生吉凶乎鰲峰熊氏注為右寸謂右寸之屬肺也四明張氏注為兩寸謂脈會太淵穴也二說不同其孰非而孰是歟請明以告我曰古聖立法以三部九候決人死生以六臟六腑分配於六部之中故可以驗人臟腑之吉凶也殊不知內經言寸口者頗多悉兼關尺而言也大槩古人以寸口為六脈之總名耳不然內經何以言寸口之脈中手短者曰頭痛寸口脈中手長者曰足脛痛寸口脈中手促上擊者肩背痛若此之類莫能盡述先哲注謂中手為醫者之中指也然則非病者之關脈乎夫越人之難經因內經而作故有是語今之注者皆以己意妄釋故與經旨不合學者宜再思之或問難經第八難曰寸口脈平而死者何謂也然諸十二經脈者皆繫於生氣之源所謂生氣之源者十二經之根本也謂腎間動氣也此五臟六腑之本十二經之根呼吸之門三焦之源一名守邪之神故氣者人之根本也根絕則莖吐枯矣寸口脈平而死者生氣獨絕於內也夫所謂腎間動氣者釋者皆指為兩尺兩尺既絕何謂寸口脈平何不言尺中腎脈而言腎間動氣請明辯以釋吾疑幸甚曰此言寸口脈平而死者亦兼關尺而論也腎間動氣者臍下氣海丹田之地也或曰臍下中行乃任脈所屬與腎何相干哉曰各開寸半為第二行皆屬足少陰腎經其臍與背後命門穴對各開寸半腎腧穴也故丹田氣海與腎脈相通為腎之根也又若有生之初先生二腎胞系在臍故氣海丹田實為生氣之源十二經之根本也或曰寸口既平奚疑其死乎曰此為病劇形脫者論耳內經曰形肉已脫九候雖調者死凡見人之病劇者人形羸瘦大肉已脫雖六脈平和猶當診候足陽明之衝陽與足少陰之太谿二脈或絕更候臍下腎間之動氣其或動氣未絕猶有可生之理動氣如絕雖三部平和其死無疑矣醫者其可不詳察乎或問內經有曰陽明病甚則棄衣而走登高而歌或不食數日而逾垣上屋所上之處皆非素所能也素非所能因病而不食反能登非常之處豈有是哉曰難經有云重陽者狂重陰者顛又曰顛多喜而狂多怒所謂重陽者三部陰陽脈皆洪盛而牢故病強健而有力故名曰狂謂重陰者三部陰陽脈皆沉伏而細故病疲倦而無力故名曰顛嘗見東陽樓氏一少年病狂一日天風大作忽飛上於邑東之塔巔且歌且哭其塔實無容步之堦眾皆以為怪予思龍乃純陽之物伏蟄於海內其身止有鱗甲且無羽翼遇陽氣升騰之日則借風雲之勢而能飛騰即此義也奚足為怪哉或問難經五十三難曰經言七傳者死間臟者生然七傳者傳其所勝也間臟者傳其子也何以言之假令心病傳肺肺病傳肝肝病傳脾脾病傳腎腎病傳心一臟不再傷故言七傳者死也間臟者傳其所生也假令心傳脾脾傳肺肺傳腎腎傳肝肝傳心是子母相傳周而復始如環無端故言生也夫經文所謂七傳者據其數止六傳而已謂一臟不再傷按其數乃有四臟不再受傷且其間臟之理未聞有發明之旨釋者止是隨文解義而已請明辯以釋吾疑可乎曰夫此條言虛勞之證也其所謂七傳者心病上必脫腎病傳心一句其一臟不再傷當作三臟不再傷皆傳寫之誤耳蓋虛勞之證必始於腎經五臟從相剋而逆傳已盡又復傳於腎與心則水絕滅而火大旺故死而不復再傳彼之三臟矣其有從相生而順傳者蓋腎水欲傳心火卻被肝木乘間而遂傳肝木然後傳心火次第由順行而及於彼之三臟而有生生不息之義故曰間臟者生學者其再思之或問醫家以水烹煮藥石本草著名類多而未詳其用曰長流水曰急流水曰順流水曰逆流水曰千里水曰半天河水曰春雨水曰秋露水曰雪花水曰井花水曰新汲水曰無根水曰菊英水曰潦水曰甘瀾水曰月窟水夫何一水之用而有許多之名必其能各有所長請逐一明言其故無吝曰謂長流水者即千里水也但當取其流長而來遠耳不可泥於千里者以其性遠而通達歷科坎已多故取以煎煮手足四末之病道路遠之藥及通利大小便之用也曰急流水者湍上峻急之流水也以其性速急而達下故特取以煎熬通利二便及足脛以下之風藥也曰順流水者其性順而下流故亦取以治下焦腰膝之證及通利二便之用也曰逆流水者漫流洄瀾之水也以其性逆而倒流故取以調和發吐痰飲之劑也曰半天河水者即長桑君授扁鵲飲以上池之水乃竹籬藩頭管內之積水耳取其清潔自天而降未受下流汙濁之氣故可以為煉還丹調仙藥之用也曰春雨水者立春日空中以器盛接之水也其性始得春升生髮之氣故可以煮中氣不足清氣不升之藥也曰秋露水者其性稟收斂肅殺之氣故可取以烹煎殺祟之藥及調敷殺癩蟲疥癬諸蟲之劑也曰井花水者清晨井中第一汲者其天一真精之氣浮結於水面故可取以烹煎補陰之劑及修煉還丹之用今好清之士每日取以烹春茗而謂清利頭目最佳其性味同於雪水也曰菊英水者蜀中有長壽源其源多菊花而流水四季皆菊花香居人飲其水者壽皆二三百歲故陶靖節之流好植菊花日採其花英浸水烹茶期延壽也日新汲水者井中新汲水未入缸甕者取其清潔無混雜之劑故用以烹煮藥劑也日甘瀾水者器盛水以物揚躍使水珠沫液盈於水面其水與月窟水性同取其味甘溫而性柔故可以烹傷寒陰證等藥也曰潦水者又名無根水山谷中無人跡去處新土科凹中之水也取其性不動搖而有土氣內存故可以煎熬調脾進食以補益中氣之劑也夫本草雖有諸水之名而未詳言其用今故述之以為後學之矜式云或問丹溪治腫脹之證專主乎土敗木賊濕熱相乘為病東垣又多主乎寒言病機諸腹脹大皆屬於熱之語乃言傷寒陽明經大實大滿之證也又云熱脹少而寒脹多二說不同其孰非而孰是歟曰東垣北方人也其地土高燥濕熱少而寒氣多故有是論我丹溪先生生長於東南之地故病此者盡因脾虛受濕肝木大旺故言然也或曰二說不同之義既得聞命矣而丹溪治腫之大法曰必須養肺以制木使脾無賊邪之慮滋腎以制火使肺得清化之源斷妄想以保母氣卻鹽味以防助邪以大劑人參白朮補脾使脾氣得實自能健運升降此千載不易之定論萬舉五全之妙法也活人多矣嘗用此法以治黃腫之證反加悶亂增劇不安改用香附蒼朮厚朴之劑反獲全功竊思水腫與黃腫皆是濕熱傷脾所致何治法之不同歟曰夫水腫之證蓋因脾土虛甚而肝木太過故水濕妄行其中雖有清痰留飲實無鬱積膠固故以參朮為君而兼以利水清金去濕熱之藥此標本兼該之治故有十全之功也彼黃腫者或酒疸或谷疸沉積頑痰膠固鬱結於其中故或為痃癖或為積聚是以積於中而形於外蓋因土氣外形而黃也故宜以厚朴蒼朮香附陳皮之類以平其土氣之敦阜用鐵粉青皮之類以平其木氣之有餘加以曲糵助脾消積退黃之後仍用參朮等補脾之劑以收十全之功此標而本之之治也若二證之藥易而治之禍不旋踵學者不可不知或問飢甚方食而食反不運化多為嘔吐吞酸等證何也曰飢而即食渴而即飲此造化自然之理也飢不得食胃氣已損脾氣已傷而中氣大不足矣遇食大嚼過飽益甚是以大傷胃氣輕則吞酸噁心重則惡寒發熱而為內傷等證者多矣又或負重遠行辛苦飢甚遇食太過則四肢倦怠矣若又強力復行適遇風雨外襲遂成內傷挾外感之證或為腫脹危篤之疾養生君子切宜防微杜漸戒之戒之或問針法有補瀉迎隨之理固可以平虛實之證其灸法不問虛實寒熱悉令灸之其亦有補瀉之功乎曰虛者灸之使火氣以助元陽也實者灸之使實邪隨火氣而發散也寒者灸之使其氣之復溫也熱者灸之引鬱熱之氣外發火就燥之義也其針刺雖有補瀉之法予恐但有瀉而無補焉經謂瀉者迎而奪之以針迎其經脈之來氣而出之固可以瀉實矣謂補者隨而濟之以針隨其經脈之去氣而留之未必能補虛也不然內經何以曰無刺熇熇之熱無刺渾渾之脈無刺漉漉之汗無刺大勞人無刺大飢人無刺大渴人無刺新飽人無刺大驚人又曰形氣不足病氣不足此陰陽皆不足也不可刺刺之重竭其氣老者絕滅壯者不復矣若此等語皆有瀉無補之謂也學者不可不知或問虛損之疾世俗例用局方十全大補湯以補之其方實為諸虛之關鍵也用參耆苓朮甘草以補氣虛用芎歸芍藥地黃肉桂以補血少吾子將何以議之乎曰此藥乃氣血兩虛之劑或血虛而氣尚實或氣虛而血尚充者其可一例施乎內經曰毒藥以治其病蓋藥性各有能毒然中病者借其能以獲安不中病者徒惹其毒以增病耳假如心脾二經虛損當以茯苓補之虛而無汗及小水短少者服之有功虛而小便數者多服則令人目盲虛而多汗者久服損真氣夭人天年以其味淡而利竅也又如肺氣弱及元陽虛者當以黃耆補之然肥白人及氣虛而多汗者服之有功若蒼黑人腎氣有餘而未甚虛者服之必滿悶不安以其性塞而閉氣也甘草為健脾補中及瀉火除煩之良劑然嘔吐與中滿及嗜酒之人多服必斂膈不行而嘔滿增劇以其氣味之甘緩也川芎為補血行血清利頭目之聖藥然骨蒸多汗及氣弱人久服則真氣走散而陰愈虛甚以其氣味之辛散也生地黃能生血脈然胃氣弱者服之恐損胃不食熟地黃補血養血然痰火盛者恐泥膈不行人參為潤肺健脾之藥若元氣虛損者不可缺也然久嗽勞嗽咯血鬱火在肺分者服之必加嗽增喘不寧以其氣味之甘溫滯氣然也白芍藥為涼血益血之劑若血虛腹痛者豈可缺歟然形瘦氣弱稟賦素虛寒者服之恐伐發生之氣以其氣味之酸寒也藥性能毒未易悉舉學者宜究本草之詳不可妄施以殺人也或問脈經謂一息四至以上為無病常人之脈今見無病之人或有一息五至有奇者有一息三至無餘者何如是之異乎曰生成之脈豈無緩急遲數之殊歟經曰性急脈亦急性緩脈亦緩大抵脈緩而遲者多壽脈急而數者多夭經曰根於中者命曰神機神去則機息蓋氣血者人身之神也脈急數者氣血易虧而神機易息故多夭脈遲緩者氣血和平而神機難損故多壽先哲論江海之潮即天地之噓吸晝夜止二升二降而已人之呼吸晝夜一萬三千五百息故天地之壽悠久而無疆人之壽延者數亦不滿百也管見如斯未知是否或問有人寸關尺三部之脈按之絕無形跡而移於手陽明經陽谿與合谷之地動者何歟曰手太陰經肺與手陽明大腸一臟一腑相為表裡其列缺穴乃二經之絡脈故脈從絡而出於陽明之經此為妻乘夫位地天交泰生成無病之脈耳學者可不曉歟或問婦人產後之證丹溪謂當以大補氣血為主治雖有雜證以末治之又曰產後中風切不可作風治而用風藥然則產後不問諸證悉宜大補氣血乎曰詳主末二字其義自明若夫氣血大虛諸證雜揉但虛而無他證者合宜大補氣血自愈或因虛而感冒風寒者補氣血藥帶驅風之劑或因脾虛而食傷太陰者補氣血藥加消導之劑或因瘀血惡露未盡而惡寒發熱者必先逐去瘀血惡露然後大補經曰有本而標之者有標而本之者又曰急則治其標緩則治其本丹溪主末二字即標本之意耳臨證之際其於望聞問切之間豈可不辨乎若一例施之以補豈非刻舟求劍之術耶或問妊娠之婦有按月行經而胎自長者有三五個月間其血大下而胎不墮者或及期而分娩或逾月而始生其理何歟曰其按月行經而胎自長者名曰盛胎蓋其婦血氣充盛養胎之外其血猶有餘故也其有數月之胎而血大下謂之漏胎蓋因事觸動任脈故血下而未傷於子宮故也雖然孕中失血胎雖不墮其氣血亦虧多致逾月不產予曾見有十二三月或十七八月或二十四五個月生者往往有之俱是氣血不足胚胎難長故耳凡十月之後未產者當服大補氣血之藥以培養之庶分娩之無憂也學者不可不知或問丹溪所謂難產之婦皆是八九個月內不能謹以致氣血虛故也請問其旨何歟曰蓋婦人有娠大不宜與丈夫同寢今人未諳此理至於八九個月內猶有房事夫情欲一動氣血隨耗蓋胎孕全仗氣血培養氣血既虧則胎息羸弱日月既足子如夢覺即欲分娩遂能拆胞求路而出胞破之後其胞中之漿水沛然下流胎息強健者即翻身隨漿而下此為易產者也胎息倦弱者猶如焚寐未醒轉頭遲慢不能隨漿而出胞漿既干則汙血閉塞其生路是以子無所向遂致橫生逆產臨產之際若見漿下而未分娩者便當憂恐急服催生之藥如蜀葵子之類逐去惡血道路通達庶有速產之功醫者不可不知此意或問中風之候皆半身不遂其有遷延歲月不死者何也曰如木之根本未甚枯而一邊之枝幹先萎耳經曰根於中者命曰神機神去則機息言動物也根於外者命曰氣立氣止則化絕言植物也夫神機未息亦猶氣化之未絕耳故半身雖不運用然亦未至於機息而死也古所謂癱瘓者亦有深意存焉言癰者坦也筋脈弛縱坦然而不舉也瘓者渙也血氣散慢渙然而不用也或曰其為治之法與諸痹同乎曰不同也經謂風寒濕三氣合而成痹故曰痛痹筋骨掣痛曰著痹著而不行曰行痹走痛不定曰周痹周身疼痛皆邪氣有餘之候也其癱瘓者或血虛或氣虛皆正氣不足之證其治法故不同也惟痿痹屬血虛麻痹屬氣虛與癱瘓治法大同而小異焉學者宜加詳察毋蹈乎實實虛虛之覆轍云或問雀目之證遇晚則目不見物至曉復明此何病使然曰是則肝虛之候也或曰肝常慮其有餘然亦有不足者乎曰邪氣盛則實正氣奪則虛其人素稟血虛適遇寅申二年少陽相火司天厥陰風木在泉火炎於上木鬱於下夫胞絡相火既盛則心血沸淖而乾涸經曰天明則日月不明邪害空竅蓋心出血肝納血心血既涸則肝無攸受經又曰目得血而能視緣肝開竅於目肝既無血則目瞀而不明矣或曰目瞀不明既得聞命矣其晚暗而曉復明者何也曰木生於亥旺於卯而絕於申至於酉戌之時木氣衰甚遇亥始生至日出於卯之地木氣稍盛而目復明矣雖然終不能瞭然如故或曰雀目之患終變為黃脹而死何也曰木絕於申乃水土長生之地木氣萎和土氣敦阜經謂氣有餘則制已所勝而侮所不勝此土氣有餘而侮所不勝之木也或曰治法何如曰先宜地黃芎歸等藥以補益其腎肝之不足次用厚朴蒼朮陳皮之類平其土氣之有餘此乃略示端倪耳醫者自宜臨證斟酌而處治之慎不可按圖而索驥也或問小兒氣喘世俗例以為犯土謂犯其土皇也或安碓或作灶或浚井填塞開通溝渠等事適遇小兒氣喘遂云犯土無疑矣信聽術士退土或書符命貼於動土之處或咒法水焚符調服或按家之九宮謂土皇居於何宮太陽落在何宮當取太陽之土與兒飲之能釋土皇之厄而喘定間亦有驗者夫歷代醫書汗牛充棟何不該載而遺此證為黃冠之流醫治歟請明以告我曰夫小兒發喘多因風寒外束腠理壅遏而肺氣不得宣通而為病耳治法當用錢氏瀉白散或三拗湯等劑使腠理開通肺氣舒暢而喘息定矣或因吐瀉之後而中氣不足亦使短氣而喘治用錢氏益黃散東垣補中益氣湯或用伏龍肝湯泡放溫飲之其喘立定者有之蓋脾土大虛必借土氣以培益之其術士窺竊此意而巧立名色而謂太陽之土能安土也夫小兒之證不一或慢驚直視而喘或肺脹氣促而喘縱取太陽土盈盎以沃之亦莫能救其萬一醫者自宜檢方按法調治毋聽末流之俗以致惑焉或問婦人懷鬼胎者何歟曰晝之所思為夜之所見凡男女之性淫而虛者則肝腎之相火無時不起故勞怯之人多夢與鬼交夫所謂鬼胎者偽胎也非實有鬼神交接而成胎也古方有云思想無窮所願不遂為白淫白濁流於子宮結為鬼胎乃本婦自己之血液淫精聚結成塊而胸腹脹滿儼若胎孕耳非偽胎而何或曰嘗閱滑伯仁醫驗謂仁孝廟廟祝楊天成一女薄暮遊廟廡見黃衣神覺心動是夕夢與之交腹漸大而若孕邀伯仁治診之曰此鬼胎也其母道其由與破血墜胎之藥下如蝌蚪魚目者二升許遂安此非與神交乎曰有是事而實無是理豈有土木為形能與人交而有精成胚胎耶噫非神之惑於女乃女之惑於神耳意度此女年長無夫正所謂思想無窮所願不遂也有道之士勿信乎邪說之惑焉或問鰲峰熊氏纂集運氣全書及撰為傷寒鈐法以病者之所生年月日時合得病之日期推算五運六氣與傷寒六經證候無不吻合謂某日當得某經某經當用某藥而以張仲景一百一十有三方按法施治如太陽無汗麻黃湯有汗桂枝湯之類使後學能推此法不須問證察脈但推算病在此經即用此經之藥實為醫家之捷徑妙訣也吾子可不祖述乎曰此馬宗素無稽之術而以世之生靈為戲玩耳竊謂上古聖人仰觀天文俯察地理以十干配而為五運以十二支合而為六氣天以六方寓之歲以六氣紀之以天之六氣加臨於歲之六節五行勝復盈虧之理無有不驗傳曰天之高也星辰之遠也苟求其故千歲之日至可坐而致也今草莽野人而以人之年命合病日而為運氣鈐法取仲景之方以治之是蓋士師移情而就法也殺人多矣知理君子幸勿蹈其覆轍云或問龐安常傷寒總病論所載時行瘟疫謂春有青筋牽證其候頸背雙筋牽急先寒後熱腰強急腳縮不伸胻中欲折或眼黃項背強直夏有赤脈㩌證其候口乾舌裂咽塞戰掉驚動不定秋有白氣貍證其候經絡壅滯皮毛堅豎發泄體熱生斑氣喘引飲冬有黑骨瘟證其候腰痛欲折胸脅如刀刺切痛心腹膨脹四季有黃肉隨證其候頸下結核頭重項直或皮肉強硬而隱隱發熱嘗聞醫有賢愚疾無今古近年以來未嘗有以上諸證何今古之不同歟請明言其故幸甚曰瘟疫之證素無定體或氣運之變遷或世情之不古愧予年逾八旬略未見此異證或世有之而予未之見歟抑亦見之而予未之識歟安常稟出類拔萃之資為一代名世之士著述方書以為後學之規範豈好為異說以欺世罔俗哉姑錄之以俟達者再論或問龐安常傷寒總病論所載聖散子方謂出於蘇子瞻尚書所傳又謂其方不知所從來而故人巢君谷世寶之以治瘟疫之疾百不失一安常贊曰自古論病惟傷寒至為危急表裡虛實日數證候應汗應下之法差之毫釐輒至不救而用聖散子者一切不問陰陽二感或男女相易狀至危篤者連飲數劑則汗出氣通飲食漸進神宇完復更不用諸藥連服取瘥其餘輕者心額微汗正爾無恙藥性少熱而陽毒發狂之類入口即覺清涼殆不可以常理論也時疫流行平旦輒煮一釜不問老少良賤各飲一大盞則時氣不入其門平居無病能空腹一服則飲食甘美百疾不生真濟世衛家之寶也吾子何不遵其法多合以濟世之瘟疫豈非積德之一事乎曰予閱其方殆與醫道不合蓋其藥味止是燥熱助火之劑別無祛邪除瘴之能如黑附子高良薑吳茱萸石菖蒲麻黃細辛半夏厚朴肉豆蔻防風藿香豈非辛烈燥熱之劑乎其茯苓蒼朮藁本豬苓澤瀉獨活甘草稍溫不熱雖有柴胡芍藥枳殼三味之涼恐一杯之水難救一車薪之火夫熱藥治熱病素問謂之從治又謂之反治又謂之劫劑然此方必當時適遇瘟疫之身熱無汗或日期已過邪氣欲去正氣將復之際偶投一服二服劫而散之者有之由是眾皆以為得神仙之法爭錄其方以傳於世正所謂訛上傳訛也豈可以大釜煎煮令一傢俱飲乎又豈可令無病之人空腹服此熱藥乎用藥者若不執之以理而謂不殺人者予未之信也安常為一代之名醫而載此方於傷寒論中而謂能博施濟眾亦賢者之過焉或問發砂之證古方多不該載世有似寒非寒似熱非熱四體懈怠飲食不甘俗呼為砂病其治或先用熱水蘸搭臂膊而以苧麻刮之甚者或以針刺十指出血或以香油燈照視身背有紅點處皆烙之以上諸法皆能使腠理開通血氣舒暢而愈此為何病又何由而得之乎曰內經名為解㑊原其所因或傷酒或中濕或感冒風寒或房事過多或婦人經水不調血氣不和皆能為解㑊證與砂病相似實非真砂病也夫砂病者嶺南煙瘴之地多有之矣詩云為鬼為蜮則不可得注云蜮短狐也江淮間多有之能含砂以射水中人影唐詩云射工巧俟遊人影亦謂此也人不見其形若被其毒輒為寒熱而病一曰蜮如鱉有三足一名射影病瘡如疥埤雅曰有一角橫在口前如弩檐臨其角端曲如上弩以氣為矢因水勢以射人俗呼水弩鵝能食之本草云溪毒砂蝨水弩射工蜮短狐蝦鬚之類俱能含砂射人被其毒者則憎寒壯熱百體分解若傷寒初發之狀彼土人治法以手捫摸痛處用芋葉或甘蔗葉卷角入肉以口吸出其砂外用生大蒜搗膏封貼瘡口即愈諸蟲惟蝦鬚最毒若不早治十死七八其毒深入於骨若蝦鬚之狀其瘡類乎疔腫彼地有鸂鶒鸀鳿等鳥專食以上諸蟲凡遇此病即以此鳥毛糞燒灰服之及籠此鳥於病者身畔吸之其砂聞氣自出而病安也其他無此諸蟲之地實非真砂證也管見如斯學者更宜博訪以長見聞可也或問痞與痃癖積聚癥瘕病雖似而其名各不同請逐一條陳其說以曉後學可乎曰痞者否也如易所謂天地不交之否內柔外剛萬物不通之義也物不可以終否故痞久則成脹滿而莫能療焉痃癖者懸絕隱僻又玄妙莫測之名也積者跡也挾痰血以成形跡亦鬱積至久之謂爾聚者緒也依元氣以為端緒亦聚散不常之意云症者徵也又精也以其有所徵驗及久而成精萃也瘕者假也又遐也以其假借氣血成形及歷年遐遠之謂也大抵痞與痃癖乃胸膈間之候積與聚為肚腹內之疾其為上中二焦之病故多見於男子其症與瘕獨見於臍下是為下焦之疾故常得於婦人大凡腹中有塊不問積聚癥瘕俱為惡候切勿視為尋常等疾而不求醫早治若待脹滿已成胸腹鼓急雖倉扁復生亦莫能救其萬一遘斯疾者可不懼乎或問或曰今之夢寐中而常魘者似有鬼神所附之狀何也曰然夢寐間常魘者蓋火起於下而痰閉於上心血虧欠而心神失守故爾豈有鬼神所附之理哉賢者願無惑焉或問古老醫家有禁咒一科今何不用曰禁咒科者即素問祝由科也立教於龍樹居士為移精變氣之術耳可治小病或男女入神廟驚惑成病或山林溪谷沖斥惡氣其證如醉如癡如為邪鬼所附一切心神惶惑之證可以借咒語以解惑安神而已古有龍樹咒法之書行於世今流而為師巫為降童為師婆而為扇惑人民哄嚇取財之術噫邪術惟邪人用之知理者勿用也或問丹溪所謂有外感挾內傷者有內傷挾外邪者其證何如而見當以何法而治請詳以語之曰假如先因勞役過度飲食失節而其體已解㑊又為感冒風寒而作其證必惡寒發熱頭身懼痛右手氣口及關脈則大於左手人迎及關脈二倍而兩手陽脈俱有緊盛之勢此內傷重而外感輕謂之內傷挾外邪也治法必以東垣補中益氣湯為主加以防風羌活柴胡之類或先因秋冬之月觸冒風寒鬱積已久欲發未發之間而加之飲食勞倦觸動而發其證必大惡風寒頭身大痛而大發熱左手人迎及關中脈則大於右手氣口及關脈一二倍而兩手陽脈亦各有緊盛之勢此外感重而內傷輕謂之外感挾內傷也治法必以仲景傷寒論六經見證之藥為主治少加以補中健脾之劑夫外感重者宜先攻而後補攻者汗下之類內傷重者宜先補而後攻二證俱重宜攻補兼施或曰勞倦飲食二者俱甚而為大熱之證欲補則飲食填塞胸中恐愈增胞悶欲消導則恐元氣愈虛而病益甚其將何法以處治乎曰此正王安道所論不足中之有餘證也必宜攻補兼施以補中益氣湯間與丹溪導痰補脾飲加神麯麥芽之屬甚者以東垣枳實導滯丸之類與補中益氣湯間而服之食去而虛證亦除是亦攻補兼施之法也醫者誠能斟酌權宜而處治之無有不安之理也或問人之壽夭各有天命存焉凡人有生必有死自古皆然醫何益乎曰夫所謂天命者天地父母之元氣也父為天母為地父精母血盛衰不同故人之壽夭亦異其有生之初受氣之兩盛者父母元氣皆壯盛也余仿此當得上中之壽受氣之偏盛者當得中下之壽受氣之兩衰者能保養僅得下壽不然多夭折雖然又不可以常理拘泥論也或風寒暑濕之感於外飢飽勞役之傷乎內豈能一一盡乎所稟之元氣耶故上古神農氏嘗百草制醫藥乃欲扶植乎生民各得盡乎天年也今時人有不信醫而信巫枉死者皆不得盡乎正命而與巖牆桎梏死者何異焉或曰今之推命者皆以所生日時之天上星辰推算其生死安危無不節節應驗子以父母之元氣為天命恐非至當之語曰天人之理盛衰無不吻合如河出圖洛出書聖人取以畫八卦而成易書凡人之一動一靜與夫吉凶消長之理進退存亡之道用之以卜筮毫髮無差雖然全賢諄諄教誨必使盡人事以副天意則凶者化吉亡者得存未嘗令人委之於天命也傳曰修身以俟命而已矣是故醫者可以通神明而權造化能使夭者壽而壽者仙醫道其可廢乎或問先哲謂諸痛為實諸癢為虛丹溪亦曰諸痛不可用參耆蓋補其氣氣旺不通而痛愈甚然則凡病痛者例不可用參耆等藥乎曰以上所論諸痛特指其氣實者為言耳如暴傷風寒在表作痛或因七情九氣怫鬱不得宣通而作痛者固不可用補氣藥也若夫勞役傷形致身體解㑊而作痛者或大便後及大瀉痢後氣血虛弱身體疼痛及四肢麻痹而痛或婦人產後氣血俱虛致身體百節疼痛等病其可不用參耆等補氣藥乎學者毋執一也或問寸關尺三脈部位既得聞命矣外有人迎氣口神門三脈其位安在請明以告我曰按活人書謂左手關前一分人迎是也右手關前一分氣口是也又按經脈謂左手人迎以前寸口脈即知人迎在病人左手關前寸後之位診者右手食指與中指兩岐之間是也又謂右手氣口以前寸口脈即知氣口在病人右手關前寸後之位診者左手食指與中指兩岐之間是也經又曰兩手神門以後尺中脈即知神門各在病人兩手關後寸前之位診者中指與無名指兩岐之間是也今人多不識此或指人迎於左關或指人迎於左寸或指氣口於右關或指氣口於右寸或指神門於兩關相對者皆非也學者可不審乎或問藥性有相畏相惡相反而古方多有同為一劑而用者其理何如曰若夫彼畏我者我必惡之我所惡者彼必畏我蓋我能制其毒而不得以自縱也且如一劑之中彼雖畏我而主治之能在彼故其分兩當彼重我輕略將以殺其毒耳設我重彼輕制之太過則盡奪其權而治病之功劣矣然藥性各有能毒其所畏者畏其能所惡者惡其毒耳如仲景制小柴胡湯用半夏黃芩生薑三物同劑其半夏黃芩畏生薑而生薑惡黃芩半夏因其分兩適中故但制其慓悍之毒而不減其退寒熱之能也其為性相反者各懷酷毒如兩軍相敵決不與之同隊也雖然外有大毒之疾必用大毒之藥以攻之又不可以常理論也如古方感應丸用巴豆牽牛同劑以為攻堅積藥四物湯加人參五靈脂輩以治血塊丹溪治屍瘵二十四味蓮心散以甘草芫花同劑而謂妙處在此是蓋賢者真知灼見方可用之昧者固不可妄試以殺人也夫用藥如用兵善用者置之死地而後存若韓信行背水陣也不善者徒取滅亡之禍耳可不慎哉或問當歸一物雷公謂頭破血身和血尾止血東垣又云頭止血身養血尾破血二說不同豈無歸一之論乎請明以告我曰東垣曰當歸者使氣血各有所歸之功之號也蓋其能逐瘀血生新血使血脈通暢與氣並行周流不息故云然又曰中半以上氣脈上行天氣主之中半以下氣脈下行地氣主之身則獨守乎中而不行也故人身之法象亦猶是焉予謂瘀血在上焦與上焦之血少則用去蘆上截瘀血在下焦與下焦之血虛則用下截之尾若欲行中焦之瘀與補中焦之血則用中一段之身非獨當歸他如黃芩用上截之虛者以降肺火用下截之實者以瀉大腸之火防風桔梗之類亦然此千古不易之定論也學者詳之或問黃柏地黃之類俱忌鐵器蒸搗何歟曰夫地黃黃柏之類皆腎經藥也錢仲陽謂腎有補而無瀉又曰虛者補其母實者瀉其子蓋腎乃陰中之少陰為涵養真元之水臟其所以忌鐵器者防其伐木瀉肝恐子能令母虛也竟無他說或問本草所載竹茹竹葉及烹竹瀝皆云用淡竹夫竹類頗多未審何竹名為淡竹耶曰東坡蘇公之方有云淡竹者對苦竹為文除苦竹之外皆淡竹也我丹溪先生常用早筀俗名雷竹此淡中之淡者也此竹又名甜竹以其筍之味甜也別有一種水竹其筍味純淡故以上二竹皆可入藥用緣二筍俱無焮辣之味故知其無毒故也如無二竹晚筀竹亦可代用余竹皆不可用也或問嶺表煙瘴之地其俗平居無病之人朝夕常噬檳榔云可闢除山嵐瘴氣之疾吾儒有仕於彼地者亦隨其俗而噬之果有益乎否乎曰按本草檳榔味辛氣溫為純陽之物善驅逐滯氣散邪氣泄胸中至高之氣除痰癖下行以治後重脫疘之證如果有以上諸疾用之以佐木香芩術等藥無不應驗若無病沖和之胃氣而無故朝夕常噬吾恐反泄真氣非徒無益而又害之是也嗚呼因習之弊死而無悔者焉羅謙甫曰無病服藥如壁里添柱誠哉是言也嘗聞用藥如用兵朝廷不得已而行之以禦寇耳若無寇可平而無故發兵不惟空廢糧餉抑且害及於無辜之良民也戒之戒之或問婦人產後諸疾古方多用四物湯加減調治我丹溪先生獨謂芍藥酸寒能伐發生之氣禁而不用何歟曰新產之婦血氣俱虛之甚如天地不交之否有降無升但存秋冬肅殺之令而春夏生髮之氣未復故產後諸證多不利乎寒涼之藥大宜溫熱之劑以助其資始資生之化源也蓋先哲制四物湯方以川芎當歸之溫佐以芍藥地黃之寒是以寒溫適中為婦人諸疾之妙劑也若或用於產後必取白芍藥以酒重複制炒去其酸寒之毒但存生血活血之能胡為其不可也後人傳寫既久脫去制炒註文丹溪慮夫俗醫鹵莽不制而用之特舉其為害之由以戒之耳若能依法制炒為用何害之有哉學者其可不知此乎中風附胃風論內經曰風之傷人也或為寒熱或為熱中或為寒中或為癘風或為偏枯又曰風者百病之長也至其變化乃為他病無常方又曰諸風掉眩皆屬肝木千金云岐伯所謂中風大法有四一曰偏枯謂半身不遂也二曰風痱謂身無疼痛四肢不收也三曰風懿謂奄忽不知人也四曰風痹謂諸痹類風狀也是以古之名醫皆以外中風邪立方處治惟河間劉守真氏謂中風癱瘓者非謂肝木之風實甚而卒中之亦非外中於風良由將息失宜心火暴甚腎水虛衰不能制之則陰虛陽實而熱氣怫鬱心神昏冒筋骨不用而卒倒無所知也亦有因喜怒思悲恐五志有所過極而卒中者夫五志過極皆為熱甚俗云風者言末而忘其本也東垣李明之亦謂中風者非外來風邪乃本氣自病也凡人年逾四旬氣衰之際或因憂喜忿怒傷其氣者多有此證壯歲之時無有也若肥盛者則間有之亦是形盛氣衰故如此耳丹溪先生亦曰有氣虛有血虛有痰甚又曰西北二方真為風所中者有之東南之人多是濕土生痰痰生熱熱生風也夫上古之論中風一以為外感風邪之候及乎三先生之論一出皆以風為虛象而謂內傷正氣為病然三先生又別各有外感之論而使後學狐疑不決故王安道有論三子主氣主火主濕之不同而與昔人主風之不合而立真中類中之目歧為二途愚竊疑焉曰卒中曰暴僕曰暴喑曰矇昧曰喎僻曰癱瘓曰不省人事曰語言蹇澀曰痰涎壅盛其為中風之候不過如此無此候者非中風之病也夫外候既若是之相侔而病因又何其若彼之異耶欲求歸一之論終不可得於是積年曆試四方之病此者若干人盡因風濕痰火挾虛而作何嘗見其有真中類中二者之分哉是以一旦豁然有所感悟未知是否請陳梗槩如下與明達者共議夫中風之證蓋因先傷於內而後感於外之候也但有標本輕重之不同耳假如百病皆有因有證因則為本證則為標古人論中風者言其證也三先生論中風者言其因也知乎此則中風之候可得而詳論矣其所謂真中風邪者未必不由氣體虛弱榮衛失調然後感於外邪也若非體虛所致則西北二方風寒大盛之地而中風者比比皆是何暇為他證哉其所謂因火因氣因濕者亦未必絕無外邪侵侮而作也若無外邪侵侮則因氣因火因濕各自為他證豈有喎僻癱瘓暴僕暴喑之候乎經曰邪之所湊其氣必虛是也豈可以一中風之證歧為二途哉治之之法重於外感者先驅外邪而後補中氣重於內傷者先補中氣而後驅外邪或以散風藥為君而以補損藥為臣使或以滋補藥為君而以散邪藥為臣使全在活法量輕重而處治之也內經曰有取本而得者有取標而得者有本而標之者有標而本之者又曰急則治其標緩則治其本若夫初病暴僕昏悶不省人事或痰涎壅盛舌強不語兩寸脈浮大而實者急宜以瓜蒂藜蘆等藥吐之以遏其勢或人迎脈緊盛或六脈俱浮弦者急宜以小續命湯表之蓋風氣大盛心火暴升而痰涎壅遏於經絡之中於斯時也豈尋常藥餌而能通達於上下哉故本方用附子以其稟雄壯之資而有斬關奪將之勢能引人參輩並行於十二經以追復其失散之元陽又能引麻黃防風杏仁輩發表開腠理以驅散其在表之風寒引當歸芍藥川芎輩入血分行血養血以滋養其虧損之真陰或加石膏知母以降胃火或加黃芩以清肺金看所挾見證與夫時月寒溫加減施治病勢稍退精神稍復輒當改用丹溪之法而以補氣補血清痰之劑以調養其本氣而安此急則治其標與夫標而本之之治也凡人手足漸覺不隨或臂膊及髀股指節麻痹不仁或口眼歪斜語言蹇澀或胸膈迷悶吐痰相續或六脈弦滑而虛軟無力雖未至於倒僕其為中風暈厥之候可指日而定矣早當從丹溪之法調治其左手脈不足及左半身不遂者以四物湯補血之劑為主治右手脈不足及右半身不遂者以四君子湯補氣之劑為主治痰盛者二陳導痰等湯兼用氣血兩虛而挾痰者八物湯加南星半夏枳實竹瀝薑汁之類若夫真元漸復痰飲漸消或覺有風邪未退者仍以羌活愈風湯防風通聖散之類出入加減調治而安此緩則治其本與夫本而標之之治也抑考先哲有云其證有中臟中腑之分證各不同中腑者多著四肢故面加五色脈浮而惡風寒四肢拘急不仁或中身之後或中身之前或中身之側皆曰中腑也其治多易中臟者多滯九竅故唇緩失音耳聾鼻塞目瞀大小便秘結皆曰中臟也其治多難大法中腑者小續命等湯以發其表中臟者三化等湯以通其里腑臟兼見者又不可以拘泥或一氣之微汗或一旬之通利又曰治須少汗亦須少下多汗則虛其衛多下則損其榮斯又不可不謹或外無六經之形證內無便溺之阻隔但手足不遂語言蹇澀者此邪中於經也又當從乎中治而不可以標本論也是宜養血通氣大秦艽湯羌活愈風湯之類治之夫所謂諸方論治乃先哲立權衡以為後學之矜式耳其於臨證切脈之際又當順時令而調陰陽安臟腑以和榮衛察病機審氣宜全在活法以度其輕重之權量甚勿膠柱以調瑟也脈法脈經曰脈微而數中風使然寸口沉大而滑沉則為實滑則為氣氣實相搏入於臟則死入於腑則愈此為卒厥不知人唇青身冷為入臟死身溫和汗自出為入腑而復自愈脈陽浮而滑陰濡濡當作轜與軟通下同而弱或浮而滑或沉而滑或微而虛或微而數寸口或浮而緩或緩而遲皆為中風之證大法浮遲者吉急疾者凶又曰脈浮而遲者易治大數而急者死方法先哲有云方者法之體法者方之用故二者不可偏廢也丹溪曰中風大率主血虛有痰或挾火與濕諸方書皆謂外中風邪惟劉河間作將息失宜水不制火極是然地有不同不可一途而論西北人外中者亦有東南之人皆是濕上生痰痰生熱熱生風也真中風邪者東垣中血脈中腑中臟之說甚好治法以治痰為先補養次之初中急掐人中令省子和三法亦可用痰壅盛者口眼歪斜者不能言語者皆當用吐法輕者用瓜蒂散或蝦汁或稀涎散吐之或重而口噤者用藜蘆末少加麝香或五分或一錢灌入鼻內吐之一吐不已再吐亦有氣血虛而不可用吐法者慎之吐法詳見痰門半身不遂大率多痰在左屬死血少血宜四物湯加桃仁紅花竹瀝薑汁在右屬痰與氣虛宜二陳湯合四君子湯加竹瀝薑汁能食者去竹瀝加荊瀝尤妙肥人多濕少加附子行經氣虛卒倒參耆補之挾痰則濃煎人參湯加竹瀝薑汁血虛者以四物湯補之挾痰者其藥俱用薑汁炒過更加薑汁竹瀝服遺尿者屬氣虛多以參耆補之凡中風口開手撒眼合遺尿吐沫直視喉如鼾睡肉脫筋痛髮直搖頭上竄面赤如妝汗綴如珠皆為中風不治之症也若動止筋痛是無血滋筋故痛曰筋枯不治以上丹溪方法凡五條四君子湯四物湯二方並見虛損門二陳湯局方千金見痰飲門小續命湯並易老加減法東垣曰中風自汗者不可重發其汗故此藥亦不可輕用也麻黃去節人參去蘆黃芩白芍藥防己桂枝川芎各七分防風去蘆一錢甘草炙七分附子童便煮去皮臍五分杏仁去皮尖另研一錢金匱要略本方有石膏當歸無附子防風防己愚按本方石膏當歸固不可無而附子防風防己尤不可缺此恐傳寫者之脫簡耳上細切作一服水一盞半加生薑五片煎至一盞溫服凡中風不審六經之形證加減用藥雖治之不能去其邪也內經曰開則淅然寒閉則然而悶知暴中風邪宜先以加減續命湯隨證治之中風無汗惡寒麻黃續命主之麻黃防風杏仁依本方加添一倍宜針太陽至陰出血崑崙舉蹺中風有汗惡風桂枝續命主之桂枝芍藥杏仁依本方加一倍宜針風府以上二證皆太陽經中風也中風無汗身熱不惡寒白虎續命主之石膏一錢四分知母一錢四分甘草七分依本方加之中風有汗身熱不惡風葛根續命主之葛根一錢四分桂枝黃芩依本方加一倍宜針陷谷刺厲兌針陷谷者去陽明經之賊邪刺厲兌者瀉陽明經之實也以上二證陽明經之中風也中風無汗身涼附子續命主之附子加一倍乾薑加七分甘草加二錢一分宜刺隱白去太陰之賊邪也此證太陰經中風也中風有汗無熱桂附續命主之桂枝附子炮甘草炙依本方加一倍宜針太谿此證少陰經中風也中風六經混淆系之於少陽厥陰或肢節攣痛或麻木不仁宜羌活連翹續命主之小續命湯八錢加羌活四錢連翹六錢古之續命混淆無六經之別今各分經治療又分經針刺刺法厥陰之井大敦刺以通其經少陽之經絕骨灸以引其熱是針灸同法象之大體也愚按先哲制小續命湯以治中風初病無汗及手足癱瘓關節不利表實等證此急則治標之藥也後人不分表裡虛實通用以治中風之證故張易水授東垣以加減之法夫中風無汗表實者固宜其有汗表虛之證雖有加減之法恐不可以膠柱鼓瑟也大秦艽湯機要中風外無六經之形證內無便溺之阻隔知血弱不能養筋故手足不能運動舌強不能言語宜養血而筋自榮此方主之秦艽甘草川芎川歸白芍藥石膏獨活白茯苓各一錢羌活防風黃芩白朮生地黃熱地黃白芷各五分細辛二分半上細切作一服水煎溫服無時如遇天陰加生薑三片同煎如心下痞滿加枳實一錢同煎服愚按此方用歸芎芍藥生熟地黃以補血養筋甚得體既曰外無六經之形證但當少用羌活秦艽引用以利關節其防風獨活細辛白芷石膏等藥恐太燥而耗血雖用此川芎止可六分之一尤宜加竹瀝薑汁同劑最好達者詳之三化湯機要中風外有六經之形證先以加減續命湯隨證治之內有便溺之阻隔復以此藥利之厚朴大黃枳實羌活各等分上細切每服三兩重水三升煎至一升半終日服之以微利為度羌活愈風湯機要並加減法療腎肝虛筋骨弱語言蹇澀精神昏憒此藥安心養神調理陰陽使無偏勝治中風內外無邪服此藥以行中道羌活甘草防風蔓荊子川芎細辛枳殼熟地黃人參麻黃薄荷甘菊花當歸知母黃耆地骨皮獨活白芷杜仲枸杞子秦艽柴胡半夏紫厚朴前胡防己各三分黃芩白茯苓芍藥各四分半蒼朮生地黃各六分桂枝一分半石膏六分天陰雨加生薑三片上細切作一服水二大盞煎至一盞去渣溫服空心一服嚥下二丹丹臨臥一服嚥下四白丹動以安神靜以清肺假令一氣之微汗本方藥一劑加麻黃一錢生薑五片空心服以熱羹粥投之得微汗則佳如一旬之通利本方藥一劑加大黃三錢如前煎臨臥服得利為度如望春大寒之後加半夏三分人參三分柴胡三分謂迎而奪少陽之氣也望夏之月加石膏三分黃芩三分知母三分謂迎而奪陽明之氣也季夏之月加防己三分白朮三分茯苓三分謂勝脾土之濕也初秋大暑之後加厚朴三分藿香三分桂一分半謂迎而奪太陰之氣也霜降之後望冬之月加附子一分半桂一分半當歸三分謂勝少陰之氣也此雖立四時加減之法更宜臨證審察虛實寒熱土地之宜邪氣之多少可也四白丹能清肺氣養魄謂中風者多昏冒氣不清利此藥主之白芷一兩白檀一錢五分白茯苓五錢白朮五錢羌活一錢五分知母二錢縮砂仁五錢人參五錢獨活一錢五分防風五錢甜竹葉二兩薄荷三錢五分細辛二錢甘草五錢香附子五錢炒川芎五錢麝香一字另研牛黃五分另研藿香一錢五分龍腦五分另研上為細末煉蜜為丸每兩作十丸臨臥嚼一丸分五七次嚼以愈風湯送下上清肺氣下強骨髓愚按此方多輕揚走竄之味雖有參朮茯苓甘草之補益而寡固不可以敵眾也若用之於風痰壅盛昏瞶不省人事者固宜其為血氣虛弱神不守舍而昏迷者則促其死耳學者宜知此意二丹丹治健忘養精神定志和血內安心神外華腠理丹參一兩五錢丹砂五錢另研遠志五錢去心熟地黃一兩五錢茯神一兩人參五錢菖蒲五錢炙甘草一兩天門冬一兩五錢麥門冬一兩去心上為細末煉蜜丸如梧桐子大每服五十丸至一百丸空心以愈風湯送下防風通聖散並加減法治中風及諸風等證防風川芎川歸白芍藥大黃芒硝連翹薄荷麻黃不用節各四分石膏桔梗黃芩去朽各八分白朮梔子荊芥穗各二分滑石二錢四分甘草炙一錢上細切作一服加生薑三片水二盞煎至一盞溫服日再服勞汗當風寒薄為皶郁乃痤去芒硝倍加芍藥當歸或生癮疹或赤或白倍加去節麻黃鹽豉蔥白發汗罷依前方加四物湯黃連解毒三藥合而飲之日二服小便淋閟去麻黃加滑石連翹煎調木香末一錢匕腰脅走注疼痛加硝石當歸甘草煎調車前子末海金砂末各一錢匕破傷風者如在表則辛以散之在裡則苦以泄之用此以兼散之汗下後通利血氣驅逐風邪加荊芥穗大黃煎調全蠍末一錢匕羌活末一錢匕諸風潮搐小兒急慢驚風大便秘結邪熱暴甚腸胃乾燥寢汗咬牙目睛上竄睡寤不安轉筋驚悸倍大黃梔子煎調茯苓末一錢匕如肌肉蠕動者調羌活末一錢匕風傷於肺咳嗽喘急加半夏桔梗紫菀如打撲傷損肢節疼痛腰中惡血留滯不下加當歸大黃煎調乳香沒藥各一錢匕解利四時傷寒加益元散半兩加蔥白鹽豉生薑水一大碗煎至五七沸溫服一半以鵝翎探之即吐吐後更服一半汗出立解如飲酒中風身熱頭痛如破加黃連蔥白煎服立愈頭旋腦熱鼻塞濁涕時下加薄荷黃連煎服內經曰膽移熱於腦則辛頞鼻淵鼻淵者濁涕下不已也如氣逆者本方煎調木香末一錢匕此方最治痢後鶴膝風良驗大防風湯局方去風順氣活血壯筋又治痢後腳弱緩痛不能行履名曰痢風或兩腳腫痛足脛枯臘名曰鶴膝風一切麻痹痿軟風濕挾虛之候服之其效如神熟地黃防風去蘆當歸去蘆酒浸黃耆白芍藥各一錢白朮一錢五分人參羌活川牛膝去蘆酒浸甘草炙各五分川芎附子各七分半炮去皮杜仲去粗皮細切薑汁拌炒絲斷一錢上細切作一服水二盞姜五片棗一枚煎至一盞空心溫服愚按此方用歸芎芍藥熟地以補血用參耆白朮甘草以補氣用羌活防風散風濕以利關節用牛膝杜仲以補腰膝用附子以行參耆之氣而走周身脈絡蓋治氣血兩虛挾風濕而成痿痹不能行者之聖藥也觀其治痢後風可見矣然可以治不足之痿弱而不可以治有餘之風痹也稀涎散仲景方治中風痰涎壅盛口眼歪斜膈塞不通等證明白礬一兩半生用半枯豬牙皂角四莢去皮弦炙黃上為細末每服一二錢溫水調下以吐為度獨聖散子和方治諸風隔實痰盛及諸癇痰飲壅溢等證甜瓜蒂一兩炒黃色瓜黃熟脫落者佳上為細末每服半錢量人虛實用之以酸虀汁調下以吐為度凡行吐法宜於天氣清明之日行之晦日難得吐病暴急者不拘先令病者隔宿不食如服藥不吐再用熱虀水投之如吐風癇病者加全蠍半錢微炒如有蟲者加豬油五七點雄黃末一錢甚者加芫花末五分立吐其蟲如濕腫滿者加赤小豆一錢故此藥不可常用大要辨其虛實實則可用虛則不可用吐罷可服降火利氣安神定志之藥附胃風丹溪曰胃風為病初飲食訖乘風涼而致其證飲食不下形瘦腹大惡風頭多汗膈塞不通脈右關弦而緩帶浮胃風湯主之胃風湯機要人參茯苓川芎川歸桂心白朮白芍藥各等分上細切每服八錢入粟米一小撮煎服如腹痛加木香五分丹溪活套凡中風證悉以二陳湯加薑汁竹瀝為主風痰盛聲如拽鋸者加南星枳殼皂角防風栝蔞仁如血虛者加川芎川歸白芍藥生地黃有瘀血加桃仁紅花如氣虛加人參白朮黃耆自汗者以黃耆為君少用茯苓半夏或佐以附子如風邪盛自汗身體痛者加防風羌活薄桂頭目不利或頭痛如破加川芎白芷荊芥穗細辛蔓荊子頂痛者去川芎加藁本或加酒炒片芩如無汗身體痛脈浮緩有力或浮緊或浮弦皆風寒在表之證本方加羌活防風川芎白芷蒼朮秦艽之類或只用小續命湯倍麻黃以表之如大便秘結不行四物三化湯以微利之三五日一去可也心血虧欠致心神恍惚本方加黃連遠志石菖蒲或心動搖驚悸者更加酸棗仁茯神側柏葉竹茹連前共作一劑煎服凡中風小便不利者不可利小便熱退自能利也凡中風年老虛弱者不可吐氣虛卒倒者不可吐肥人中風口喎手足麻木不分左右皆屬痰用貝母栝蔞子南星半夏陳皮白朮黃連黃芩黃柏羌活防風荊芥葳靈仙薄桂甘草天花粉因痰者加附子竹瀝薑汁入酒一匙行經行火瘦人中風屬陰虛火熱四物湯加牛膝黃芩黃柏有痰加痰藥入竹瀝薑汁服遺尿者屬氣虛以參耆大劑補之右癱者酒芩酒柏酒連防風各五錢半夏一兩羌活五錢人參蒼朮各一兩川歸川芎各五錢麻黃三錢甘草五錢南星一兩附子三片丸如彈子大酒化下肥人憂思氣鬱右手癱口渴補中益氣湯有痰加半夏竹瀝薑汁中風證口眼歪斜語言不正口角流涎半身不遂或全體不能舉動因元氣虛弱兼酒色之過而更挾外邪用人參防風麻黃羌活升麻桔梗石膏黃芩荊芥天麻南星薄荷葛根芍藥杏仁川芎川歸白朮細辛皂角等分加姜煎更入竹瀝半杯服外以艾灸治風穴道微汗而愈或有因寒而中宜姜附湯每服三錢挾痰挾氣攻刺加芍藥五分手足不仁加防風挾濕加白朮筋脈牽急加木瓜肢節痛不可忍加薄桂一錢加薑棗水煎服之祖傳方蠲風飲子治中風癱瘓口眼歪斜及一切手足走注疼痛肢節攣急麻痹不仁等證防風去蘆杜仲去粗皮薑汁炒羌活白芷川歸去蘆頭酒浸洗川芎生地黃酒浸洗白芍藥川牛膝去蘆酒洗秦艽去蘆何首烏萆薢蒼朮米泔浸一二宿白朮木通去皮大楓子肉葳靈仙血藤即過山龍也防己丁公藤各一兩荊芥穗海桐皮去粗皮五茄皮天南星煨制半夏湯泡七次橘紅去白赤茯苓去皮桑寄生天麻殭蠶炒釣鉤藤各五錢薄桂去粗皮草烏頭去皮尖甘草節川烏去皮臍炮豬牙皂角各二錢半兩頭尖陰地蕨一名地茶大薊小薊理省藤桑絡藤各一兩五錢生薑一兩另研細上各切細用無灰好酒二斗五升以瓷罐一個盛酒浸藥以皮紙十數重包封罐口冬半月夏七日秋春十日每日清晨午前午後臨臥各服一大白盞忌雞豬魚羊驢馬飛禽蝦蟹等肉味及煎煿油膩水果生冷蕎麥熱面一切動氣發風之物其效如神萬舉萬全之藥也如神救苦散治癱瘓手足走痛不止非痛勿用御米殼蜜炒一錢陳皮五錢壁虎炙黃即蝘蜓也乳香沒藥甘草各二錢五分上為末每服三錢煎服醫案予長嫂何氏年五十七身肥白春初得中風暴僕不省人事身僵直口噤不語喉如拽鋸水飲不能入六脈浮大弦滑右甚於左以藜蘆末一錢加麝香少許灌入鼻竅吐痰一升許始知人事身體略能舉動急煎小續命湯倍麻黃連進二服復以衣被得汗漸蘇省能轉側但右手足不遂語言蹇澀後以二陳湯加芎歸芍藥防風羌活等藥合竹瀝薑汁日進二三服若三四日大便不去則不能言語即以東垣導滯丸或潤腸丸微利之則語言復正如此調理至六十四歲得他病而卒傷寒論內經曰人之傷於寒也則為病熱熱雖甚不死若兩感於寒者則不免於死矣蓋傷寒之證非若雜病之易知也惟漢張仲景深達是理而為立法之祖著傷寒論一書載三百九十七法一百一十有三方以為後學之矜式惜乎其書一變於王叔和之撰次再變於成無己之詮註傳之愈久而愈失其真也考其法與方也何嘗合其數焉且三陰寒證之用熱藥者十居七八其內經所謂傳經之傷寒自三陽而傳入於三陰之經但一於熱耳何由而為寒哉是以不能不使人之致疑也故後人紛紛之論俱未得其旨要愚竊憾焉有至人傳云傷寒大法有四曰傳經曰專經曰即病曰郁病夫即病者多為專經郁病者多為傳經蓋寒邪之中人無有定體或中於陽或中於陰或但中於太陽未及鬱熱而即發首尾只在本經而不傳變者治宜麻黃桂枝等湯驅散表邪而愈或有從太陽未及鬱熱不從陽明少陽過而遂入於三陰之經者亦有初不曾入於陽經而直傷於三陰之經而即病者因其未曾鬱熱是以一切為寒證焉故多自霜降後至春分前發者是也為其無頭痛無大熱脈沉遲而微故古方又出中寒一條實此證也治宜四逆真武等湯溫中通脈而愈若夫始從太陽鬱熱以次而傳至於陽明少陽次第傳變於三陰之經者則為傳經之熱證明矣經曰一日巨陽受之其脈尺寸俱俘其證頭項痛腰脊強故宜發汗二日陽明受之其脈尺寸俱長其證身熱目痛鼻乾不得臥故宜解肌三日少陽受之其脈尺寸俱弦其證胸脅痛而耳聾往來寒熱故宜和解四日太陰受之其脈尺寸俱沉細其證腹滿咽乾自利故宜分利五日少陰受之其脈尺寸俱微緩其證口燥舌乾而渴故宜清之六日厥陰受之其脈尺寸俱沉澀其證煩滿而囊縮故宜下之自此以後病日以衰至十三日乃愈故多自春分後至夏至前發者是也夫春夏固無即病專經之寒證而秋冬豈無郁病傳經之熱證歟惟寒邪之傳注經絡實無定體故東垣有曰太陽者巨陽也為諸陽之首膀胱經病若渴者自入於本也名曰傳本太陽傳陽明胃土者名曰巡經傳為發汗不徹利小便餘邪不盡透入於裡也太陽傳少陽膽木者名曰越經傳為原受病脈浮宜汗當用麻黃而不用之故也太陽傳少陰腎水者名曰表裡傳為表病急當發汗而反下所以傳也太陽傳太陰脾土者名曰誤下傳為受病脈緩有汗當用桂枝而反下之所致也當臍腹痛四肢沉重太陽傳厥陰肝木者為三陰不至於首惟厥陰與督脈上行與太陽相接名曰巡經得度傳也夫經所謂兩感傷寒者日傳二經之候也一日太陽與少陰俱病二日陽明與太陰俱病三日少陽與厥陰俱病張仲景無治法惟東垣有治兩感大羌活湯云十可救其一二未能試其驗否愚按仲景傷寒論曰中而即病者名曰傷寒不即病者寒毒藏於肌膚至春變為溫病至夏變為暑病暑病者熱極重於溫也考之內經有曰春傷於風夏為飧泄夏傷於暑秋為痎瘧秋傷於濕冬必咳嗽冬傷於寒春必病溫此四時之正病也遍閱內經中但有六經傳變之傷寒而無三陰直傷即病之寒證焉大抵內經以春三月及夏至前發者為真傷寒張仲景以秋分後至冬三月發者為真傷寒抑未敢議其孰非而孰是也若夫春為溫病夏為熱病皆冬受寒邪鬱積之久之重病也外有四時感冒新受風寒之輕證亦有頭痛體痛惡寒發熱等候自當作感冒處治非冬傷寒邪過時而發之重病比也今人因借仲景治傷寒法治之獲效遂通謂之四時傷寒實非仲景立法之本意也夫欲治傷寒者切宜潛心洞察不可苟且輕試且如不當汗而汗者為亡陽為蓄血為鼻衄為筋惕肉瞤為下厥上竭為咽乾為小便淋閟不當下而下者為結胸為痞氣為懊憹為失血為復熱又陰盛陽虛汗之即愈下之即死陽盛陰虛下之即愈汗之即死又曰桂枝下咽陽盛即斃承氣入胃陰盛乃亡醫者其可輕視之乎脈法脈陽浮而陰弱謂之傷風邪在六經俱弦加之陽浮衛中風也陰弱榮氣弱也風傷陽故浮虛脈浮緊而無汗謂之傷寒寒傷榮榮實則衛虛陽脈緊邪在上焦主欲吐也脈浮頭項痛腰脊強病在太陽脈長身熱鼻乾目疼不得臥病在陽明脈弦胸脅痛耳聾往來寒熱病在少陽脈沉細咽乾腹滿自利病在太陰脈微緩口燥舌乾而渴病在少陰脈沉澀煩滿囊縮病在厥陰脈陰陽俱盛重感於寒而緊澀變為溫瘧陰陽緊盛傷寒之脈前病熱未已後復感於寒也脈陽浮而滑陰濡而弱更遇於風變為風濕陽脈浮滑陰脈濡弱皆風脈也前脈未除風來乘熱也脈陽洪數陰實大更遇溫熱兩合變為溫毒洪數實大皆熱兩熱相合也脈陽濡弱陰弦緊更遇溫氣變為瘟疫病發熱脈沉細表得太陽名曰痓病病太陽關節疼痛而煩脈沉細名曰濕痹病太陽身熱疼痛脈微弱弦芤名曰中暍若發汗已身灼然熱名曰風溫風溫為病脈陰陽俱俘自汗出身重多眠睡息鼾語難小便不利更被其下若被火者微發黃色劇者則驚癇時瘛瘲色如火熏則死脈沉細而疾身涼四肢冷煩躁不欲飲水狂悶名曰陽厥傷寒熱盛脈浮大者生沉小者死已汗沉小者生浮大者死方法丹溪曰外感無內傷者用仲景法傷寒挾內傷者十居八九經曰邪之所湊其氣必虛補中益氣湯從六經所見之證加減用之氣虛甚者少加附子以行參耆之氣東垣謂內傷者極多外傷者間而有之此發前人所未發後人徇俗不見真切雷同指為外傷極謬其或可者蓋亦因其不敢放肆而多用平和之藥散之耳若粗率者必致殺人有感冒輕病不可便認為傷寒西北二方極寒肅殺之氣外傷者甚多東南二方溫和之地外傷甚少所謂千百而一二也以上丹溪方法凡一條桂枝湯並加減法治太陽經傷風發熱自汗鼻鳴乾嘔桂枝二錢五分芍藥一錢五分甘草一錢上細切作一服加生薑三片大棗二枚水一盞半煎至一盞去渣溫服本方惟冬及春初可行春末及夏至前加黃芩一錢夏至後加知母一錢石膏一錢或加升麻五分若病人素虛寒者不用加減小便數其素飲酒人不喜甘者切不可用桂枝也如發汗過多心下悸而欲按者去芍藥薑棗煎服如傷風項背強有汗不惡風而變為柔痓者本方中加乾葛一錢如汗後身痛脈沉本方中加人參一錢如風溫身痛脈浮虛澀多汗本方中加附子五分如關脈沉實大便秘而腹痛者本方中加大黃一錢五分芍藥一錢減甘草五分如太陽下之太早成協熱利不止心下痞表裡不解本方中去芍藥加白朮人參乾薑各一錢如太陽汗多成柔痓者本方中加乾葛桂枝芍藥各五分栝蔞根甘草各一錢如太陽脈浮腹痛本方中加芍藥一錢餳糖一匙名小建中湯如傷寒汗後身痛脈遲弱本方中加黃耆一錢餳糖一錢名黃耆建中湯如太陽發熱無汗惡寒脈微弱者本方中加麻黃石膏各等分名桂枝二越婢一湯如服桂枝後形似瘧日再發或身癢而汗不出者得汗必解本方中加麻黃一錢五分杏仁十個名桂枝麻黃各半湯麻黃湯並加減法治太陽證脈浮頭及身體疼痛惡寒發熱無汗而喘麻黃去根節二錢桂枝一錢三分甘草六分杏仁十個上細切作一服水一盞半先下麻黃煎一沸掠去上沫下余藥煎八分去渣溫服復取汗蓋麻黃湯性熱惟冬及春初兼病人素有寒者乃用正方夏至後服必發斑黃狂悶如夏月得太陽證惡寒發熱頭痛脈浮洪盛無汗以子和六神通解散代之如太陽發熱無汗惡寒漸變為剛痓者本方中加赤芍藥六分葛根一錢豆豉二錢入蔥白同煎如傷寒中濕身體痛身目俱黃本方中去桂枝加連軺一錢生梓白皮赤小豆各二錢入生薑大棗同煎傷寒即病少陰經脈沉微身體痛得汗則已本方中去桂枝杏仁甘草加細辛一錢二分附子一錢傷寒大下後脈沉遲尺脈不至咽喉不利唾膿血厥逆泄利不止者雖曰難治本方中去杏仁加升麻當歸各一錢知母黃芩萎蕤各半錢石膏白朮芍藥天門冬茯苓乾薑各七分次第取微汗而愈即病少陰經無表裡證本方中去桂枝杏仁倍甘草加附子一錢二三服後得微汗而愈如風濕相搏脈浮一身盡痛本方中去桂枝加薏苡仁一錢得微汗而愈葛根湯並加減法治太陽與陽明合病無汗惡風身體肌肉俱痛葛根一錢五分桂枝甘草芍藥各七分半麻黃一錢上細切作一服加生薑三片大棗二枚水一盞半煎先下麻黃葛根一二沸掠去上沫納諸藥煎至一盞去渣溫服取微汗即愈如見陽明正病頭目痛鼻乾無汗肌肉疼痛本方中去麻黃桂枝加升麻一錢五分倍芍藥取微汗而愈名升麻葛根湯如風溫脈浮身重汗出本方中加石膏大青龍膽草萎蕤各五分如疫癘春感冒發熱而渴不惡寒本方中加黃芩六分不問已汗未汗頭痛肌熱者本方中去麻黃甘草桂枝加知母川芎各六分入生薑蔥白同煎如溫毒發斑心煩嘔逆本方中去桂枝芍藥加橘紅杏仁知母黃芩各六分如太陽誤下之成協熱利不止本方中去麻黃桂枝芍藥加黃連黃芩各三分甘草只用二分如太陽與陽明合病不下利但嘔者本方中加製半夏五分小青龍湯並加減法治太陽表證未解心下有水氣乾嘔發熱而咳麻黃芍藥各二錢細辛乾薑炮甘草炙桂枝各一錢五分五味子七枚半夏二錢上細切作一服用水三盞先煮麻黃減半盞掠去上沫納諸藥煮取一盞去渣溫服連進三服如表證未解而渴甚者本方中去半夏加栝蔞根一錢如嘔而微利熱而咳本方中加蕘花龍眼大如太陽汗後飲水多咳而喘本方中去麻黃加杏仁泥一錢重如太陽咳嗽表未解心下有水氣而小便不利者本方中去麻黃加茯苓一錢五分如水寒相搏咳逆不止者本方中去麻黃加附子一錢大青龍湯治傷寒見風或傷風見寒太陽無汗脈浮緊煩躁可服脈弱汗自出不可服麻黃五錢桂枝甘草炙各一錢五分杏仁七個去皮尖另研石膏三錢上細切作一服加生薑三片大棗二枚水二盞先下麻黃煎掠去上沫納諸藥煎至一盞去渣服得汗則止後服未汗再投一服或二服得汗為度如太陽無汗惡風煩躁夏月於本方中加黃芩二錢小柴胡湯並加減法傷寒四五日往來寒熱胸滿脅痛心煩喜嘔風濕身熱邪在少陽經病柴胡去蘆二錢五分黃芩人參各一錢甘草五分半夏八分上細切作一服加生薑三片大棗二枚水二盞煎至一盞去渣溫服如小便難潮熱腹滿本方中加茯苓一錢如下後陰虛生熱脈微惡寒本方中去黃芩加芍藥二錢如嘔而發熱胸脅滿小便不利本方中去黃芩加茯苓一錢五分如飲水過多成水結胸本方中去大棗加牡蠣一錢五分如少陽往來寒熱咳嗽胸脅痛者本方中去人參大棗加五味子乾薑各五分如往來寒熱而渴甚者本方中去半夏加人參五分栝蔞仁一錢如身熱欲近衣不渴者本方中去人參加桂枝五分如病發熱而渴不惡寒而嗽者本方中加五味子五分如痞而胸脅滿脹本方中加乾薑五分牡蠣一錢如風溫汗後身熱心下妨悶有動氣者本方中加桂枝五分芍藥一錢如往來寒熱胸脅滿小便不利嘔而不渴者本方中去人參半夏加桂枝乾薑牡蠣各六分栝蔞根一錢如傷寒八九日下之胸滿小便不利譫語驚狂自汗亡陽煩躁起臥不安一身盡痛本方中加龍骨桂枝鉛丹茯苓牡蠣各五分大黃七分煎服大柴胡湯治傷寒內實大便難身熱不惡寒反惡熱者柴胡四錢黃芩芍藥各二錢五分半夏二錢人參一錢大黃二錢枳實一錢五分上細切作一服加生薑三片大棗二枚水二盞煎八分去渣溫服以利為度未利再投一服調胃承氣湯治太陽陽明不惡寒反惡熱大便秘結譫語而嘔日哺潮熱者大黃六錢五分甘草三錢芒硝一錢上細切水二大盞煎至一盞去渣納芒硝再煎一沸溫服小承氣湯治六七日不大便腹脹滿悶病在陽明無表證汗後不惡寒潮熱狂言而喘者大黃七錢厚朴枳實各三錢五分上細切作一服水二碗煎一碗去渣溫服以利為度未利再投一服大承氣湯治胃實譫語五六日不大便腹滿煩渴並少陰舌乾口燥日晡發熱脈沉實者大黃七錢五分厚朴枳實各一兩芒硝半合上細切水二碗先煎枳樸二物取一碗半去渣納大黃再煎至一碗去渣納芒硝更煎一二沸溫服以利為度未利再投一服桃仁承氣湯外證已解小腹急大便黑小便不利為瘀血證此藥主之大黃三錢桃仁十個去皮尖研桂心去皮芒硝各一錢五分甘草一錢上細切水一盞半煎至一盞去渣納芒硝再煎一二沸溫服血盡為度未盡再服白虎湯並加減法治陽明證汗後脈洪大而渴及虛煩中暍等證知母六錢甘草二錢石膏一兩二錢粳米五勺上細切作一服水二盞煎待米熟去渣溫服如口燥煩渴或發赤斑本方中加人參二錢名化斑湯又名人參白虎湯如秋感熱之疫癘或陽明下後大便不固熱不退者或濕溫證熱不退而大便溏者本方中加蒼朮六錢添水煎名蒼朮白虎湯理中湯並加減法治即病太陰自利不渴寒多而嘔腹痛下利鴨溏蛔厥霍亂等證人參甘草乾薑白朮各二錢五分上細切作一服水二盞煎八分去渣溫服如腎氣動者去白朮加肉桂二錢如吐多者去白朮加生薑三錢如下多者倍白朮人參添水煎寒多者加乾薑一錢半如腹滿下利脈沉遲而微者加炮附子二錢如傷冷中寒脈弱氣虛變為陰疸本方中加茵蔯蒿二錢如霍亂轉筋本方中加石膏五錢如痞而胃寒或霍亂吐瀉胸滿未成結胸者或厥陰飢不能食食即吐蛔用理中丸以本方藥為細末煉蜜為丸如彈子大每用白湯半盞化一丸四逆湯治即病太陰自利不渴及三陰證脈沉細而遲身體痛者附子一枚去皮作八片生用甘草六錢炙乾薑五錢炮上細切分作二服每服用水二盞煎至一盞去渣溫服取少汗乃愈真武湯治即病陰證傷寒脈沉細身體痛或發少陰汗致筋惕肉瞤等證茯苓芍藥生薑附子炮去皮各三錢白朮二錢上細切作一服水二盞煎至一盞去渣溫服如咳者加五味子乾薑細辛各一錢如小便利者去茯苓如下利者去芍藥加乾薑二錢如嘔者去附子倍生薑朮附湯治風濕小便自利及濕溫身痛等證白朮三錢甘草二錢附子炮生薑各二錢五分上細切作一服水二盞大棗二枚煎至一盞去渣溫服小陷胸湯治小結胸陽證傷寒下之太早變為結胸胸中作痛痞滿黃連一錢三分半夏二錢六分栝蔞連穰二錢五分上細切作一服用水二盞先煮栝蔞去渣納諸藥再熬至七分盞去渣溫服未和再投一服大陷胸湯治大結胸並熱實結胸胸中大痛高起手不可捫摸者大黃三錢芒硝二錢五分甘遂一分二釐半另末上細切作一服水二盞先煮大黃去渣納芒硝煮一二沸納甘遂未服以利為度抵當湯治血結胸譫語因瘀血結於胸中狂言小腹亦滿漱水不欲咽者虻蟲去翅足炒水蛭各十五枚炒黃色桃仁一十個去皮尖另研大黃三錢上細切水一盞半煎至一盞去渣溫服血下止後服小半夏加茯苓湯治水結胸半夏四錢茯苓三錢上細切作一服水一盞半煎至一盞去渣入生薑自然汁半合再煎一二沸溫服梔子豆豉湯治吐下後心胸懊憹無奈或大下後身熱不去心中痛結肥梔子四枚香豉五錢上細切作一服水二盞先煮梔子至一盞納豉同煮至七分去渣溫服得吐止後服玄參升麻湯治發斑咽痛升麻玄參甘草各五錢上細切水三盞煎至一盞半去渣溫服陽毒升麻湯治陽毒赤斑出狂言吐膿血升麻二錢犀角屑射干黃芩人參甘草生用各一錢上細切作一服水二盞煎至一盞去渣溫服姜附湯並加減法治下後復發汗晝不得眠無表證而脈微者乾薑五錢附子一枚生用上細切作一服水二盞煎至一盞去渣頓服如下利厥逆脈不至者加甘草五錢倍乾薑添水煎服如面赤者加蔥九莖嘔者加生薑咽痛加桔梗利止脈不出加人參三錢名通脈四逆湯吐利止汗出而厥四肢拘急脈微欲絕本方煎成正藥加豬膽汁半合攪勻分二服其脈即起少陰證腹痛或泄利下重本方中加芍藥二錢五分藿香正氣散和劑治四時感冒頭痛憎寒壯熱或風濕氣霍亂吐瀉常服除山嵐瘴氣大腹皮先以手指拔淨用清酒洗淨曝乾再用烏豆煮汁洗淨用蓋此物恐有鳩鳥糞毒不制即殺人紫蘇連莖葉用藿香白芷茯苓各六分厚朴薑汁製炒白朮陳皮去白桔梗半夏各四分甘草炙二分上細切作一服加生薑三片大棗二枚水二盞煎至一盞三分溫服不換金正氣散和劑治四時感冒傷寒瘟疫時行及山嵐瘴氣寒熱往來霍亂吐瀉下利赤白及出遠方不伏水土並皆治之厚朴薑汁製炒陳皮去白藿香半夏湯泡十次蒼朮米泔浸各一錢甘草五分上細切作一服加生薑三片大棗二枚水一盞半煎至一盞溫服加減涼膈散東垣退六經熱及傷寒餘熱不解胸煩等證連翹一錢梔子薄荷葉淡竹葉黃芩桔梗各五分甘草生一錢五分上細切作一服水一盞半煎至一盞日三五服熱退即止易老曰涼膈散減芒硝大黃加桔梗同為舟楫之劑浮而上之治胸膈中與六經熱以其手足少陽之氣俱下胸膈中三焦之氣同相火遊行於身之表膈與六經乃至高之分此藥浮載亦至高之劑故能於無形之中隨高而走去胸膈中及六經熱也十神湯和劑方治時令不正瘟疫妄行或四時感冒風熱發熱憎寒頭疼身痛無汗此藥不問陰陽兩感並宜服之川芎甘草麻黃乾薑紫蘇升麻白芷赤芍藥陳皮香附各一錢上細切作一服加生薑三片連須蔥白三個如中滿氣實者加枳殼一錢水二大盞煎至一盞三分去渣溫服消風百解散治四時感冒頭疼發熱咳嗽鼻塞聲重喘急等證荊芥穗白芷陳皮麻黃去節蒼朮各一錢甘草五分上細切作一服加生薑三片蔥白三個水一盞半煎至一盞熱服咳嗽甚者加烏梅一個同煎服黃連解毒湯活人治傷寒大熱不止乾嘔煩渴錯語呻吟不得安臥黃連一錢黃芩黃柏梔子各二錢上細切作一服水一盞半煎至一盞去渣服金沸草散活人治傷寒咳嗽頭疼發熱胸膈痰壅喘滿等證前胡一錢五分半夏七分半細辛三分赤茯苓一錢甘草三分荊芥穗二分旋覆花一錢五分名金沸草一方無細辛茯苓有麻黃芍藥上細切作一服加生薑五片大棗一枚水一盞半煎至一盞溫服五苓散仲景方治傷寒中暍煩躁小便不利而渴或霍亂吐利不止東垣曰五苓散乃太陽證之下藥也夫太陽高則汗而發之下則引而竭之渴者邪入太陽本也當下之使邪從膀胱出也其腎燥膀胱熱小便不利此藥主之小便利者不宜用然太陽病熱而渴小便雖利亦宜此藥下之當服不服則谷消水去形亡必就陽明燥火戊胃發黃此太陽入本失下也由不服此藥故也澤瀉一兩五錢白朮一兩赤茯苓豬苓各一兩肉桂五錢上研為細末每服三錢白湯或清米飲調服或細切加薑棗煎服熱甚者去桂加黃芩如傷寒三四日間往來寒熱自利者邪入太陰而少陽經病猶在也本方合小柴胡名柴苓湯加薑棗煎服以分利其陰陽也東垣此事難知曰經云有汗不得服麻黃無汗不得服桂枝若誤服則其變不可勝數故立此法不犯三陽禁忌解利神方此易老之法也名曰九味羌活湯九味羌活湯東垣羌活治太陽肢節痛君主之藥也然非為無主也乃為撥亂反正之主故大無不通小無不入關節痛非此不能除也防風治一身盡痛乃軍卒中卑下職也一聽軍令而行所使引之而至蒼朮別有雄壯上行之氣能除濕下安太陰使邪氣不納傳之於足太陰脾細辛治足少陰腎苦頭痛川芎治厥陰頭痛在腦白芷治陽明頭痛在額生地治少陰心熱在內黃芩治太陰肺熱在胸甘草能緩裡急調和諸藥以上九味雖為一方然亦不可執一執中無權猶執一也當視其經絡前後左右之不同從其輕重大小多少之不一增損用之其效如神細切水煎服若急汗熱服以羹粥投之若緩汗溫服之而不用湯投之也脈浮而不解者宜先急而後緩脈沉而不解者宜先緩而後急此藥不獨解利傷寒治雜病亦有效中風行經者加附子中風秘澀者加大黃中風並三氣合而成痹等證各隨十二經上下內外寒熱溫涼四時六氣加減補瀉用之東垣曰經云兩感於寒者死不治一日太陽與少陰俱病頭痛發熱惡寒口乾煩滿而渴太陽者腑也自背腧而入人所共知少陰者臟也自鼻息而入人所不知也鼻氣通於天故寒邪無形之氣從鼻而入腎為水也水流濕故腎受之經曰傷於濕者下先受之同氣相求耳又云天之邪氣感則害人五臟以是知內外兩感臟腑俱病欲表之則有里欲下之則有表表裡既不能一治故死矣然所稟有虛實所感有淺深虛而感之深者必死實而感之淺者猶或可治治之而不愈者有矣未有不治而復生者也予嘗用此間有生者十得二三故立此方以待好生君子用之名曰解利兩感神方大羌活湯解利兩感神方大羌活湯易老方防風羌活獨活防己黃芩黃連蒼朮白朮甘草炙細辛各三分知母川芎地黃各一錢上細切作一服水二盞煎至一盞半去渣熱飲之未解再服三四劑病愈則止若有餘證並依仲景法如證治六神通解散張子和治夏月傷寒得太陽陽明二經病汗不出頭項痛腰脊強目疼鼻乾不得臥代麻黃葛根等湯發表藥也蒼朮三錢石膏滑石黃芩各一錢五分麻黃七分半甘草五分上細切作一服水二盞煎至七分服春加防風一錢劉河間守真治傷寒直格要訣傷寒前三日在表法當汗可用雙解散連進數服必愈雙解散以下皆河間方即後二方防風通聖散方見中風門益元散又名六一散又名天水散方見痢門二藥合而服之當得汗而解若不解者病已傳變傷寒後三日在裡法當下若下之太早則表邪乘虛入里遂成結胸虛痞懊憹斑疹發黃之證輕者必危危者必死但當以平和之藥宣散其表和解其里病勢或有汗或無汗發熱未愈當用小柴胡涼膈天水合而服之病若半在表半在裡法亦當和解小柴胡涼膈主之若里微熱者則當微下大柴胡合解毒湯主之若熱勢未退又以大柴胡合三一承氣下之三一承氣湯大黃芒硝厚朴枳實各五分甘草一錢上細切作一服水一大盞姜三片煎七分熱服其病胸膈滿悶或喘或嘔陽脈緊盛者宜瓜蒂散吐之汗吐下三法之後別無異證者涼膈散調之病大熱已去微熱未盡除者以益元散服之無令再病此傷寒治法之大要也或傷風自汗脈浮緩者雙解散去麻黃以解利之其病半表半裡白虎湯和解之其病在裡脈沉細者無問風寒暑濕或表裡證俱不見或內外諸邪所傷有汗無汗心腹痛滿譫語煩躁蓄熱內盛俱是脈沉者並用承氣合解毒下之或中暑自汗以白虎湯解之白虎解後以五苓合天水調之多進數服無妨或腹脹滿脈沉者亦當以承氣合解毒微下之或發汗之後熱不解脈尚浮者白虎加蒼朮再解之或裡熱內盛陽厥極深皆因失下而成此證以致身冷脈微昏懵將死切不得以寒藥下之誤下即死有一輩庸醫妄言是陰厥便欲投玄武四逆溫熱之劑下咽必死殊不知此證乃陰耗陽竭陰氣極弱謂之耗陽厥極深謂之竭蓄熱怫鬱將欲絕者當此之際寒劑熱劑俱不可投但進涼膈解毒以養陰退陽宜散蓄熱脈氣漸生得大汗而愈亦有無汗氣和而愈者未愈卻用解毒合承氣下之次以解毒涼膈天水三藥合而為一調和陰陽洗滌臟腑則其餘別證自不生矣有大下之後熱不退再三下之熱愈盛若下之不愈脈微氣虛力弱不加以法則無可生之理若輟而不下則邪熱極盛陰氣極衰脈息漸絕必不可救似此之證是下之亦死不下亦死醫者到此殺人活人一彈指間其不至手足失措者幾希訣云傷寒汗後汗出不解或反不汗脈尚浮白虎加蒼朮湯再解之又按餘論云傷寒下後自汗虛熱不已白虎加蒼朮人參一服如神汗止身涼此通仙妙法也如此則汗下之後熱不退不問有汗無汗並宜白虎加蒼朮解之又加人參亦炒仍服涼膈解毒調之經云三下而熱不退者即死後人有四五次下而生及十數次下而生者此偶然誤中耳活者得一二死者已千百後學切不可以此為法但當依前法用解毒合涼膈調之使陽熱除退陰脈漸生庶不夭人命也若傷飲不解散成結胸之證臨時擇用大小陷胸湯丸累下之若脈浮者不可下是表證未出小柴胡合小陷胸湯投之脈雖浮而熱大極者承氣徐徐疏利之或有留飲過度濕熱內生自利不止其熱未退解毒湯治之陽毒生斑涼膈散加當歸怫鬱熱盛在表燥而無汗濕熱在裡不能發於外相搏遂成發黃茵蔯湯調五苓散甚者茵蔯合承氣下之一心煩不得臥梔子豉湯茵蔯蒿湯山茵蔯一兩大黃五錢梔子十枚上細切水二盞煎一盞溫和服以利為度梔子豉湯方見前一誤下太早遂成結胸虛痞涼膈散加枳殼桔梗一剛柔二痓譫語發狂逾垣赴井皆陽熱極盛而然承氣合解毒下之一汗下之後煩渴飲水涼膈散及減桂五苓甘露益元選而用之甘露飲茯苓澤瀉甘草石膏寒水石各二兩白朮桂枝豬苓各五錢滑石四兩上為末每服三錢白湯調或新汲水調薑湯尤妙一小便不通五苓泄之大便閉結承氣下之更有外證加減防風通聖散方內隨證用藥處治萬無一失也一婦人證治皆然惟孕婦三四月並七八月不用硝黃其餘月分用之無妨一小兒減劑服之此中有古人治傷寒不傳之妙後之學者宜慎寶之愚按河間以上治傷寒法宜用於春三月及夏至前後溫病及中暑熱傳經之證能按法施治無有不安丹溪活套凡傷寒傳經之證初得太陽經病惡寒發熱頭項強腰脊痛無汗急用東垣九味羌活湯表之而愈或諸痛悉除亦不惡寒但發熱不解或微汗濈濈然出此為挾虛證宜用補中益氣湯為主治有汗加桂枝芍藥汗未透脈尚浮緊加羌活蒼朮防風葛根倍升麻柴胡滿悶者去黃耆人參仍頭痛未去加川芎白芷薄荷荊芥細辛葛根如渴加五味子麥門東天花粉三四日間不宜前藥則以小柴胡湯驗證加減如寒熱脅痛少陽外證悉具只以本方服之若兼腹滿自利已見太陰證而少陽證猶未除者本方中加五苓散名柴苓湯熱甚者去桂倍黃芩渴甚者本方去半夏加五味子天花粉五六日不大便潮熱引飲本方中去人參甘草加芍藥枳殼厚朴大黃甚者加芒硝或用河間三一承氣湯七八日過經不解熱不退或黃連解毒湯涼膈散選而用之或仍以小柴胡看證調治而愈或愈後因勞役復熱者仍用補中益氣湯多服數帖自安雖因食復病切不可輕用大黃芒硝之類下之蓋病後氣血大虛若復下之必死慎之慎之又傷寒下後譫語初能認人三五日後妄言不休此神不守舍慎勿復下脈多沉細足冷氣促面青褐色口乾燥宜用補中益氣湯倍人參加竹葉二三十片內外本弱得汗下後大虛脈細數熱如火炙氣促宜用人參當歸白朮黃耆甘草五味子知母加竹葉數片煎用童便二三帖而安大病虛脫本是陰虛用艾灸丹田補陽陽生則陰長故也不可用附子止可用參耆多服為佳傷寒已經發汗吐下誤治後三焦生熱脈洪數譫語不顧體晝夜喘息不休衄血熱不解身目俱黃狂叫欲走三黃石膏湯連進三四服而愈如怯弱人因感寒濕發熱不食數日後不省人事言語亂妄神思昏迷面青齒黑人以為必死之證脈沉細先用小柴胡湯等藥不愈急用四君子湯加附子數片煎以碗盛放水盆中少時殺其熱性稍溫服之脈與神思即回然後可用別藥此謂之陰證傷寒傷寒怫鬱不解三陽併入三陰臟腑結燥面赤口渴心驚譫語內熱多而外熱少宜用二一承氣湯或以此藥送下木香檳榔丸三五十粒下其燥屎而安如汗下後熱未能除用梔子豆豉湯或東垣加減涼膈散煎服以徹其邪而愈凡傷寒身體疼痛惡風寒遇暖則喜脈浮而數必得大汗而愈不問日數皆以六神通解散煎服如譫語神思不寧蓋熱邪已入里不能盡解本方加人參黃連即安服前藥如汗不透更加紫蘇葉葛根白芷等藥助之當得大汗而病如掃此張載仁之法藥雖輕微不知自有神妙不可易而忽之傷寒發斑面赤昏瞶譫語脈洪而虛按之無力或絕不見用人參生地黃各五錢炮附子一錢大黃二錢半服之不甚瀉夏月服亦不妨傷寒發斑生熱用黃瓜根杵汁黃瓜即牆頭生小瓜黃色累累然四月黃瓜生即此瓜也調伏龍肝服之去紅點甚妙發斑似傷寒乃痰熱之病發於外微汗以散之通聖散消息用之醫案東陽杜世良乃兄三月間得傷寒證惡寒發熱小便淋澀大便不行初得病時莖中出小精血片如棗核大由是眾醫皆謂房事所致遂作虛證治而用補中益氣等藥七八日後熱愈甚大渴引飲胃中滿悶語言錯亂召予診視六脈俱數甚右三部長而沉滑左手略平亦沉實而長予曰此大實大滿證屬陽明經宜大承氣湯眾皆驚愕曰先生誤矣予不聽作大劑連進二服大瀉後熱退氣和病愈十數日後因食鴨肉太多致復熱來問予教用鴨肉燒灰存性生韭汁調下六七錢下黑糞一碗許而安東陽戚十八歲四月間得傷寒證惡寒發大熱而渴舌上白胎三日前身脊百節俱痛至第四日惟脅痛而嘔自利六日來召予治診其脈左右手皆弦長而沉實且數甚予曰此本三陽合病今太陽已罷而少陽與陽明仍在與小柴胡合黃連解毒服三服脅痛嘔逆皆除惟熱猶甚九日後漸加氣築痰響聲如拽鋸出大汗退後而身復熱愈甚法當死看其面上有紅色潔淨而無賊邪之氣言語清亮間有譫語而不甚含糊予故不辭去而復與治用涼膈散倍大黃服二服視其所下仍如前自利清水其痰氣亦不息與大承氣湯合黃連解毒湯二服其所下亦如前予曰此蓋熱結不開而燥屎不來耳後以二方相間日三四服每藥又各服至五帖始得結糞如肥皂子大者十數枚痰氣漸平熱漸減至十五日熱退氣和而愈一知醫者問曰傷寒論謂下後不可再下連日用此峻劑而獲安者何也曰燥屎未下而脈尚實胡為不可再下是故為醫者不可膠柱而調瑟也
