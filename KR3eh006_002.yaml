body:
  text: 卷之二瘟疫附大頭天行病蝦蟆瘟論內經曰蒼天之氣清淨則志意治順之則陽氣固雖有賊邪弗能害也又曰冬不藏精者春必病瘟是以多感於房勞辛苦之人安樂者未之有也俗名瘟病醫書曰疫癘曰黃病嶺南閩廣等處曰瘴氣蓋指山嵐霧露煙瘴濕熱惡氣而名之也一皆觸冒四時不正之氣而為病焉傷寒論曰春應溫而反清夏應熱而反寒秋應涼而反熱冬應寒而反溫龐安常曰疫氣之發大則流行天下次則一方次則一鄉次則偏著一家悉由氣運郁發有勝有伏遷正退位之所致也視斯疾者其可不推運氣而治之乎陶氏曰夫疫氣之中人輕重不一仲景無治法後人用敗毒散治甚得理然亦有愈不愈者蓋疫氣有淺深資稟有壯怯怯而受癘氣之深者雖智者尚不能治況庸劣之士乎若資稟壯實所感又淺則庶幾可愈切不可作傷寒正治而大汗大下也但當從乎中治而用少陽陽明二經藥少陽小柴胡湯陽明升麻葛根湯也看所中陰陽經絡脈證而以二方加減和治之殊為切當學者宜詳察之毋忽脈法脈陽濡弱陰弦緊更遇溫氣變為瘟疫溫病二三日體熱腹滿頭痛食飲如故脈直而疾八日死溫病四五日頭痛腹滿而吐脈來細而弦十二日死溫病八九日頭身不疼目不赤色不變而反利脈來澀澀按之不鼓手時大心下堅十七日死溫病汗不出出不至足者死厥逆汗自出脈堅強急者生虛軟者死溫病下利腹中痛甚者死方法丹溪曰衆人病一般者此天行時疫也治有三法宜補宜散宜降用大黃黃芩黃連人參桔梗蒼朮防風滑石香附人中黃為末神麯糊為丸每服五七十丸氣虛以四君子湯下血虛以四物湯下痰多以二陳湯下熱甚者加童便謂人中黃者人糞也今人多有以糞缸中清汁頓飲一二碗病隨愈然但恐畏其臭穢不能下咽耳故丹溪所取人中黃法於冬月以竹截筒削去青兩頭留節一頭打通一竅以大甘草納入筒內以竹釘塞其竅投糞缸中二三個月取出曬乾用以上丹溪方法凡一條陶尚文治瘟疫法若病只在少陽經者小柴胡加防風羌活微發之而愈若病兼陽明經者柴葛二方合服之小柴胡對升麻葛根湯也若見太陽證大便泄者以本方小柴胡也去黃芩對五苓散尤當看脈寒熱若無寒去桂留芩若小便不利是膀胱本病本方加去桂五苓散若入太陰經無熱證見者用理中湯此證必須腹痛而瀉明日瀉止痛止仍用小柴胡和之若入少陰經及厥陰經用陰證傷寒傳經法治之若初看未端的且先以敗毒散治之看歸在何經再隨經施治無不效者若發黃小柴胡合去桂五苓散未退茯苓滲濕湯瘟疫作渴本方加石膏知母濕溫渴蒼朮白虎湯瘟疫發狂不識人大柴胡湯加當歸如大便泄者三黃石膏湯柴苓湯瘟疫胸膈滿悶本方中加枳殼橘紅黃連若大便不通大柴胡湯微利之三黃石膏湯石膏三錢黃芩黃連黃柏各一錢五分豆豉半合麻黃一錢梔子五枚上細切作一服水二盞煎至一盞三分連進三五劑愈敗毒散治瘟疫四時通用羌活獨活前胡柴胡川芎枳殼桔梗白茯苓人參各等分甘草減半上為細末每服三錢加生薑三片水一盞半煎至一盞溫服或沸湯點服亦可此藥治傷寒瘟疫風濕風眩四肢痛憎寒壯熱項強睛疼不問老人小兒皆可服或嶺南煙瘴之地或瘟疫時行或人多風痰或處卑濕之地腳氣痿弱此藥不可缺也日三五服以知為度一方加薄荷少許每服五錢加姜水煎服九味羌活湯方見傷寒門治瘟疫初感一二日間服之取汗而愈其效如神黑奴丸治瘟毒發斑煩躁大渴及時行熱病六七日未得汗脈洪大而數面赤目眩身痛大熱狂言欲走渴甚又云五六日以上不解熱在胸中口噤不能言為壞傷寒醫所不治棄為死人精魄已竭心下尚溫斡開其口灌藥下咽則活黃芩釜底煤芒硝麻黃梁上塵小麥奴灶突墨各一兩大黃一兩三錢上為細末煉蜜為丸如彈子大新汲水化服飲水盡足當發寒寒已汗出乃瘥若時頃不汗再服一丸須見微利若不渴不可與此藥神朮散太無治四時瘟疫頭痛項強憎寒壯熱身痛專主山嵐瘴氣之妙劑也陳皮二錢蒼朮厚朴各一錢甘草藿香石菖蒲各一錢五分上細切作一服加姜三片大棗一枚水一盞半煎至一盞去渣溫服一方無菖蒲有香附一錢名神朮散氣散附大頭天行病丹溪曰大頭病乃濕熱在高巔之上用羌活及酒炒黃芩酒蒸大黃隨病加減切不可用降藥東垣曰陽明邪熱太甚實資少陽相火而為之也濕熱為腫火盛為痛此邪見於頭多在兩耳前後先出皆主其病也治法大不宜速藥速則過其病所謂上熱未除中寒復生必傷人命宜用緩藥緩服徐徐少與當視其腫勢在何部分隨經處治之陽明為邪首大腫少陽為邪出於耳項前後也二黃湯東垣治大頭天行疫病黃芩酒製炒黃連酒製炒生甘草各等分上細切每服三錢水一盞煎七分溫服徐徐呷之如未退用鼠黏子不拘多少水煎入芒硝等分亦時時少與毋令飲食在後如未已只服前藥取大便利邪氣已則止前方宜各少加引經藥陽明渴加石膏少陽渴加栝蔞根陽明行經升麻芍藥葛根甘草太陽行經甘草荊芥防風並與上藥相合用之或云頭痛酒芩口渴乾葛身痛羌活桂枝防風芍藥俱宜加之普濟消毒飲子東垣泰和二年四月民多疫癘初覺憎寒壯熱體重次傳頭面腫盛目不能開上喘咽喉不利舌乾口燥俗云大頭傷寒諸藥雜治終莫能愈漸至危篤東垣曰身半以上天之氣也邪熱客於心肺之間上攻頭面而為腫耳須用下項藥共為細末半用湯調時時服之半用蜜丸噙化服盡良愈活者甚衆時人皆曰天方謂天仙所制也遂刻諸石以傳永久黃芩五錢酒製炒黃連五錢酒製炒人參三錢陳皮去白二錢甘草二錢連翹一錢玄參二錢白殭蠶七分炒升麻七分柴胡五分桔梗三分板藍根一錢馬勃一錢鼠黏子一錢上為末服如上法或加防風川芎薄荷當歸身細切五錢水二盞煎至一盞食後時稍熱服之如大便硬加酒蒸大黃一錢或二錢以利之腫勢甚者以砭針刺之附蝦蟆瘟丹溪曰蝦蟆瘟屬風熱防風通聖散加減用之或用小柴胡加防風羌活荊芥薄荷桔梗煎服外以側柏葉搗汁謂火煅蚯蚓糞敷之或用丁香尖附子尖南星醋調敷之或五葉藤車前草皆可搗敷之有效甘桔湯治冬瘟咽喉腫痛甘草桔梗各等分上細切水煎時時頻呷之萎蕤散治冬瘟頭面腫萎蕤二錢五分石膏一錢五分麻黃白薇羌活杏仁甘草青木香川芎各五分干菊花一錢五分上細切作一服水二盞煎至一盞去渣日三服祖傳方人黃散治四時疫癘大頭天行等病甘草三錢辰砂雄黃各一錢五分糞缸岸置風露中年遠者佳水飛細研一兩重上為細末每服三錢煎薄荷桔梗湯送下日三五服煎藥甘草桔梗茯苓藁本白朮各五分水煎服疫癘夏感寒伏於少陰咽痛次必下利名曰腎傷寒宜用半夏桔梗甘草各一錢加姜五片煎服大頭天行病從頤頷腫熱者又名顱兹頁瘟東垣有方用羌活酒炒黃芩酒蒸大黃加減水煎服十五六日服小柴胡湯不愈者仍用陳皮紫蘇發散而愈又法灑炒黃芩黃連為君炙甘草為佐水煎細細呷之再加鼠黏子酒蒸大黃煎入芒硝亦細細頻與服之微利為度腫減後去後三味只服前藥如渴屬陽明加石膏屬少陽加栝蔞根若陽明行經加升麻芍藥葛根甘草太陽行經加羌活荊芥防風如頭痛加黃芩渴加葛根身痛加羌活防風荊芥桂枝芍藥隨宜用之入上藥相合煎服或時疫腫毒疙瘩或臟腑積熱發於頭項咽嗌堵塞水漿不下或面赤脈浮洪熱甚漏蘆湯治之升麻黃芩大黃各一兩藍葉即大青葉玄參各二兩煎服丹溪活套云衆人病一般者乃天行時疫蓋冬月閉藏之時反行春令溫勝於寒而發泄真陰土勝水虧矣所勝者妄行土有餘也所生者受病所勝者侮之火土相合濕熱相聚故春來木長之時無水滋生化源故人病瘟治有三法見前春感清氣無汗惡寒為疫癘通用升麻葛根湯春感清氣發熱而渴不惡寒宜解肌湯葛根黃芩芍藥各一錢麻黃一錢半甘草桂枝各七分半大棗一枚水煎服春溫發熱咳嗽身疼口燥渴脈浮洪熱甚宜小柴胡湯加桂枝治之咳嗽加五味子渴去半夏加栝蔞根人參脈實渴宜大柴胡湯下之渴加知母石膏凡溫病脈尺寸俱浮素傷於風因而傷熱風熱相搏其證四肢不收身熱自汗頭痛喘息發渴昏睡或體重不仁慎勿發汗汗之則譫語煩躁目昧無睛光病在少陰厥陰二經宜萎蕤湯人參敗毒散葛根龍膽湯小柴胡湯甚者栝蔞葛根湯脈浮身腫汗出漢防己湯誤汗者防己黃耆湯四時傷寒疫癘或傷風有汗或風濕身腫體痛惡風口乾日晡潮熱脈實並用人參敗毒散夏應熱而反寒夏及秋初而為暴寒折於盛暑熱結四肢則壯熱頭痛或寒傷於胃下利膿血或水瀉脈實者宜下之安調中湯加大黃三錢葛根黃芩等藥各二錢醫案東陽李文會內子陳氏年二十九三月間得瘟疫證病三日經水適來發熱愈甚至七八日病劇胸中氣築作痛莫能臥衆醫技窮辭去黑夜來迎豫診治病者以綿花袋盛托背而坐於床令婢磨胸不息手六脈俱微數極而無倫次又若蝦游狀豫問曰恐下早成結胸耳主人曰未曾下豫再思之三日而經水適來致中氣虛與下同用黃龍湯四物湯小陷胸湯共合一劑加薑棗煎服主人曰此藥何名豫曰三合湯也一服而諸病悉減遂能臥再服熱退而病全安愈後又因食粥太多而病復熱又作內傷處治而用補中益氣湯出入加減調理而愈斑疹附冷丹論內經曰少陰所至為瘍疹夫少陰所至者言君火有餘熱令大行戊子戊午之歲也在人則心主之心火太過則制己所勝而燒爍肺金蓋肺主皮毛故紅點如蚤之狀見於皮膚之間心火侮而乘之之色也名曰癮疹或傷寒溫熱病而發斑斑如錦文者名曰發斑皆熱毒之所致也其證有陽毒有陰毒是皆冬應寒而反溫人受不正之氣故至春夏而發為斑爛夫陽脈浮數而陰脈實大者名為溫毒或為內外結熱極深舌卷焦黑鼻若煙煤狂言見鬼面赤而斑爛者名為陽毒如溫病下之太早熱氣乘虛入胃或下之太遲熱病鬱積胃中或醫者誤用熱藥過多胃氣熱甚及內傷熱病虛火燔灼肺之間皆能成發斑也是故發赤斑者半生半死發黑斑者九死一生治法用化斑湯即人參白虎湯升麻葛根湯玄參升麻湯黑膏黑奴丸之類是皆正治之法也學者宜詳察而用之脈法脈陽浮而數陰實而大火盛在表故陽脈浮數下焦實熱故陰脈實大脈多沉伏或細而散或絶無滑伯仁曰脈者血之波瀾故發斑者血散於肌膚故脈伏方法丹溪曰發斑屬氣熱挾痰而作自里而發於外通聖散中消息用當微汗以散之下之非理也戴氏曰有色點而無顆粒者曰斑一云發斑似傷寒痰熱之病發於外也有屬裡者因胃熱助手少陰火入手太陰肺也故紅點如斑生於皮毛間耳白虎瀉心調味承氣從長選用之內傷發斑者胃氣極虛一身之火遊行於外所致宜補以降之疹屬熱與痰在肺清肺火降痰或解散出汗亦有可下者戴氏曰疹浮小有顆粒者是也隨出即沒沒而又出主乎解散汗之即愈通聖散中消息用之丹疹皆是惡毒熱血蘊蓄於命門遇君相二火合起即發也如遇熱時以通聖等辛涼之劑解之寒月以升麻葛根等辛溫之劑解之凡丹疹先從四肢起而後入腹者死有乳孩因胎毒兩腋生癤後腹脹發赤疹如霞片取剪刀草杵汁調原蠶沙敷之而愈冷丹屬血風血熱用通聖散有痰血相搏用蟬蛻殭蠶荊芥南星治之以上丹溪方法凡七條消風散荊芥穗甘草炙陳皮去白厚朴白殭蠶炒蟬蛻去土炒人參茯苓防風川芎藿香羌活各等分上細切每服二錢煎荊芥湯或茶清調下葛根橘皮湯元戎治肌膚斑駁冬溫治發咳而心悶但嘔清汁葛根橘紅杏仁知母黃芩麻黃甘草各等分上細切每服五錢水一盞半煎至一盞溫服陽毒升麻湯活人治傷寒一二日間身發斑爛或吐下後變成陽毒腰背疼痛面赤狂言下利脈浮大咽痛方見傷寒門玄參升麻湯活人治發斑咽痛煩躁譫語方見傷寒門陽毒梔子湯活人治傷寒壯熱百節煩痛身發斑爛升麻梔子仁黃芩芍藥各一錢石膏二錢知母一錢五分杏仁七分半柴胡一錢甘草五分上細切作一服入姜三片香豉一百粒煎服犀角消毒飲和劑治發斑癮疹等證牛蒡子四分荊芥穗防風去蘆各三錢甘草一分犀角一錢五分另鎊為細末不入湯煎上細切作一服水二盞煎至一盞調犀角末服解毒防風湯和劑治發斑及癮疹癢痛防風一錢五分地骨皮黃耆芍藥荊芥穗枳殼牛蒡子炒各七分半上細切作一服水二盞煎至一盞去渣溫服升麻葛根湯仲景治傷寒陽明實熱發斑方見傷寒門陰毒升麻鱉甲湯治陰斑升麻二錢當歸甘草各一錢五分蜀椒二十粒鱉甲炙一錢雄黃四分另研上細切水二盞煎至一盞去渣調雄黃末服加味羌活散治感四時不正之氣發為癮疹羌活前胡各一錢人參桔梗甘草炙枳殼麩炒黃色川芎天麻茯苓各五分蟬蛻薄荷各三分上細切作一服加生薑三片水二盞煎至一盞溫服調中湯治內傷外感所發陰斑蒼朮一錢五分陳皮一錢砂仁藿香芍藥煨甘草炙桔梗去蘆半夏湯泡七次白芷羌活枳殼各七分川芎五分麻黃去節桂枝各三分上細切作一服加生薑三片水二大盞煎七分溫服化斑湯仲景治傷寒汗吐下後發斑脈伏即傷寒門白虎加人參湯也守真類萃又加白朮水煎時時服之黑膏活人治溫毒發斑冬月大溫人受不正之氣至春發斑如錦文脈浮散屬陽沉伏屬陰用此以消疫毒之氣生地黃半斤香豉一升上二味細切以豬膏二斤合煎之取濃汁如膏用雄黃麝香如豆大內中攪和勻每服用彈子大白湯化下大青四物湯活人治瘟疫發斑大青四錢阿膠炒成珠子甘草炙各二錢香豉一合上細切作一服水煎服之祖傳方加味敗毒散治瘟疫及癮疹等證羌活獨活前胡柴胡川歸川芎枳殼桔梗茯苓人參各五分甘草薄荷各二分半加白朮防風荊芥蒼朮芍藥生地黃各五分上細切作一服加生薑三片大棗二枚水煎服此因虛而感冒風濕以致發斑者服之良驗內傷論內經曰陽者天氣也主外陰者地氣也主內故陽道實陰道虛犯賊風虛邪者陽受之食飲不節起居不時者陰受之是故陽受之則入六腑陰受之則入五臟此內外陰陽腑臟虛實之不同也舉世醫者但見惡寒發熱頭目沉重之證更不察內外虛實便作傷寒模糊處治輒用仲景汗下解利之法治之多死良可嘆哉我東垣先生憫生靈之夭枉著內外傷辨惑論脾胃論等書一皆以扶植胃氣為本誠萬世不刊之妙典也其諄諄告誡之意屢以飲食失節勞役過傷為言而立補中益氣等湯為主治若能確守其法而行之無有不驗惜乎今之醫者多承因習之弊懵然不識機變睥睨其書而不視間有讀者不明脈候虛實不偏於此則偏於彼或遇內傷挾痰與食清氣怫鬱於下濁氣填塞胸中之候驟以補中益氣等藥一試則氣滿痞塞遂謂補藥不宜於此證也決意改用汗下解利之法醫死而不之悔故王安道有內傷不足中有有餘之議此發東垣之所未發者耳學者宜潛心究察其虛實似是之非庶不夭人之天年也東垣辨內外虛實之法學者宜熟玩於胸中臨證之際庶無魯魚亥豕之訛焉抑考辨惑論曰夫外傷風寒有餘之證其發熱惡寒寒熱並作其熱也拂拂發熱發於皮毛之上如羽毛之拂明其熱在表也其口鼻氣塞不通心中煩悶不安其惡風寒也稍似裸體便不能禁雖重衣厚幕逼近烈火終不能御其寒一時一日增加愈甚必待邪傳入里乃已語聲重濁前輕後重高厲有力腹中和口知穀味大小便如常筋骨疼痛不能動搖手背熱手心不熱是皆外感有餘之候也其內傷飲食勞役不足之證其發熱惡寒寒熱間作及熱也蒸蒸燥熱發於肌肉之間捫之烙手明其熱在內也其口鼻中氣短少氣不足以息其惡風寒也居露地中遇大漫風起卻乃不惡惟門窗隙中些少賊風則大惡之亦必待其陰陽既和汗出則已語言困倦前重後輕氣不相續腹中不和口不知穀味大小便或閉或溏或心下痞悶或胸中如刀劙之痛手心熱手背不熱是皆內傷不足之候也以此辨之豈不如黑白之易見乎愚故略述東垣之言以為後學之矜式耳臨證又當參考其脈候求其有餘中之不足或不足中之有餘或外感挾內傷或內傷挾外感視其輕重而權宜用藥以施治之庶幾登東垣之堂而為當世之司命矣脈法東垣曰右寸氣口脈大於人迎一倍過在少陰則二倍太陰則三倍右手三部屬三陰少陰在關主脾太陰在寸主肺肌膚大熱故脾肺二臟之脈皆緊盛也右寸氣口脈急大而數時一代而澀澀者肺之本脈代者元氣不相接續此飲食失節勞役過甚大虛之脈也右關脾脈大而數謂獨大於五脈也數中顯緩時一代也此不甚勞役之脈也右關胃脈損弱甚則隱而不見但內顯脾脈之大數微緩時一代此飲食不節寒溫失所之脈也右關脈沉而滑此宿食不消之脈也方法丹溪曰東垣內外傷辨甚詳世之病此者為多但有挾痰者有挾外邪者有熱鬱於內而發者皆當以補元氣為主看所挾而兼用藥氣虛甚者必少加附子以行參耆之氣挾痰者補中益氣加半夏更以竹瀝薑汁傳送以上丹溪方法凡一條戴氏曰凡內外兼證或內傷重而外感輕者為內傷挾外感證治法宜先補益而後散邪或以補中益氣為主治加散邪藥當以六經脈證參究各加本經藥治之或外感重而內傷輕者為外感挾內傷證治法宜先散邪而後補益或以辛涼等解散藥為君而以參朮茯苓芎歸等藥為臣使是其治也補中益氣湯東垣黃耆一錢甘草炙五分或七分人參病甚者一錢白朮當歸各七分陳皮五分升麻柴胡各三分上細切作一服水二盞煎至一盞去渣溫服脾胃一虛肺氣先絶故用黃耆以益皮毛而閉腠理不令自汗也上喘氣短損其元氣用人參以補之心火乘脾用炙甘草之甘溫以瀉火熱而補胃中元氣若脾胃急痛腹中急縮者宜多用之此三味除濕熱煩熱之聖藥也白朮苦甘溫除胃中熱利腰臍間血升麻柴胡苦平味之薄者升胃中之清氣又引黃耆甘草甘溫之氣味上升能補衛氣之散解而實其表又緩帶脈之縮急用當歸以和血脈橘紅以理胸中之氣又能助陽氣上升以散滯氣助諸甘辛為用或少加黃柏以救腎水而瀉陰中之伏火也表熱者一二服氣和微汗而愈如咽乾者加乾葛如心刺痛乃血澀不足加當歸如精神短少者加人參五味子如頭痛加蔓荊子痛甚加川芎頭痛腦痛加藁本細辛有痰加半夏生薑如咳嗽夏加五味子麥門冬秋冬加去節麻黃春加佛耳草款冬花久咳肺中伏火去人參如食不下乃胸中有寒或氣澀滯加青皮木香陳皮寒月更加益智草豆蔻夏月更加芩連秋更加檳榔砂仁如心下痞悶加芍藥黃連如腹脹加枳實木香砂仁厚朴天寒加生薑肉桂如腹痛加白芍藥甘草有寒加桂心夏加黃芩甘草芍藥冬加益智草豆蔻半夏如脅痛或縮急加柴胡甘草如臍下痛加熟地黃不已乃是寒也加肉桂如大便閉澀加當歸大黃如腳軟乏力或痛加黃柏不已更加防己如氣浮心亂以硃砂安神丸鎮固之則愈上此方加減法是飲食勞倦喜怒不節如病熱中則可用之若未傳寒中則不可用也蓋甘酸適足以益其病耳如黃耆人參甘草芍藥五味子之類是也見脾胃論硃砂安神丸黃連一錢五分硃砂一錢酒生地黃酒當歸身炙甘草以上各五分上為極細末湯浸蒸餅為丸如黍米大每服十五丸津唾咽下食後服一方無地黃歸身用生甘草調中益氣湯其脈弦洪緩而沉按之中之下得時一澀其證四肢倦怠肢節煩疼難以屈伸身體沉重煩心不安忽肥忽瘦口失滋味腹難舒伸大小便清利而數或上飲下便或大便澀滯不行一二日一見夏月飧泄米穀不化或便後見血或見白膿胸滿短氣膈噎不通或痰嗽稠黏口中沃沫食入反出耳鳴耳聾目中溜火視物昏花胬肉紅絲熱壅頭目不得安穩嗜臥無力不思飲食此藥主之黃耆一錢人參有嗽去之甘草蒼朮各五分柴胡此味為上氣不足胃氣與脾氣下溜乃補上氣從陰養陽也升麻各二分橘紅二分如腹中氣不得運轉更加一分木香一分或二分上細切作一服水二盞煎至一盞去渣空心溫服寧心絶思藥必神效蓋病在四肢血脈空心在旦是也如時顯熱躁乃下元陰火蒸發也加生地黃二分黃柏三分大便虛坐不得或了而不了腹中逼迫血虛血澀也加當歸身三分如身體沉重雖小便數多亦加茯苓二分蒼朮一錢澤瀉五分黃柏三分如胃氣不和加半夏五分生薑三片有嗽加生地黃二分以製半夏之毒如痰厥頭痛非半夏不能除此足太陰脾經邪所作也如兼燥熱加黃柏生地黃各二分如無以上證只服前藥如春夏腹痛加白芍藥三分如惡熱而渴或腹痛者更加白芍藥五分生黃芩二分如惡寒腹中痛加桂心三分去黃芩名桂枝芍藥湯如冬月腹痛不可用芍藥蓋其性之大寒也只加乾薑二分或加半夏五七分以生薑制之如秋冬之月胃脈四道為衝脈所逆並脅下少陽脈二道而反上行病名厥逆內經曰逆氣上行滿脈去形明七神昏絶離去其形而死矣其證氣上衝咽不得息而喘息有音不得臥加吳茱萸五分或一錢湯泡去苦用觀厥氣多少而用如夏月有此證為大熱也蓋此病隨四時為寒熱溫涼也宜以酒黃柏酒黃連酒知母各等分為細末熟湯為丸如梧桐子大每服二百丸白湯空心送下仍多飲熱湯服畢少時便以美膳壓之使不得胃中停留直至下元以瀉衝脈之邪也大抵治飲食勞倦之病乃虛勞七損症也當用溫平甘多辛少之藥治之是其本法也升陽順氣湯治因飲食不節勞役所傷腹脅滿悶短氣遇春則口淡無味遇夏雖熱猶有惡寒飢則常如飽不喜食冷物黃耆一錢半夏六分甘草炙二分草豆蔻四分神麯三分炒升麻柴胡各二分當歸身陳皮各三分黃柏一分半人參三分上細切作一服水二盞生薑三片煎至一盞去渣食前溫服夫脾胃不足之證須用升麻柴胡苦平味之薄者陰中之陽引脾胃中清氣行於陽道及諸經生髮陰陽之氣以滋春氣之和也又引黃耆人參甘草甘溫之氣味上行充實腠理使陽氣得衛外而為固也凡治脾胃之藥多以升陽補氣名之者此也升陽補氣湯治飲食不時飢飽勞役胃氣不足脾氣下溜氣短無力不能寒熱早飯後轉增昏悶頻要眠睡怠惰四肢不收懶倦動作五心煩熱厚朴薑製三分升麻羌活各五分白芍藥煨五分獨活五分防己五分甘草炙五分澤瀉五分柴胡一錢二分生地黃七分半上細切作一服生薑三片大棗二枚水二盞煎至一盞去渣食前大溫服如腹脹及腹中窄狹加厚朴一倍如腹中似硬加砂仁三分當歸補血湯治肌熱燥熱困渴引飲目赤面紅晝夜不息其脈洪大而虛重按全無內經曰脈虛血虛又云血虛發熱證像白虎惟脈不長實為辨耳誤服白虎湯必死此病得之於飢困勞役黃耆一兩當歸酒洗二錢上細切作一服水二盞煎至一盞食前溫服木香化滯湯治因憂食濕面結於中脘腹皮抵痛心下痞滿不思飲食食之不散常常痞氣或胃脘當心而痛並皆治之半夏湯泡洗一錢五分草豆蔻濕麵裹煨杵碎甘草炙各七分半柴胡去蘆六分木香橘紅各四分半枳實麩炒黃色當歸各三分酒紅花一分上細切作一服水二盞生薑五片煎至一盞去渣熱服升陽益胃湯治肺及脾胃虛則怠惰嗜臥四肢不收時值秋燥令行濕熱少退體重節痛口燥舌乾飲食無味大便不調小便頻數不欲食食不消兼見肺病灑淅惡寒慘慘不樂面色惡而不和乃陽氣不伸故也當升陽益胃此藥主之黃耆一錢半夏人參去蘆甘草炙各五分獨活三分防風三分因秋旺故以辛溫瀉之白朮二分羌活三分黃連一分柴胡去蘆二分澤瀉二分不淋祕者不可用橘紅二分半白芍藥三分何故秋旺用人參白朮芍藥之類補肺蓋為脾胃虛則肺最受邪故因時而補易為力也茯苓二分小便利口不渴者勿用上細切作一服生薑五片大棗二枚水二盞煎至一盞去渣早飯後溫服服藥後如小便罷而病加增劇是不宜利小便當去茯苓澤瀉如方喜食一二日不可飽食恐胃再傷以藥力尚少脾胃之氣不得轉運升發也須滋味之食或美食助其藥力益升浮之氣而滋其胃氣慎不可淡食以損藥力而助邪氣之降沉也可以少役形體使胃與藥得轉運開發慎毋大勞役使氣復傷若脾胃得安靜尤佳若胃氣稍強少食嘉果以助藥力經云五果為助是也雙和散補血益氣治虛勞少力不熱不寒溫而有補白芍藥一錢黃耆蜜炙熟地黃川芎川歸各六分甘草炙肉桂各四分上細切作一服生薑三片大棗二枚水一盞半煎至一盞溫服大病後血虛氣乏者以此調治門冬清肺飲治脾胃虛弱氣促氣喘精神短少或衄血吐血等證紫菀茸一錢黃耆蜜炙白芍藥炒甘草炙各七分人參麥門冬去心當歸身各五分五味子九粒上細切作一服水一盞半煎至一盞去渣食後溫服寬中進食丸滋形氣喜飲食麥糵面一兩炒黃半夏湯泡七次去皮臍豬苓去黑皮各七錢草豆蔻濕麵裹煨神麯炒各五錢枳實麩炒黃色橘紅各三錢白朮五錢白茯苓澤瀉各三錢砂仁二錢乾生薑炮五錢甘草炙人參青皮各二錢木香一錢上為細末湯浸蒸餅為丸如梧桐子大每服三十丸溫米飲送下食後服白朮和胃丸治病久厭厭不能食而臟腑或閉或溏此胃氣虛弱也常服則和中理氣去濕消痰和脾胃進飲食白朮一兩五錢半夏湯泡洗七次厚朴薑製各一兩陳皮去白八錢人參五錢甘草炙二錢枳實麩炒黃色檳榔各二錢五分木香一錢五分乾生薑七分上為細末湯浸蒸餅為丸如梧桐子大每服五十丸溫米飲送下枳朮丸治痞滿消食強胃白朮二兩枳實麩炒黃色一兩上為細末用沸湯泡青荷葉乾者亦可頃間去葉用湯浸晚粳米杵粉以原湯煮糊為丸如梧桐子大每服五十丸多至七八十丸白湯送下本方加橘紅一兩名橘皮枳朮丸治元氣虛弱飲食不消心下痞悶本方加炒神麯一兩炒麥糵面一兩名曲糵枳朮丸治飲食太過致心腹滿悶不快本方加木香一兩名木香枳朮丸能破滯氣消飲食開胃進食本方加半夏一兩名半夏枳朮丸治因冷食內傷本方加酒炒黃連酒蒸大黃炒神麯淨橘紅各二兩黃芩四兩名三黃枳朮丸治傷肉食濕面辛辣味厚之物填塞悶亂不快草豆蔻丸治傷飲食卒心痛甚效或秋冬傷寒冷之物胃脘當心而痛上支兩脅痛膈噎不通食飲不下草豆蔻麵裹煨枳實麩炒黃色白朮各一兩麥糵麵炒黃色半夏湯泡洗黃芩去朽酒炒神麯炒黃色各五錢乾生薑炮橘紅青皮炒各二錢炒鹽五分上為細末湯浸蒸餅為丸如緑豆大每服五十丸白湯送下如冬月不可用黃芩歲火不及又傷冷物加以溫劑是其治也然亦有熱物傷者從權以寒藥治之隨時之宜不可不知也枳實導滯丸治傷濕熱之物不得施化而作痞滿悶亂不安大黃一兩枳實去穰麩炒神麯炒各五錢茯苓去皮黃芩去朽黃連白朮各三錢澤瀉二錢或加木香檳榔各二錢名木香導滯丸上為細末湯浸蒸餅為丸如梧桐子大每服七八十丸溫水送下食遠量強弱加減丸數以利為度白朮丸治傷豆粉濕面油膩之物白朮六兩枳實炒半夏泡洗七次神麯炒各五錢橘紅七錢黃芩炒五錢白礬枯三分上為細末湯浸蒸餅為丸如緑豆大每服六七十丸白湯送下量所傷加減丸數因素食多用椒姜故用黃芩以瀉之木香見哯丸治傷生冷硬物心腹滿悶疼痛神麯炒京三稜煨各一兩草豆蔻麵裹煨香附子各五錢升麻柴胡各三錢木香一錢巴豆霜五分石三稜五錢去皮煨上為細末湯浸蒸餅為丸如梧桐子大每服三十丸白湯送下量所傷多少服之三稜消枳丸治傷生冷硬物不能消化心腹滿悶京三稜醋煮廣朮醋煮神麯炒各七錢淨青皮巴豆和皮米炒焦黑去米及皮茴香陳皮去白各五錢丁香益智去殼各三錢上為細末醋調麵糊為丸如梧桐子大每服十丸加至二十丸生薑湯送下食前量虛實加減如更衣止後服備急大黃丸治心腹諸卒暴痛大黃巴豆去皮膜及油乾薑各等分上為細末煉蜜和搗為丸如小豆大每服二丸以利為度保和丸丹溪治一切飲食所傷胸腹飽悶不安或腹中有食積癖塊多服日漸消散脾胃虛者勿服山楂肉五兩去核神麯炒三兩半夏湯泡洗三兩茯苓陳皮去白各一兩連翹一兩萊蔔子炒一兩麥糵面炒一兩上為細末別用生神麯五兩入生薑汁一小盞水調打糊為丸如梧桐子大每服三五十丸白湯或清米飲送下一方加麥糵面有白朮二兩名大安丸健脾胃消食積最效一云脾虛者服之虛虛之禍疾如反掌或以四君子等作湯使送下蓋山楂一物大能克化食物若胃中無食脾虛不運不思食者服之則克伐脾胃之氣故云然也加味二陳湯丹溪導痰補脾消食行氣橘紅茯苓各七分半夏湯泡洗一錢甘草炙三分川芎蒼朮白朮各八分山楂肉一錢五分砂仁五分神麯炒七分香附子一錢麥糵面炒五分上件除神麯麥糵面細研炒另包余細切作一服加生薑三片大棗一枚水二盞煎至一盞調神麯麥糵入內服祖傳方溯源散凡傷食物致惡寒發熱久不愈或傷寒後食諸物致食復潮熱不已必詢問其先食何物所傷或糍粽或肉食則以原食之物燒存性一兩重細研為末別用生韭菜連根約一握杵汁調服過一二時以東垣枳實導滯丸百餘粒催之其所傷之宿食即下熱退而愈參苓白朮散治脾胃虛弱飲食不進或嘔吐瀉利其大病後補助脾胃此藥極妙人參白朮白茯苓乾山藥白扁豆去殼薑汁浸炒一兩五錢甘草炙桔梗去蘆薏苡仁蓮肉以上各一兩家傳治噤口痢用石蓮肉又加石菖蒲一兩有氣加木香五錢上為細末每服二錢棗湯調下噤口痢用粳米湯休息痢用砂糖湯調下別方有縮砂一兩醫案杜門傅氏婦豫族侄女也年三十歲因勞倦傷食致腹痛䐜脹面黃十數日後求豫治診得右手氣口脈洪盛而滑右關脈浮診虛大而滑重按則沉實左寸關亦弦滑而無力兩尺皆虛而伏豫曰此中氣不足脾氣弱而不磨當補瀉兼施而治初與補中益氣湯二服次日與枳實導滯丸八十丸大便去二次次日又與補中益氣湯如此補一日瀉一日二十日服補藥十數帖導滯丸千數丸腹脹漸退而安東陽盧廉夫善推明丹溪之醫學者也自病亦誤治年四十五時正月間因往永康路途跋涉勞倦發熱身體略痛而頭不痛自以為外感而用九味羌活湯三帖汗出熱不退前後又服小柴胡湯五六帖熱愈甚經八日召豫診視至臥榻前見煎成湯飲一盞在案問之乃大承氣湯將欲飲診其脈右三部浮洪略弦而無力左三部略小而亦浮軟不足豫曰汝兒自殺矣此內傷虛證服此藥大下必死伊曰我平生元氣頗實素無虛損證明是外感無疑也豫曰將欲作陽明內實治而下之歟脈既不沉實而又無目疼鼻乾潮熱譫語等證將欲作太陽表實治而汗之歟脈雖浮洪而且虛又無頭痛脊強等證今經八日不應仍在其表汝欲作何經而處治之乎伊則唯唯不語以補中益氣湯加附子三分作大劑與之是夜連進二服天明往診脈略平和伊言尚未服仍謂前藥無效欲易外感退熱之藥豫曰再飲前藥二服不效當罪我又如前二服脈證俱減半伊始曰我兒誤矣去附子再煎二服與之得熱退氣和而愈豫則告曰其熱雖退體猶困倦伊如前自合二十餘帖服後方得強健復元而安上湖呂氏子年三十餘九月間因勞倦發熱醫作外感治用小柴胡黃連解毒白虎等湯反加痰氣上壅狂言不識人目赤上視身熱如火衆醫技窮八日後召豫診視六脈數疾七八至又三部豁大無力左略弦而芤豫曰此病先因中氣不足又內傷寒涼之物致內虛發熱因與苦寒藥太多為陰盛格陽之證幸元氣稍充未死耳以補中益氣湯加製附子二錢乾薑一錢又加大棗生薑煎服衆醫笑曰此促其死也黃昏時服一劑痰氣遂平而熟寐伊父報曰自病不寐今安臥鼾聲如平時至半夜方醒始識人而諸病皆減又如前再與一劑至天明時得微汗氣和而愈中暑論內經曰因於暑汗煩則喘喝靜則多言潔古曰靜而得之為中暑動而得之為中熱中暑者陰證中熱者陽證東垣曰暑熱之時無病之人或避暑於深堂大廈得之者名曰中暑其病必頭痛惡寒身形拘急肢節疼痛而煩心肌膚大熱無汗為房室之陰寒所遏使周身之陽氣不得伸越大順散等熱藥主之若行人或農夫於日中勞役得之者名曰中熱其病必苦頭痛發躁熱惡熱捫之肌膚大熱必大渴引飲汗大泄無氣以動乃為大熱外傷肺氣蒼朮白虎等涼劑主之王安道曰暑熱之氣一也皆夏月中傷其邪而為病焉豈以一暑熱分為陰陽二證而名之耶其避暑於深堂大廈及恣食藏冰瓜果寒涼之物正經所謂口得寒物身犯寒氣之病耳自當同秋冬即病陰證傷寒處治不可名中暑也此論固是抑亦有未悉之旨也歟愚按仲景傷寒論中一證曰中暍即中暑也虛而微弱煩渴引飲體熱自汗此蓋得勞役體虛而暑邪干衛之候是宜東垣清暑益氣湯等補益之劑治之而愈一證曰熱病即中熱也脈洪而緊盛頭疼身熱口燥心煩此蓋得之於冬感寒邪鬱積至夏而發乃挾暑而成大熱之候是宜黃連白虎解毒等湯清涼之劑調之而愈曰中暑者陰證內傷之為病也曰中熱者陽證外感之為病也曰陰曰陽豈不於斯而明辨之乎學者宜再思之脈法經曰脈虛身熱得之傷暑脈弦細芤遲許學士云傷暑其脈弦細芤遲何也內經曰寒傷形熱防氣蓋傷氣而不傷形則氣消而脈虛所謂弦細芤遲皆虛脈也仲景以弦為陰朱肱亦曰中暑脈虛細弱暑脈虛可知矣脈虛而微弱或浮大而散或隱不見微弱隱伏皆虛類也方法丹溪曰夏月陽氣盡出於地人之腹屬地氣陽氣於此時浮於肌表腹中之陰虛矣夏月伏陰在內此陰字有虛之義若作陰冷看誤矣古人治暑有用大順散等劑蓋以涼亭水閣寒涼冰雪之傷不用溫劑病何由安非為伏陰而用也火令之時流金爍石何陰冷之有孫真人制生脈散令人夏月服之非虛而何暑證用黃連香薷飲清暑益氣湯五苓散等藥有挾痰者加南星半夏之類挾虛者加入參黃耆之類以上丹溪方法凡二條戴氏曰暑有冒有傷有中三者有輕重之分或腹痛水瀉者胃與大腸受之噁心者胃口有痰飲此二者冒暑也可用黃連香薷飲黃連退熱香薷消暑氣或身熱頭疼躁亂不寧者或身如針刺者此為熱傷在肉分也當以解毒白虎等湯加柴胡氣虛加人參或咳嗽發寒熱盜汗出不止脈微者熱在肺經火乘金也此為中暑宜用清肺湯柴胡天水散之類急治則可清暑益氣湯治長夏濕熱大勝人感之多四肢困倦精神短少懶於動作胸滿氣促肢節煩疼或氣高而喘身熱而煩心下痞滿小便黃而數大便溏而頻或泄黃如糜或如泔色或渴或不渴不思飲食自汗體重或汗少者血先病而氣未病也其脈中得洪緩若濕熱相搏必加之以遲病雖互換少差其脈暑濕令則一也宜以清燥之劑治之黃耆汗少一錢蒼朮各一錢半升麻一錢人參白朮陳皮神麯炒澤瀉各五分甘草炙黃柏酒浸炒川歸青皮麥門冬去心乾葛各三分五味子九粒上細切作一服水二盞煎至一盞去渣溫服白虎湯仲景治暑熱發渴方見傷寒門益元散河間一名天水散一名六一散治中暑身熱煩渴小便不利此藥能燥濕分利水道實大腑化熱毒行積滯逐凝血補脾胃降火之要藥也方見痢門香薷飲局方治一切暑熱腹痛霍亂吐利煩心等證香薷三錢厚朴薑製白扁豆炒各一錢五分上細切作一服水二盞煎七分去渣溫服黃蓮香薷飲局方治證同前以前方去扁豆加黃連七分半也十味香薷飲香薷一錢人參陳皮白朮白茯苓白扁豆炒黃耆木瓜厚朴各五分薑汁製炒甘草炙五分上細切作一服水二盞煎至一盞去渣溫服桂苓甘露飲河間治伏暑發渴脈虛桂心人參黃耆茯苓白朮甘草葛根澤瀉石膏寒水石各一兩滑石二兩火煅另研木香一錢上為細末每服三錢白湯調下五苓散方見傷寒門本方加茵蔯名茵蔯五苓散治濕熱發熱黃證最捷大順散易老甘草乾薑杏仁湯煮去皮尖炒肉桂各等分上先將甘草用白砂同炒次入姜卻下杏仁炒過篩去砂同桂研為細末每服二錢白湯調下王安道曰大順散本為冒暑伏熱引飲過多脾胃受濕嘔吐水穀不分臟腑不調所立故甘草乾薑皆經火炒又肉桂而非桂枝蓋溫中藥也內有杏仁不過取其能下氣耳若以此藥治靜而得之之證吾恐不能解表反增內煩矣愚按內經必先歲氣無伐天和其暑月豈可用此熱藥此方雖録於此不可輕用生脈散人參五味子麥門冬泡去心各等分上細切水煎夏月時時代熟水飲之孫真人曰夏月必服五味子以補五臟氣東垣曰夏月服生脈散加黃耆甘草令人氣力湧出祖傳方凡人夏月沖斥道途或於田野中務農作勞或肥白氣虛之人不能抵當暑熱忽然昏悶運僕其氣將絶如在日中即當移病者於陰處徐徐以溫湯水灌之如未蘇急灸氣海穴以復其元氣醒後以大劑滋補之藥補之切不可灌以涼水即死愚按內經有曰陽氣者煩勞則張精絶闢積於夏使人煎厥目盲不可以視耳閉不可以聽憒憒乎若壞都汩汩乎不可止是則中暑運厥之候也濕證論內經曰諸濕腫滿皆屬脾土又曰濕勝則濡泄地之濕氣感則害人皮肉筋脈原病式曰諸痙強直積飲痞膈中滿霍亂吐下體重跗腫肉如泥按之不起皆屬於濕夫濕之為病所感不同有從外感而得之者有從內傷而得之者若居處卑濕之地與夫道途沖斥風雨或動作辛苦人汗沾衣裳皆濕從外感者也或恣飲酒漿湩酪多食柑橘瓜果之類皆濕從內傷者也大抵宜發汗及利小便使上下分消其濕是其治也經又曰因於濕首如裹濕熱不攘大筋緛短小筋弛長緛短為拘弛長為痿因於氣為腫四維相代陽氣乃竭丹溪釋曰濕者土之濁氣首為諸陽之會其位高其氣清其體虛故聰明系焉濁氣熏蒸清道不通故沉重不利似乎有物蒙之失而不治濕鬱為熱熱留不去熱傷血不能養筋故為拘攣濕傷筋不能束骨故為痿弱王注曰素嘗氣疾濕熱加之氣濕熱爭故為腫也邪氣漸盛正氣漸微陰氣衰少致邪代正氣不宣通故四維發腫諸陽受氣於四肢也但今人見膝間關節腫痛全以為風治者多誤矣學者宜詳察之脈法脈經曰濕家為病一身盡疼發熱而身色似熏黃也脈浮而緩濕在表也脈沉而緩濕在裡也或弦而緩或緩而浮皆風濕相搏也方法丹溪曰六氣之中濕熱為病十居八九濕在上宜微汗而解經曰濕上甚而熱治以苦溫佐以甘辛以汗為故而止也不欲汗多故不用麻黃乾葛等劑濕在中下宜利小便此淡滲治濕也一云濕在下宜升提之濕有自外而入者有自內得者陰雨濕地皆從外治宜汗散久則疏通滲泄之蒼朮治濕上下部都可用一云上焦濕用蒼朮其功甚烈二陳湯加酒芩羌活蒼朮木通散風行濕最妙以上丹溪方法凡四條防己黃耆湯金匱治風濕脈浮身重汗出惡風或周身疼痛防己三錢甘草一錢五分白朮二錢黃耆三錢五分上細切作一服加生薑三片大棗二枚水二大盞煎至一盞去渣溫服喘者加麻黃胃氣不和加芍藥氣上衝加桂枝下有寒加細辛濕勝身重陽微中風則汗出惡風故用黃耆炙甘草以實表防己白朮以勝濕甘草附子湯仲景治風濕相搏骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫而痛者甘草炙二錢白朮二錢附子一錢五分桂枝四錢上細切作一服水煎金匱方無桂枝加生薑大棗名曰白朮附子湯加味五苓散元戎治濕勝身痛小便不利體重發渴者本方中加羌活一倍是也除風濕羌活湯東垣治風濕相搏一身盡痛羌活七分防風升麻柴胡各五分藁本蒼朮各一錢上細切作一服水二盞煎至一盞去渣溫服羌活勝濕湯東垣治肩背痛不可回顧此手太陽氣鬱而不行以風藥散之脊痛項強腰似折項似拔此足太陽經不通行此藥主之羌活獨活各一錢藁本防風甘草炙川芎各五分蔓荊子三分上細切作一服水二盞煎至一盞去渣溫服食前如身重腰痛沉沉然經中有寒濕也加酒洗漢防己五分輕者附子五分重者川烏五分茯苓滲濕湯東垣治濕鬱成黃疸寒熱嘔吐而渴身體面目俱黃小便不利不思飲食莫能安臥黃芩黃連梔子防己白朮蒼朮陳皮青皮枳實各四分赤茯苓澤瀉各五分茵蔯六分豬苓去黑皮一錢上細切作一服水二盞煎至一盞去渣溫服茵蔯五苓散局方治濕熱大勝黃疸發熱五苓散內加茵蔯一倍即是也祖傳方白朮酒治中濕遍身疼痛不能轉側及皮肉痛難著席白朮一兩上細切作一服無灰老酒一盞半煎至一盞去渣溫服丹溪活套云濕本為土氣火熱則能生濕土故夏熱則萬物濕潤秋涼則萬物乾燥夫熱而怫鬱則生濕也因濕生痰故用二陳湯加酒芩羌活防風去風行濕蓋風藥能勝濕也大抵治濕宜利小便為上策故曰治濕不利小便非其治也如一身盡痛或無汗是濕流關節邪氣在表宜五苓散加羌活蒼朮以微汗之不可大汗恐汗去而虛濕仍在也若自汗多者宜白朮甘草湯若小便自利清白大便泄瀉身痛自汗此為寒濕宜五苓散加生附蒼朮木瓜如風濕身痛微腫惡風宜杏仁湯官桂五錢大門冬芍藥麻黃各二錢五分杏仁七個水三盞姜十片煎分二服又治濕消腫脹利小便健脾胃葶藶木香散葶藶子茯苓豬苓白朮各一兩木香澤瀉木通甘草桂枝各五錢滑石三兩為末湯調服然以上諸方乃略示其端倪耳全在活法加減而用之不可執一論也夫治濕者固當以二術為君以補脾為主治然亦有濕盛氣滿膨脹者又當以利水行氣為先補脾藥又未可遽用或以二術為君而利水藥為臣使或以木通澤瀉葶藶草前子等利水藥為君而以茯苓白朮人參等補脾藥為臣使有本而標之者亦有標而本之者看緩急而施治則萬舉萬全之功可立而待也燥證論內經曰諸澀枯涸乾徑皴揭皆屬於燥原病式曰經云風熱火同陽也寒燥濕同陰也又燥濕少異也然燥金雖屬秋陰而異乎寒濕故反同其風熱也故火熱勝則金衰而風生緣風能勝濕熱能耗液而反寒陽實陰虛則風熱勝於水濕而為燥也凡人風病多因熱甚而風燥者為其兼化以熱為其主也蓋肝主於筋而風氣自甚又燥熱加之則筋大燥也燥金主於收斂其脈緊澀故為病徑強緊急而口噤也或病燥熱太甚而脾胃乾涸成消渴者或風熱燥甚怫鬱在表而裡氣平者或善伸數缺筋脈拘急或時惡寒筋惕而搐又或風熱燥並而鬱甚於里故煩滿而或祕結也及風癇之發作者由熱甚而風燥為其兼化涎溢胸膈燥爍而瘛瘲昏冒僵仆也凡此諸證皆由熱甚而生風燥病各有異者由風熱燥各微甚不等故也所謂中風筋緩者因其風熱勝濕而為燥之甚也然筋緩不收而痿痹故諸膹郁病痿皆屬於肺金乃燥之化也如秋深燥甚則草木萎落而不收病之象也是以掌得血而能握足得血而能步夫燥之為病者血液衰少不能榮養百骸故若是也學者不可不知脈法脈緊而澀或浮而弦或芤而虛方法丹溪曰皮膚皴揭拆裂血出大痛或肌膚燥癢皆火爍肺金燥之甚也宜以四物湯去川芎加麥門冬人參天花粉黃柏五味子之類治之以上丹溪方法凡一條以下皆臞仙方瓊脂膏治血虛皮膚枯燥及消渴等證鹿角膠一斤生地黃二十斤洗淨細搗取真汁去渣白沙蜜二斤煎一二沸掠去上沫淨而止真酥油一斤生薑二兩搗取真汁上先以文武火熬地黃汁數沸以絹濾取淨汁又煎二十沸下鹿角膠次下酥油及蜜同煎良久候稠如餳以瓷器收貯每服一二匙空心溫酒調下瓊玉膏治證同前及肺熱咳嗽甚者方見咳嗽門天門冬膏治血虛肺燥皮膚折裂及肺痿咳膿血證天門冬新掘者不拘多少上一味淨洗去皮心細搗絞取汁澄清以布濾去渣滓用銀鍋或沙鍋慢火熬成膏每用一二匙空心溫酒調服地仙煎治諸燥證山藥杵細一斤杏仁去皮尖一升生牛乳汁二斤上件將杏仁研細入牛乳山藥拌勻絞取汁用新瓷瓶密封重湯煮一日每服一二匙空心溫酒或湯調下和血益氣湯東垣治口燥舌乾便數舌上赤脈此藥生津液除乾燥生肌肉方見消渴門當歸潤燥湯東垣治消渴大便祕澀乾燥結硬兼喜溫飲陰頭退縮舌燥口乾眼澀難開等證方見消渴門生津甘露湯一名清涼飲子東垣治消中能食而瘦口舌乾燥自汗大便結燥小便頻數方見消渴門生津甘露飲子東垣治消渴諸燥證方見消渴門辛潤緩肌湯東垣治諸燥肌渴及皮膚燥澀等證方見消渴門潤燥湯東垣治大便燥結腸胃枯涸等證潤腸丸東垣治大便乾燥閉結不通潤燥和血活血潤燥丸東垣治大便風祕血祕常常燥結潤腸湯東垣治大便結燥不通以上四方並見大便結燥門通幽湯治大便結燥治在幽門以辛潤之甘草炙紅花各一分生地黃熟地黃各一錢升麻桃仁泥當歸身各一錢上銼水煎調檳榔末五分稍熱服之醫案豫仲兄懷德處士年四十五平生體瘦弱血少值庚子年歲金太過至秋深燥金用事久晴不雨得燥證皮膚折裂手足枯燥搔之屑起血出痛楚十指甲厚反而莫能搔癢豫制一方名生血潤膚飲服數十帖其病如脫後治十數人皆驗祖傳方生血潤膚飲川歸身酒洗生地黃熟地黃酒洗黃耆蜜炙各一錢天門冬一錢五分麥門冬去心一錢五味子九粒片芩去朽酒洗五分栝蔞仁五分桃仁泥五分酒紅花一分升麻二分上細切作一服水二盞煎至一盞溫服如大便結燥加麻仁郁李仁各一錢火熱論內經曰諸熱瞀瘈暴喑冒昧躁擾狂越罵詈驚駭胕腫疼酸氣逆衝上禁栗如喪神守喋嘔瘡瘍喉痹耳鳴耳聾嘔湧溢食不下目昧不明暴注瞤瘈暴病暴死皆屬於火丹溪曰太極動而生陽靜而生陰陽動而變陰靜而合而生水火木金土各一其性惟火有二曰君火人火也曰相火天火也火內陰而外陽主乎動者也故凡動皆屬火以名而言形質相生配於五行故謂之君以位而言生於虛無守位稟命因動而見故謂之相天主生物故恆於動人有此生亦恆於動其所以恆於動者皆相火之為也云云又曰五者之性為物所感不能不動謂之動者即內經五火也相火易起五性厥陽之火相扇則妄動矣火起於妄變化莫測無時不有煎熬真陰陰虛則病陰絶則死愚按心為君火而又有相火寄於肝腎二臟即內經一水不能勝二火也五性之火為物所感而動即內經一水不能勝五火也夫五行之理天人所同知乎此則造化陰陽洞明於胸臆之間又能灼知其火邪之虛實或補或瀉用藥以平之則愈疾之功如射之中鵠矣學者其可忽諸脈法脈浮而洪數為虛火脈沉而實大為實火洪數見於左寸為心火見於右寸為肺火見於左關為肝火右關為脾火兩尺為腎經命門之火男子兩尺洪大者必遺精陰火盛也方法丹溪曰陰虛火動者難治實火可瀉黃連解毒之類虛火可補參朮生甘草之類謂之實者邪氣實也謂之虛者正氣虛也鬱火可發當看在何經風寒外束者可發輕者可降重則從其性而升之凡火盛者不可驟用寒涼必須溫散火急甚者必緩之生甘草兼瀉兼緩參術亦可人壯氣實火盛顛狂者可用正治硝黃冰水之類人虛火盛狂者以生薑湯與之若投以冰水之類正治立死有補陰則火自降炒黃柏生地黃之類凡氣有餘便是火氣從左邊發者肝火也氣從臍下起者陰火也愚按氣有餘者非真氣也五志厥陽之火動而為邪氣也飲酒人發熱者難治不飲酒人因酒發熱者亦難治輕手按之熱甚重手按之不甚此熱在肌表宜清之地骨皮麥門冬竹茹之類重手按之熱甚而烙手輕手按之不覺熱此病在肌肉之內宜發之東垣升陽散火湯火鬱湯之類煩躁者氣隨火升也木通下行瀉小腸火人中白瀉肝火尿缸岸也秋石亦是黃芩黃連以豬膽汁拌炒能瀉肝膽之火黃柏加細辛瀉膀胱之火青黛能瀉五臟之鬱火玄參能瀉無根之遊火小便降火極速山梔子能降火從小便中泄去其性能屈曲下行人所不知人有氣如火從腳下起入腹者此虛極也蓋火起於九泉之下也此病十不救一治法以四物湯加降火藥服之外以附子末津調貼腳心湧泉穴以引火下行愚按此條言猶有未悉者如果勞怯陰虛之人有此固為作陰虛治若壯實之人有此則是濕鬱成熱之候也愚嘗冒雨徒行衣濕得此證以蒼朮黃柏加牛膝防己等藥作丸服之而愈後纍醫數人皆驗若誤作陰虛治即成痿證劇矣以上丹溪方法二十一條左金丸一名回令丸治肝火黃連六兩吳茱萸一兩湯泡浸半時許焙乾用上為細末粥丸煎白朮陳皮湯下大補丸治陰火黃柏去粗皮細切用新瓦盛鹽酒炒褐色上為細末粥丸或水丸煎四物湯送下又云氣虛四君子湯血虛四物湯送下抑青丸治肝火黃連不拘多少上為細末粥丸白湯送下石膏丸瀉胃火並食積痰火石膏煅上為細末醋丸緑豆大清米飲送下四物湯加白馬脛骨降陰火代芩連用陰虛發熱四物湯加炒黃柏知母乃降火補陰之妙劑甚者加龜板兼氣虛加參耆白朮手心熱屬熱鬱當用火鬱湯或用梔子香附白芷半夏川芎曲糊為丸服以上丹溪方法凡三條火鬱湯東垣治四肢熱及五心煩熱因熱伏土中或血虛得之或胃虛多食冷物抑遏陽氣於脾土之中羌活升麻葛根芍藥人參各七分柴胡甘草生各三分防風二分半蔥白五莖上細切作一服水一盞半煎至一盞稍熱服升陽散火湯東垣治男子婦人四肢發困熱筋骨間熱肌表熱如火燎捫之烙手此病多因血虛而得之或胃虛過食冷物郁遏陽氣於脾土之中火鬱則發之升麻葛根獨活羌活白芍藥人參各六分甘草炙一分柴胡三分防風三分半生甘草二分上細切作一服加生薑三片水一盞半煎至一盞熱服忌生冷等物瀉陰火升陽湯東垣治肌熱頭熱面赤食少喘咳痰盛右關脈緩弱或弦或浮而數羌活甘草炙黃耆蒼朮各一分升麻八分柴胡一錢半去蘆人參黃芩各七分黃連酒炒五分石膏五分秋冬勿用上細切作一服水二盞煎至一盞溫服滋腎丸東垣降腎火黃柏二兩酒拌陰乾知母二兩去毛酒浸陰乾肉桂一錢去粗皮上二味氣味俱陰以同腎氣故能補腎而瀉下焦火也桂與火邪同體故以寒因熱用凡諸病在下焦皆不渴也上為細末以熟水丸百沸湯下涼膈散河間大黃酒浸紙裹煨朴硝甘草各五分連翹一錢梔子黃芩薄荷各二分半淡竹葉五片上細切作一服水一盞煎至八分去渣入蜜一匙和勻服三補丸河間瀉三焦火黃芩黃連黃柏各等分上為細末新汲水丸服紫雪局方治內外煩熱不解口中生瘡顛狂叫走解諸熱毒邪熱小兒驚癇等證黃芩百兩寒水石磁石石膏滑石研各二斤以上用水一石煮至四斗去渣入下項藥甘草炙八兩青木香生犀角屑羚羊角屑沉香各五兩丁香一兩升麻玄參各一斤以上再煮至一斗五升入下項藥硝石芒硝亦可二斤朴硝擇淨者十斤以上入前藥汁中微火煎柳枝不住手攪候有七斤投放水盆中半日待藥凝定入下項藥攪令勻硃砂三兩當門子即麝香一兩二錢半上煎成霜雪紫色每服一錢或二錢涼水調下大人小兒臨時以意斟酌加減多寡服之並食後服妙香丸局方治時疫傷寒解五毒潮熱積熱及小兒驚癇等證巴豆取淨三百五十粒牛黃片腦膩粉麝香各七錢五分辰砂九兩金箔九十片上研極細煉蠟六兩入蜜七錢五分同煉令勻每兩作三十丸每服一丸小兒緑豆大二丸白湯下拔萃方無金箔有水銀硇砂治久遠成積按硇砂不可輕用制煉不精則害人慎之瀉心湯局方治心經蘊熱上以黃連一味為細末水調服之麥門冬湯千金治諸病後火熱乘肺咳唾有血胸脅脹滿上氣喘急羸瘦五心煩熱渴而煩悶麥門冬去心桑白皮蜜炒生地黃各七分半夏湯泡七次去皮臍紫菀茸桔梗淡竹葉麻黃各五分五味子甘草各三分上細切作一服加生薑三片水一盞半煎至一盞溫服愚按此方曰病後火熱乘肺麻黃其可用乎曰渴而煩悶半夏亦不用可也宜去此二味加貝母天門冬方為穩當也梔子仁湯河間治發熱潮熱發狂煩躁面赤咽痛梔子仁赤芍藥大青知母各五分升麻黃芩石膏各一錢杏仁湯煮去皮尖七分半柴胡一錢二分生甘草一錢豆鼓五十粒上細切作一服水二盞煎八分去渣溫服當歸龍薈丸河間治腎水陰虛風熱蘊積時發驚悸筋惕搐搦神昏不寧榮衛壅滯頭目昏眩肌肉瞤瘈胸膈咽嗌不利腸胃燥澀躁擾狂越罵詈驚駭火熱等證當歸草龍膽梔子仁黃連黃柏黃芩各一兩大黃青黛蘆薈各五錢木香一錢麝香五分上為細末煉蜜丸如小豆大每服三十丸薑湯送下三黃丸河間治三焦火盛消渴不生肌肉大黃黃連黃芩各等分上為細末煉蜜丸如小豆大每服五丸漸加至十丸白湯送下服至一月行及奔馬丹溪活套云凡去上焦濕熱須酒洗黃芩以瀉肺火如肺有實熱宜用如虛熱而用黃芩則傷肺氣須先用天門冬保定肺氣然後用之如去中焦濕熱與痛須用黃連以瀉心火若中焦有實熱宜用若脾胃氣虛不得轉運及中焦有鬱熱者當用茯苓白朮黃芩葛根代之如胸中煩熱須用梔子實熱者切當若虛煩須用補藥為主人參白朮黃芩芍藥茯苓麥門冬大棗之類如下焦有濕熱腫痛並膀胱有火邪者須用酒洗防己草龍膽黃柏知母之類固是捷藥若肥白人氣虛者宜用白朮蒼朮南星滑石茯苓之類如黑瘦之人下焦有濕熱腫痛者必用當歸紅花桃仁牛膝檳榔等藥柴胡瀉肝火須用片芩佐之片芩又能瀉肺火須用桑白皮佐之若鼠尾者能瀉大腸之火黃連瀉心火若用豬膽汁拌炒更以草龍膽佐之大能瀉膽中之火白芍藥瀉脾火若冬月用必以酒浸炒蓋其性之酸寒也知母黃柏瀉腎火又瀉膀胱之火梔子瀉三焦之火在上中二焦連殼用在下焦須去殼水洗去黃漿炒焦色研細用之人中白非獨瀉肝火又能瀉三焦火及膀胱之火從小便中出蓋膀胱乃此物之故道也祖傳方人中白散治陰虛火盛及五心煩熱等證人中白二兩黃柏鹽酒拌炒褐色生甘草青黛各五錢上為細末每服二錢童子小便調服醫案駱氏婦年四十餘夜間發熱早晨退五心煩熱無休止時半年後求豫治六脈皆數伏而且牢浮取全不應豫與東垣升陽散火湯四帖而熱減大半胸中覺清快勝前再與二帖熱悉退後以四物湯加知母黃柏少佐以炒乾姜服二十餘帖全安郁證論內經曰木鬱達之火鬱發之土鬱奪之金鬱泄之水鬱折之張子和曰木鬱達之謂吐之令其條達也火鬱發之謂汗之令其疏散也土鬱奪之謂下之令無壅礙也金鬱泄之謂滲泄解表利小便也水鬱折之謂抑之制其沖逆也此治五郁之大要耳我丹溪先生觸類而長之而又著為六郁之證所謂氣血沖和百病不生一有佛郁諸病生焉此發前人之所未發者也夫所謂六郁者氣濕熱痰血食六者是也或七情之抑遏或寒熱之交侵故為九氣怫鬱之候或雨濕之侵凌或酒漿之積聚故為留飲濕鬱之疾又如熱鬱而成痰痰鬱而成癖血鬱而成癥食鬱而成痞滿此必然之理也又氣鬱而濕滯濕滯而成熱熱鬱而成痰痰滯而血不行血滯而食不消化此六者皆相因而為病者也是以治法皆當以順氣為先消積次之故藥中多用香附撫芎之類至理存焉學者宜知此意脈法脈多沉伏氣鬱則必沉而澀濕鬱則脈必沉而緩熱鬱脈必沉數痰鬱脈必弦滑血鬱脈必芤而結促食鬱脈必滑而緊盛郁在上則見於寸郁在中則見於關郁在下則見於尺左右亦然脈或結或促或代滑氏診家樞要曰氣血食積痰飲一有留滯於其間脈必因之而止節矣但當求其有神何害之有夫所謂有神者即經所謂有中氣也方法丹溪曰氣血沖和百病不生一有怫鬱諸病生焉其證有六曰氣鬱曰濕鬱曰熱鬱曰痰鬱曰血鬱曰食鬱氣鬱戴氏曰胸脅痛脈沉香附此味而能橫行胸臆間必用童便浸焙乾用否則燥蒼朮米泔浸五七次撫芎即蘼蕪芎藭苗頭小塊氣脈上行故能散郁也濕鬱戴氏曰周身走痛或關節痛遇陰寒則發脈沉蒼朮白芷川芎茯苓熱鬱戴氏曰目瞀小便赤脈沉散梔子青黛香附蒼朮撫芎痰鬱戴氏曰動則喘寸口脈沉滑海石香附南星栝蔞子血鬱戴氏曰四肢無力大便紅脈沉桃仁紅花青黛川芎香附食鬱戴氏曰咽酸腹悶不能食左寸脈平和右寸脈緊盛香附蒼朮山楂神麯針砂醋炒或保和丸諸郁藥春加防風夏加苦參秋冬加吳茱萸凡藥在中焦以蒼朮撫芎開提其氣以升之假令食在氣上氣升則食降余仿此越鞠丸一名芎術丸神麯炒香附童便浸一宿蒼朮川芎梔子炒上為細末水丸緑豆大每服五七十丸溫水下生韭飲治食鬱久則胃脘有瘀血作痛大能開提氣血生韭葉一握搗取自然汁一盞上先以生桃仁連皮細嚼十數個後以韭汁送下六郁湯解諸郁陳皮去白一錢半夏湯泡七次蒼朮米泔浸撫芎各一錢赤茯苓梔子炒各七分香附二錢甘草炙五分砂仁研細五分上細切作一服加生薑三片水二盞煎至一盞溫服如氣鬱加烏藥木香檳榔紫蘇乾薑倍香附砂仁如濕鬱加白朮倍蒼朮如熱鬱加黃連倍梔子如痰鬱加南星枳殼小皂莢如血鬱加桃仁紅花牡丹皮如食鬱加山楂神麯麥糵面升發二陳湯治痰鬱火邪在下焦大小便不利此藥能使大便潤而小便長陳皮去白一錢半夏一錢五分茯苓一錢甘草五分撫芎一錢升麻防風柴胡各五分上細切作一服加生薑三片水一盞半煎至一盞溫服以上丹溪方法凡七條升陽散火湯東垣治熱鬱火鬱湯東垣二方並見火門醫案一男子年二十九歲三月間房事後騎馬渡溪遇深淵沉沒幸得馬健無事連濕衣行十五里抵家次日憎寒壯熱肢節煩疼似瘧非瘧之狀一醫作虛證治而用補氣血藥服月餘不效又易一醫作勞瘵治用四物湯加知母黃柏地骨皮及丹溪大補陰丸倍加紫河車服至九月反加滿悶不食乃顧倩有乳婦人在家止吃人乳汁四五杯不吃米粒召豫診視六脈皆洪緩重按若牢右手為甚豫作濕鬱處治用平胃散倍蒼朮加半夏茯苓白朮川芎香附木通砂仁防風羌活加姜煎服黃昏服一帖一更時又進一帖至半夜遍身發紅丹如癮疹片時遂沒而大汗索粥與稀粥二碗由是諸病皆減能食仍與前方服三帖後以茯苓滲濕湯倍加白朮服二十餘帖平安痰飲論內經曰諸氣憤郁皆屬肺金蓋肺氣鬱則成熱熱盛則生痰丹溪曰自郁成積自積成痰痰挾瘀血遂成窠囊此為痞為痛為噎膈翻胃之次第也王隱君曰痰證古今未詳方書雖有懸飲留飲支飲痰飲諸飲之異而莫知其為病之源或頭風目昏眩運耳鳴或口眼蠕動眉稜耳輪瘙癢或四肢遊風腫硬似痛非痛或為齒頰癢痛牙床浮腫而痛癢不一或噯氣吞酸嘈雜嘔噦或咽嗌不利咯之不出咽之不下色似煤炲形如破絮桃膠蜆肉之類或心下如停冰雪心頭冷痛時作或夢寐奇怪鬼魅之狀或足腕痠軟腰背卒痛或四肢骨節煩疼並無常所乃至手麻臂痛狀若挫閃或脊中每有一掌如冰凍之寒痛者或渾身習習如蟲行者或眼沿澀癢口糜舌爛甚為喉閉等證又或繞項結核似癧非癧或胸腹間如有二氣交紐噎塞煩悶有如煙氣上衝頭面烘熱或為失志顛狂或為中風癱瘓或為勞瘵荏苒之疾或為風痹及腳氣之候或心下怔忡驚悸如畏人將捕或喘嗽嘔吐或嘔冷涎緑水黑汁甚為肺癰腸毒便膿攣跛其為內外疾病非止百端皆痰之所致也蓋津液既凝為痰為飲而洶湧上焦故口燥咽乾流而之下則大小便閉塞面如枯骨毛髮焦乾婦人則經閉不通小兒則驚癇搐搦治法宜先逐去敗痰然後看虛實調理故制沉香滾痰丸為通治三焦痰飲之要藥也愚竊以其論證固詳不問虛實而以一峻藥攻之恐未中乎肯綮也歟蓋資稟有厚薄病邪有淺深一或失手何以收救故丹溪有曰治痰用利藥過多致脾氣虛則痰反易生而多矣又曰中焦有食積與痰而生病者胃氣亦賴所養卒不可便攻攻盡則愈虛而病劇夫滾痰丸止可投之於形氣壯實痰積膠固為病者若氣體虛弱之人決不可輕用也慎之慎之脈法要略云脈雙弦者寒飲也或大下後善虛其脈偏弦者飲也肺飲不弦但苦喘短氣又云脈浮而細滑者傷飲脈弦數有寒飲春夏難治脈沉而弦者懸飲內痛其人短氣而渴四肢歷節走痛脈沉者有留飲陳無擇云飲脈皆弦微沉滑或云左右手關前脈浮弦大而實者膈上有稠痰也宜吐之自愈病人百藥不效關上脈伏而大者痰也眼胞及眼下如炭煙燻黑者亦痰也丹溪曰久得澀脈痰飲膠固脈道阻澀也卒難得開必費調理方法丹溪曰有熱痰有濕痰有酒痰有食積痰有風痰有寒痰有老痰熱痰用青黛黃連及用青礞石丸最捷濕痰身多軟而重用蒼朮白朮又曰濕痰用黃芩香附半夏貝母熱痰加栝蔞青黛酒痰用栝蔞青黛蜜丸噙化食積痰用神麯麥牙山楂或化痰丸消積藥攻之風痰用南星白附子寒痰用半夏盧氏注曰凝結清冷其狀若寒非寒也然亦有用溫藥者蓋寒因熱用使引導無捍格也老痰用海石香附半夏栝蔞五倍子一云五倍子佐他藥大治頑痰痰結核在咽喉嗽而不能出化痰藥加咸能軟堅之味栝蔞仁杏仁海石桔梗連翹少佐以朴硝薑汁蜜丸噙化痰在脅下非白芥子不能達痰在四肢非竹瀝不行痰在腸胃間可下而愈痰之為物隨氣升降故無處不到脈浮當吐痰在膈上必用吐膠固稠濁必用吐痰在經絡中非吐不可吐中就有發散之義凡吐法宜先升提其氣用防風山梔川芎桔梗芽茶生薑之類或就以此藥探吐吐時須先以布勒腰腹而於不通風處行之吐法用蘿蔔子半升擂和以漿水一碗去渣入少油與蜜溫服或用蝦半斤入醬蔥姜等物料水煮先吃蝦後飲汁少時以鵝翎探吐其鵝翎須先以桐油浸而以皂角水洗曬乾待用如服瓜蒂藜蘆等藥不用探法自吐凡虛弱人中焦有痰胃氣亦賴所養卒不可便攻攻盡則愈虛治痰用利藥過多致脾氣虛則痰反易生而多許學士用蒼朮治痰挾瘀血成窠囊行痰極效即神術丸也油炒半夏大治濕痰又治喘心痛粥丸生薑湯下以上丹溪方法凡十六條燥濕痰星夏丸南星半夏各一兩海蛤粉三兩上為細末薑汁浸蒸餅為丸青黛為衣如梧桐子大每服三五十丸薑湯送下中和丸治濕痰氣熱蒼朮黃芩半夏香附各等分上為細末薑汁調神麯糊為丸如梧桐子大每服五七十丸白湯送下小胃丹上可取胸膈之痰下可利腸胃之痰能損胃不食胃氣虛而少食者不可用大黃酒拌濕紙裹煨熟焙乾再以酒炒潤一兩五錢黃柏炒褐色二兩甘遂麵裹煨熟去面大戟長流水煮一時許洗淨曬乾用芫花醋拌經宿炒黑勿焦各一兩上為細末粥丸麻子大每服十丸溫湯送下墜痰丸能利痰從穀道中出風化硝枳實麩炒黃色黑牽牛取頭末五錢生白礬三錢豬牙皂角去皮弦酥炙黃三錢一本有貝母三錢上為細末萊蔔汁丸如梧桐子大每服五十丸白湯下雞鳴時服先見屎次見痰古方無硝枳而用水丸分兩亦不同青礞石丸能化痰降痰一云治食積去濕痰青礞石敲碎如骰子大以焰硝同入鍋煅黃色茯苓半夏湯泡七次去皮臍南星慢火煨裂黃芩各五錢風化硝三錢盆淨者冬月以絹袋盛懸風前化之上為細末神麯糊入薑汁為丸如梧桐子大每服三五十丸薑湯送下此藥重在風化硝一方加蒼朮五錢滑石一兩一方無南星有白朮一方有枳實倍青礞石枳實瀉痰能沖牆倒壁黃芩治痰假其下火也天花粉大能降上膈熱痰海粉熱痰能降濕痰能燥頑痰能消人中黃飯丸如緑豆大每服十數丸白湯送下能降陰火清痰又治食積痰因火盛逆上治火為先白朮黃芩石膏之類凡久病陰火上升津液生痰不生血宜補血制相火其痰自除血藥必用薑汁傳送痰成塊吐咯不出氣鬱滯者難治脾虛者清中氣二陳湯加白朮之類兼用提藥實脾土燥脾濕是治其本二陳湯一身之痰都管治痰之要藥也欲下行加引下藥上行加引上藥引上柴胡升麻防風之類引下黃柏木通防己之類又曰二陳加升提之藥能使大便潤而小便長陳皮去白一錢半夏湯泡七次二錢茯苓一錢甘草五分上細切作一服加生薑三片水一盞煎至七分溫服以上丹溪方法又七條導痰湯局方治風濕痰等證半夏二錢湯泡七次南星煨裂橘紅去白枳殼麩炒黃色甘草炙茯苓各一錢上細切作一服加生薑五片水一盞半煎至一盞溫服如久嗽肺燥熱者去半夏加五味子九枚杏仁五分千緡湯局方治風痰壅盛半夏湯泡七次七個四破皂角一寸去皮炒黃甘草炙一寸上細切作一服入生薑三片水一盞煎至七分溫服利膈化痰丸丹溪南星煨裂蛤粉半夏湯泡貝母去心栝蔞仁去殼香附去皮童便浸皂角去皮弦杏仁去皮尖炒青黛各等分上以前六味研為細末卻以皂角杵碎煎濃汁擂杏仁如泥再以薑汁和蒸餅為丸如緑豆大青黛為衣每服五十丸薑湯送下滾痰丸王隱君方治濕熱食積成窠囊老痰大黃酒拌蒸黃芩去朽各半斤沉香五錢礞石硝煅黃金色一兩上為細末滴水為丸如梧桐子大每服三五十丸量人強弱加減丸數神術丸丹溪治痰飲蒼朮一斤米泔浸生芝麻五錢用水二小盞研細取漿大棗十五枚煮肉研細上以蒼朮焙乾為末然後以芝麻漿及棗肉和勻丸如梧桐子大每服五七十丸溫湯下黃芩利膈丸東垣除胸中熱利膈上痰生黃芩炒黃芩各一兩半夏湯泡七次澤瀉去毛黃連各五分天南星煨裂枳殼麩炒陳皮去白各三錢白朮二錢白礬五分上為細末湯浸蒸餅入薑汁為丸如梧桐子大每服三五十丸食遠溫水下忌酒及濕面蠲飲枳實丸丹溪逐飲消痰導滯清膈枳實麩炒半夏泡陳皮去白各三兩黑醜半斤取頭末三兩上為細末麵糊為丸如梧桐子大每服五十丸薑湯送下十棗湯仲景治懸飲內痛芫花醋炒黑色甘遂麵包水煮大戟各等分上為細末以水一升半煮大棗十枚至八合去渣調藥末強人一錢弱人五分平旦服之不下更加五分下後以糜粥調養之河間曰芫花之辛以散飲大戟之苦以泄水其甘遂直達水氣所結之處乃泄水飲之聖藥也然亦有大毒人虛者不可輕用三花神祐丸治一切濕熱沉積痰飲變生諸病或風熱燥郁肢體麻痹走注疼痛風痰涎嗽氣血壅滯不得宣通等證人壯氣實者可服甘遂依前制大戟芫花醋拌濕炒各五錢黑醜二兩取頭末大黃一兩輕粉一錢上為細末滴水為丸如小豆大初服五丸每服加五丸溫水下日三服加至快利利後須服至病根盡除為度痞悶極甚者若便多服則頓攻不開轉加痛悶則當初服二丸每服加二丸至快利即止控涎丹三因方治患胸背脅頸項及手足腰胯隱痛不忍筋骨牽引釣痛時時走易乃是痰涎在胸膈間隨氣升降於經絡中作楚而然或手足冷痹氣脈不通誤認為癱瘓者甘遂去心依前制大戟去皮白芥子主上氣發汗胸膈有冷痰上件各等分為細末糊丸如梧桐子大每服五十丸淡薑湯下食後臨臥服量病人虛實加減丸數一方名妙應丸治驚痰加硃砂為衣痛甚者加全蠍酒痰加雄黃全蠍驚氣痰成塊者加穿山甲鱉甲玄胡索蓬莪朮臂痛加木鱉子霜桂心熱痰加盆硝寒痰加丁香胡椒肉桂半夏丸治肺熱痰嗽栝蔞仁另研半夏湯泡七次去皮臍焙開各一兩上為細末和勻薑汁打糊為丸服取竹瀝法大治熱痰及能養血清熱有痰厥不省人事幾死者得竹瀝灌之遂蘇誠起死回生藥也用水竹早筀竹俗名雷竹蘇東坡曰淡竹對苦竹為文耳除苦竹之外皆淡竹也我丹溪先生存日只用此二竹蓋取其為諸竹中之最淡者以其筍味之甘淡也截長二尺許每段劈作四片以薄磚二塊排定將竹片架於磚上兩頭露一二寸下以烈火迫之兩頭以盆盛瀝六分中加薑汁一分服之痰熱甚者止可加半分耳取荊瀝法能治熱痰功勝竹瀝但不補耳用黃荊截作短片炙取瀝同上法丹溪活套云二陳湯一身之痰無所不治但在上加引上藥在下加引下藥如偏頭痛在右本方加川芎白芷防風荊芥薄荷升麻之類在左本方合四物湯亦加防風荊芥薄荷細辛蔓荊子柴胡酒片芩之類頂痛者本方加川芎藁本升麻柴胡蔓荊子細辛薄荷等藥如痰在腰胯膝下腫痛本方加蒼朮防己木通黃柏萆薢川牛膝之類如痰在胸腹中作痛或痞滿本方加白朮神麯麥芽砂仁之類如痰在脅下作痛或漉漉有聲本方加柴胡青皮川芎芍藥之類如痰在經絡中或胸背手足臂膊作痛者上加防風羌活葳靈仙在下加防己牛膝木通之類冬月加烏附行經如風痰壅盛喘急咳咳不寧本方加防風羌活南星枳殼皂角之類如熱痰為病腹脹喘滿本方加黃芩黃連梔子栝蔞仁滑石石膏竹瀝之類如濕痰身重倦怠本方加蒼朮白朮南星之類如酒痰本方加葛根枳椇砂仁神麯麥芽之類寒痰本方加乾薑附子益智草豆蔻之類氣痰本方加木香檳榔砂仁枳殼烏藥香附之類燥痰本方加栝蔞仁杏仁貝母五味子之類陰虛咯血痰嗽本方加天門冬麥門冬知母黃柏貝母款冬花紫菀馬兜鈴之類如痰在中焦作噯氣吞酸胃脘當心而痛或嘔清水噁心等證本方多加白朮蒼朮神麯麥芽川芎砂仁草豆蔻枳實豬苓澤瀉黃連吳茱萸梔子仁木香檳榔之類作丸服之醫案豫侄婦何氏在室時四月間因多食青梅得痰飲病日間胸膈中大痛如刀錐至晚胸中痛止而膝䯊大痛蓋痰飲隨氣升降故也一醫作胃寒治用乾薑良薑官桂烏附丁沉輩及煮胡椒粥間與病日刷加之口渴小水淋澀求豫治診其六脈洪數而滑豫作清痰處治令其急烹竹瀝服三日口不渴小水亦不淋澀但胸中與膝互痛如舊用蘿蔔子研汁與半碗吐痰半升許至夜痛尤甚於前正丹溪所謂引動其猖狂之勢耳次日用人參蘆一兩逆流水煎服不吐又次日與苦參煎湯服又不吐又與附子尖桔梗蘆皆不吐一日清晨藜蘆末一錢入麝香少許酸漿水調與始得大吐至次日天明吐方定前後得頑痰及稠飲一小桶許其痛如脫後以軟粥將理而安咳嗽論內經曰五臟六腑皆令人咳非獨肺也皮毛者肺之合也皮毛先受邪氣邪氣以從其合也五臟之咳延久乃移於六腑河間曰咳謂無痰而有聲肺氣傷而不清也嗽謂無聲而有痰脾濕動而生痰也咳嗽謂有痰而有聲蓋因傷於肺氣動於脾濕咳而為嗽也脾濕者秋傷於濕積於脾也故內經又曰秋傷於濕冬必咳嗽大抵素秋之氣宜清肅反動之氣必上衝而為咳甚則動於脾濕發而為痰焉又曰寒暑燥濕風火六氣皆令人咳惟濕病痰飲入胃留之而不行上入於肺則為咳嗽假令濕在心經謂之熱痰濕在肝經謂之風痰濕在肺經謂之氣痰濕在腎經謂之寒痰為患不同宜隨證而治之是故咳而無痰者以辛甘潤其肺夫欲治咳嗽者當以治痰為先治痰者必以順氣為主是以南星半夏勝其痰而咳嗽自愈枳殼橘紅利其氣而痰飲自降痰盛而能食者小承氣湯微下之痰盛而不能食者厚朴湯疏導之夏月嗽而發熱者謂之熱嗽小柴胡加石膏知母冬月嗽而發寒熱謂之寒嗽小青龍湯加杏仁此治法之大要也學者不可不知脈法關上脈微為咳肺脈微急為咳而唾血脈弦澀而咳為少血脈緊者為肺寒雙弦者寒脈浮而緊者為虛寒脈浮而緩者傷風脈細者濕脈數為熱脈沉數為實熱脈弦為水偏弦為飲脈沉為留飲洪滑多痰咳脈浮直者生脈浮濡者生脈緊者死沉小伏匿者死咳而羸瘦脈堅大者死咳而脫形發熱脈小堅急者死凡肌瘦脫形熱不去咳嘔腹脹且泄脈弦急者皆死證也方法丹溪曰咳嗽有風寒有火有勞有痰有肺脹風寒者主發散行痰二陳湯加麻黃杏仁桔梗之類戴氏曰風寒者鼻塞聲重惡寒是也風寒鬱熱於肺夜嗽者三拗湯加知母脈大而浮有熱加黃芩生薑寒嗽古方有以生薑切作薄片焙乾為末糯米糊為丸如芥子大空心清米飲下三十丸聲啞屬寒寒包熱也此言感寒而嗽者宜細辛半夏生薑辛以散之風入肺久嗽者用鵝管石雄黃蔚金款冬花為末以生薑一片置舌上以藥末拌艾於姜上灸之取煙入喉中愈一方有南星佛耳草無蔚金此即煙筒法小異治嗽煙筒方用鵝管石雄黃款冬花佛耳草為末以雞子清劇紙上卷藥末作筒燒煙以口銜吸烟入喉薑湯送下喘嗽遇冬則發此寒包熱也解表熱自除枳殼桔梗各一錢麻黃防風甘草陳皮紫蘇木通黃芩各等分如嚴寒去黃芩加杏仁五分感冷則嗽膈上有痰二陳湯加炒枳殼黃芩桔梗蒼朮麻黃木通生薑火者主降火清金化痰黃芩海石栝蔞青黛桔梗半夏香附訶子青皮之類戴氏曰有聲痰少面赤是也蜜丸噙化乾咳嗽者系火鬱之甚難治乃痰鬱火邪在肺中用苦梗以開之下用補陰降火不已則成勞須行倒倉法此證不得志者有之有痰因火逆上者必先治火然亦看痰火孰急若痰急先治痰而後降火也勞者主補陰清金四物湯加竹瀝薑汁戴氏曰盜汗出兼痰多作寒熱是也陰虛火動而嗽四物合二陳順而下之加炒黃柏知母尤佳陰虛喘嗽或吐紅者四物湯加知母黃柏五味子人參麥門冬桑白皮地骨皮好色之人元氣虛弱咳嗽不愈瓊玉膏最捷肺虛甚者人參膏以生薑陳皮佐之有痰加痰藥此好色腎虛者有之久嗽勞嗽用貝母知母各一兩以巴豆同炒黃色去巴豆再用白礬白芨各一兩為末以生薑一片蘸藥睡時噙化藥盡嚼姜咽之麥門冬陳皮阿膠珠各等分蜜丸噙化又方有人參五味子咳嗽聲嘶啞乃血虛受熱用青黛蛤粉蜜調服之醫說內一方治痰嗽用蚌粉新瓦上炒通紅拌入青黛少許以淡虀水滴入麻油數點調服痰者主豁痰戴氏曰嗽動便有痰聲痰出嗽止是也痰嗽用半夏栝蔞子各五兩貝母桔梗各二兩知母一兩枳殼一兩半為細末生薑汁浸蒸餅為丸服一方黃芩一兩半酒洗白芥子去殼滑石各五錢貝母南星各一兩風化硝二錢半薑汁浸蒸餅為丸青黛為衣痰多喘嗽白朮半夏蒼朮香附杏仁各一兩黃芩五錢為末姜汗調麵糊為丸服痰嗽因酒傷肺栝蔞仁杏仁俱杵如泥黃連為末以竹瀝入紫蘇葉煎再入韭汁調丸服一方用青黛栝蔞蜜丸噙化以救肺久嗽有積痰留肺脘中如膠氣不能升降或挾溫與酒而作茜根俗名過山龍童便浸殭蠶炒海粉栝蔞仁蜂房杏仁神麯為末薑汁竹瀝調噙化痰嗽氣急蒼朮三兩香附一兩半蘿蔔子蒸杏仁栝蔞仁半夏各一兩黃芩茯苓各五錢川芎三錢丸服嗽而有痰宜灸天突穴肺腧穴以泄火熱瀉肺氣食積痰嗽發熱半夏南星為君栝蔞蘿蔔子為臣青黛海石石𨢑為使薑汁浸蒸餅丸服食積痰嗽三補加二母炒為末丸如椒核大以竹瀝藕汁吞之三補芩連柏也二母知貝母也肺脹者主收斂戴氏曰動則喘滿氣急聲重者是也肺因火傷極遂成郁遏脹滿用訶子為君佐以海粉香附青黛杏仁之類肺脹郁遏不得眠者難治凡嗽春是春升之氣夏是火炎於上秋是濕熱傷肺冬是風寒外束用藥發散之後必以半夏等藥逐去其痰庶不再作早晨嗽多者此胃中有食積至此時火氣流入肺中以知母地骨皮降肺火上半日嗽多者胃中有火知母石膏降之午後嗽多者屬陰虛四物湯加知母黃柏先降其火黃昏嗽多者火氣浮乘肺不宜用涼劑以五味子五倍斂而降之嗽而脅痛宜以青皮疏肝氣後以二陳湯加南星香附青黛薑汁一云實者白芥子之類嗽而心煩不安六一散加辰砂服嗽而失聲潤肺散訶子肉五倍子五味子黃芩甘草各等分上為細末蜜丸噙化以上丹溪方法凡三十八條嗽而無聲有痰方河間半夏白朮五味子防風枳殼甘草各等分嗽而有聲無痰方河間生薑杏仁泡去皮尖五味子九枚升麻防風桔梗各等分甘草炙二分嗽而有聲有痰方白朮半夏五味子防風久不愈加枳殼阿膠珠各等分寒熱交作而痰嗽者小柴胡加知母之類一方加白芍藥五味子桑白皮陰氣在下陽氣在上咳嗽嘔吐喘促瀉白散加青皮五味子人參茯苓粳米熱嗽胸滿小陷胸湯方見傷寒門治嗽劫藥五味子湯五味子五錢甘草一錢半五倍子風化硝各一錢上為末蜜丸噙化或用訶子百藥煎荊芥穗蜜丸噙化治嗽最要分肺虛肺實若肺虛久嗽宜五味子款冬花紫菀馬兜鈴之類以補之若肺實有火邪宜黃芩天花粉桑白皮杏仁之類以瀉之東垣曰治嗽必用五味子為君然有外邪者驟用之恐閉住其邪氣必先發散之而後用之可也治嗽用呵子味酸苦有收斂降火之功五味子收肺氣乃火熱必用之劑杏仁散肺氣風熱然肺實有熱因於寒者為宜桑白皮瀉肺氣然性不純良用之多者當戒或用馬兜鈴以其去肺熱補肺也多用生薑以其辛能發散也栝蔞子甘能補肺潤肺降氣胸中有痰者以肺受火逼失降下之令今得甘緩潤下之助則痰自降宜其為治嗽之要藥也瓊玉膏丹溪治虛勞乾咳嗽人參十二兩沉香琥珀各五錢白砂蜜五斤煎沸去沫白茯苓去皮淨者二十五兩生地黃去蘆淨者十斤洗淨銀石器內杵細取自然汁大忌鐵器臞仙曰今豫所制此方加沉香琥珀二味其功效異於世傳之方上以人參茯苓沉香琥珀俱為細末先將地黃汁與白砂蜜攪勻用密絹濾去細渣入藥末攪勻入好瓷瓶或銀瓶內用綿紙十數層外加箭箬包封扎瓶口入砂鍋內或銅鍋內以長流水浸沒瓶頸用桑柴文武火煮三晝夜取出換蠟紙數重包扎瓶口浸沒井中半日以出火毒提起仍入前鍋內煮半日以出水氣然後收藏每日清晨及午前後取一二匙用溫酒一盞調服不飲酒人白湯亦可九仙散局方治一切咳嗽久嗽乃擊其惰歸之藥也人參款冬花桑白皮桔梗阿膠炒成珠五味子各一錢烏梅一個貝母五分罌粟殼去穰蒂蓋蜜炙二錢上細切作一服加生薑三片水二盞煎至一盞溫服三拗湯局方治風寒咳嗽喘急麻黃不去根節甘草生用杏仁不去皮尖另研細各一錢五分上細切作一服加生薑五片棗二枚水一盞半煎至一盞溫服痰清乃止溫肺湯局方治肺感寒邪咳嗽吐痰半夏泡陳皮去白五味子乾薑泡桂心各五分杏仁去皮炒研五分北細辛阿膠炒成珠甘草炙各二分半上細切作一服加生薑三片大棗二枚水一盞半煎至一盞去渣溫服愚按此方乃冬月寒冷之時觸冒寒邪而未鬱熱者極效如久嗽鬱熱者切不可用杏蘇飲局方治上氣喘嗽面目浮腫紫蘇葉七分五味子大腹皮酒洗淨烏梅肉杏仁泥各五分陳皮去白桔梗麻黃去根節柔白皮蜜炙阿膠珠各二分半紫菀茸三分半甘草炙一分上細切加生薑五片水一盞半煎至一盞溫服丹溪活套云二陳湯治咳嗽去痰代病根之藥也除陰虛血虛火盛乾咳嗽者勿用如血虛有痰者本方合四物湯加五味子麥門冬栝蔞仁之類如傷風邪咳嗽本方加南星枳殼防風荊芥前胡細辛旋覆花之類如傷寒邪咳嗽本方加麻黃杏仁桔梗乾薑桂枝之類如傷熱邪咳嗽本方加黃芩薄荷知母石膏桔梗之類如先傷風寒鬱熱久嗽不已欲成勞者本方加知母貝母款冬花紫菀五味子天麥二門冬馬兜鈴當歸生地黃之類如傷風寒喘嗽並作本方加麻黃杏仁防風荊芥枳殼桑白皮桔梗地骨皮紫蘇之類如咳嗽聲嘶引兩脅痛不可忍者本方加芎歸芍藥青皮柴胡草龍膽黃芩竹茹之類如年久喘嗽遇風寒則發作者本方加紫菀款冬花桑白皮杏仁五味子知母石膏之類不問風寒鬱熱勞嗽久嗽曾先服麻黃杏仁防風等藥病雖退減而病根未除者本方加粟殼烏梅阿膠五味子栝蔞仁之類可一服而愈凡諸嗽須分氣虛氣實新久用藥如新咳嗽挾虛者可用人參風寒邪甚者則不可用如久嗽已鬱熱者切不可用人參反增喘滿嗽劇如肺虛久嗽加五味子款冬花紫菀茸馬兜鈴之類以補之若肺實而有火邪者宜桑白皮片黃芩天花粉杏仁枳殼桔梗之類以瀉之祖傳方潤肺除嗽飲治遠年咳嗽如神人參杏仁生甘草薄荷各三分五味子九粒款冬花紫菀茸麻黃陳皮去白石膏煅桔梗半夏桑白皮蜜炙枳殼麩炒烏梅粟殼去穰蜜炙各等分上細切加生薑三片細茶一撮水一盞半煎至一盞服三聖丹治久嗽極效天南星泡製一兩半夏湯泡七次二兩甘草生用五錢先以星夏二味研為細末用生薑自然汁拌勻盦作曲春秋七日冬十日夏五日取出再同甘草共研為細末別取淡竹瀝一碗將前藥末用竹瀝拌勻作餅子焙乾又將竹瀝沃濕又焙乾如此沃焙十數次待竹瀝盡為度研為極細末用白沙蜜調如餳每臨臥抄一匙於口內噙化下再用竹瀝漱口咽之哮喘論內經曰諸逆衝上皆屬於火又曰夫起居如故而息有音者此肺之絡脈逆也河間曰火氣甚為夏熱衰為冬寒故病寒則氣衰而息微病熱則氣盛而息粗又寒水為陰主乎遲緩熱火為陽主乎急數是以寒則息遲氣微熱則息數氣粗而為喘也大抵哮以聲響名喘以氣息言夫喘促喉中如水雞聲者謂之哮氣促而連屬不能以息者謂之喘雖然未有不由痰火內郁風寒外束而致之者歟外有陰虛發喘氣從臍下起直衝清道而上者又有氣虛發喘而短氣不能以接續者是故知喘之為證有實有虛治法天淵懸隔者也若夫損不足而益有餘者醫殺之耳學者不可不詳辨焉脈法喘急脈滑而浮者生澀而數者死脈宜浮遲不宜急數脈數有熱喘咳吐血上氣不得臥者死上氣面浮腫肩息脈浮大不治又加利尤甚上氣躁而喘者為肺脹欲作風水發汗則愈一云咳而上氣肺脹其脈沉心下有水氣也要略千金外臺沉作浮寸口伏胸中有逆氣尺寸俱沉關上無有者苦心下喘方法丹溪曰喘急者氣為火所鬱而稠痰在肺胃也有痰者有火炎者有陰虛自小腹下火起而上逆者有氣虛而致氣短而喘者哮專主於痰宜用吐法亦有虛而不可吐者謹之治哮必使薄滋味不可純用寒涼藥必兼散表戴氏曰痰者凡喘便有痰聲火炎者乍進乍退得食則減食已則喘大概胃中有實火膈上有稠痰得食墜下其痰喘則暫止稍久食已入胃反助其火痰再升上喘反大作俗不知此作胃虛治以燥熱之藥以火濟火也昔葉都督患此證諸醫作胃虛治之不愈後以導水丸利五六次而安氣短喘急者呼吸急促而無痰聲又有胃虛喘者抬肩拮肚喘而不休者是也痰者降痰化氣為主火炎者降心火清肺金陰虛痰喘者補陰降火四物湯加枳殼半夏一云陰虛氣喘四物湯加陳皮甘草些少以降氣補陰白芍藥須以酒浸日乾忌火氣虛發喘以參耆補之而愈凡人喘未發時以扶正氣為主已發以攻邪為主喘急甚者不可用苦寒藥火盛故也宜溫劫之劫藥用椒目五七錢研為極細末生薑湯調服喘止之後因痰治痰因火治火千緡湯治痰喘不得臥人扶而坐數日一服而安方見痰門一方用導痰湯合千緡湯服一方用萊蔔子二兩蒸熟皂角五錢燒存性栝蔞仁海粉南星用白礬一錢半研細入水浸一宿曝乾各一兩為末煉蜜為丸噙化一方無南星栝蔞海粉一方治喘而嗽用南星栝蔞半夏香附橘紅萊蔔子青黛皂角為末神麯糊丸薑湯送下一方有杏仁喘用阿膠須分虛實若久病發喘必是肺虛故用阿膠人參五味子之類補之若新病肺實而發喘者宜桑白皮葶藶子麻黃杏仁之類瀉之東垣曰久嗽鬱熱在肺不用人參新病未成鬱熱者用人參未知孰是氣實人因服黃耆過多而喘者宜服三拗湯以瀉氣三拗湯治肺感風寒喘急不已方見咳嗽門以上丹溪方法凡十四條葶藶大棗瀉肺湯河間治肺壅脹胸膈滿悶上氣喘急身體面目浮腫等證葶藶子不拘多少炒黃為末煉蜜丸如彈子大上以水三盞大棗十枚煎至二盞去棗入葶藶一丸再煎至一盞溫服之葶藶散濟生治過食煎煿或飲酒過度致肺壅喘不得臥及肺癰咽燥不渴濁唾腥臭甜葶藶子炒桔梗去蘆栝蔞子升麻薏苡仁桑白皮蜜炙葛根各八分甘草四分上細切作一服加生薑五片水一盞半煎至一盞溫服瀉白散治大人小兒風寒傷肺喘急咳嗽桑白皮一錢地骨皮一錢生甘草五分上細切作一服加姜水煎服一方加防風荊芥各七分半又方加麻黃杏仁各五分其效尤捷祖傳方治遠年喘急桑木內蠹蟲糞炒一升萊蔔子炒半升杏仁不去皮尖炒半升甘草生二兩共為極細末湯浸蒸餅為丸如梧桐子大每服五七十丸淡薑湯送下又方治哮喘用苧麻根和砂糖爛煮時時嚼咽下永絶病根神效又方用貓兒頭骨燒灰酒調二三錢一服便止又方用郭公莓刺根煎服即止而不發醫案東陽一羽士年五十餘素有喘病九月間得發熱惡寒證喘甚脈洪盛而似實一醫作傷寒治而用小柴胡湯加枳殼陳皮等藥六日後欲行大承氣一醫曰不可當作傷食治宜用枳實導滯丸爭不決召豫視之二醫皆曰脈實氣盛當瀉豫為診後曉之曰此火盛之脈非真實也觀其氣短不足以息當作虛治乃用補中益氣湯加麥門冬五味子入附子三分煎服二帖脈收斂四帖而病輕減六帖病痊安瘧證論內經曰夏傷於暑秋為痎瘧又曰先寒而後熱者名曰寒瘧先熱而後寒者名曰溫瘧其但熱而不寒者名曰疸瘧丹溪曰痎瘧皆生於風痎瘧者老瘧也以其隔二日一作纏綿不去古方多用峻劑恐非稟受怯弱與居養所移者所宜始悟常山烏梅砒丹劫劑或誤投之輕病變重重者必危夫三日一作者邪入於三陰經也作於子午卯酉日者少陰瘧也作於寅申巳亥日者厥陰瘧也作於辰戌丑未日者太陰瘧也瘧得於暑當以汗解或因取涼太過汗郁成痰其初感也弱者即病胃氣強者伏而未動至於再感復因內傷其病乃作宜其難瘥夫感暑與風皆外邪也故非汗多不解今之遘此疾者已經再三劫試胃氣重傷何由得愈欲治此證必先與參術等補劑為君加柴葛等發散藥漸而取汗得汗而虛又行補養下體屬陰最難得汗補藥力到汗出至足方是佳兆又有感病極深邪氣必自臟傳出至腑其發無時若發於午之後寅之前者血受病也為難愈須漸趲早亦佳兆也治斯疾者春夏為易秋冬為難大忌飽食遇發日食飽病愈加重尤當以汗之難易較輕重也內經又曰瘧之且發也陰陽之且移也必從四末始陽已傷陰從之故先其時堅束其處令邪氣不得入陰氣不得出審候見之在孫絡盛堅而血者皆取之謂用三稜針刺孫絡出血此直往而未得並者也故今人多以諸般草藥於臂膊內縛之即此遺意耳外有陰虛證每日午後惡寒發熱至晚亦得微汗而解脈必虛濡而數且瘧脈弦而虛脈不大弦為辨耳若誤作瘧治而用常山砒丹及柴胡乾葛等藥多至不救醫者宜以脈證參驗其虛實而療之毋縱巨膽以殺人也脈法要略曰瘧脈自弦弦數多熱弦遲多寒弦而小緊者下之瘥弦遲者宜溫弦緊者可發汗針灸浮大者可吐之弦數者風發也以飲食消息止之脈經云瘧脈自弦微則為虛代散則死方法丹溪曰有暑瘧有風瘧有濕瘧有痰瘧有食瘧三日一發者受病一年間日一發者受病半年一日一發者受病一月連發二日住一日者氣血俱受病俗名脾寒乃因名而迷其實也苟因飲食所傷而得之未必是寒況其他乎暑瘧宜人參白虎湯之類有痰者二陳湯加常山草果柴胡黃芩不能食者必於飲食上得之當以食治虛者必用參術一二帖托住其氣不使下陷後用他藥若無汗要有汗散邪為主帶補若有汗要無汗扶正氣為主帶散邪數發之後便宜截而除之久發則中氣虛弱病邪已深而難治世有砒丹等截藥有大毒不可輕用大渴大熱用小柴胡去半夏加知母麥門冬黃連黃柏梔子天花粉瘧渴用生地黃麥門冬天花粉牛膝知母炒黃柏乾葛生甘草久瘧二陳湯加川芎蒼朮柴胡葛根白朮一補一發藥也甚者發寒熱頭痛如破渴而飲水多汁可以參耆芩連梔子川芎蒼朮白朮之類治之痰滯胸滿熱多寒少大便燥實大柴胡利之愈久瘧不得汗以二陳湯倍加蒼朮白朮少加檳榔小兒瘧疾者有痞塊生地黃芍藥各一錢半陳皮川芎炒黃芩半夏各一錢甘草二分加生薑煎調醋炙鱉甲末瘧母用丸藥消導之醋炙鱉甲為君三稜蓬朮香附海粉青皮桃仁紅花神麯麥芽隨證加減為丸醋湯送下老瘧系風暑入在陰分宜用血藥引出陽分而散川芎撫芎當歸紅花蒼白朮白芷黃柏甘草煎露一宿服之痎瘧老瘧也三日一發陰經受病也夫瘧得於暑當以汗解或處涼冷令汗不得泄鬱而成痰又復嗜欲縱飲及輕試劫藥胃氣大傷其病難愈必先與參朮陳皮芍藥等劑佐以本經引用之藥若得汗而體虛又須重補俟汗通身下過委中方是佳兆仍節飲食避風寒遠房勞無不愈者以上丹溪方法凡十六條截瘧常山飲局方川常山草果檳榔知母炙甘草烏梅穿山甲慢火煨脆上各等分細切每服五錢水酒各半盞煎至八分露星月一宿清晨冷服之欲吐則順之忌熱湯一日然常山性暴悍善驅逐痰飲大傷真氣病人稍虛弱者戒勿輕用截瘧七寶飲局方常山一錢厚朴青皮陳皮炙甘草檳榔草果仁各五分上細切作一服酒水各半盞寒多加酒熱多加水煎八分露星月一宿空心冷服忌熱茶湯一日至午食溫粥東垣曰夏月天氣上行秋月天氣下行治者當順天道如先寒後熱太陽陽明病白虎加桂也此天氣上行宜用之若天氣下行則不宜瀉肺宜瀉命門相火則可矣亦有內傷冷物而作者當先調中後定瘧形治隨應見乃得康寧亦有久而不瘥者當求虛實以脈為期虛補實瀉可使卻疾此之謂也太陽證令人腰痛頭重寒從背起先寒後熱熇熇暍暍然熱止汗出難已羌活加生地黃湯小柴胡加桂湯陽明證令人先寒灑淅寒甚久乃熱熱去汗出喜日月光火氣乃快然桂枝二白虎一湯黃芩芍藥加桂湯少陽證令人身體解㑊寒不甚熱不甚惡見人見人心惕惕然熱多汗出甚小柴胡湯太陰證令人不樂好太息不嗜食多寒熱汗出病至則善嘔嘔已乃衰小建中湯異功散少陰證令人嘔吐甚多寒熱熱多寒少欲閉戶牖而處其病難已小柴胡加半夏湯厥陰證令人腰痛小腹滿小便不利如癃伏數便意恐懼氣不足腹中悒悒四物玄胡苦楝附子湯白虎加桂枝湯活人治溫瘧知母四錢甘草一錢石膏五錢桂枝一錢粳米一合上以水三盞煎米至二盞去米入諸藥再煎至一盞溫服三服汗出愈溫脾散寶鑑治久瘧不愈紫河車俗名金線重樓緑豆各一兩甘草五錢信砒一錢五分研細上為細末入砒一處研勻每服五分新汲水少許調下須於發日隔夜夜深服藥忌葷酒瓜果生冷魚腥雞肉等物三日孕婦勿服但至誠合此藥與人並不吐此雖有砒一味而有河車緑豆甘草三味及新汲水皆能解毒不妨按以上二方劫病之捷勝於他方但虛弱或久病羸瘦之人終不可輕用如服上藥吐不止者以生緑豆細研新汲水調飲多即止丹溪活套云凡瘧證或連日或間日發作惡寒發熱腰背頭項俱痛此屬太陽經瘧也宜二陳湯加麻黃羌活藁本防風之類如連日或間日發作先寒後熱或寒少熱多或但熱不寒目痛鼻孔燥此屬陽明經瘧也宜用二陳湯加乾葛升麻石膏知母白芷之類如連日或間日發或先寒後熱或寒熱間作脅痛口苦或嘔吐噁心此少陽經瘧也宜二陳湯倍加柴胡及黃芩人參青皮之類如於子午卯酉日發寒熱嘔吐舌乾口燥此少陰經瘧也宜二陳湯加川歸川芎黃柏黃連柴胡之類如於辰戌丑未日發寒熱嘔吐不嗜食或腹滿自利此太陰經瘧也宜二陳湯加蒼白朮柴胡芍藥之類如於寅申巳亥日發惡寒發熱寒多熱少或腹痛引陰如淋狀善恐此厥陰經瘧也宜用二陳湯加桂枝附子乾薑之類大抵瘧屬三陽宜汗宜吐麻黃葛根柴胡常山草果烏梅之屬治之瘧屬三陰宜下宜溫宜和大柴胡湯柴胡桂薑湯柴胡四物湯附子理中湯之類選而用之祖傳方截法木通秦艽常山穿山甲醋炙黃各一錢辰砂五分另研烏梅七個大棗七枚上細切以水三盞煎至一盞先以棗和辰砂末食後服藥一方用常山草果知母檳榔各一錢酒一盞浸一日臨發日早服又方治久瘧不愈一服便止永不發其效如神常山一錢五分檳榔一錢丁香五分烏梅一枚上細切作一服用好酒一盞浸一宿臨發日清晨飲之豫壯年過杭同舟有二男子皆年逾四十已各得痎瘧三年矣俱發於寅申巳亥日一人晝發於巳而退於申一人夜發於亥而退於寅豫曰但到杭可買藥俱與痊可晝發者乃陰中之陽病宜補氣解表與小柴胡湯倍柴胡人參加白朮川芎葛根陳皮青皮蒼朮夜發者為陰中之陰病宜補血疏肝用小柴胡合四物加青皮各與十帖教其加薑棗煎於未發前二時服每日一帖服至八帖同日得大汗而愈永不再發霍亂論內經曰歲土不及風乃大行民病飧泄霍亂體重腹痛筋骨繇復陳無擇曰霍亂者心腹卒痛嘔吐下利憎寒壯熱頭痛眩暈先心痛則先吐先腹痛則先利心腹齊痛吐利並作甚則轉筋入腹即死蓋陰陽反戾清濁相干陽氣暴升陰氣頓墜陰陽痞隔上下奔趨河間曰吐瀉不止者其本在於中焦或因渴而大飲飲而過量或因飢而始食食而過飽以致濕熱內甚故陰陽交錯而不和是為吐瀉仲景曰邪在上焦則吐邪在下焦則瀉邪在中焦則既吐且瀉此為急病也然吐瀉為患十死其一二如揮霍撩亂而不得吐瀉者此名乾霍亂也多死法日既有其入必有所出今有其入而不得其出者痞塞也故轉筋吐瀉者其氣有三一曰火二曰風三曰濕大抵霍亂吐瀉之證皆風火濕熱之為害耳治法宜分利陰陽散風行濕而降火也又當引清氣上升使濁氣下降無有不安仲景又曰熱多欲飲水五苓散寒多不飲水理中丸河間亦曰凡覺此證急用五苓益元散桂苓甘露飲乃吐瀉之聖藥也慎勿與粟米粥湯入胃必死丹溪曰內有所積外有所感陽不升陰不降乖隔而成非因鬼邪皆飲食所致此先哲確論也切勿與穀食雖米湯一呷下咽立死必待吐瀉止過半日飢甚方可與稀粥少食以漸而將息也學者詳之脈法脈微而澀或代而散或隱而伏或大而虛脈右關滑為霍亂吐瀉脈結促代者不可斷以死脈大者生脈微弱漸遲者死脈洪者為熱脈弦者為飲氣口脈弦滑膈間有宿食留飲宜順其性以鹽湯探吐之方法丹溪曰大法生薑理中湯最好有宜吐者雖自吐利還須以吐法提其氣用二陳湯探吐或樟木屑煎湯或鹽湯皆可吐之一方蒼朮厚朴陳皮乾葛各一錢五分水煎服或用薑湯下保和丸四五十粒轉筋屬血熱四物湯加酒芩紅花蒼朮南星煎服轉筋男子以手挽其陰女子以手牽乳近兩傍此千金妙法也乾霍亂忽然心腹痛㽲欲吐不吐欲瀉不瀉者是也俗名㽲腸痧即是難治死在須臾升降不通故也宜吐以提其氣最是良法內有物所傷外為邪氣所遏大法宜發汗有用吐法者即兼發散之義有用溫藥解散者二陳湯加川芎蒼朮防風白芷等解散藥也委中穴出血或十指頭出血皆是良法以上丹溪方法凡七條桂苓甘露飲河間五苓散二方並見中暑門半夏湯治霍亂轉筋吐瀉不止半夏曲茯苓白朮各五錢淡桂二錢五分甘草炙一錢上為細末每服二錢渴者以涼水調下不渴者以溫水調下不拘時候理中丸仲景白朮人參乾薑甘草各等分上為細末煉蜜為丸如彈子大每服一丸涼水化下六和湯河間治霍亂吐瀉不止白朮半夏泡砂仁炒杏仁泡去皮尖人參甘草各五分赤茯苓藿香洗去土白扁豆薑汁拌炒木瓜各一錢香薷厚朴薑汁製炒各二錢上細切加生薑三片大棗一枚水二盞煎至一盞溫服漿水散機要治暴泄如水周身汗出盡冷脈弱不能言語甚而吐逆不止半夏二錢附子乾生薑炙甘草桂心各五分良薑三分半上細切作一服漿水煎服之姜附湯活人治霍亂吐瀉轉筋手足厥冷多汗方見傷寒門理中湯局方治過食生冷遂成霍亂吐瀉食不消心腹滿悶不快加青皮陳皮名治中湯更加丁香附子名丁香治中湯宜臨病斟酌施治方見傷寒門祖傳方灸法治霍亂已死而胸中尚有暖氣者灸之立蘇其法以鹽填滿臍孔灸之不計壯數又法治霍亂吐瀉不止灸天樞氣海中脘四穴立愈天樞二穴在臍心兩傍各開二寸氣海一穴在臍下一寸半中脘一穴在臍上四寸洗法治霍亂轉筋用大蓼一握水煮熏洗立效丹溪活套云凡霍亂不渴用生薑理中湯如渴用五苓散加五味子麥門冬滑石轉筋用四物湯加酒芩紅花南星蒼朮又云冬月用理中湯夏月用黃連香薷散放井中浸冰冷頓服乃效一方治吐瀉用藿香蒼朮厚朴陳皮砂仁白芷甘草半夏茯苓人參炒神麯各等分水煎遇寒加乾薑寒甚加附子泄瀉論內經曰濕勝則濡泄又曰春傷於風夏必飧泄又曰暴注下迫皆屬於熱又曰諸病水液澄徹清冷皆屬於寒叔和云濕多成五泄是故知風寒濕熱皆能令人泄瀉但濕熱良多而風寒差少耳原病式曰瀉白為寒青黃赤黑為熱也大抵瀉利小便清白不澀為寒赤澀為熱又大便完穀不化而色不變吐利不腥穢水液澄徹清冷小便清白不澀身冷不渴脈遲細而微者皆寒證也凡穀肉消化者無問色及他證便斷為熱夫寒泄而穀消化者未之有也或火性急速轉化失常完穀不化而為飧泄者亦有之矣仲景曰邪熱不殺穀然熱得濕則為飧泄也噫寒熱二證冰炭相反治之者差之毫釐謬以千里者也醫者可不謹乎脈法內經曰脈細皮寒少氣泄利前後飲食不入是為五虛死其漿粥入胃泄注止則虛者活脈經曰泄注脈緩時小結者生浮大數者死又洞泄食不化不得留下膿血脈微小流連者生徑急者死脈訣云下利微小則為生脈大浮洪無瘥日方法丹溪曰泄屬濕屬氣虛有火有痰有食積者戴氏曰凡瀉水腹不痛者濕也飲食入胃不住完穀不化者氣虛也腹痛瀉水腸鳴痛一陳瀉一陳者火也或瀉或不瀉或多或少者痰也腹痛甚而瀉瀉後痛減者食積也燥濕四苓散加蒼朮倍白朮甚者二術炒為末米飲調服氣虛用人參白朮芍藥火宜伐火利小水四苓散加滑石黃芩梔子木通痰宜伐痰海石青黛黃芩神麯為丸服或用吐以提其清氣食積宜消導疏滌之神麯大黃枳實之類水瀉用蒼朮厚朴陳皮炒曲茯苓豬苓澤瀉地榆甘草冬加乾薑等分煎服泄瀉水多者必用五苓散夏月水瀉桂苓甘露飲二方並見暑門治泄瀉諸藥多作丸子效脾胃不和泄瀉者胃苓湯五苓合平胃散是也世俗例用澀藥治瀉若病久而虛者或可若初得者必變他證為禍不小殊不知瀉多因於濕分利小水為上策也以上丹溪方法凡十二條清六丸治泄瀉六一散一料加紅曲五錢上為細末湯浸蒸餅為丸服溫六丸治泄瀉或兼嘔吐者六一散加乾薑或生薑汁亦可蒸餅丸服姜曲丸治食積瀉陳曲茴香各五錢生薑一兩上為細末蒸餅丸服止瀉方肉豆蔻五錢白滑石春冬一兩二錢五分夏二兩五錢秋二兩上為細末薑汁調神麯作糊為丸服脾泄丸白朮神麯芍藥並炒各等分冬加肉豆蔻去芍藥為細末神麯糊為丸服以上皆丹溪方茯苓湯東垣治因傷冷飲水泄瀉注下一夜十餘次變作白痢或變赤白相雜腹中㽲痛食減熱燥四肢沉因無力生黃芩一錢五分當歸二錢肉桂炙甘草各二分半豬苓茯苓各三分澤瀉五分芍藥七分半蒼朮生甘草升麻柴胡各一錢上細切作一服水二盞煎至一盞稍熱服黃耆補胃湯東垣治一日大便三四次溏而不多有時作泄腸中鳴小便黃黃耆柴胡當歸身益智橘紅各一錢五分升麻二錢炙甘草五分紅花少許上細切作一服水二盞煎至一盞稍熱食前服升陽除濕湯東垣自下而上者引而去之蒼朮一錢柴胡羌活防風升麻神麯澤瀉豬苓各五分炙甘草陳皮麥糵面各三分上細切作一服水二盞煎至一盞去渣空心服如胃寒腸鳴加益智仁半夏各五分生薑三片大棗一枚同煎非腸鳴勿用治痛泄要方劉草窗白朮二兩炒白芍藥二兩炒陳皮一兩五錢炒防風一兩上細切分作八服水煎或丸服久瀉加升麻六錢白朮芍藥湯機要治太陰脾經受濕水泄注下體重微滿困弱無力不欲飲食水穀不化宜此和之身重暴下是大勢來亦宜和也白朮白芍藥各四錢甘草二錢上細切作一服水二盞煎至一盞溫服茯苓湯機要治濕瀉又治食積濕熱作瀉白朮茯苓各五錢上細切作一服水煎食前服一方有芍藥三味各等分名白朮散為末米飲調下蒼朮芍藥湯治證如前蒼朮五錢芍藥二錢五分黃芩一錢五分淡桂五分上細切作一服水二盞煎至一盞溫服防風芍藥湯機要治飧泄身熱脈弦腰痛微汗防風芍藥黃芩各二錢上細切作一服水煎空心服蒼朮防風湯機要治泄瀉脈弦頭痛蒼朮二錢防風一錢白朮四錢麻黃一錢上細切作一服加生薑五片水二盞煎至一盞食前服神朮散良方治春傷於風夏必飧泄之證蒼朮一錢五分藁本川芎各六分羌活四分甘草炙三分細辛二分上細切作一服加生薑三片水二盞煎至一盞去渣溫服如欲汗加蔥白三莖胃風湯局方治證如前及治風冷乘虛入客腸胃米穀不化泄瀉注下及腸胃濕毒下如豆汁或下瘀血或如魚腦日夜無度久不得愈者方見中風門丹溪活套云泄瀉注下如水用生料五苓散加蒼朮車前子倍白朮為末米湯調服濕熱甚下泄如熱湯者本方去桂加滑石黃芩梔子木通之類如腹中㽲痛下泄清冷喜熱手蕩尉口不燥渴乃寒泄也本方倍桂加肉豆蔻有氣加木香病甚者更加丁香附子作丸服如久泄穀道不合或脫肛此元氣下陷及大腸不行收令而然用白朮芍藥神麯陳皮肉豆蔻訶子肉五倍子烏梅為丸以四君子湯加防風升麻煎湯送下如食積時常腹痛瀉積先以木香檳榔丸或東垣枳實導滯丸推遂之而後以四苓加厚撲蒼朮神麯麥芽之類作丸服之以安胃氣如瀉水腹不痛者屬氣虛宜四君子湯倍白朮加黃耆升麻柴胡防風之類補以提之而愈祖傳方治暴泄注下用車前子一兩微炒上一味研為細末清米飲調服又方治腹痛泄瀉用艾葉一握車前子葉一握陰乾上先將二葉細切用水二盞煎至一盞去渣入薑汁再煎一沸稍熱服立愈醫案一人泄瀉日夜無度諸藥不效偶得一方用針沙地龍豬苓三味共為細末生蔥搗汁調方寸匕貼臍上小便長而瀉止一人吐瀉三日垂死囑付後事豫為灸天樞氣海三穴立止
