body:
  text: 卷之七婦人科上月經論內經曰二陽之病發心脾有不得隱曲女子不月其傳為風消為息奔者死不治難經曰心出血肝納血肺出氣腎納氣蓋婦人百病皆自心生如五志之火一起則心火亦從而燔若夫經閉不通之證先因心事不足由是心血虧耗故乏血以歸肝而出納之用已竭經曰母能令子虛是以脾不磨而食亦少所謂二陽之病發心脾者此也二陽者陽明也因食少故肺全亦失所養而氣滯不行則無以滋腎陰況月經全借腎水施化腎水既乏則經血日以乾涸以致或先或後淋瀝無時若不早治漸而至於閉塞不通甚則為癥瘕血膈勞極之證不易治也又如崩漏不止之證先因心火亢甚於是血脈泛溢以致肝實而不納血出納之道遂廢經曰子能令母實是以肝腎之相火挾心火之勢亦從而相扇所以月水錯經妄行無時而泛溢也若不早治澌而至於崩中不息甚則化為白濁白淫血枯發熱勞極之症不可治矣經曰邪氣盛則實正氣奪則虛所謂心血不足者正氣奪也心火亢甚者邪氣盛也邪氣者相火也丹溪曰天非此火不能生物人非此火不能有生但貴乎適中凡動必聽命乎心君則無以上諸證大抵經閉不行與夫經漏不止其初皆由心事不足以致月經不調早不調治直至危篤求醫雖妙手莫能為矣東垣經閉不行有三論崩漏不止亦有三論學者宜參究其論以治之不可拘泥也脈法脈經曰寸口脈微而澀微則衛氣不足澀則榮氣無餘衛不足其息短其形躁血不足其形逆榮衛俱虛言語謬誤趺陽脈微而澀澀則胃氣虛虛則短氣咽燥而口苦胃氣澀則失液少陰脈微而遲微則無精遲則陰中寒澀則血不來此為居經三月一來脈微血氣俱虛年少者亡血也乳子下利為可不者此為居經三月一來脈微弱而澀年少得此為無子中年得此為絶産寸口脈沉而遲沉則為水遲則為寒寒水相搏趺陽脈伏水穀不化脾氣衰則鶩溏胃氣衰則身體腫少陽脈卑少陰脈細男子則小便不利婦人則經水不通經為血不利則為水名曰水分寸口脈沉而數數則為出沉則為入出則為陽實入則為陰結趺陽脈微而弦微則無胃氣弦則不得息少陰脈沉而滑沉則為在裡滑則為實沉滑相搏血結胞門其藏不瀉經絡不通名曰血分經水前斷後病水名曰血分此病難治先病水後經斷名曰水分此病易治婦人帶下六極之病脈浮則為腸鳴腹滿緊則為腹中痛數則為陰中癢痛則生瘡弦則陰戶掣痛婦人帶下脈浮惡寒漏下者不治婦人寸口脈浮而弱浮則為虛弱則為血浮則短氣弱則有熱而自汗出趺陽脈浮而澀浮則氣滿澀則有寒喜噫吞酸其氣時下小腹則寒少陰脈滑而數者陰中生瘡少陰脈數則氣淋陰中生瘡少陰脈弦者白腸必挺核少陰脈浮而動浮則為虛動則為痛婦人則脫下婦人漏血下赤白日下血數升脈急疾者死遲者生婦人漏下赤白不止脈小虛滑者生大緊實數者死婦人疝瘕積聚脈弦急者生虛弱小者死少陰脈浮而緊緊則疝瘕腹中痛半産而墮傷浮則亡血惡寒絶産肥人脈細胞中有寒故令少子其色黃者胸上有寒婦人月經一月再來者經來其脈欲自如常而反微不利不汗出者其經二月必來方法丹溪曰經候有枯閉不通者有不及期與過期者有妄行者有色紫黑及淡者有成塊者有作疼者夫經不通或因墮胎及多産傷血或因久患潮熱銷血或因久發盜汗耗血或因脾胃不和飲食少進而不生血或因痢疾失血治宜生血補血除熱調胃之劑隨證用之或因七情傷心心氣停結故血閉而不行宜調心氣通心經使血生而經自行矣虛中有熱月事不來以四物湯加黃芩治之常過期者血少也以芎歸參術兼痰藥治之過期紫黑有塊作痛血熱也以四物湯加香附黃連治之過期色淡挾痰者以二陳湯加芎歸治之常不及期者血熱也以四物湯加黃芩黃連香附肥人多兼痰藥治之血枯經閉者以四物湯加紅花桃仁治之痰多占住血海地位因而下多者目必漸昏肥人多有之以南星蒼朮川芎香附作丸服之肥人軀脂滿經閉者以導痰湯加芎歸黃連不可服地黃泥膈故也如用必以薑汁炒肥人少子亦由痰多脂膜閉塞子宮不能受精而施化也宜服上藥瘦人子宮無血精氣不聚亦令無子以四物湯養血養陰等藥治之經水未行臨經將來作疼者血實也一曰瘀血鬱滯也以四物湯加桃仁香附黃連紅花或加玄胡索莪朮木香有熱加柴胡黃芩經水行後而作疼者氣血俱虛也以八物湯加減煎服夫血為氣之配因氣而行成塊者氣之凝將行而痛者氣之滯行後作痛者氣血虛也色淡者亦虛也而有水以混之也錯經妄行者氣之亂也紫者氣之熱黑則熱之甚也今人悉指為風冷而行溫熱之劑禍不旋踵調經散治經水或前或後或多或少或逾月不至或一月兩來皆可服川歸酒洗一錢半麥門冬去心二錢吳茱萸擇去閉目者沸湯泡七次焙乾半錢人參去蘆一錢半夏湯泡七次一錢白芍藥一錢川芎一錢牡丹皮去心一錢肉桂半錢阿膠珠甘草各七分半上細切作一服水二盞加生薑三片煎至一盞空心稍熱服月經過期不行宜服和經湯當歸一錢半川芎半錢熟地黃一錢白芍藥一錢桃仁三十個去皮尖研紅花三分香附米一錢熟桂半錢木通八分蓬莪朮一錢甘草五分蘇木一錢上細切作一服水一盞半煎至一盞空心溫服月經先期而來宜服安經湯歸身一錢半川芎半錢白芍藥八分生地黃一錢阿膠珠半錢艾葉半錢條芩一錢甘草半錢香附一錢黃柏半錢知母半錢黃連薑汁拌炒八分上細切作一服水煎空心服經不通用馬鞭草杵汁熬膏為丸或燒存性為丸紅花當歸煎湯送下固經丸治經水過多不止黃芩龜板白芍藥各一兩樗根白皮七錢半黃柏炒三錢香附童便浸一宿熔干二錢半上為細末酒糊為丸如梧桐子大每服七十丸白湯下崩漏有虛有熱虛則下溜熱則流通急則治其標用白芷煎湯調下百草霜服或棕櫚灰或狗頭骨燒存性或伍靈脂半生半炒俱以酒調服後以四物湯加乾薑調補之緩則治其本四物湯加芩連參耆香附乾薑之類四物湯加荊芥穗條芩止血神效崩漏多因氣所使而下香附米一錢炒黑歸身一錢白芍藥一錢酒炒熟地黃一錢川芎黃耆蒲黃地榆人參各半錢白朮一錢升麻三分煎服甚者加棕櫚灰為末酒調服婦人血病宜用當歸若肥白人與人參黃耆同用瘦黑人宜與生地黃香附同用帶下是濕熱為病白屬氣赤屬血以二陳湯加蒼朮治濕為主氣虛入參術血虛入芎歸帶下是胃中痰積流下滲入膀胱當升之天人知此以二陳湯加蒼白朮升麻柴胡甚者上用吐法以提其氣下用二陳加二術仍用瓦壟子以燥其濕痰肥人帶下多是濕痰用海石半夏南星黃柏蒼朮川芎香附樗皮冬加乾薑瘦人少有此病有者是熱以滑石樗皮川芎海石青黛丸服結痰帶下以小胃丹津液咽下數丸候積下後以補藥調治一方治白帶樗白皮山茱萸苦參香附各五錢龜板酥炙枳子各二兩黃柏一兩乾薑貝母各二錢半白芍藥七錢半上為細末酒糊為丸服又方白芷四兩以石灰半斤淹三宿漉去灰以白芷炒焦為末清米飲調空心服之又方以黃荊子一味炒焦為末米飲調服上可治心痛下可治白帶以其能燥濕痰也羅先生治帶用十棗湯神祐丸五燭散此法實者可用虛者不可峻攻帶下必須斷厚味凡用藥寒月少加薑附臨機應變用之一人上有頭風鼻涕下有白帶用南星蒼朮酒芩辛夷川芎黃柏炒焦滑石半夏牡蠣粉丸服四物湯乃婦人衆疾之總司也當歸川芎白芍藥熟地黃上細切等分水煎服以上丹溪方法凡三十三條東垣治崩漏帶下多主於寒學者宜再思之不可一途而論經曰陰虛陽搏謂之崩觀此可知東垣曰葵花白者治白帶赤者治赤帶用之果驗調經升陽除濕湯東垣治女子漏下惡血月事不調或暴崩不止多下水漿之物皆因飲食不節勞倦所傷或素有心氣不足致令心火乘脾必怠惰嗜臥困倦乏力氣短氣急脾主滋榮周身者也脾胃虛而心胞乘之故漏下月水不調也況脾胃為血氣陰陽之根蒂也當除濕去熱益風氣上伸以勝其濕又云火鬱則發之當歸酒洗獨活各半錢蔓荊子七分防風炙甘草升麻藁本各一錢柴胡羌活蒼朮黃耆各一錢半上細切作一服水五盞煎至一盞去渣空心溫服少時以早飯壓之可一服而已如灸足太陰脾經中血海穴三七壯亦已此藥乃從權之法因風勝濕為胃氣下陷而氣迫於下以救其血之暴崩也住後必須服黃耆人參炙甘草當歸之類數服以補之於補氣升陽湯中加和血藥便是也若遇夏月白帶下脫漏不止宜用此湯一服立止涼血地黃湯治婦人血崩是腎水陰虛不能鎮守胞絡相火故血走而崩也黃芩荊芥穗蔓荊子各一分半黃柏知母藁本細辛川芎各二分黃連羌活柴胡升麻防風各三分生地黃當歸各半錢甘草一錢紅花少許上細切作一服水三大盞煎至一盞去渣空心稍熱服酒煮當歸丸東垣治㿗疝白帶下疰腳氣腰以下如在水雪中居火炕以厚衣重蓋猶寒肌肉消瘦小便與白帶長流而不禁固面白目青䀮䀮無所見身重如山行步欹側腿膝枯細大便閉澀心下痞悶懊憹食不下面垢背寒此上中下三陽俱虛脈沉緊而澀按之空虛洪而無力尤為中寒之證乃氣血俱虛之極也茴香五錢黑附子炮良薑各七錢當歸一兩上四味細切以好酒一升半煮至酒盡焙乾炙甘草苦楝生用丁香各半錢木香升麻各一錢柴胡二錢炒黃鹽全蠍各三錢玄胡索四錢上與前四味同研為細末酒煮麵糊為丸如梧桐子大每服五七十丸空心淡醋湯送下忌油膩冷物及酒濕面等固真丸治白帶久下不止臍腹冷痛陰中亦痛目中溜火視物昏花齒惡熱飲但喜干食此皆寒濕乘於胞內肝經陰火上溢故目中溜火其惡熱飲者陽明經中伏火也法當大瀉寒濕以此丸治之黃柏酒洗白芍藥各半錢柴胡白石脂各一錢火煅水飛研白龍骨酒煮水飛日乾為末當歸酒洗各二錢乾薑四錢炮上除龍骨石脂水飛日乾另研外余共為細末麵糊為丸如雞頭仁大日乾空心白湯下少時以早飯壓之是不令熱藥犯胃也忌生冷硬物酒濕面烏藥湯東垣治婦人血海疼痛當歸一錢甘草木香各五分烏藥一錢半香附二錢上細切作一服水二盞煎至一盞食前溫服助陽湯東垣治白帶下陰戶中痛空心面急痛身黃皮緩身重如山陰寒如冰生黃芩橘紅各五分防風高良薑乾薑郁李仁甘草各一錢柴胡一錢二分白葵花三分上細切分作二服每服水二盞煎至一盞去渣食前稍熱服丁香膠艾湯東垣治崩漏不止蓋心氣不足勞役及飲食不節所得其脈兩尺俱弦緊洪按之無力自覺臍下如冰冷白帶及白滑之物多間有如屋漏水下時或有鮮血右尺脈時或浮洪熟地黃白芍藥各三分川芎丁香各四分阿膠珠六分生艾葉一錢當歸一錢二分上以川芎地黃丁香另為細末其當歸芍藥艾葉各細切連前共六味入水五大盞煎至一盞半去渣入阿膠再上火煎至一大盞稍熱空心服水府丹治婦人久虛積冷經候不行癥瘕痞塊腹中暴痛面有皯黯黎黑羸瘦硇砂紙隔沸湯淋熬取紅豆以上各五錢桂心另為末木香乾薑各一兩砂仁二兩花蕊石煅研一兩半斑蝥一百個去頭足生地黃汁童子尿各一升臘月狗膽七枚元蜻二百個去頭足糯米一抄同炒黃色去米上九味為細末同三汁熬為膏和丸如雞頭實大硃砂為衣每服一丸食前細嚼溫酒送下米飲亦可黃耆當歸人參湯東垣治婦人經水暴崩不止先因損身失血自後一次縮一十日而來其後暴崩不止蓋因其人心窄性急多驚而心氣不足及飲食不節得之診得掌中寒脈沉細而緩帶數九竅不利四肢無力上喘氣促口鼻氣不調脾胃虛弱胃腕當心而痛左肋縮急當臍有動氣腹鳴下氣大便難宜先治其本餘證可去安心定志和脾胃益元氣補血養神以大熱劑去其寒少加生地黃去命門相火不令四肢痿弱黃連二分生地黃三分炒神麯橘紅桂枝各五分草豆蔻六分黃耆人參麻黃不去節各一錢當歸身一錢半杏仁五枚另研如泥上細切作一服水二盞半先煎麻黃令沸掠去沫煎至二盞下諸藥同煎至一盞食前服立止又以草豆蔻丸十五丸以止胃腕密寒之痛再與肝積之藥除其病根當歸芍藥湯東垣治婦人經水漏下不止其色鮮紅時值炎月先因勞役脾胃虛弱氣短氣逆自汗不止身熱悶亂不思飲食四肢困倦大便時泄後復因心氣不足經水暴下不止微覺氣下行氣逆全無氣短懶於語言此藥主之柴胡二分炙甘草生地黃各三分黃耆一錢陳皮連白熟地黃各五分蒼朮米泔浸白朮川歸白芍藥各一錢半上細切作一服水二盞煎至一盞空心溫服柴胡調經湯東垣治經水不止其色鮮紅項筋急腦痛脊骨強痛不安炙甘草當歸身葛根各三分獨活藁本升麻各半錢柴胡七分羌活蒼朮各一錢紅花少許上細切作一服水二盞煎至一盞空心溫服取微汗立止益胃升陽湯東垣治婦人經候凝結黑血成塊左廂有血瘕水泄不止食有時不化後血塊暴下並水泄俱作是前後二陰有形血脫竭於下既久經候猶不調水泄日三四行食罷煩心飲食減少人形瘦弱血脫益氣古聖人之法也先補胃氣以助生髮之氣故曰陽生陰長諸甘藥為之先務蓋甘能生血陽生陰長之理也人身以穀氣為寶故先理胃氣為要柴胡升麻各五分炙甘草當歸身酒洗陳皮各一錢人參有嗽不用炒神麯各一錢二分黃耆一錢半白朮二錢生黃芩二分上細切作一服水二大盞煎至一盞去渣熱服如腹中痛加白芍藥三分中桂少許如渴或口乾加葛根三分不拘時服升陽舉經湯東垣治經水不止右尺脈按之空虛是氣血俱脫大寒之證輕手其脈數疾舉指弦緊或澀皆陽脫之證陰火亦亡見熱證於口鼻眼或渴此皆陰躁陽欲先去也當溫之舉之升之浮之燥之此法乃大升浮血氣補命門之下脫肉桂夏月不用白芍藥各二分紅花半分細辛三分人參熟地黃川芎各半分獨活根黑附子炮炙甘草各七分半羌活藁本防風各一錢白朮當歸黃耆柴胡各一錢二分桃仁泥少許上細切分作二服每服用水二大盞煎至一盞空心熱服當歸附子湯東垣治臍下冷痛赤白帶下當歸四分炒鹽三分蠍稍升麻各五分甘草炙六分柴胡七分黃柏少許為引用附子炮一錢乾薑炮良薑各八分上細切作一服水三盞煎至一盞去渣稍熱服或為細末酒麴糊為丸亦可調經補真湯東垣冬後一月微有地泥冰泮其白帶下陰戶中寒一服立止獨活乾薑炮藁本防風蒼朮各二分麻黃不去節炙甘草人參去蘆當歸身白朮生黃芩升麻各五分黃耆七分良薑澤瀉羌活各一錢柴胡四分杏仁二枚研桂枝少許白葵花七朵去萼上細切作一服除黃芩麻黃另外先以水三大盞煎麻黃一味令沸掠去沫入余藥同煎至二盞再入生黃芩煎至一盞空心服之候一時許可食早飯柴胡丁香湯東垣治婦人年三十歲左右臨經先腰臍痛甚則腹中亦痛經縮三二日生地黃五分丁香四分當歸身防風羌活各一錢柴胡一錢二分全蠍一枚上細切作一服水二盞煎至一盞去渣食前稍熱服之延胡苦楝湯東垣治臍下冷撮痛陰冷大寒白帶下黃柏一分延胡索苦楝子各二分附子炮肉桂各三分炙甘草五分熟地黃一錢上細切作一服水二盞煎至一盞食前溫服桂附湯東垣治白帶腥臭多悲不樂大寒證黃柏為引用知母各五分肉桂五分附子炮三錢上細切作一服水三盞煎至一盞空心溫服如少食常飽腹中滿悶加白芍藥半錢如不思飲食加五味子二十個如煩惱面上如蟲行乃胃中元氣極虛加黃耆一錢半人參七分炙甘草升麻各半錢人參補氣湯東垣治四肢懶倦自汗無力丁香末二分生甘草炙甘草各三分生地黃白芍藥各半錢熟地黃六分人參去蘆防風去蘆羌活黃柏知母當歸身升麻各七分柴胡一錢黃耆一錢半全蠍一個五味子二十個上細切作一服水二大盞煎至一盞空心稍熱服黃耆白朮湯東垣治婦人四肢沉重自汗上至頭頸惡風頭痛躁熱細辛二分吳茱萸川芎各三分柴胡升麻各四分當歸身六分黃柏酒洗炙甘草羌活各八分五味子一錢白朮人參各一錢半黃耆二錢半上細切作一服水二大盞生薑五片煎至一盞去渣食前稍熱服增味四物湯東垣治婦人血積血瘕當歸川芎白芍藥熟地黃京三稜乾漆炒煙盡另研肉桂去粗皮廣莪朮各等分上細切每服五錢水二大盞煎至一盞去渣空心溫服補經固真湯東垣治婦人白帶下流不止其心胞尺脈微細蓋始病血崩久則血少後亡其陽故白滑之物下流不止所謂崩中日久為白帶也乃本經血海枯竭津液後亡不能滋養筋骨以本部行經藥為引用以大辛甘油膩之藥潤其枯而滋津液以大辛熱之藥補其陽道生其血脈以苦寒之藥泄其肺而救上熱傷氣以人參補之以微苦溫之藥為佐而益元氣白葵花研爛四分陳皮五分不去白生黃芩細研另入郁李仁去皮尖研如泥甘草炙柴胡各一錢乾薑細末人參各二錢上細切除黃芩外以水三盞煎至一盞半入黃芩同煎至一盞去渣空心熱服少時以早飯壓之溫胃補血湯東垣治婦人耳鳴鼻不聞香臭口不知穀味胃氣不快四肢困倦行步欹側發脫落食不下膝冷陰汗帶下喉中吤吤不得臥口燥咽乾太息頭不可以回顧項筋緊急脊骨強痛頭旋眼黑頭痛噴嚏生地黃白朮藿香黃柏各二分牡丹皮蒼朮王瓜根陳皮吳茱萸各三分當歸身四分柴胡人參炙甘草地骨皮各五分升麻生甘草各六分黃耆一錢丁香一個桃仁三分白葵花七朵上細切作一服水二大盞煎至一盞食前熱服立效散東垣治婦人血崩不止當歸蓮花心白綿子紅花茅花以上各一兩上銼如豆大白紙包裹泥固火煅存性為細末每服三錢如干血氣研血竭為引溫酒調服或加輕粉半錢如血崩甚不止加麝香為引溫酒調服四聖散東垣治婦人赤白帶下川烏炮生白礬各一錢紅娘子三個斑蝥十個上為細末煉蜜為丸如皂子大綿裹塞陰戶中溫經除濕湯東垣治婦人值冬月四肢無力乃痿厥濕熱在下焦也醋心者是濁氣不下降欲為中滿也閣眼麻木作者陽道不行也惡風寒者上焦之分皮膚中氣不行也開目不麻者陽道少行而陰寒之氣暫退也頭旋目眩者風氣下陷於血分不得伸越而作也近火則有之黃連二分柴胡草豆蔻神麯炒木香各三分麻黃不去根節獨活當歸身黃柏升麻羌活各半錢炙甘草人參白朮豬苓澤瀉各七分黃耆陳皮蒼朮各一錢白芍藥一錢半上細切作一服水二大盞煎至一盞食遠服治肢節疼痛無力之勝藥也桃仁散産寶治婦人月水不調或淋瀝不斷斷後復來狀如瀉水虛弱不進飲食腹中堅痛不可行動月水或前或後或經月不來舉體沉重惟欲眠臥多思酸物桃仁去皮尖炒另研甘草炙半夏各三分赤芍藥生地黃各一錢澤蘭葉川牛膝當歸桂心牡丹皮人參蒲黃川芎各七分上細切作一服加生薑三片水二盞煎至一盞空心溫服通經下取方産寶曾經試驗神效海蛤粉半兩苦葶藶牙皂各二錢半巴豆略去油天花粉苦丁香紅娘子各一錢半麝香上為細末每用一錢蔥涎同搗為丸簿綿裹以五寸竹管納陰戶中候熱時先通黃水次則經行通經丸産寶治婦人室女月經不通或成血瘕疼痛桂心青皮大黃酒濕紙裹煨川椒莪朮乾薑川烏炮去皮乾漆碎炒煙盡當歸桃仁去皮尖麩炒研如泥各等分上為細末將四分之一以米醋熬成膏和余藥末成劑臼中杵勻丸如梧桐子大每服二十丸空心淡醋湯下漸加至三四十丸溫酒亦可下性畏漆者入雞子清和藥內膠艾湯良方治勞傷氣血衝任虛損月水過多淋瀝不止阿膠炒成珠川芎甘草炙各半錢當歸艾葉各七分半熟地黃白芍藥各一錢上細切作一服水一盞半煎至一盞溫服一方加地榆黃耆見胎前門加減四物湯良方治經候微少漸致不通手足煩疼形瘦潮熱脈息微數本方去地黃川芎加澤蘭葉三倍甘草半分如經候過多本方去熟地黃加生地黃如經行身熱脈數頭昏本方加柴胡黃芩如經行微少或脹或痛四肢疼痛本方加延胡索沒藥白芷共為末以淡醋湯調下如經候不調心腹㽱痛只用芎歸二味煎服名君臣散以歸倍於芎也加味四物湯元戎因氣衝經脈故月事頻並臍下多痛本方加白芍藥如經欲行臍腹㽱痛本方加玄胡苦楝檳榔木香如經水過多本方加黃芩白朮如經水澀少本方加葵花紅花如經水適來適斷或往來寒熱宜先服小柴胡湯以去寒熱然後以四物湯和之或以二方並服名柴胡四物湯香附一物丸産寶治經候不調血氣刺痛腹脅膨脹頭眩噁心崩漏帶下並宜治之香附子杵去皮毛不拘多少米醋浸一日夜用瓦銚煮令熟焙乾上為細末醋糊為丸如梧桐子大日乾每服五十丸淡醋湯下艾附丸産寶治證如前香附子一斤醋煮艾葉四兩當歸二兩上為細末醋糊為丸服地黃通經丸産寶治婦人經候不行結成血瘕在臍下如覆杯熟地黃三兩虻蟲去頭足炒水蛭糯米同炒去米桃仁各五十個上為細末煉蜜為丸如梧桐子大每服五十丸空心溫酒下未和加至七八十丸益母丸良方治婦人赤白帶惡露時下不止及治婦人胎前産後及經中諸般奇病無所不療益母草一名茺蔚子紫花方莖俗名野天麻五月採陰乾磨為細末勿犯鐵器煉蜜為丸如彈子大每服一丸用熱酒加童便化下兼氣者木香湯化下或只以末子每服二錢或酒或童便調下此婦人之仙藥也苦楝丸治赤白帶下最妙苦楝焠酒浸茴香炒當歸各等分上為細末酒糊為丸如梧桐子大每服五十丸空心溫酒送下丹溪活套曰凡婦人經候不調皆當以四物湯為主治如經候過而腹中作痛綿綿無休息者屬血虛本方倍當歸熟地黃兼氣虛者本方加人參黃耆挾寒者加乾薑如經候將來腹中陳陳痛乍作乍止者血氣實也本方用生地黃加黃連香附桃仁紅花玄胡索牲丹皮之類如經水常不及期而行者血熱也本方用生地黃加黃連黃芩白芷之類如經水常過期而來者瘦人多應是血少本方倍當歸熟地黃加黃耆甘草少佐以紅花桃仁泥以為生血之引用也肥人大概是氣虛挾痰阻滯升降然也本方去地黃加參耆甘草茯苓半夏陳皮香附等藥常過期而紫黑成塊者血熱也多作腹痛本方用生地黃加香附黃連玄胡索五靈脂乳香沒藥之類過期而血淡色者痰多血少也本方用生地黃合二陳湯煎服肥盛婦人或二三個月一行者痰盛而軀脂閉塞經脈以導痰湯加芎歸香附蒼白朮之類如經水適來適斷往來寒熱如瘧者本方合小柴胡煎服如經行過三五日腹中綿綿走痛者此血行而滯氣未盡行也本方加木香檳榔煎服立愈祖傳方治婦人室女月經不通漸成脹滿及治男子墜馬跌撲損傷以致瘀血停積欲成血蠱病者悉皆治之名曰桃奴飲子桃奴桃樹上嫩桃干朽不落者冬月及正月收猳鼠糞即雄鼠糞也兩頭尖者是玄胡索肉桂香附五靈脂以上各炒砂仁桃仁去皮尖另研上各等分為細末每服三錢空心溫酒調下一方治月經不通只以鼠糞一合略炒研細溫酒調下立效又方治婦人血崩不止用蒼耳草燒存性好酒調服立止或調入四物湯中亦效醫案一老婦人年五十三血崩久不止諸藥不效豫以橡斗蒼耳草根二物燒存性用四物湯加白芷茅花乾薑煎湯調服其經血自此而止再不行矣婦人科中胎前論內經曰陰搏陽別謂之有子謂陰脈搏手其中別有陽脈也是為血氣和平陽施而陰化也蓋為人之夫婦猶天地然天地之道陰陽和而後萬物育夫婦之道陰陽和而後男女生是故欲求嗣者先須調其婦之經脈經脈既調則氣血和平氣血和平則百病不生而樂乎有子矣脈經曰診其手少陰之脈動甚者妊子也蓋手少陰心脈也心主血脈故也又腎為胞門子戶尺中腎脈按之不絶當妊子也又曰婦人妊娠一月之時足厥陰脈養之二月足少陽脈養之三月手少陰脈養之四月手少陽脈養之五月足太陰脈養之六月足陽明脈養之七月手太陰脈養之八月手陽明脈養之九月足少陰脈養之十月足太陽脈養之是以諸經脈各養三十日也若夫至期當養之經虛實不調則胎孕為之不安甚則下血而墮矣夫手足十二經氣血盈虧不同如手足厥陰太陽少氣多血手足太陰少陰少血多氣手足少陽氣多血少手足陽明氣盛血多安胎之法宜各按月依經視其氣血虛實而調之固無胎墮之患其或感冒風寒別生異證又宜各按法而調治之機要曰治胎産之病當從厥陰經論之毋犯胃氣及上二焦謂之三禁不可汗不可下不可利小便若發汗者如傷寒下早之證利大便者則脈數已動於脾利小便者則內亡津液胃中枯燥制方之法能不犯三禁則榮衛自和而寒熱止矣皆醫者之繩墨也其為妊娠之婦早當絶去嗜欲安養胎元性宜靜而不宜躁體宜動而不宜安味宜涼而不宜熱衣宜溫而不宜寒毋久立毋久坐毋久行毋久臥又宜卻去一切肥甘煎煿油膩辛辣鹹酸水果魚鱉狐兔鴿雀之類即無胎漏胎痛胎動下血子腫子癇等證及橫産逆生胎死腹中之患矣丹溪曰難産之婦皆是八九十月內不能謹欲以致氣血虛故也傳曰古者婦人妊子寢不側坐不偏立不蹕不食邪味割不正不食席不正不坐目不視邪色耳不聽淫聲口不出傲言夜則令瞽誦詩道正事則生子形容端正才過人矣古所謂胎教也妊娠之婦可不慎歟附期嗣論夫人欲求嗣必先視其婦之經脈調否其或未調必以藥而調之經脈既調宜以人事副之按其法而行之庶不失其候也訣云三十時中兩日半二十八九君須算落紅滿地是佳期金水過時空霍亂霍亂之時枉費工樹頭樹底覓殘紅但解開花能結子何愁丹桂不成叢此蓋婦人月經方絶金水才生此時子官正開乃受精結胎之候妙合太和之時過此佳期則子宮閉而不受胎矣然男女之分各有要妙存焉如月候方絶一日三日五日交會者成男二日四日六日交會者成女過此則不孕矣又云陰血先至陽精後沖縱氣來乘血開裹精陰外陽內則成坎卦之象而為男若陽精先入陰血後參橫氣來助精開裹血陰內陽外則成離卦之象而為女脈法脈經曰婦人三部脈浮沉正等按之無絶者妊娠也妊娠初時寸微小呼吸五至三月而尺數也脈滑疾重以手按之散者胎已三月也脈重手按之不散但疾不滑者五月也妊娠四月脈左疾為男右疾為女俱疾為生二子又法得太陰脈為男得太陽脈為女又法左手沉實為男右手浮大為女左右手俱大生二男大者如實狀又法左右尺俱浮當作沉為生二男不爾則女作男生左右尺俱沉當作浮為産二女不爾則男作女生也此男女兼形之説也婦人懷娠脈離經而浮設腹痛引腰脊為欲生也又法婦人欲生其脈離經半夜覺日中即生也懷娠六七月脈實大牢強弦緊者生沉細者死懷娠至六七月暴下鬥余水其胎必倚而墮此非時孤漿預下故也寸口脈洪而澀洪則為氣澀則為血氣動丹田其形則溫澀在於下胎冷若冰陽氣胎活陰氣必終洪則為氣者生澀則為血者死欲別陰陽其下必僵假令陽經蓄血若杯陰為死胎陽為蓄血問婦人雙胎其一獨死其一獨生醫為下其死者其病則愈然後竟免軀其脈何以別之師曰寸口脈衛氣平調榮氣緩舒陽施陰化精盛有餘陰陽俱盛故知雙軀今少陰微緊血則濁凝經養不周胎則偏夭少腹冷滿膝臏疼痛腰重起難此為血理若不早去害母失胎婦人經自斷而有軀其脈反弦恐其後必大下不成胎也大下謂大下血也方法丹溪曰婦人無子者多由血少不能攝精俗醫悉謂子宮虛冷投以辛熱之藥煎熬臟腑血氣沸騰禍不旋踵或服艾者不知艾性至熱入火灸則不行入藥服則上行多服則致毒咎將誰執瘦怯婦人子宮乾澀宜滋陰養血四物加香附黃芩之類肥盛者乃軀脂滿溢閉塞子宮宜行濕燥痰南星半夏川芎滑石防風羌活一本有蒼朮無防風羌活或導痰湯之類墮胎乃血氣虛損不能榮養胎元而自墮耳猶枝枯則果落干萎則花墜也又因恚怒傷情內火便動亦能墮胎猶風撼其木人拊其枝也火能銷物造化自然病源乃謂風冷傷於子臟未得病情者也大抵屬虛屬熱二者又當視其輕重而治之一婦有胎即墜其脈左大無力重取則澀乃血少也以其妙年只補中氣使血自榮濃煎白朮湯調黃芩末一錢服之至三四兩得保全而生以上丹溪方法凡四條固胎飲熟地黃歸身尾人參白芍藥白朮川芎陳皮甘草桑樹上羊兒藤七葉圓者愚恐當作如檢桑葉圓者即俗名桑絡也真桑寄生尤妙少加黃連黃柏入糯米五七十粒煎服血虛不安者加阿膠珠胎氣痛者加縮砂安胎飲孕成之後覺胎氣不安或腹微痛或腰間作疼或飲食不美宜服或至五六個月常服數帖甚好白朮當歸白芍藥熟地黃各一錢人參川芎條黃芩陳皮各半錢甘草砂仁紫蘇各三分上細切作一服加生薑三片水煎服安胎丸白朮條芩神麯炒各等分上為細末粥丸每服五十丸清米湯下蓋白朮條芩乃安胎之聖藥也丹溪曰天行不息所以生生而無窮茺蔚子活血行氣有補陰之妙命名益母以其行中有補也故曰胎前無滯産後無虛條芩白朮乃安胎之聖藥俗以黃芩為寒而不用反謂溫熱藥能養胎殊不知胎孕宜清熱養血使血循經而不妄行乃能養胎黃芩必取細挺沉實者用之縮砂安胎以其止痛行氣故也砂仁非八九個月內不宜多用懷妊嗜物乃一臟之虛如受酸物乃肝臟止能養胎而虛也胎動者因火逼動胎逆上作喘急用條芩香附之類胎漏謂有胎而血漏下也屬氣虛有熱用四物湯加阿膠珠白朮條芩縮砂炒香附炒黑加糯米白水煎服又方治胎漏下血條芩五錢白朮一兩砂仁炒阿膠炒成珠各三錢上為細末每服二錢煎艾湯調服水煎服亦可又方枳殼炒黃芩各半兩白朮一兩水煎食前溫服胎痛宜用當歸地黃湯良方當歸一錢熟地黃二錢上細切水一盞半煎至一盞溫服心腹諸痛凡妊婦偶有所傷腹痛不安或從高墮下重物所壓觸動胎元痛不可忍及下血者甚妙産寶砂仁不拘多少和皮略炒勿令十分焦黑去皮取仁為末熱酒調服不飲酒者米飲或艾湯鹽湯皆可調服如覺胎中熱其胎即安矣此方即驗大抵妊婦不可缺此常服安胎易産凡妊娠二三個月忽心痛㽱痛不安用産寶當歸三錢阿膠炒二錢甘草炙二錢蔥白四錢上細切分作二服每服用水二盞煎至一小盞溫服凡妊婦四五個月忽心腹㽱痛産寶大棗十四枚炒令黑鹽一錢燒令赤上為末取一撮許酒調服之立愈治妊娠心腹大痛氣欲絶者産寶川芎川歸茯苓制朴各一兩上細切作一服用水三升煎至一升分二服立飲而愈川芎散産寶治婦素有冷氣衝心如刀刺者川芎一錢人參吳茱萸各半錢茯苓桔梗各四分當歸一錢制朴半錢芍藥七分半枳殼炙甘草各三分上細切作一服水一盞半煎至一盞稍熱服妊娠腰痛如折不能轉側産寶鹿角半兩上以火燒令赤酒淬再燒再淬以碎為度細末酒調服治妊娠腰腳腫痛産寶白茯苓白朮乾薑甘草炙各一錢杏仁三錢去皮尖研上細切作一服水一盞半煎至一盞溫服胎腫謂有胎或手足或頭面通身浮腫者是也屬濕多或用山梔子一合炒為末米湯調下丸服亦可惡阻乃有孕而噁心阻其飲食者是也多從痰治用二陳湯之類又方以白朮為丸服一曰肥人是痰瘦人是熱半夏茯苓湯治惡阻不食吐逆頭眩四肢怠惰煩疼惡寒自汗半夏湯炮七次透過心薑汁拌炒黃色生薑各一錢茯苓七分熟地黃陳皮去白桔梗旋覆花無嗽不用人參芍藥甘草炙川芎各半錢上細切水煎空心服千金方有紫蘇細辛各半錢丹溪醫按一婦孕兩月嘔吐頭眩醫以參朮川芎陳皮茯苓服之愈重脈弦左為甚此惡阻病必怒氣所激問之果然肝氣既逆又挾胎氣參術之補大非所宜以茯苓湯下抑青丸二十四粒五服稍安脈略數口苦幹食即口酸意其膈間滯氣未盡行以川芎陳皮梔子生薑茯苓煎湯下抑青丸十五粒而愈但口酸易飢此肝熱未平以熱湯下抑青丸二十粒愈後兩手脈平和而右甚弱其胎必墮此時肝氣既平可用參術以防之服一日而胎自墮矣參橘散良方治妊娠三月內惡阻吐逆不食或心虛煩悶橘紅茯苓各一錢麥門冬白朮厚朴薑製甘草炙各半錢上細切作一服加生薑三片竹茹一錢或加人參一錢水一盞煎七分溫服小膠艾湯良方治妊婦因顛仆挫跌胎動不安或胎搶上逼心或腹痛血下阿膠炒成珠一兩艾葉二兩指迷方加秦艽一兩上細切用水三升煎至一升半分三服膠艾湯不問月數淺深安胎極妙熟地黃艾葉當歸甘草炙川芎阿膠各半錢黃耆二分半上細切作一服水一盞半煎至一盞溫服治妊娠下血不止胎上衝心四肢厥冷悶僕欲死産寶阿膠炒艾葉各一兩竹茹如拳大白砂蜜二合上用水二升煎至一升入蜜更煎一二沸分二服治妊娠下血如月信來者若致胞干非特損子亦能損母産寶熟地黃乾薑炮各一兩上為細末每服三錢一日夜三四服治胎孕無故下血腹痛不可忍或下黃汁如漆如水如豆汁者産寶野苧根炒生銀各一兩上用水酒各一盞煎至一盞去渣分作二服不拘時服胎動衝心煩悶欲死安胎止痛産寶當歸酒洗川芎人參阿膠炒甘草炙各一兩蔥白切一升上用水七升煎至三升分三服妊娠因舉重僕跌損傷胎氣不安或子死腹中産室川芎一兩上為細末每服一匕連進三服死胎即下治妊娠遺尿失禁白薇白芍藥各等分上為細末酒調方寸匕日三服子煩妊娠苦煩悶不安又曰心煩熱悶謂之子煩麥門冬茯苓防風知母各一錢上細切作一服用水二盞煎至一盞入竹瀝一二匙服犀角散治子煩犀角屑地骨皮條芩麥門冬赤茯苓各一錢甘草半錢上細切作一服水一盞半煎至一盞入竹瀝一合溫服當歸飲良方治子煩當歸一錢半川芎阿膠珠豆豉桑寄生各七分半蔥白七莖上細切作一服水一盞半煎至一盞溫服竹瀝湯治子煩竹瀝一合防風黃芩麥門冬各一錢白茯苓一錢半上細切作一服水一盞半煎至一盞去渣入竹瀝再煎數沸溫服澤瀉散産寶治妊娠氣壅身體腹脅浮腫喘急氣促小便閉澀不利謂之子滿澤瀉桑白皮枳殼麩炒黃色檳榔木通赤茯苓各等分上細切每服四錢加生薑五片水一盞煎八分溫服金匱張仲景曰婦人本肌肉肥盛頭舉身滿今反羸瘦頭舉中隆胞系了戾亦多致此病但利小便即愈宜服腎氣丸蓋藥中有茯苓故也地黃為君功在補胞木通散良方治妊娠身體浮腫四肢脹急小便不利謂之子腫木通一錢木香訶子皮各三分香薷一錢枳殼炒半錢檳榔半錢桑白皮一錢條芩半錢紫蘇莖葉一錢上細切作一服加生薑三片水一盞半煎至一盞溫服全生白朮散産寶治妊婦面目虛浮肢體腫脹名曰子腫白朮一兩生薑皮大腹皮陳皮茯苓各半兩指迷方用茯苓皮多桑白皮無術上為細末每服二錢米飲調下鯉魚湯産寶治妊娠腹脹滿或通身浮腫小便不利或胎死腹中此方甚驗當歸白芍藥各一錢白茯苓一錢半白朮二錢橘紅半錢鯉魚一尾不拘大小上細切作