和丸如梧桐子大每服二丸倒流水送下如灌不下化開灌之無憂散産寶治分娩難産及胞衣不下等證孕婦臨月預服此藥日進二服則子易生而胞易落也當歸酒洗川芎白芍藥各七分木香不見火甘草各五分枳殼麩炒黃色乳香各一錢血餘灰四分上為細末分作二服水一盞煎八分濾去渣溫服不拘時催生奪命如神丹産寶牡丹皮枳殼麩炒赤芍藥各一錢蛇蛻二錢青皮阿膠珠甘草炙五加皮藝臺子貫衆馬鳴蛻炙焦各半錢花蕊石火煅半錢乳香一錢另研上為細末煉蜜丸如彈子大臨産細嚼一丸棗湯送下未産小頃又嚼一丸以産為度芎歸湯一名佛手散良方治妊娠因事跌僕子死腹中惡露妄下疼痛不已口噤欲絶用此藥探之若子死腹中立便遂下若腹痛隨止子母俱安又治臨産難生胞衣不下及産後血暈不省人事狀如中風血崩惡露不止腹中血刺㽱痛血滯浮腫入心經語言顛倒血風相搏身熱頭痛或似瘧非瘧一切胎前産後危急狼狽垂死等證並皆治之當歸酒洗去蘆一兩川芎七錢上細切分作四服每服用水一盞煎水將干投酒一盞半煎五七沸溫服如口噤幹開灌之如人行五里許再灌盡此四服便省立産神驗奪命丹産寶治胞衣不下蓋兒之初生惡血流入衣中衣為血所脹塞故不得下須臾衝上逼心即死急服此藥黑附子半兩炒牡丹皮一兩乾漆二錢半研細炒煙盡為度上為細末用米醋一升大黃末一兩同煮成膏和前藥末為丸如梧桐子大每服五七丸溫酒下黑龍丹産寶治難産及胞衣不下血迷血暈等證當歸五靈脂川芎良薑生地黃以上各二錢細切入雞子殼內紙筋鹽泥固濟火煅入後藥百草霜一兩硫黃乳香各二錢琥珀花蕊石各一錢上件連前藥共為細末酒米糊為丸如彈子大如用時將一二丸仍用火煅紅為末以童子小便合酒調灌下垂死者灌三四丸即活其功不可盡述一方産寶治胞衣不下川牛膝二錢當歸一錢半木通三錢滑石四錢半黃葵子二錢半上用水煎連進三四服立下枳殼散局方妊娠八九個月內胎氣壅滿常宜服之滑胎易産安和子臟益血舒氣枳殼五兩麩炒黃色粉甘草炙一兩半香附子一兩炒上為細末每服二錢空心沸湯點服日進三服一方加糯米炒同為末白湯點服令兒易産初生胎氣微黑百日後肥白此為古方之冠若妊婦稍弱者單衣恐胎寒腹痛胎弱多驚於內加當歸一兩木香半兩不見火如此用之則陽不致強陰不致弱二氣調和有益胎嗣自妊娠初得以至臨月藥石禁忌歌産寶歌曰蚖斑水蛭及虻蟲烏頭附子與天雄野葛水銀並巴豆牛膝薏苡連蜈蚣三稜代赭芫花射大戟蛇蛻黃雌雄牙硝芒硝牡丹桂槐花牽牛皂角同半夏南星與通草瞿麥乾薑蟹甲爪硇砂乾漆兼桃仁地膽茅根莫用好飲食禁忌局方雞肉合糯米食令子生寸白蟲食犬肉令子無聲魚鯉同雞子食令子生疳蝕瘡食兔肉令子缺唇食羊肝令子多厄難食鱉肉令子項短縮頭鴨子與桑椹同食令子倒生心寒鮮魚同田雞食令子喑啞雀肉同豆醬食令子面生雀卵斑點食冰漿令絶産食茨菰消胎氣食驢馬肉過月難産豆醬合霍菜食墮胎食山羊肉令子多病食鰍鱔無鱗魚難産食諸般菌生子驚風而夭食雀腦令子患雀目勿妄服湯藥勿妄亂針灸勿過飲酒漿勿舉重登高陟險心有大驚子必癲癇勿多睡臥須時時少步動和血脈勿勞力過傷使腎氣不足子必解顱腦破不合衣毋太溫食毋太飽若脾胃不和榮衛虛損子必羸瘦多病戒之戒之臨産須知外録一臨月不可洗頭以免橫生逆産一懷妊十月已滿陰陽氣足忽然臍腹陳痛胎孕偏陷腰間重脹穀道挺進漿水淋下其兒遂生此乃正産若當生自有其時如瓜熟蒂懸栗熟自落之類一凡臨産宜擇年高有識穩婆及純謹婦人三四人扶持一應外來間雜之人喪服穢濁之婦預宜杜絶勿令觸犯胎氣致産不利産後客氣犯兒亦主傷害一凡臨産房中不得喧鬧宜緊閉門戶靜以待生一歲月滿足方覺腹痛不可驚動太早早則舉家霍亂卜筮問神巫覡之流稱説鬼神多方哄嚇謀利産婦聞之恐怖夫恐則氣怯氣怯則上焦閉下焦脹氣乃不行以致難産如犯此急宜服紫蘇飲以寬其氣一凡臨月忽然腹痛或作或止或一日二日三五日胎水已來腹痛不密者名曰弄痛非當産也又有一月前忽然腹痛如欲便産卻又不産者名曰試月非當産也不問胎水來與不來俱不妨事但當寬心候時若果當産時腰腹痛極不已穀道挺進眼中火出其時便産豈有或痛不痛欲産不産之候耶人多於此胡行亂做枉了性命可不慎歟一凡初覺腹痛而腰不甚痛者未産也且扶行熟忍若行不得則憑物而立行得又行一世人不識但見腹痛才作便謂生産坐婆疏狂者不候時至便言試水試水並胞漿先破風入産戶以致腫脹門戶狹小乾澀難産一將産之時産母甚痛不肯舒伸行動固執曲腰眠睡胎元轉動尋到生門已破遮閉又轉又尋再三胎已無力決至難産一初覺不痛且當任意坐臥勉強飲食毋致臨産乏力一凡産母初覺欲生便須惜力調養不可妄亂用力兒身方轉便被用力一逼令兒錯路以致橫逆須待臨到産門用力一逼兒即下生此所當用力也譬如登廁時候未至用力何益一凡産母知覺心中憤悶可取白蜜一匙溫水調服一産母如覺飢餓可進以軟白粥不令飢渴以致乏力亦不可食硬飯糍粽恐産後有傷食之病一未産之先或煩渴欲飲水只可與清米飲飲之為佳一凡産不可服催生符水況血得寒即凝血一凝則胎滯而反致難産夫催生符水蓋是野道士求食謀利之設有何益哉一凡産婦胞漿未下但當穩守無妨胞漿既破一二時後不生便當服催生藥要緊夫胞漿者本胞內養兒之水也兒既拆胞其水既下胎隨水而下則為易生胎元無力轉頭遲慢漿下即血來閉塞道路令子無路可通故難産也如用蜀葵子等破血之藥逐去惡血使兒得路而生故曰催生藥也一凡催生多用滑利迅速之藥如兔腦筆頭灰胬牙蛇蛻之類是也二凡催生若見水血先下子道乾澀不能下者如豬脂油蜜酒蔥白葵子牛乳榆白皮滑石之類是也三凡催生若稽停勞力之久風冷乘虛入於子官使氣血凝滯而難産者如牛膝蔥桂五積散順元散之類四凡催生有觸犯惡氣心煩躁悶難産者如麝香硃砂乳香青竹茹之類夫産育之難者皆由産婦不會預聞講説生育道理臨事倉惶用力失宜遂有難産之危是故有逆産者則先露足有橫生者則先露手坐産者則先露其臀此皆用力太早之過夫當臍腹疼痛之初兒身才轉而未順用力一逼遂致橫逆若手足先露者用細針刺兒手足心一二分深三四刺之以鹽塗其上輕輕送入兒得痛驚轉一縮即順生之矣或兒腳先下者謂之蹈蓮花生急以鹽塗兒腳底又可急搔之並以鹽摩母腹上則正生矣灸法治難産及胞衣不下急於産母右腳小指尖頭上灸三壯炷如小麥大立産凡橫倒難産用蛇蛻一條全者蠶蛻紙一張上以二物入新瓷瓶中鹽泥固濟燒存性為末煎榆白皮湯入乳香同調服下則順生又方治橫生先露手足阿膠炒滑石一兩冬葵子一合酥油一兩每服四錢水一大盞煎至七分連進二三服又方治橫逆不順子死腹中用伏龍肝灶心紅土也上為細末溫酒調下一二錢甚驗礙産良方凡兒身已順門戶俱正兒已露頂而不能生此因兒身回轉肚帶攀住兒肩不能下也治法急令産母仰臥輕輕推兒向上徐徐引手以中指按兒肩下其臍帶仍須候兒身正順令産母用力一送兒即下生又法令穩婆款款分開臍帶外將紙拈原書此處有脫文凡兒身向未順生路未正被産母用力一逼令兒偏生或左腿或右腿或臀或左右額角雖兒身已逼産門而不能下但云兒已露頂非頂也治法當令産母仰臥看生人輕輕推兒近上以手正其頭用力一逼即下若是頭之後骨偏拄穀道兒則露額當令看生人以綿衣炙令溫暖裹手急於穀道外傍輕輕推兒頭令正然後用力一送兒即下生此名偏産治盤腸産法良方有臨産則子腸先出甚可驚恐治法以盆盛溫水溫潤其腸令産母仰臥且以言語安慰其心卻用好米醋半盞和新汲水七分攪勻忽噀産母面或背則打頓而收每一噀令一縮三噀三縮腸則盡收矣合用參耆歸芎等大劑補藥加升柴防風之類以升舉之未有不安者也又法急以萆麻子去殼研細貼産母囟頂上即收一方治産難數日子死腹中不出母氣欲絶瞿麥六兩通草三兩桂心三兩牛膝四兩榆白皮四兩一方無榆白皮有天花粉四兩大能墮胎上細切用水九升煎取三升去渣分三服頓飲即下又方牛膝丸下死胎杜牛膝三兩紫金藤七錢肉桂二錢當歸四錢蜀葵根七錢麝香半錢上為末米糊為丸如梧桐子大硃砂為衣每服五十丸乳香湯送下又方治子死腹中不出用黃牯牛屎不拘多少塗母腹上立出一云以牛屎炒令大熱入醋半盞以青布包裹於母臍上下尉之立下又治子死腹中用雞子黃一個生薑自然汁一合調勻頓服分娩後用藝臺粥補之生子下血過多子死腹中憎寒手指甲青面色黃黑胎上搶心悶亂欲死冷汗自出喘滿不食或食毒物或誤服草藥傷胎下血不止胎尚未損可安若已死即下極妙牡丹皮赤芍藥桂心桃仁白茯苓上各等分為細末煉蜜為丸如彈子大每服一丸細嚼淡醋湯送下連服數丸立驗一方治胞衣不下川牛膝三錢當歸身尾二錢木通三錢滑石四錢冬葵子二錢半上細切水煎連進二三服即下丹溪活套云凡婦人胎前諸疾只須以四物湯為主治看證加減調治如覺腹中煩悶口苦厭食不問月數多少本方加白朮條芩砂仁煎服如五六個月後胎動不安或逆搶逼心本方加阿膠艾葉砂仁枳殼條芩白朮野苧根入金銀同煎服如氣血虛心煩脈虛大無力或怔忡手戰及時有微熱本方加人參白朮黃芩甘草酸棗仁遠志麥門冬地骨皮等藥如五六個月前無故下血或因事下血謂之漏胎本方加條芩白朮甘草白芷茅根地榆桑寄生之類如七八個月前後面目及四肢浮腫本方加茯苓澤瀉白朮條芩炒梔子厚朴甘草梢麥門冬之類如孕中忽然口噤吐沫不省人事言語錯亂本方合二陳湯加麥門冬竹茹遠志石菖蒲之類如感冒風寒頭痛發熱或身體疼痛本方合小柴胡湯或更加細辛白芷防風羌活等藥如二三個月內嘔吐噁心不納飲食謂之惡阻本方去地黃加陳皮半夏曲砂仁神麯藿香麥芽陳倉米白朮之類或因事動胎致胎不安動撞不已及下血欲墮本方加人參白朮白茯苓條芩白芷桑寄生砂仁阿膠珠甘草等藥或時有白濁白帶本方加白茯苓陳皮蒼朮半夏曲牡蠣龍骨之類如無故腹痛瀉利清水或發熱胎動不安本方加白朮茯苓豬苓澤瀉蒼朮訶子皮砂仁神麯乾薑之類祖傳方治難産瀝漿胞干胎不得下用香油蜂蜜各一碗和勻用銅銚慢火煎一二沸掠去沫調白滑石末一兩重攪勻頓服外以油蜜於母腹臍上下摩之立産又方催生曾試甚驗用兔頭骨家貓頭骨各一個烈火煅地上出火毒研為極細末每服二三錢濃煎芎歸湯調下即産又方治胞衣不下三蛻飲蛇蛻一條全者蠶蛻紙一方蟬蛻四十九個用瓷瓶盛燒存性細研順流水調服立下婦人科下産後論內經曰一息不運則機緘窮一毫不續則穹壤判所謂氣血周流循環無端少有不續則身危矣若夫妊娠之婦子在腹中母子一氣流通全賴漿水滋養十月數足血氣完全形神俱備忽如夢覺自能用手拆胞求路而出既出胞外母子分體呼吸殊息其可久羈於內而使其氣化不運不續哉夫胎元壯健者胞既拆即隨漿而下故易産也其困弱者轉頭遲緩胞漿既干汙血來塞道路凝滯是以橫生逆産子死腹中而産母之命死在須臾可不畏乎凡見將生之際胞漿既下逾時尚未分娩便當仿徨設計用藥逐去惡血使子路通暢而無難産之患豈可袖手以待斃哉是故催生之藥即芎歸益母草冬葵子之類皆使之逐去汙血者也若腰腹未甚痛漿水少淋瀝而下名為試漿實非胞內真漿也且宜寬心守待切不可輕易便令穩婆接取産母用力逼胎太早多致橫逆不順切須謹慎其或先見手足不順者額偏露者但當以手輕輕撥正以待其自下可也若分娩之後胞衣未下者猶為可懼宜多方用藥逐下甚不可令粗率之婦摘取嘗見有擀破尿脬致終身之害者有取下肝葉而産母隨時殞命者可不謹歟若夫難産之婦皆是産前恣欲所致非獨難産且産後諸疾皆由是而生焉或有乍寒乍熱似瘧非瘧或大熱頭疼體痛如傷寒狀或卒中口噤如痓如癇或左癱右瘓角弓反張或妄言見鬼心神惶惑或耳目口鼻忽覺黑氣如煙燻之狀或腹中作痛綿綿不絶以上諸證若非惡露未盡即是勞傷血氣大虛之證丹溪曰凡産前當清熱養血為主産後宜大補氣血為要雖有雜證以末治之此萬世不易之確論也雖然亦有離褥太早或澡浴身垢以致感冒風濕或多啖雞子糍粽難消之物皆能惡寒發熱變證多端醫者宜潛心診察脈候以扶危拯急不可苟且妄治以夭折人之天年也脈法脈經曰新産婦人有三病一者病痓二者病鬱冒三者大便難云云師曰亡津液胃燥故大便難産婦鬱冒其脈微弱嘔不能食大食反堅但頭汗出所以然者血虛而厥厥而必冒冒而欲解必大汗出以血虛下厥孤陽上出故但頭汗出所以産婦喜汗出者亡陰血虛陽氣獨盛故當汗出陰陽乃復所以便堅者嘔不能食也小柴胡湯主之病解能食七八日而更發熱者此為胃熱氣實承氣湯主之婦人産後七八日無太陽證小腹堅痛此為惡露不盡四五日不大便趺陽脈微實再倍其人發熱日晡所煩躁者譫語不能食利之即愈宜承氣湯以熱在裡結在膀胱也按丹溪曰産後宜大補氣血為主雖有雜證以末治之又曰産後不可汗下叔和以仲景治傷寒法用承氣小柴胡等藥欲退産後之熱恐非至到可法之語姑述於此以與賢者共議而採擇之可也丹溪曰産前脈細小産後脈洪數皆死又曰産前脈當洪數既産而洪數如故豈得不死此亦大概言之今見産後豈無脈洪數而生者方法丹溪曰産後當大補氣血為主雖有雜證以末治之産後補虛用參朮黃耆陳皮歸身尾川芎炙甘草如發熱輕則加茯苓淡滲之其熱自除重則加乾薑或云大熱而用乾薑何也曰此熱非有餘之邪熱乃陰虛生內熱耳蓋乾薑能入肺分利肺氣又能入肝分引衆藥生血然必與補陰藥同用之此造化之妙非天下之至神其孰能與於此哉産後發熱惡寒或口服歪斜等證皆是血氣虛甚當以大補氣血為主治左手脈不足補血藥多於補氣藥右手脈不足補氣藥多於補血藥切不可用小續命湯表散之劑産後惡寒發熱腹痛者當去惡血若腹不滿者非惡血也惡露不盡小腹作痛名兒枕痛用五靈脂香附為末醋糊丸甚者加留尖桃仁一云用神麯糊丸白朮陳皮湯下氣虛者四君子湯下治血刺痛用當歸乃和血之法若因積血而刺痛者宜桃仁紅花當歸頭之類血在下焦當用歸尾産後血運用韭葉細切盛於有嘴瓶中以滾醋沃之急封瓶口以瓶嘴納産婦鼻中即蘇或用稱捶及磚石燒紅投醋中熏之亦良法也又方用鹿角一段燒存性出火毒為末酒調灌下即醒血運因氣血俱虛痰火汛上作運二陳導痰隨氣血加減硃砂安神丸亦可服以麥門冬湯下一方治血運人參一兩紫蘇半兩上細切童便酒水三物同煎服以上丹溪方法凡十條清魂散嚴氏治産後血運昏不知人澤蘭葉人參各一兩荊芥穗四兩甘草炙八錢川芎二兩上為細末每服二錢溫酒入童便調下更用漆器燒煙燻之頻置醋炭更服此藥愈風湯丹溪治産後中風口噤牙關緊急手足瘛瘲角弓反張荊芥穗當歸各等分焙乾上為細末每服三錢豆淋酒調下童便亦可豆淋酒用大黑豆不拘多少炒焦投好酒中新産後不可用芍藥以其酸寒能伐發生之氣也丹溪産後乳汁不通用通草七分瞿麥柴胡天花粉各一錢桔梗二錢青皮白芷木通赤芍藥連翹甘草各半錢作一帖水煎食後細細飲之更摩乳房或無子食乳者要消乳用麥糵二兩炒分作四服白湯調下局方産後泄瀉利用陳皮白朮茯苓川芎酒炒芍藥黃芩滑石炙甘草煎服立效一方無甘草有乾薑丹溪按二物皆不可缺凡乳母但覺小水短少即是病生便須服藥調治蓋兒飲母乳母安兒安防患未形治法之善者也丹溪有産婦因收生者不謹損破尿脬而致淋瀝不禁因思肌肉破尚可完補診其脈虛甚蓋難産因氣血虛故産後猶虛試與峻補以參術為君芎歸為臣桃仁陳皮黃耆茯苓為佐以豬羊脬煎湯熬藥汁極飢飲之一月而安蓋氣血驟長其脬即完恐稍遲亦難成功也丹溪黑神散局方治産後惡露不盡或胎衣不下血氣攻衝心腹疼痛及血迷血運等證黑豆炒半升熟地黃當歸酒浸洗肉桂去粗皮乾薑炮甘草炙白芍藥蒲黃各四兩濟生方無蒲黃有附子上為細末每服二錢童便和酒調服人參當歸散産寶治産後去血過多血虛則陰虛陰虛生內熱令人心煩短氣自汗頭痛熟地黃人參當歸身肉桂麥門冬白芍藥炒各一錢上細切作一服入淡竹葉五片生薑三片水煎服當歸黃耆湯産寶治産後失血過多腰痛身熱自汗當歸身三錢黃耆二錢白芍藥一錢半炒上細切作一服水一盞半加生薑三片煎至一盞溫服失笑散治産後心腹㽱痛欲死及兒枕痛蒲黃炒五靈脂各等分上為細末每服二錢熬成膏白湯化下三聖散産寶治兒枕痛當歸肉桂玄胡索各等分上為細末每服二錢熱酒或童便調下抵聖湯産室治産後血氣傷於脾胃腹脅滿悶嘔逆噁心赤芍藥半夏澤蘭葉陳皮人參各二錢甘草炙一錢上細切作一服入生薑三片水煎服之當歸羊肉湯良方治産後發熱自汗肢體疼痛日久不愈名日褥勞當歸身人參各七錢黃耆一兩生薑半兩上細切用羯羊肉一斤煮取清汁五大盞去肉渣入煎藥慢火煮取四盞分六服徐徐飲之茯苓散産寶治産後心虛怔忡不定言語錯亂人參甘草山藥當歸各一錢遠志茯苓桂心麥門冬各半錢上細切作一服加生薑三片大棗一枚水一盞半煎至一盞去渣溫服當歸散産寶治産後氣血俱虛恐增客熱宜服此以去惡露當歸白芍藥川芎黃芩各一兩白朮半兩上為細末每服二錢童便入溫酒調下黃耆湯産寶治産後虛汗不止黃耆二錢白朮防風熟地黃牡蠣粉煅白茯苓麥門冬炙甘草各半錢上細切作一服加大棗一枚水煎服增損四物湯良方治産後陰虛發熱或日間明瞭暮發寒熱當歸川芎生地黃柴胡各等分上細切每服五錢水一盞半煎至一盞溫服四物一黃散良方治産後腹中血塊作痛當歸炒川芎炒熟地黃白芍藥炒各半兩蒲黃炒二錢半上為細末每服二錢空心溫酒調下黑龍丹産寶治産後一切血疼垂死者但灌藥得下無有不安者五靈脂生地黃當歸川芎高良薑各二錢上細切用砂鍋一個盛藥外以赤石脂為細末醋調封縫又以紙筋鹽泥固濟文武火煅過置地上出火毒研細入後藥硫黃一錢半花蕊石另煅一錢乳香另研一錢半琥珀另研一錢上同前藥共為極細末醋糊為丸如彈子大每服一丸用生薑自然汁無灰酒各一合童便半盞合和將藥於炭火上燒紅投入薑酒內研散頓服立效烏金散産寶治産後血速血運敗血不止淋瀝不斷臍腹㽱痛頭目昏眩多汗無力及治崩中下血不止麒麟竭亂髮皂莢水洗淨松墨煅醋淬百草霜當歸去蘆肉桂去粗皮赤芍藥延胡索鯉魚鱗燒存性上各等分為細末每服二錢溫酒調下調經散産寶治産後虛浮蓋敗血乘虛停積腑臟流注肌肉腐壞成水令人面目四肢浮腫切不可用導水泄利之藥是謂重虛其虛多致夭亡此藥主之沒藥一錢另研琥珀一錢另研桂心赤芍藥當歸各一兩細辛半兩射香半錢另研上為細末每服一錢匕薑汁溫酒童便和調服之正脾散産寶治産後通身浮腫及治婦人大病後脾氣虛弱中滿腹脹等病蓬莪朮炮香附子童便侵茴香甘草炙陳皮上各等分為細末每服二錢燈草木通湯下柏子仁散良方治産後譫言妄語皆心血虧欠心神不守所致柏子仁遠志去心人參去蘆桑寄生防風去蘆琥珀另研細當歸熟地黃甘草炙上各等分細切每服五錢先用白羊心一枚切片以水一大盞半先煮至九分去羊心入藥末五錢煎至六分去滓溫服不拘時琥珀散良方治産後瘀血攻心迷悶妄言見鬼琥珀鐵粉各一兩人參茯神生地黃阿膠珠各七錢半硃砂五錢甘草麝香各一錢另研上為細末和勻每服一錢用金銀煎湯調下交感地黃煎丸局方治産後舌強不語眼見黑花或發狂見鬼及胞衣不下心腹脹滿等證生地黃新掘者生薑各二斤各用石臼杵細以布絞去汁留渣以新瓦各炒乾當歸去蘆一兩延胡索一兩炒蒲黃炒香四兩琥珀一兩另研上為細末煉蜜為丸如彈子大每服一丸煎當歸湯化下食前服七珍散局方治産後不語人參石菖蒲川芎熟地黃各一兩細辛一錢防風五錢去蘆上為細末每服一錢匕薄荷湯調下不拘時服調中湯局方治産後瀉利臍腹㽱痛六脈沉細高良薑當歸桂心白芍藥附子炮去皮臍川芎各一錢甘草炙半錢上細切作一服加生薑五片水一盞半煎至一盞溫服定痛散局方治産後惡血不盡腹中作痛當歸芍藥各二錢肉桂一錢上細切作一服酒水合一盞半生薑五片煎至一盞服麻仁丸局方治産後大便祕結麻仁去殼枳殼人參大黃當歸各等分上為細末煉蜜為丸如梧桐子大每服二十丸白湯下未通漸加丸數以便潤為度羊肉湯局方治産後腹中虛痛氣血不足羸弱力倦及寒月中生産寒氣入於産門臍下脹滿手不可犯此寒疝也此藥主之此方乃張仲景之方曾試極驗精羯羊肉四兩當歸二兩生薑一兩陳皮二兩上細切水三碗酒一盞煎至一碗去渣分二服加蔥鹽亦可滋腸五仁丸局方治産後血氣虛損大腸閉澀傳道艱難杏仁去皮尖麩炒桃仁如上制各一兩柏子仁半兩松子仁二錢半郁李仁一錢麩炒橘紅四兩別研為末上五仁另研為膏合橘皮末和勻再研煉蜜丸如梧桐子大每服三十丸加至五六十丸食前清米飲下一方加當歸梢五錢固經丸局方治産後血氣未復而有房事及勞役損傷致血暴崩或淋瀝不止沒藥赤石脂補骨脂木賊各半兩附子一隻炮去皮臍上為細末米糊為丸如梧桐子大每服二十丸溫酒下或陳米飲下熟乾地黃散局方治證同前亦治婦人一切崩中下血不止頭目沉重熟地黃一錢半甘草一分半蒲黃炒黑色半錢蟹爪微炒一錢白茯苓半錢桂心二分半阿膠一錢炒得鹿角膠尤妙白芍藥半錢伏龍肝七分半昆布男子裩襠也一錢燒存性當歸一錢上細切作一服入竹茹一錢用水二盞煎至一盞溫服拒勝湯局方治産後腹脹滿悶嘔吐不定蓋敗血入於脾胃而脾不能運化故胃不能納穀以致嘔吐腹脹等證赤芍藥半夏炮七次澤蘭葉人參去蘆陳皮去白各一錢甘草炙一分上細切作一服加生薑三片水一盞半煎至一盞溫服八味理中丸局方治新産血氣俱傷臟腑暴虛體弱多汗一百日內常服壯氣補虛止嘔吐人參去蘆一兩甘草炙一兩半乾薑炮一兩白朮二兩砂仁一兩白茯苓一兩麥糵面炒神麯炒各一兩上為細末米糊為丸如梧桐子大每服三十丸食前薑湯下有痰者宜加半夏曲旋覆花湯産寶治産後感冒風寒咳嗽喘急痰涎壅塞坐臥不能前胡麻黃去節杏仁去皮尖炒研五味子茯苓甘草炙旋覆花半夏曲荊芥穗赤芍藥各半錢上細切作一服加生薑三片大棗一枚水一盞半煎至一盞去渣溫服四神散産寶治産後留血不消積聚作塊急切疼痛下利不止當歸去蘆乾薑炮川芎赤芍藥各半分上為細末每服三錢溫酒調下當歸養血丸産寶治産後惡血不散發熱腹痛及惡露不盡臍腹堅脹兼治婦人室女經候不調赤白帶下腹脅疼痛當歸去蘆赤芍藥各四兩牡丹皮桂心炒延胡索炒各二兩上為細末煉蜜丸如梧桐子大每服三十丸或酒或米湯任下豬腎子飲産寶治産後蓐勞寒熱如瘧咳嗽頭疼自汗體瘦腹中㽱痛豬腰子一對切作四片當歸白芍藥各一兩上以當歸芍藥二味細切用水三碗煮至二碗去渣將腰子切碎如骰子狀入前藥汁內用晚粳米一合香豉一兩蔥白五七根同煮糜爛空腹食之日進一服當歸黃耆飲産寶治産後陰脫謂陰戶中宮脫下也當歸白芍藥黃耆人參各二錢升麻半錢上細切作一服水煎溫服未收再服當歸散産寶治婦人陰脫又名疝㿗當歸黃芩白芍藥各一兩蝟皮半兩燒存性牡蠣煅二兩上為細末溫酒或米湯調下忌登高舉重桃仁膏産寶治産後陰疼煩悶桃仁五味子枯礬為末研桃仁膏拌敷硫黃湯産寶治産後玉門不斂硫黃四兩吳茱萸菟絲子各一兩半蛇床子一兩上細切每服四錢水一碗煎湯頻洗之自斂婦人乳汁不通有二種有血氣壅盛乳脈滯而不行者有血氣虛弱乳汁絶少者夫虛者補之用鍾乳粉豬蹄鯽魚之類盛者行之用通草漏蘆土瓜根之類方見於後産寶漏蘆湯産寶治婦人肥盛氣脈壅滯乳汁不通或留結為壅腫痛將欲成膿者漏蘆二兩半蛇蛻炙一條土瓜根十根切片炒焦按土瓜當作王瓜禮記月令四月王瓜生即此物也其實如栝蔞而小如荔枝色黃藤蔓葉圓無缺者是上為末每服二錢酒調下仍吃熱羹湯助之鍾乳散産寶治婦人氣虛血少脈澀不行乳汁絶少鍾乳粉細研每服二錢濃煎漏蘆湯調下母豬蹄湯局方治乳汁不通母豬蹄一隻通草四兩用水一斗煮取四五升取汁飲之未下更作一料服之丹溪活套云新産不可用芍藥以其酸寒能伐發生之氣十日之內忌之只以黃耆四物湯為補虛之要藥以黃耆易芍藥是也如氣虛者本方加參朮茯苓甘草發熱者加乾薑自汗多者少用川芎勿用茯苓倍蜜炙黃耆如口渴加五味子麥門冬如腹痛者非芍藥不可雖新産亦用但以酒炒不妨如惡露不盡作痛四物湯煎調香附五靈脂末服甚者加桃仁泥四五分新産子宮未斂作痛名兒枕痛又名瘕母塊痛用醋炒芍藥粟殼甘草水煎入少米醋或以三物為末醋湯調服酸以收之之義也産後有惡血不去發寒熱成癥瘕者四物湯加三稜蓬朮乳香沒藥香附五靈脂乾漆桃仁紅籃花之類産後腹痛不息宜四物湯加烏藥香附桂心高良薑陳皮童便和醋煎服甚效産後月餘經血淋瀝不止四物加白芷升麻調血餘灰産後陰痛四物加藁本防風産後通身浮腫四物加乳香沒藥桂心木通大腹皮高良薑血竭檳榔海金沙産後子腸不收八物湯加升麻防風須以酒炒黃耆為君産後中風口眼歪斜八物加附子荊芥少加防風羌活煎服
