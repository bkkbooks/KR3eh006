body:
  text: 卷之四眩運論內經曰諸風掉眩皆屬肝木又曰歲木太過風氣流行脾土受邪民病飧泄食減甚則忽忽善怒眩冒巔疾雖為氣化之所使然未必不由氣體之虛衰耳其為氣虛肥白之人濕痰滯於上陰火起於下是以痰挾虛火上衝頭目正氣不能勝敵故忽然眼黑生花若坐舟車而旋運也甚而至於卒倒無所知者有之丹溪所謂無痰不能作眩者正謂此也若夫黑瘦之人軀體薄弱真水虧缺或勞役過度相火上炎亦有時時眩運何濕痰之有哉大抵人肥白而作眩者治宜清痰降火為先而兼補氣之藥人黑瘦而作眩者治宜滋陰降火為要而帶抑肝之劑抑考內經有曰風勝則地動風木太過之歲亦有因其氣化而為外感風邪而眩者治法宜祛風順氣伐肝降火為良策焉外有因嘔血而眩冒者胸中有死血迷閉心竅而然是宜行血清心自安醫者宜各類推而治之無有不痊者也脈法左手脈數熱多脈澀而芤有死血右手脈實有痰積脈虛大必是久病左手人迎脈緩而浮大者屬風方法丹溪曰痰在上火在下火炎上而動其痰也此證屬痰者多蓋無痰不能作眩也雖有因風者亦必有痰又曰火動其痰二陳湯加黃芩蒼朮羌活挾氣虛者亦以治痰為主兼補氣降火藥去血過多而眩運者芎歸湯眩運不可當者以大黃酒炒為末茶清調下急則治其標也以上丹溪方法凡三條防風通聖散河間治風熱眩運方見中風門半夏白朮天麻湯東垣治風痰眩運方見頭痛門加味六君子湯丹溪治氣虛痰盛兼挾風邪眩運不休者陳皮去白一錢半夏湯泡透一錢五分茯苓一錢甘草炙五分荊芥穗五分上細切作一服加生薑三片大棗二枚水二盞煎至一盞去渣入竹瀝一大匙溫服六合湯良方治風虛眩運四物湯加秦艽羌活為佐水煎服之玉液湯嚴氏方治七情感動氣鬱生涎隨氣上衝頭目眩運心嘈忪悸眉梭骨痛大半夏湯泡七次去皮臍上以一味薄切成片每服四錢加生薑十片煎入沉香磨水一呷服大效芎術湯嚴氏方治冒雨中濕眩運嘔逆頭痛不食等證川芎半夏泡透白朮各一錢二分甘草炙六分上細切作一服加生薑七片水一盞半煎至一盞溫服川芎散本事方治風眩運山茱萸一兩去核山藥甘菊花人參茯神小芎藭各五錢上為細末每服二錢溫酒調下丹溪活套云眩運者中風之漸也如肥白人氣虛而挾痰者四君子湯倍蜜炙黃耆加半夏橘紅或少加川芎荊芥穗以清利頭目也如痰盛而挾氣虛者二陳湯加人參白朮黃耆或少加炮附子煎入竹瀝薑汁服如體瘦血虛而痰火兼盛者二陳湯合四物加片芩薄荷煎入竹瀝薑汁童便服如諸般眩運挾風則加防風荊芥天麻秦艽等藥挾熱加片芩黃連梔子之類挾寒加乾薑官桂附子之屬無有不安者也頭痛論內經曰新沐中風則為首風又曰首風之狀頭面多汗惡風當先風一曰則病甚頭痛不可以出內至其風曰則病少愈東垣曰金匱真言論曰東風生於春病在肝腧在頸項故春氣者病在頭又諸陽會於頭面如足太陽之脈病沖頭痛足少陽之脈病頭角頷痛夫風從上受之風寒傷上邪從外入客於經絡令人振寒頭痛身重惡寒治在風池風府調其陰陽不足則補有餘則瀉汗之則愈此傷寒頭痛也頭痛耳鳴九竅不利者腸胃之所生乃氣虛頭痛也心煩頭痛者病在膈中過在手巨陽少陰乃濕熱頭痛也如氣上不下頭痛癲疾者下虛上實也過在足少陰巨陽甚則入腎寒濕頭痛也如頭半寒痛者先取手少陽陽明後取足少陽陽明此偏頭痛也有真頭痛者甚則腦盡痛手足寒至節者死不治有厥逆頭痛者所犯大寒內至骨髓髓者以腦為主腦逆故令頭痛齒亦痛也凡頭痛皆以風藥治之者總其大體而言之也高巔之上惟風可到故味之薄者陰中之陽乃自地升天者也然亦有三陰三陽之異故太陽頭痛惡風脈浮緊川芎羌活獨活麻黃之類為主少陽經頭痛脈弦細往來寒熱柴胡為主陽明頭痛自汗發熱惡寒脈浮緩長實者升麻葛根石膏白芷為主太陰頭痛必有痰體重或腹痛為痰癖其脈沉緩蒼朮半夏南星為主少陰經頭痛三陰三陽經不流行而足寒氣逆為寒厥其脈沉細麻黃細辛附子為主厥陰頭頂痛或吐涎沫厥冷其脈浮緩吳茱萸湯主之血虛頭痛川歸川芎為主氣虛頭痛人參黃耆為主氣血俱虛頭痛調中益氣湯少加川芎蔓荊子細辛其效如神白朮半夏天麻湯治痰厥頭痛藥也清空膏乃風濕熱頭痛藥也羌活附子湯治厥逆頭痛藥也如濕氣在頭者以苦藥吐之不可執方而治先師嘗病頭痛發時面頰青黃暈眩目不欲開懶言身體沉重兀兀欲吐潔古曰此厥陰太陰合病名曰風痰頭痛以局方玉壺丸治之更灸俠溪穴即愈是知方者體也法者用也徒執體而不知用者弊體用不失可謂上工矣學者其可執一而不知變乎脈法內經曰寸口脈中手短者頭痛也脈經曰陽弦則頭痛又曰寸口脈浮中風發熱頭痛脈緊頭痛是傷寒邪脈緊上寸口者傷風頭痛脈訣云頭痛短澀應須死浮滑風痰皆易除方法丹溪曰頭痛多主於痰痛甚者火多宜清痰降火勞役下虛之人似傷寒發熱汗出兩太陽穴痛甚此相火自下衝上宜補中益氣湯加川芎當歸甚者加知母蔓荊子細辛諸經氣滯亦作頭痛宜分經理氣治之偏頭風在右屬痰屬熱痰用蒼朮半夏熱用酒製片黃芩在左屬風及血虛風用荊芥薄荷或云荊芥薄荷是頭痛要藥宜詳證加用血虛用芎歸芍藥酒黃柏諸家不分所屬故藥多不效少陽偏頭痛者多大便祕或可下之一方治風濕熱頭痛神效片芩一兩酒製炒蒼朮羌活防風各五錢蒼耳子三錢細辛二錢上為細末以生薑一片擂細和藥末三錢搗勻茶清調下一方有生甘草酒連川芎炒半夏曲無防風細辛一方治少年強壯人氣實有痰或頭暈而重痛立效大黃酒拌炒乾再拌三次上為細末茶清調下三錢立效一方治眉梭骨痛屬風熱與痰白芷片芩酒製炒上各等分為細末每服二錢茶清調下選奇湯局方治眉骨痛不可忍神效羌活防風各三錢甘草一錢夏生冬炒酒片芩一錢半冬不用熱甚者冬亦炒用上細切作一服水一盞半煎至一盞食後服又方局方因風寒眉骨痛不止者川烏草烏各一錢以上二味俱用童便浸二宿炒用細辛羌活片芩酒拌炒甘草炙各五分上為細末分二服茶清調下清空膏東垣治偏正頭痛年深久不愈者善療風濕熱頭痛上壅頭目及腦痛不止者除血虛頭痛不治川芎五錢柴胡七錢黃連酒炒防風去蘆羌活各一兩甘草炙一兩五錢片黃芩三兩切片酒拌濕一半炒一半曬乾上為細末每服二錢熱盞內入茶清少許湯調如膏臨臥抹口內少用白湯送下如苦頭痛每服加細辛二分如太陰脈緩有痰名痰厥頭痛減羌活防風川芎甘草加半夏曲一兩五錢如偏正頭痛服之不愈減羌活防風川芎一半加柴胡一倍如發熱惡熱而渴此陽明頭痛只服白虎湯加香白芷立愈半夏白朮天麻湯東垣治痰厥頭痛眼黑頭旋噁心煩悶氣促上喘無力以言心神顛倒目不敢開如在風雲中頭苦痛如裂身重如山四肢厥冷不得安臥黃柏一分半乾薑二分澤瀉白茯苓天麻黃耆人參蒼朮各三分半神麯炒白朮各五分麥糵面半夏湯泡去皮臍橘紅各七分半上細切共作一服水二盞加生薑三片煎至一盞去渣稍熱服食前可一服而愈此頭痛苦甚謂之足太陰痰厥頭痛非半夏不能除眼黑頭旋風虛內作非天麻不能療黃耆甘溫瀉火補氣實表止汗人參甘溫瀉火補中益氣二術俱苦甘溫除濕補中澤瀉茯苓利小便導濕橘皮苦溫益氣調中神麯消食蕩胃中滯氣大麥糵寬中助脾乾薑辛熱以滌中寒黃柏苦寒酒洗以療冬天少火在泉發躁也安神湯東垣治頭痛頭旋眼黑生甘草炙甘草各二分柴胡升麻生地黃酒浸洗各五分防風二分半知母酒浸炒五分黃柏酒拌炒羌活各一錢黃耆一錢五分上細切作一服水二盞煎至一盞半加蔓荊子五分川芎三分再煎至一盞去渣臨臥稍熱服徹清膏東垣蔓荊子細辛各一錢薄荷葉川芎各三錢生甘草炙甘草各五錢藁本一兩上為細末每服二錢食後茶清調下川芎散東垣治頭目不清利川芎五錢柴胡七錢羌活防風藁本生甘草升麻各一兩炙甘草生地黃各一兩半酒黃蓮炒酒片芩各三兩上為細末每服二錢食後茶清調下白芷散一名鬱金散東垣治諸熱苦頭痛鬱金一錢白芷石膏各二錢雄黃芒硝薄荷葉各三錢上為細末口含水鼻內搐之羌活清空膏東垣蔓荊子一錢黃連三錢羌活防風甘草各四錢片芩一兩上為細末每服一錢茶清調下食後或臨臥服清上瀉火湯東垣昔有人年少時氣弱常於氣海三里穴節次灸之至年老成熱厥頭痛雖冬天大寒猶喜寒風風吹之頭痛即愈略來暖處或見煙火其痛夏作此灸之過也荊芥穗川芎各二分蔓荊子當歸身蒼朮各三分酒黃連生地黃藁本各四分生甘草二分升麻防風各三分半酒黃柏炙甘草黃耆各五分酒黃芩酒知母各七分羌活八分柴胡一錢細辛三分酒紅花少許上細切作一服水二盞煎至一盞去渣食後稍熱服細辛散東垣治偏正頭痛細辛瓦松各二分生黃芩芍藥各三分半酒黃連川芎各五分黃芩酒炒甘草炙各八分柴胡去蘆一錢上細切作一服水一盞半煎至一盞食後服羌活湯東垣治風熱壅盛上攻頭目昏眩甘草炙一分半澤瀉三分酒栝蔞根白茯苓酒黃柏各四分柴胡五分防風酒黃芩酒黃連羌活各六分上細切作一服水二盞煎至一盞食後或臨臥服一粒金東垣治偏頭風蓽茇一兩半以豬膽汁拌勻入膽內懸掛陰乾用玄胡索青黛白芷川芎各一兩上為細末無根水為丸每用一丸以無根水化開搐鼻內外以銅錢二三文咬口內出涎羌活附子湯東垣治客寒犯腦痛及齒亦痛名曰腦風麻黃不去節附子炮防風白芷殭蠶黃柏各七分羌活蒼朮各五分升麻二分黃耆三分甘草二分佛耳草三分無嗽不用上細切作一服水二盞煎至一盞去渣溫服麻黃附子細辛湯仲景方治三陰三陽經不流行而足寒氣逆為寒厥頭痛其脈沉細麻黃細辛各六錢附子一個去皮臍生用上細切水三升三合先煮麻黃令沸減七合掠去上沫納諸藥煎取一升去渣分三服吳茱萸湯活人治厥陰頭項強痛或吐痰沫厥冷其脈浮緩吳茱萸熱水泡三五次生薑各五錢人參二錢五分上細切作一服水二盞大棗一枚煎至一盞去渣溫服加味調中益氣湯東垣治氣血俱虛頭痛其效如神陳皮黃柏酒炒各三分升麻去粗皮柴胡去蘆各四分人參甘草炙蒼朮各六分米泔浸黃耆一錢川芎六分蔓荊子三分杵去皮細辛二分上細切作一服水二盞煎至一盞去渣溫服一方有木香二分無黃柏如大便虛坐不得或了而不了腹中逼迫此血虛血澀也加當歸身五分愚按東垣謂此方治氣血俱虛頭痛本方加當歸一味雖無以上證亦恐不可缺也玉壺丸局方治風濕頭痛亦治痰患雄黃一錢研飛南星煨裂半夏湯泡七次去皮臍天麻酒浸白朮各二錢去蘆上為細末薑汁浸蒸餅為丸每服二十丸薑湯下川芎茶調散局方治諸風上攻頭目昏痛鼻塞聲重薄荷四兩去梗用葉荊芥穗川芎各二兩羌活白芷甘草各一兩炙細辛五錢防風二錢五分上為細末每服二錢食後茶清調下醫壘元戎治三陽頭痛方羅太無方羌活防風荊芥穗升麻去黑皮及內朽葛根去粗皮白芷石膏火煅柴胡去蘆川芎芍藥酒炒細辛蔥白連須者上各等分細切五錢水二盞煎至一盞溫服如聖餅子河間治風寒伏留陰經痰飲氣厥頭痛防風天麻各五錢南星乾薑川芎甘草各一兩半夏五錢川烏去皮臍火炮一兩上為細末蒸餅糊調捻作餅子如錢樣每用五餅同荊芥末細嚼茶清送下川芎神功散寶鑑治風熱上攻頭目令人偏正頭痛川芎川烏如上同製法白芷南星炮麻黃各一錢去節甘草五分炙上細切作一服加生薑三片大棗一枚水一盞半煎至一盞去渣食後溫服芎辛散三因治傷風寒生冷及氣虛痰厥頭痛如破兼眩運嘔吐附子去皮臍生用烏頭去皮生用南星乾薑甘草炙川芎細辛各一錢上細切作一服加生薑五片茶芽少許水二盞煎至一盞去渣溫服小芎辛湯嚴氏治風寒在腦或感邪濕頭重而疼眩運嘔吐川芎二錢細辛白朮各一錢甘草五分上細切作一服加生薑五片茶芽少許水煎服石膏散寶鑑治陽明經頭痛大效川芎石膏白芷各等分上為細末每服四錢茶清調下三生丸嚴氏治痰厥頭痛半夏白附子南星各等分上為細末生薑自然汁浸蒸餅為丸如緑豆大每服四五十丸食後薑湯送下茯苓半夏湯治風熱痰逆嘔吐頭痛半夏二錢赤茯苓一錢片黃芩甘草橘紅各五分上細切作一服加生薑三片水一盞半煎至一盞溫服祖傳方治頭風熱痛不可忍者小川芎一兩白芷五錢細茶芽三錢荊芥穗四錢片黃芩二兩酒拌濕炒再拌再炒如此三次不可令焦薄荷葉二錢五分上為細末每服二錢白湯或茶清調下又經驗敷貼頭風熱痛朴硝大黃各等分上為細末用深井底泥和捏作餅子貼兩太陽穴神驗丹溪活套云凡治頭風必以二陳湯加川芎白芷為主如太陽經頭痛加羌活少陽經加柴胡黃芩陽明經加石膏白芷太陰經加蒼朮少陰經加細辛厥陰經加吳茱萸如肥人頭痛必是濕痰加半夏蒼白朮如瘦人頭痛是熱上壅多加酒洗片黃芩如因感冒而頭痛者宜加防風羌活藁本升麻柴胡葛根之類如氣虛而頭痛者宜加黃耆人參東垣安神湯之類如風熱在上而頭痛者加天麻蔓荊子臺芎酒片芩之類如苦頭痛者宜用細辛如形瘦色弊而頭痛者是血虛宜用歸芎芍藥酒黃柏之類如頂巔痛者宜藁本酒炒升柴胃脘痛俗呼為心痛論內經曰木鬱之發民病胃脘當心而痛上肢兩脅痛膈噎不通食飲不下蓋木氣被郁發則太過故民病有土敗木賊之候也夫胃為脾之腑陽先於陰故臟未病而腑先病也甚而至於脅下如刀劙之痛者已連及於臟矣古方名為脾疼者是也胃之上口名曰賁門賁門與心相連故經所謂胃脘當心而痛今俗呼為心痛者未達此又耳雖曰運氣之勝復未有不由清痰食積鬱於中七情九氣觸於內之所致焉是以清陽不升濁陰不降而肝木之邪得以乘機侵侮而為病矣更原厥初致病之由多因縱恣口腹喜好辛酸恣飲熱酒煎煿復餐寒涼生冷朝傷暮損日積月深自郁成積自積成痰痰火煎熬血亦妄行痰血相雜妨礙升降故胃脘疼痛吞酸噯氣嘈雜噁心皆噎膈反胃之漸者也俗醫不究其源例以辛香燥熱之劑治之以火濟火遂成危劇良可痛哉古方九種心痛曰飲曰食曰風曰冷曰熱曰悸曰蟲曰疰曰來去痛夫所謂冷者惟一耳豈可例以熱藥治之乎詳其所由皆在胃脘而實不在於心也有真心痛者大寒觸犯心君又曰汙血衝心手足青過節者旦發夕死夕發旦死醫者宜區別諸證而治之無有不安之理也脈法脈經曰陽微陰弦則胸痹而痛責其虛也今陽虛知在上焦所以胸痹心痛者以其脈陰弦故也胸痹之病喘息咳唾胸痹痛短氣寸口脈沉而遲關上小緊而數心脈微急為痛微大為心痹引背痛脈短而數者心痛澀者心痛脈浮大弦長者死方法丹溪曰心痛即胃脘痛須分久新若明知身犯寒氣口得寒物而病於初得之時當用溫散溫利之藥若病久則成郁矣鬱則成熱原病式中備言之矣若欲行溫散溫利寧無助火添病耶由是古方多用山梔子為君熱藥為之響導則邪易伏病易退病安之後若縱恣不改前非病必再作難治矣此病雖日久不食不死又曰中宮有食積與痰而生病者胃氣亦賴所養卒不便虛雖日數多不食不死若痛方止即吃物病必復作勿歸咎於醫也必須再服三五服藥後以漸而少食方可獲全安心膈大痛攻走腰背發厥嘔吐諸藥不效者就吐中以鵝翎探之出痰積碗許而痛即止脈堅實不大便者下之亦可一方用黃荊子炒焦為末米飲調服一云上可治心痛下可治白濁又方用藍葉擂細取汁合薑汁服又方用青黛以薑汁入湯調服又方用海粉佐以香附末以川芎山梔子煎湯入薑汁調服又方無藥處以鹽置刀頭燒紅淬入水中乘熱飲之吐痰而愈此法治絞腸痧大痛幾死者立效又方治心痛輕者以麻黃桂枝之類散之或以韭汁開提之重者加石𨢑又方痛甚者脈必伏宜溫藥附子之類不可用人參白朮蓋諸痛不可補氣故也又方治氣實者用牡蠣粉一二錢溫酒調下又方治濕痰作痛用白螺螄殼去泥沙火煅為細末每服方寸匕溫酒調下立止又方以物輕按而痛定者屬虛以二陳湯加炒乾薑末和之而愈又方山梔大者七枚或九枚炒焦黃用水一盞煎七分入生薑自然汁二三匙令辣熱飲之立止又方山梔子劫止之後復發者前藥必不效用玄明粉一錢匕白湯送下立止又方治平日喜好熱物致死血流於胃口而作痛者以桃仁承氣湯下之安又方治死血作痛證用玄胡索一兩半桂心紅花滑石紅曲各五錢桃仁三十個蒸餅丸服效又方治蟲痛者必面上有白斑唇紅能食時作時止用二陳湯加苦楝根煎服又方治痰積胃脘作痛白螺殼丸白螺螄殼火煅滑石炒山梔子香附童便浸南星煨裂各一兩枳殼麩炒黃色青皮木香半夏砂仁各五錢莪朮一兩上為末春加川芎夏加黃連秋冬加吳茱萸用生薑汁浸蒸餅為丸如緑豆大每服五十丸薑湯下黃連六一湯治多食煎炒或燒餅米胖等物致熱鬱胃口而痛者甚效方見嘔吐門連附六一湯治胃脘痛甚諸藥不效者寒因熱用方也黃連六錢附子炮去皮臍一錢上細切作一服加生薑三片大棗一枚水一盞半煎至一盞去渣稍熱服以上丹溪方法凡二十一條草豆蔻丸東垣治客寒犯胃作痛或因濕熱鬱結作痛亦可劫而止之又治氣弱心痛亦妙草豆蔻一兩裹煨橘紅吳茱萸湯泡焙乾人參白殭蠶黃耆益智仁各八錢生甘草炙甘草當歸身青皮各六錢澤瀉小便多者減半半夏各一兩桃仁去皮尖七十個麥糵面一兩半炒神麯炒微黃柴胡脅不痛減半薑黃各四錢上為細末桃仁另研如泥入諸藥中和勻再研湯浸蒸餅為丸如梧桐子大每服三十丸白湯送下食遠麻黃豆蔻丸東垣治客寒犯胃心頭大痛不可忍木香青皮紅花厚朴薑製各二錢蘇木三分蓽澄茄四分升麻半夏湯泡七次麥糵面砂仁黃耆白朮陳皮去白柴胡炙甘草吳茱萸當歸身各五分益智仁六分神麯炒一錢麻黃不去節二錢上為細末湯浸蒸餅為丸如梧桐子大每服五十丸白湯下或細嚼白湯送下亦可木香化滯湯東垣治因憂食濕面結於胃脘腹皮抵痛心下硬微滿不思飲食食之不散常常痞氣不安方見痞滿門倉卒散三因治氣自腰腹間攻心痛不可忍腹中冰冷自汗如洗手足攣急厥冷山梔子大者四十九枚連皮捶碎炒焦附子一枚炮去皮臍上為末每服二錢酒一盞煎八分溫服金鈴子散河間治熱厥心痛金鈴子玄胡索各一兩上為細末每服二錢溫酒調下白湯亦可神聖代針散河間治心腹諸痛乳香沒藥當歸白芷川芎各五錢芫蜻一兩去翅足炒上為細末每服一分病甚者五分先點好茶一盞次摻藥末在茶上不得吹攪立地細細呷之心痛欲死者服之立效小腸氣搐如角弓膀胱腫硬一切氣刺虛痛並婦人血癖血迷血運血刺痛衝心胎衣不下難産但是一切因血作痛之疾服之大有神效朮附湯活人治寒厥暴痛脈微氣弱附子泡五分白朮二錢甘草一錢炙上細切作一服水一盞半入生薑五片大棗二枚煎至一盞去渣溫服此藥又治風濕相搏身重煩疼不能轉側不嘔不喝大便堅實小便自利及風虛頭目眩運不知食味暖飢補中助陽氣止有汗之聖藥也丹溪活套云草豆蔻一味性溫能散滯氣利膈上痰若胃脘果因寒而作痛用之如鼓應桴若濕痰鬱結成痛者服之多效若因熱鬱而痛者理固不當用此但宜以涼藥監製如芩連梔子之屬其功尤速東垣草豆蔻丸寒熱心痛俱獲奇功但因熱者不可多服久服恐有積溫成熱之患耳若久病鬱熱已膠固者斷不可用此味也胃中若有流飲清痰作痛腹中漉漉有聲及手足寒痛或腰膝脊脅抽掣作痛者用小胃丹或三花神祐丸或控涎丹漸漸服之能徹去病根即止祖傳方加味枳朮丸治清痰食積酒積茶積肉積在胃脘當心而痛及痞滿噁心嘈雜噯氣吞酸嘔吐脾疼等證其效如神白朮三兩枳實麩炒黃色蒼朮米泔浸二宿焙豬苓去黑皮麥糵面炒黃色神麯微炒黃色半夏湯泡透各一兩澤瀉去毛赤茯苓去皮川芎黃連陳壁土炒去土白螺螄殼煅各七錢縮砂仁草豆蔻黃芩陳壁土同炒青皮去白萊蔔子炒乾生薑各五錢陳皮去白香附米童便浸栝蔞子厚朴薑汁製炒檳榔各三錢木香甘草各二錢吞酸加吳茱萸湯泡寒月五錢熱月二錢半久病挾虛加人參白扁豆石蓮肉各五錢時常口吐清水加炒滑石一兩煅牡蠣五錢上為細末用青荷葉泡湯浸晚粳米研粉作糊為丸如梧桐子大每服七十丸多至一百丸清米飲送下醫案一男子年三十五胃脘作痛久矣人形黃瘦食少而胸中常若食飽來求治與加味枳朮丸服不效而日漸大痛叫號聲聞四鄰別父母妻子囑付後事欲自殺豫以桃仁承氣湯作大劑與之連二服大下瘀血四五碗許困倦不能言語者三日教以稀粥少食漸漸將理病全安復壯如舊腹痛論內經曰寒氣入經而稽遲泣與澀通而不行客於脈外則血少客於脈中則氣不通故卒然而痛云云按內經舉痛論言寒邪外客而為痛者甚為詳悉但未能盡述學者自宜檢閲外有因虛因實因傷寒因痰火因食積因死血者種種不同亦當表而出之庶使學者易為參考焉東垣曰腹中諸痛皆由勞役過甚飲食失節中氣不足寒邪乘虛而客入之故卒然而作大痛經云得炅則止此事難知集論曰傷寒中脘痛太陰也理中湯黃耆建中湯之類臍腹痛者少陰也四逆湯真武湯附子湯之類小腹痛厥陰也重則正陽散回陽丹輕則當歸四逆湯之類太陰連少陰痛甚者當變為下利不止若夫雜病腹痛四物苦楝湯酒煮當歸丸之類夏月腹痛肌熱惡熱脈洪數屬手太陰足陽明黃芩芍藥湯主之秋月腹痛肌寒惡寒脈沉疾屬足太陰足少陰桂枝芍藥湯主之四時腹痛芍藥甘草湯主之原病式曰熱鬱於內則腹滿堅結而痛不可例言為寒也成無己曰陰寒為邪者則腹滿而吐食不下自利益甚腹㽲痛太陰證也發汗不解醫反下之因而腹滿時痛者屬太陽也桂枝加芍藥湯主之大實而痛者桂枝加大黃湯主之又曰邪氣聚於下焦則津液不得宣通血氣不得流行或溺或血流滯於下而生脹滿硬痛也若從心下至小腹皆硬滿而痛者是邪實也須以大陷胸湯下之若但小腹硬滿而痛小便利者則是蓄血之證小便不利者則為溺澀之證也其有血虛瘦弱之人津液枯涸傳送失常鬱火燥熱煎成結糞滯於大小腸之間阻氣不運而作痛者宜以枳實導滯丸備急大黃丸之類先通其滯止其痛然後用四物等生血潤燥之劑以治其本外有卒然心腹大痛欲吐不得吐欲瀉不得瀉唇青厥逆死在須臾此內因食積外感寒邪是名乾霍亂之候也宜急以鹽湯灌之而以鵝翎探吐取涎而愈若夫清痰留滯於胸腹之間食積鬱結於腸胃之內皆能令人腹痛清痰作痛者控涎丹小胃丹之類食積為患者保和丸枳朮丸之類消之枳實導滯丸木香檳榔丸之類下之濁氣在上者湧之清氣在下者提之寒者溫之熱者清之虛者補之實者瀉之結者散之留者行之此治法之大要也學者詳之脈法脈經曰脈細小緊急病速進在中腹中刺病陰弦則腹痛弦急小腹痛尺脈緊臍下痛尺脈伏小腹痛症疝尺脈實小腹痛當利之心腹痛不得息脈細小遲者生脈堅大疾者死腹痛脈反浮大而長者死方法丹溪曰腹痛有寒有積熱有食積有痰有死血脈弦者多屬食宜溫散之蓋食得寒則滯得熱則行更宜以行氣或利藥助之無不愈者脈滑者是痰痰因氣滯而聚阻礙道路氣不得宣通而痛宜導痰解鬱凡痛必用溫散以其鬱結不行阻氣不運故也臍下忽大痛人中黑色者多死腹中水鳴乃火擊動其水也戴氏曰痛甚便欲大便去後則痛減者是食積也綿綿痛而無增減者是寒也時痛時止者是熱也其痛有常處而不移動者是死血也痛而小便不利者痰也治腹痛用臺芎蒼朮香附白芷為末薑汁入湯調服白芍藥止能治血虛腹痛余俱不治以其酸寒收斂而別無溫散之功者也如飲食過傷而腹痛者宜木香檳榔丸下之如氣虛之人傷飲食而腹痛宜調補胃氣並消導藥用人參白朮山楂神麯枳實麥芽木香砂仁之類如腹中常有熱而痛此為積熱宜調胃承氣湯下之小腹實痛用青皮以行其氣小腹因寒而痛宜肉桂吳茱萸因寒氣作痛者宜小建中湯加乾薑官桂臺芎蒼朮白芷香附因熱而痛者二陳湯加黃耆黃連梔子痛甚者加炒乾姜從治之若腹痛不禁下者宜川芎蒼朮湯以治之川芎蒼朮香附白芷茯苓滑石加姜水煎服以上丹溪方法凡十五條高良薑湯東垣治因寒心腹大痛高良薑三錢厚朴薑製官桂各一錢上細切作一服水一盞半煎至一盞去渣稍熱服草豆蔻湯東垣治臍腹虛脹作痛澤瀉二錢木香三分神麯四分半夏枳實麩炒黃色草豆蔻麵裹煨黃耆春夏勿用益智仁去殼甘草炙各五分青皮陳皮各六分川歸七分茯苓七分上細切作一服加生薑三片水一盞半煎至一盞溫服益胃散東垣治因服寒藥過多致腹痛不止人參厚朴薑製甘草炙白豆蔻去殼薑黃乾薑炮砂仁澤瀉以上各三分益智仁六分陳皮七分黃耆七分蜜炙上細切作一服加姜水煎服厚朴溫中湯東垣治胃虛寒脹滿疼痛厚朴陳皮各一錢茯苓草豆蔻麵包煨甘草炙木香各五分乾薑三分半炮上細切加姜水煎服六合散又名金鑰匙河間治一切燥熱鬱結汗後餘熱宣轉不通並治小腸氣結心腹滿悶胸中痞結走注疼痛大黃一兩酒拌濕蒸白醜炒黑醜略炒甘遂各五錢檳榔三錢生輕粉一錢上為細末每服一錢蜜水調下量虛實加減服沒藥散河間治一切心腹疼痛不可忍者沒藥另研乳香另研各三錢木鱉子四錢支殼穿山甲五錢糠灰火煨脆上為細末每服五分或一錢酒大半盞煎三五沸服木香檳榔丸河間治食鬱氣滯作痛木香三錢檳榔三錢青皮五錢去白陳皮五錢去白麥糵面炒七錢枳實麩炒黃色六錢白朮五錢厚朴薑製四錢上為細末湯浸蒸餅為丸如梧桐子大每服五十丸溫水下食遠枳實導滯丸東垣治食傷濕熱之物不得施化腹痛滿悶不安以利為度方見內傷門瓜蒂散活人治食傷太陰填塞悶亂不快甚則心胃大痛兀兀欲吐者方見中風門桂枝加芍藥湯活人治腹滿時痛脈弱桂枝甘草各二錢白芍藥四錢上作一服姜三片棗二枚水煎服小建中湯活人治傷寒陽脈澀陰脈弦腹中急痛者桂枝甘草炙各三分白芍藥六分阿膠炒一合上加姜二片棗二枚水煎服真武湯活人治腹痛下痢四肢沉重方見傷寒門霹靂散河間治腹痛脈微欲絶附子一枚泡取出以糠灰焙之去皮臍上以一味取五錢重入真臘茶一錢同研細為末分作二服每服用水一盞煎七分去渣入蜜一匙稍冷服酒煮當歸丸東垣治小腹寒痛及婦人白帶疝㿗大寒等證茴香五錢黑附子炮良薑各七錢當歸一兩上四味細切以上好無灰酒一升半煮至酒乾盡焙乾入後藥炙甘草苦楝生用丁香各五錢木香升麻各一錢柴胡二錢炒黃鹽全蠍各三錢玄胡索四錢上與前四味同研為細末酒煮麵糊為丸如梧桐子大每服五七十丸空心淡醋湯下忌油膩冷物及酒濕面黃連湯河間治胸中有熱胃中有邪氣腹內痛甚時欲嘔吐此藥升降陰陽黃連酒炒甘草炙乾薑桂枝各五錢人參二錢半夏半合泡七次去皮臍上細切入大棗二枚量水煎服芍藥甘草湯河間治四時腹痛白芍藥酒炒甘草炙上各等分每服五錢細切入生薑三片水一盞半煎至一盞溫服醫壘元戎云腹痛脈弦傷氣用本藥脈洪傷金加黃芩脈緩傷水加桂枝脈澀傷血加當歸脈遲傷寒加乾薑加減小柴胡湯河間治寒熱脈弦腹痛本方去黃芩加白芍藥四物苦楝湯河間治臍下虛冷腹痛四物湯六錢加玄胡索苦楝各一錢五分上細切水二盞煎至一盞溫服增損當歸丸河間治三陰受邪心腹㽲痛四物湯五錢防風獨活全蠍各五錢續斷原方無茴香各一兩苦楝酒煮玄胡索炒木香丁香各二錢上為細末酒糊為丸如梧桐子大每服五十丸白湯下苦楝丸河間治奔豚小腹作痛方見疝氣門一捏金散局方治臍腹大痛及奔豚小腸氣等證玄胡索川楝子酒煮全蠍去毒炒茴香上各等分為細末每服二錢匕熱酒調下神驗丹溪活套云凡腹痛多是血脈凝澀不行必用酒炒白芍藥惡寒而痛加桂惡熱而痛加黃柏如腹痛欲以物拄按者屬虛用人參白朮乾薑官桂之類如腹痛手不可按者屬實宜用建中湯加大黃或調胃承氣湯加桂枝類下之而愈如因飲食過傷而作痛者必問因傷何物如傷生冷硬物而作痛者東垣木香見睍丸三稜消積丸之類如傷熱物而作痛者枳實導滯丸三黃枳朮丸之類看強弱緩急用而下之如氣虛之人因飲食過傷而腹痛者宜補瀉兼施用二陳湯加川芎白朮神麯麥芽人參蒼朮之類或送下前推積等丸子以下之如腹中常覺有熱而暴痛暴止者此為積熱宜調胃承氣湯之類下之如因跌撲損傷而作痛者此瘀血證宜桃仁承氣湯抵當湯之類逐去其血即愈如因事損傷或酒後涉水血凝腹痛者大承氣湯加桂醫治一黃氏婦年五十餘小腹有塊作痛二月餘一醫作死血治與四物加桃仁等藥不效又以五靈脂玄胡索乳香沒藥三稜莪朮等作丸服又不效召豫治診其六脈皆沉伏兩尺絶無豫曰乃結糞在下焦作痛耳非死血也用金城稻藁燒灰淋濃汁一盞服之過一時許與枳實導滯丸一百粒催之下黑糞如梅核者一碗許痛遂止後與生血潤腸之藥十數帖調理平安一壯年男子寒月入水網魚飢甚遇涼粥食之腹大痛二晝夜不止一醫先與大黃丸不通又與大承氣湯下糞水而痛愈甚召豫治診其六脈皆沉伏而實面青黑色豫曰此大寒證及下焦有燥屎作痛先與丁附治中湯一帖又與灸氣海穴二十一壯痛減半繼以江子加陳皮木香作丸如緑豆大生薑汁送下五粒下五七次平安腰痛論內經曰足太陽脈令人腰痛引項脊尻背如重狀少陽腰痛如以針刺其皮中循循然不可以俯仰不可以顧陽明腰痛不可以顧顧如有見者善悲足少陰腰痛痛引脊內廉厥陰腰痛腰中如張弓弩弦太陰腰痛熱甚生煩腰下如有橫木居其中甚則遺溲又曰太陽所至為腰痛巨陽虛則腰背頸項痛是動則病項如拔脊痛腰似折髀不可以曲又曰腰者腎之腑轉搖不能腎將憊矣脈經曰凡有所用力舉重若入房過度汗出如浴水則傷腎腎脹者腹滿引背央央然腰髀痛又有腎著之病從腰以下冷腰重如帶五千錢若夫腰痛之證雖有六經見候之不同銼閃腎著之或異或瘀血或風寒或濕痰流注種種不一原其所由未必不因房室過度負重勞傷之所致也經曰邪之所湊其氣必虛是也治法虛者補之杜仲黃柏肉桂當歸五味菟絲子天門冬熟地黃之類風者散之麻黃防風羌活獨活之類寒者溫之肉桂附子乾薑之類挫閃者行之當歸蘇木乳香沒藥桃仁紅花之類瘀血者逐之大黃牽牛桃仁水蛭虻蟲之類濕痰流注者消導之蒼朮撫芎香附白芷枳實橘紅半夏茯苓之類宜各類推而治之不可執一論也脈法脈經曰尺脈沉腰背痛凡腰痛時時失精飲食減少其脈沉滑而遲此為可治腰痛之脈皆沉弦沉弦而緊者為寒沉弦而浮者為風沉弦而濡細者為濕沉弦而實者為銼閃丹溪曰脈必沉而弦沉為滯弦為虛澀者是瘀血緩者是濕滑者伏者是痰大者是腎虛也方法丹溪曰有腎虛有瘀血有濕熱有銼閃有痰諸腰痛不可用補氣藥亦不宜峻用寒涼藥腎虛腰痛用杜仲黃柏龜板知母枸杞子五味子豬脊骨髓丸服瘀血宜行血順氣用補陰丸加桃仁紅花外用三梭針於委中穴出血以其血滯於下也濕宜燥濕行氣用黃柏杜仲蒼朮川芎之類戴氏曰疼之不已為腎虛也日輕夜重者是瘀血也遇天陰及久坐而發者是濕也痰宜南星半夏加快氣藥佐之使痰隨氣運腰曲不能伸者針委中立愈腎著為病其體重腰冷如冰飲食如故小便自利腰以下冷痛而重治宜流濕兼用溫藥以上丹溪方法凡七條腎著湯三因方治腎著腰痛乾薑炮茯苓各一錢五分甘草炙五分白朮二錢五分上每服四錢水煎服青娥丸三因治腎虛腰痛常服壯筋補虛杜仲一斤炒生薑十兩炒破故紙一斤炒上為細末用胡桃肉一百二十個湯浸去皮膜研為膏煉蜜些少丸如梧桐子大每服五十丸鹽湯下或薑湯下立安丸三因治五種腰痛常服溫補腎元壯健腰腳破故紙炒乾木瓜各一兩五錢牛膝酒洗一兩萆薢二兩杜仲薑汁炒絲斷續斷各一兩上為細末煉蜜丸如梧桐子大每服五十丸溫酒下補骨脂丸局方治腎虛及寒濕一切腰痛萆薢四兩一兩用童便浸一兩用米泔浸一兩用鹽湯浸一兩用酒浸各浸一晝夜杜仲四兩炒絲斷補骨脂三兩炒香胡桃肉八兩浸去油膩另研如泥上以前三味共研為細末不犯鐵器入胡桃肉用木杵搗千餘下以糯米糊為丸秋冬以煉蜜為丸如梧桐子大每服五十丸空心溫酒下乾物壓之獨活湯東垣治勞役腰痛如折羌活去蘆防風去蘆獨活去蘆澤瀉去毛肉桂各三錢去粗皮大黃酒浸煨熟甘草各二錢川歸五錢連翹五錢防己酒炒黃柏酒炒各二錢桃仁三十個研每服一兩酒水煎服摩腰丹治寒熱腰痛附子尖烏頭尖天南星各二錢五分硃砂乾薑各一錢雄黃樟腦丁香各一錢五分麝香當門子五粒上為末蜜丸如龍眼大每用一丸生薑汁化開如厚粥樣烘熱置掌中摩腰上冷盡黏著肉烘綿衣縛定腰熱如火間三日用一丸妙或加吳茱萸桂皮煨腎丸局方治腎虛腰痛杜仲三錢炒絲斷上為細末以豬腰子一隻薄批作五七塊以椒鹽醃去腥水摻藥末在內以荷葉包裹更加濕紙二三重外包慢火煨熟食之無灰酒送下補腎丸丹溪治腎虛腰痛方見虛損門蒼朮湯丹溪治濕熱腰腿疼痛防風黃柏各一錢柴胡二錢蒼朮三錢上細切作一服水一盞半煎至一盞去渣溫服川芎肉桂湯東垣治瘀血在足太陽足少陰足少陽三經腰痛漢防己防風去蘆各三錢神麯炒獨活各五分川芎柴胡肉桂當歸梢甘草炙蒼朮各一錢羌活一錢五分桃仁五個去皮尖另研細上細切作一服好酒三盞煎至一盞去渣稍熱服食遠地龍散東垣治腰脊痛或打撲損傷或從高墜下惡血在太陽經令人腰脊痛或髀股脛腨中痛不可忍當歸梢二分中桂地龍各四分鹽水拌炒麻黃五分蘇木六分獨活黃柏鹽酒炒甘草各八分羌活一錢二分桃仁六個去皮尖研如泥上細切作一服水二盞煎至一盞去渣溫服拈痛湯東垣治濕熱為病肩背沉重肢節腰脅疼痛胸膈不利白朮四分人參去蘆升麻苦參酒炒葛根蒼朮各五分防風去蘆知母去毛酒洗澤瀉黃芩豬苓去皮當歸各六分甘草炙生黃芩酒洗茵蔯酒炒羌活各八分上細切作一服水二盞煎至一盞去渣溫服蒼朮復煎散東垣治寒濕相合腦後痛惡寒項筋脊骨強肩背膝眼痛腰痛膝臏痛無力行步沉重紅花一分黃柏三分柴胡去蘆藁本澤瀉白朮升麻各五分羌活一錢蒼朮四兩上細切先以蒼朮一味用水三大盞煎至二盞去渣入前藥復煎至一盞去渣空心稍熱服取微汗為效忌酒及濕面一粒金丹河間治腰膝走注疼痛如虎咬之狀不可忍者草烏頭炮製五靈脂各四兩木鱉子一兩去殼白膠香二兩乳香二錢五分當歸五錢京墨二錢五分沒藥五錢麝香二分半地龍去泥土淨一兩上為細末再研千餘下糯米糊丸如梧桐子大每服一丸或二丸多至三丸溫酒下服藥後微汗神驗加味四物湯元戎治瘀血腰痛本方加桃仁泥酒紅花二味煎服安腎丸三因治腎虛腰痛破故紙炒胡蘆芭炒茴香炒川苦楝炒續斷炒各三兩桃仁炒杏仁炒山藥茯苓各二兩上為細末煉蜜為丸如梧桐子大每服五十丸鹽湯下如神散三因治挫閃腰痛甚者不過三服平安川歸肉桂玄胡索各等分杵碎炒上為細末每服二錢熱酒調下或細切酒煎亦可獨活寄生湯三因治因腎虛坐臥冷濕當風所得獨活一錢桑寄生杜仲炒細辛牛膝秦艽茯苓白芍藥桂心川芎防風甘草炙人參熟地黃當歸各五分上細切作一服水二盞煎至一盞去渣空心溫服五積散局方治寒濕及清痰流注經絡腰膝背脅疼痛白芷川芎桔梗芍藥陳皮厚朴薑製炒茯苓去皮甘草麻黃乾薑炮官桂川歸半夏湯泡七次去皮臍蒼朮米泔浸五七日枳殼各五分上細切作一服加生薑三片水二盞煎至一盞溫服丹溪活套云凡因房勞辛苦而腰痛者四物湯加知母黃柏五味子杜仲之類吞補腎丸或大補陰丸因風寒濕流注經絡而作痛者二陳湯加麻黃蒼朮川芎白芷防風羌活獨活之類因挫閃跌撲致死血流於本經而作痛者四物湯加桃仁紅花蘇木之類脈實人壯盛者大承氣湯加桂下之安有因醉飽入房太甚而酒食之積乘虛流入於本經致腰痛難以俯仰四物湯合二陳湯加麥糵神麯杜仲黃柏官桂砂仁葛花桔梗之類脅痛論內經曰肝病者兩脅下痛引少腹令人善怒虛則目䀮䀮無所見耳無所聞善恐如人將捕之又曰怒則氣逆甚則嘔血及飧泄故氣上矣蓋心生血肝納血因大怒而血不歸經或隨氣而上出於口鼻或留於本經而為脅痛又或歲木太過而木氣自甚或歲金有餘而木氣被郁皆能令人脅痛經曰病脅下滿氣逆二三歲不已病名曰息積是亦肝木有餘之證也外有傷寒發寒熱而脅痛者足少陽膽足厥陰肝二經病也治以小柴胡湯無有不效者或有清痰食積流注脅下而為痛者或有登高墜僕死血阻滯而為痛者又有飲食失節勞役過度以致脾土虛乏肝木得以乘其土位而為胃脘當心而痛上支兩脅痛膈噎不通食飲不下之證醫者宜於各類推而治之毋認假以為真也脈法脈經曰肝脈搏堅而長色不青當病墜墮若搏因血在脅下令人喘逆若軟而散耎轜濡軟古通用其色澤者當病溢飲溢飲者暴渴多飲而溢入於肌膚腸胃之外也脈經曰肝脈沉之而急浮之亦然若脅下痛有氣支滿引少腹而痛時小便難苦目眩頭痛腰背痛足為逆寒時癃婦人月水不來時無時有得之少時有所墜墮脈雙弦者肝氣有餘兩脅作痛方法丹溪曰脅痛屬肝木氣實因怒氣大逆肝氣鬱甚謀慮不決風中於肝皆使木氣大實故火盛肝氣急也有死血因惡血停留於肝搏於脅下而作痛病則咳嗽氣急引脅痛痰流注因痰積流注於厥陰之經亦能使脅下痛病則咳嗽氣急引脅痛當歸龍薈丸瀉肝火大盛之要藥因內有濕熱兩脅痛甚伐肝木之氣肝實宜之當歸龍膽草梔子仁黃連黃芩大黃酒濕煻火煨蘆薈青黛各五錢木香二錢五分麝香五分另研上為細末神麯糊丸如梧桐子大每服二十丸生薑湯下一方加柴胡五錢青皮一兩熱甚者烘熱服一方木氣實者用川芎蒼朮青皮芍藥柴胡甘草龍膽草各等分水煎服左金丸瀉肝火行濕為熱甚之反佐黃連六錢吳茱萸一錢上為細末湯浸蒸餅為丸如緑豆大每服三五十丸淡薑湯下一方破血行氣治死血作痛之證桃仁去皮留尖另研紅花酒拌焙乾川芎香附童便浸青皮各等分上細切水煎服加味二陳湯治濕痰流注脅內作痛本方加泡南星蒼朮川芎姜水煎服肝苦急急食辛以散之用撫芎蒼朮或用小柴胡湯蓋本方為脅痛發寒熱者必用之要藥也左脅痛以柴胡為君加佐使藥川芎青皮龍膽草之類兩脅走痛或用控涎丹因清痰流注作痛者可用蓋痰在脅下非白芥子不能達方見痰門治咳嗽脅痛者二陳湯加南星青皮香附青黛薑汁一云四物湯加青皮等藥以疏肝氣氣弱之人脅下痛脈細緊或弦多從勞役怒氣得之八物湯加木香青皮或加桂心水煎服之去滯氣用青皮蓋青皮乃肝膽二經藥人多怒脅下有鬱積固宜以解二經之實者若二經氣血不足先當補血氣少加青皮可也此承上條意思言也肥白人氣虛發寒熱而脅下痛用參耆補氣柴胡黃芩退熱木香青皮調氣瘦黑人寒熱脅痛多怒者必有瘀血宜桃仁紅花柴胡青皮大黃之類行之發寒熱脅痛似覺有積塊必是飲食太飽勞力所致必用龍薈丸治之解痛治標藥外用琥珀膏貼之又方用芥菜子水研敷又方以吳茱萸醋研水調敷又方以韭菜葉搗細炒熱貼而以尉斗盛火尉之以上丹溪方法凡十五條推氣散局方治右脅痛甚脹滿不食片薑黃枳殼麩炒桂心各五錢甘草炙三錢上為細末每服二錢薑湯調下水煎亦可枳芎散東垣治右脅疼痛不可忍枳實麩炒川芎各五錢甘草炙一錢五分上為細末每服二錢薑棗湯或酒調下異香散東垣治腹脅膨脹痞悶噎塞腹脅㽲痛蓬莪朮煨益智仁甘草京三稜各一錢青皮陳皮各五分石蓮肉三分厚朴薑製三分上細切作一服加生薑三片大棗一枚白鹽少許水一盞半煎至一盞去渣溫服分氣紫蘇飲河間治腹脅疼痛氣促喘急五味子桔梗去蘆紫蘇葉桑白皮蜜炙黃色草果仁陳皮去白大腹皮酒洗淨茯苓甘草炙各五分上細切作一服加生薑三片白鹽少許水一大盞煎至七分去渣空心溫服芎葛湯河間治脅下疼痛不可忍者桂枝川芎細辛乾葛防風去蘆各八分芍藥枳殼麻黃人參甘草炙各四分上細切作一服加生薑三片水一盞半煎至一盞溫服丹溪活套云凡脅痛者多是肝木有餘也宜用小柴胡加青皮川芎芍藥龍膽草甚者煎成正藥入青黛麝香痰流注者本方倍半夏加橘紅南星蒼白朮茯苓川芎之類瘀血作痛者小柴胡合四物湯加桃仁紅花或乳香沒藥煎服痛甚而元氣壯實者桃仁承氣湯下之而愈性急多怒之人時常腹脅作痛者小紫胡加川芎芍藥青皮之類煎服甚者以煎藥送下當歸龍薈丸其效甚速醫案金氏子年四十餘因騎馬跌撲次年左脅脹痛醫與小柴胡湯加草龍膽青皮等藥不效來求治診其脈左手寸尺皆弦數而澀關脈芤而急數右三部惟數而虛豫曰明是死血證用抵當丸一劑下黑血二升許後以四物湯加減調理而安諸氣論內經曰百病皆生於氣也故怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收炅則氣泄驚則氣亂勞則氣耗思則氣結夫人身之正氣與血為配血行脈中氣行脈外一呼脈行三寸一吸脈行三寸氣血並行周流乎一身之中灌溉乎百骸之內循環無端運氣不悖而為生生不息之妙用也經曰一息不運則機緘窮一毫不續則穹壤判若內無七情之所傷外無六淫之所感何氣病之有哉其不善攝生者五志之火無時不起五味之偏無日不傷是以釀成膠痰固積留滯於六腑鬱火邪氣充塞乎三焦使氣血失其常候腑臟不能傳導是故外邪得以乘虛而湊襲矣以致清陽不升濁陰不降而諸般氣痛朝輟暮作而為膠固之疾非良工妙手莫易治焉若夫為脅痛為心腹痛為周身刺痛甚則為反胃為膈噎等證即此之由也大抵男子屬陽得氣易散女人屬陰遇氣多郁是以男子之氣病者常少女人之氣病者常多故治法曰婦人宜調其血以耗其氣男子宜調其氣以養其血此之謂也學者宜致思焉脈法脈經曰脈滑者多血少氣澀者少血多氣大者血氣俱多脈來大而堅者血氣俱實小者血氣俱少脈來細而微者血氣俱虛代者氣衰細者氣少浮而絶者氣欲絶弦大而滑中有短氣尺脈澀而堅為血實氣虛尺脈細而微血氣俱不足也劉立之曰下手脈沉便知是氣沉極則伏澀弱難愈其或沉滑氣兼痰飲病也方法丹溪曰周流乎一身以為生者氣也苟內無所傷外無所感何氣病之有今冷氣滯氣逆氣上氣皆是肺受火邪氣得炎上之化有升無降熏蒸清道甚而轉成劇病局方例用辛香燥熱之劑以火濟火咎將誰歸又曰氣無補法世俗之論也以其為病痞滿壅塞似難於補不思正氣虛者不能運行邪滯著而不出所以為病經曰壯者氣行則愈怯者著而為病苟或氣怯不用補法氣何由行又曰冷生氣者出於高陽生之謬言也病人自覺冷氣從下而上者非真冷也蓋上升之氣自肝而出中挾相火自下而上其熱為甚火極似水陽亢陰微又曰凡氣有餘便是火是皆為治之正論也可不究歟調氣用木香然木香味辛氣能上升如氣鬱而不達固宜用之若陰火衝上而用之則反助火邪而病甚矣故當用黃柏知母而少用木香佐之稟受素壯而氣刺痛當用枳殼烏藥若因氣不舒而刺痛當用木香調達之若肥白人氣刺痛者宜與人參白朮加枳殼木香一方解五臟結氣益少陰經血用梔子炒令將黑為末以生薑汁入湯同煎飲之其效甚捷以上丹溪方法凡五條清膈丸治因濕熱氣滯黃芩黃連各五錢炒香附一兩五錢蒼朮二兩上為細末新取紅熟栝蔞去皮搗爛和丸如緑豆大每服三五十丸白湯下正氣天香湯河間治婦人一切諸氣作痛或上湊心胸或攻築脅肋腹中結塊發渴刺痛月水因之而不調或眩暈嘔吐往來寒熱無問胎前産後一切氣候普皆治之烏藥一錢五分香附六錢陳皮紫蘇乾薑各六分半上細切作一服水一盞半煎至一盞去渣稍熱服木香檳榔丸子和此藥流濕潤燥推陳致新滋陰抑陽散郁破結活血通經治男子婦人嘔吐酸水痰涎不利頭目昏眩並一切酒毒食積及米穀不化或下痢膿血大便祕塞風壅積熱口苦煩渴涕唾稠黏膨脹氣滿等證木香檳榔青皮去穰陳皮去白黃柏莪朮煨枳殼麩炒黃連去毛大黃酒拌濕紙包煨黑醜取頭末香附各一兩童便浸當歸一兩五錢上為細末滴水為丸如梧桐子大每服五七十丸溫水下以利為度蘇合香丸局方大能順氣化痰並治傳尸骨蒸勞瘵卒暴心痛小兒驚搐大人中風卒死等證沉香麝香另研訶子煨去核木香丁香蓽茇安息香另研為末用無灰酒一升煮為膏白朮白檀香各一兩薰陸香另研蘇合油加入安息膏內龍腦另研各一兩硃砂另研飛用為衣烏犀角屑各五錢香附子另末一兩上為細末研極勻入安息膏及煉蜜和勻丸如梧桐子大空心溫酒化下四丸白湯亦可蘇子降氣湯局方治氣不升降痰涎壅塞氣滿氣痛等證川歸去頭酒浸甘草炙前胡去蘆厚朴薑製各五分肉桂去粗皮陳皮去白各七分半半夏泡紫蘇子另研各一錢上細切作一服加生薑三片大棗一枚水一盞半煎至一盞去渣不拘時服異香散局方治胃氣不和飲食不化腹脅膨脹一切冷氣結聚作痛等證方見脅痛門沉香降氣湯局方治陰陽壅滯氣不升降胸膈痞悶噫醋吞酸沉香四錢砂仁五錢甘草炙一兩二錢香附童便浸一宿四兩上為細末每服二錢入鹽少許白湯調下復元通氣散局方治跌撲損傷或負重挫閃致氣滯於血分作痛並一切氣不宣通瘀血凝滯周身走痛等證舶上茴香炒穿山甲煻火煨木香各一兩半玄胡索碎炒白醜取頭末甘草炙陳皮去白各一兩當歸一兩五錢今加乳香沒藥各五錢上為細末每服二錢熱酒調下不飲酒人白湯下病在上食後病在下食前服木香流氣飲治諸氣痞塞不通胸膈膨脹面目虛浮四肢腫滿口苦咽乾大小便不利藿香葉木香不見火厚朴薑製青皮去白香附去毛童便浸麥門冬去心白芷各七分半甘草五分陳皮去白一錢大腹皮酒洗淨乾木瓜人參去蘆蓬莪朮煨丁香皮不見火半夏湯泡各二分赤茯苓去皮石菖蒲各三分草果仁五分紫蘇葉檳榔白朮肉桂木通各六分沉香七分半上細切分作二服每服加生薑三片大棗一枚水一盞半煎至一盞去渣服丹溪活套云蒼天之氣貴乎清淨若浩然充塞乎宇宙之間以為生生不息之運用者此一元之正氣也彼為云為霧為風雹為雷霆鼓舞於天地之間者皆山澤濕熱鬱蒸之氣也在人者亦猶是焉其清純之元氣與血並行循環無端未嘗有盈虧也彼衝出橫行於臟腑之間而為痛為痞滿為積聚等證者亦猶天地間云雷之鼓舞因濕熱鬱蒸而發者也濕熱鬱蒸之久在天地則為霖雨雹雪等物在人身者為積聚為痃癖為痰氣痞滿之類治之之法在胸臆之間而為痞滿刺痛伏梁等證者二陳湯加枳實黃連桔梗栝蔞仁木香之類在下焦而為奔豚七疝等證者本方加桃仁山楂梔子枳核茴香川楝荔核之類在兩脅攻築作痛者本方加青皮柴胡芍藥草龍膽之類在中焦而為痞滿脹急者本方加木香厚朴檳榔枳殼或用平胃散以平其敦阜之氣惟婦人胎前産後一切氣疾作楚者俱用四物湯為主治加疏通行氣之藥此治氣之大法也學者宜細詳之疝氣論內經曰肝脈大急沉皆為疝又曰三陽急為瘕三陰急為疝難經曰任脈之為病其內苦結男子為七疝夫所謂七疝者寒水筋血氣狐㿗七者是也子和曰寒疝者囊冷結硬如石陰莖不舉或控睪丸而痛得之於坐臥濕地或寒月涉水或值雨雪或坐臥磚石或風冷處使內過勞宜以溫劑下之久而無子水疝者其狀腎囊腫痛陰汗時出或囊腫狀如水晶或囊癢而搔出黃水或少腹按之作水聲得之於飲水醉酒使內過多汗出而遇風寒濕之氣聚於囊中故水冷令人為卒疝宜以逐水之劑下之外有漏針法恐誤不録筋疝者其狀陰莖腫脹或潰而為膿裡急筋縮或莖中作痛痛極則癢或挺縱不收或出白物如精隨溲而下得之於房室勞傷及邪術所使宜以降心火之劑下之血疝者其狀如黃瓜在少腹兩旁橫骨兩端約紋中俗名便癰得之於重感春夏大熱勞於使內氣血流溢滲入脬囊留而不去結成癰腫膿少血多宜以和血之劑下之氣疝者其狀上連腎腧下及陰囊多得於號哭忿怒則氣鬱之而脹號哭怒罷即氣散者是也有一治法以針出氣而愈然針有得失宜以散氣之藥下也或小兒亦有此疾俗名偏墜得之於父已年老或年少多病陰痿精怯強力入房因而有子稟胎病也此證難治惟築賓一穴有灸之而愈者穴法宜考灸經狐疝者其狀如仰瓦臥則入少腹行立則出腹入囊中如狐晝出穴而溺夜入穴而不溺此疝出入往來上下正與狐相類也亦與氣疝大同小異宜以逐氣流經之劑下之㿗疝者其狀陰囊大如升斗不癢不痛者是也得之於地氣卑濕故江淮之間多有之宜以去濕之劑下之女子陰戶凸出雖亦此類乃熱則不禁固也不可便認為虛寒而溫之補之本名曰瘕宜以苦藥下之以苦堅之愚按子和論七疝病源至為詳悉但其處方一以攻下之法為主治不能使人無疑耳既曰多由房勞致虛而作其可一例施之以攻下之法乎大抵七疝為病若非房勞所致即是遠行辛苦涉水履冰熱血得寒而凝滯於小腸膀胱之分或濕熱乘虛而流入於足厥陰之經古方一以為寒而純用烏附等熱藥為治我丹溪先生獨斷為濕熱此發古人之所未發者也夫熱鬱於中而寒束於外宜其有非常之痛故治法宜驅逐本經之濕熱消導下焦之瘀血以寒因熱用之法立方處治即邪易伏而病易退也其攻下之法愚故未敢試而行之以俟識者再論學者宜致思焉脈法內經曰肝脈大急沉皆為疝心脈滑搏急為心疝肺脈沉搏為肺疝又三陽急為瘕三陰急為疝又曰太陰脈滑則病脾風疝厥陰脈滑則病狐疝少陰脈滑則病肺風疝陽明脈滑則病心風疝太陽脈滑則病腎風疝少陽脈滑則病肝風疝脈經曰寸口脈弦而緊弦則衛氣不行衛氣不行則惡寒緊則不欲食弦緊相搏則為寒疝趺陽脈浮而遲浮則為風虛遲則為寒疝寒疝繞臍痛若發則自汗出手足厥寒其脈沉弦者烏頭湯主之方法丹溪曰疝氣者睪丸連小腹急痛也有痛在睪丸者有痛在五樞穴邊者皆足厥陰之經也或無形或無聲或有形如瓜或有聲如蛙自素問而下皆以為寒蓋寒主收引經絡得寒則收而不行所以作痛然亦有踢冰涉水終身不病此者無熱故也大抵此證始於濕熱在經鬱而至久又得寒氣外束不得疏散所以作痛若只作寒論恐為未備或曰厥陰經鬱積濕熱何由而致豫曰大勞則火起於筋醉飽則火起於胃房勞則火起於腎大怒則火起於肝火積之久母能令子虛濕氣便盛濁液凝聚併入血隧流於厥陰厥陰屬木繫於肝為將軍之官其性急速火性又暴為寒所束宜其痛之太暴也有以烏頭梔子等分作湯服之其效亦捷後用此方隨形證加減與之無不驗但濕熱又當分多少而治濕則腫多㿗病是也又有挾虛而發者當以參術為君疏導藥佐之脈甚沉緊而豁大無力者是也其痛亦輕但重墜牽引耳專主肝經與腎經絶無相干切不可下劫藥神效蓋濕熱因寒鬱而作用梔子以降濕熱烏頭以破寒鬱況二物皆下焦之藥而烏頭為梔子之所引其性急速不容胃中停留也又謂按之不痛者屬虛須加肉桂以薑汁丸服一方定疝痛用海石香附為末薑汁調下又方治諸疝定痛速效用枳實梔子糖球即山楂茱萸各炒濕盛者加荔枝核炒為末丸服或用長流水調末子空心服一二錢一本有川楝子又方治食積與瘀血成痛者一云少腹痛者有瘀血及有積熱梔子仁桃仁山楂枳實茱萸各等分上為末順流水入薑汁作湯調服又方治陽明經受濕熱傳入大腸惡寒發熱少腹連毛際結核悶痛不可忍用山梔桃仁橘核並炒山楂等分入薑汁煎熱服按之不痛者屬虛必用桂枝山梔子炒烏頭炮上件為細末薑汁打糊為丸如梧桐子大每服四五十丸劫痛效一方治㿗腰痛者一本腰不痛者一本治㿗要藥蒼朮南星白芷山楂半夏川芎枳實神麯糊丸服諸疝發時用海石香附二味為末生薑汁入湯調服亦治心痛因清痰而作痛者又治疝方橘核炒桃仁研梔子炒茱萸炒川烏炮水煎服小腸氣腎核脹痛蒼朮陳皮川楝子各二錢半甘草五分紫蘇一錢半細切酒水各一盞連須蔥白五莖煎服劫疝藥用烏頭梔子炒擂細順流水入薑汁調服陰囊腫脹大小便不通白牽牛二兩桑白皮白朮木通去節陳皮各五錢上為細末每服二錢薑湯調下空心服凡疝氣挾虛者必以參術為君佐以疏導之藥如川楝子茴香枳實山楂梔子之類以上丹溪方法凡十三條蔥白散三因治一切寒症作痛川芎當歸枳殼炒厚朴炒乾薑官桂青皮茴香炒川楝茯苓麥糵炒三稜炮神麯炒莪朮炮熟地黃白芍藥木香人參各等分上細切每服五錢加蔥白三莖鹽少許水煎空心溫服又方桃仁二十四個枸橘子十四個瓦上炒山梔子九枚去皮吳茱萸七十粒山楂子十四個並炒生薑一指大擂細以順流水一鍾蕩起煎數沸連渣服又方治㿗不痛用蒼朮神麯白芷山楂川芎梔子半夏入姜煎服凡㿗證非痛斷房事與厚味不可用藥凡治七疝須先灸大敦穴一名大順在足大拇指離爪甲如韭葉大灸三壯足厥陰井也治疝氣神方其病甚至氣上衝如有物築塞心臟欲死手足冷者二三服除根硫黃不拘多少火中溶化即投水中出毒研細荔枝核為末炒焦黃色陳皮上三味各等分為末飯丸如梧桐子大每服十四五丸酒下其痛立止自己覺疼甚不能支持略用五六丸再不可多也又治疝方蒼朮香附各鹽炒黃柏酒炒以上為君青皮去穰玄胡索益智桃仁以上為臣茴香附子鹽炒甘草炙以上為使上細切每服五錢順流水煎服五葉湯洗疝痛立效枇杷葉野紫蘇葉椒葉蒼耳草葉水晶蒲桃葉上五味不拘多少量水煎湯浴洗一方肥人腫疝作痛發熱惡寒五苓散加茴香煎服神驗吳茱萸湯東垣治厥疝腹中冷痛積氣上逆致陰冷囊寒吳茱萸五分湯泡七次川烏頭炮去皮細辛各七分半良薑當歸乾薑炮官桂各二分半上細切作一服水一盞煎七分溫服日進三服不痛為度茴香楝實丸東垣治控睪小腸痛結上而不下痛衝心膈茴香炒楝實去核略炒食茱萸泡陳皮各一兩馬藺花醋炒一兩芫花醋炒五錢上為細末醋糊為丸如梧桐子大每服十丸至二十丸空心溫酒下蒺藜湯寶鑑治陰疝牽引小腹痛諸厥疝即陰疝也喜欲房勞痛不可忍蒺藜去刺炒附子炮去皮臍梔子仁各一錢上細切作一服水一盞煎至六分食前溫服亦治前控睪小腸痛木香散東垣治心疝小腹痛悶絶不已木香陳皮各五分良薑訶子皮赤芍藥枳實炒各二分半草豆蔻川芎黑醜各二分上細切水一盞煎七分去渣溫服香殼散局方治小腸氣臍腹㽲痛筋急陰股中痛悶暈不省人事舶上茴香鹽炒枳殼麩炒各一兩沒藥五錢上為細末每服一錢溫酒調下不拘時並進二三服效沉香桂附丸寶鑑治中氣虛弱甚脾胃虛寒臟腑積冷心腹疼痛手足厥逆冷便利無度七疝引痛喜熱物尉蕩證沉香附子炮川烏炮乾薑炮良薑炮官桂吳茱萸湯泡去苦茴香炒各一兩上為細末醋煮麵糊為丸如梧桐子大每服五十丸至七十丸空心米飲下加味五苓散元戎治疝氣卒痛小便祕澀本方加川楝子一分上為細末每服二錢空心米飲調下茴香楝實丸寶鑑治陰疝痛不可忍及小腸氣痛川楝子炒茴香炒山茱萸吳茱萸青皮陳皮芫花醋煮比前方宜減半馬藺花食茱萸各等分較之前方多吳茱萸青皮山茱萸上為細末醋糊丸如梧桐子大每服三十丸空心溫酒下天台烏藥散寶鑑治小腸疝氣牽引臍腹疼痛烏藥木香茴香炒青皮良薑炙各五錢檳榔二枚川楝子十枚巴豆七十枚上先以巴豆微打破用川楝子麩炒黑去麩及巴豆不用其餘藥同為細末每服一錢溫酒調下甚者姜酒調下葵子湯濟生治膀胱實熱腹脹小便不通口舌乾燥膀胱作痛赤茯苓豬苓冬葵子枳實瞿麥木通黃芩車前子滑石各五分甘草二分半上細切作一服加生薑三片水煎空心服丁香楝實丸治男子七疝痛不可忍婦人瘕聚帶下皆任脈所主陰經病也乃腎肝受邪故治同法當歸附子炮茴香炒川楝子各一兩上細切用好酒三升同煮酒盡為度焙乾為細末每末子一兩入丁香木香各五分玄胡索五錢全蠍十三個炒上為末與前藥同拌勻酒糊為丸如梧桐子大每服三十丸加至一百丸空心溫酒送下一捏金散外集治七疝及奔豚氣痛不可忍者神效方見腹痛門丹溪活套云凡治七疝多用熱藥而獲效者即內經從治之法耳須用寒涼藥監製之不可純用大熱之劑如烏頭附子之類令人久服多服必變劇不可治矣但宜以二陳湯加枳實橘核梔子山楂等藥煎入生薑汁熱辣飲之如有瘀血作痛者本方加玄胡索桃仁泥如有氣作痛者本方加木香茴香楝實等藥如六脈沉細手足厥冷者本方加附子乾薑肉桂之類以佐之如睪丸痛甚者加荔枝核乳香沒藥為細末調入本方煎藥內或另用順流水調服亦可如木腎腫大如升斗者本方去甘草加海藻昆布荔枝核茴香川楝等藥為末順流水調服作丸子亦可祖傳方馬藺花丸治七疝㿗氣及婦人陰㿗墜下小兒偏墜等證無有不效者馬藺花醋炒川楝實橘核海藻洗淨海帶洗淨昆布三味俱鹽酒洗桃仁去皮尖各一兩厚朴薑製木通枳實麩炒黃色玄胡索杵碎炒肉桂去粗皮木香檳榔各五錢脈沉細手足逆冷者加川烏頭一個五錢炮上為細末酒糊丸如梧桐子大每服五七十丸或酒或姜鹽湯送下腳氣論內經曰諸濕腫滿皆屬脾土又曰傷於濕者下先受之蓋脾主四肢足居於下而多受其濕濕鬱成熱濕熱相搏其病作矣是以先從氣衝穴隱核痛起及兩足脛紅腫或惡寒發熱狀若傷寒筋攣掣痛是其候也或一旬或半月復作如故漸漸而致於足筋腫大如瓜瓠者多有之矣東南卑濕之地比比皆是西北高燥之方鮮或有之古方名為緩風由宋元以來呼為腳氣原其所由非止一端有從外感而得者有從內傷而致者所感雖有內外之殊其為濕熱之患則一也故異法方宜論云北方者其地高陵居風寒冰冽俗飲湩酪而肉食皆以飲多速飲為能經曰因而大飲則氣逆夫乳酪醇酒者濕熱之物飲之屬也加以奉養太過又滋其濕水性順下氣不能詬故下注於足脛積久而為腫滿疼痛此飲食下流之所致也東南地勢卑下濕氣迷滿山澤行履坐臥無處不有若稟壯而氣實者不能侵賊其氣虛血少之人或遇房勞及負重遠行沖冒雨雪寒濕乘虛而客襲於足而成此證是外感寒濕之所致也大抵病因有內外之殊而治法無表裡之異耳故為治者宣通用蒼朮白朮之類以治其濕知母黃柏條芩之類以去其熱當歸芍藥生地黃之類以調其血木瓜檳榔之類以行其氣羌活獨活以利關節而散風濕兼用木通防己川牛膝之類引藥下行及消腫去濕以為此證大法不過如此東垣曰濕淫所勝治以苦溫以苦辛發之透關節勝濕為佐以苦寒泄之流濕清熱為臣故立當歸拈痛湯以治之其效捷如影響針經曰有道以來必有道以去治宜多以針灸為佳以導引其濕熱之氣外出也學者宜詳究焉脈法脈弦者風濡弱者濕洪數者熱遲澀者寒微滑者虛牢堅者實結則因氣散則因憂緊則因怒細則因悲方法丹溪曰腳氣從濕從下須提起其濕在下之藥隨氣血用入心則恍惚謬妄嘔吐食不入眠臥不安左寸脈乍大乍小或乍有乍無者死入腎則腰腳腫小便不通呻吟目與額皆黑氣衝胸而喘左尺脈絶者死治濕熱腳氣方紫蘇黃柏鹽酒拌炒芍藥木瓜澤瀉去毛木通去皮防己檳榔蒼朮米泔浸枳殼麩炒黃色甘草炙香附童便浸炒羌活以上各等分痛加木香腫甚加大腹皮發熱加黃連大黃上細切水煎服痛除腫退則住服防己飲黃柏酒炒蒼朮鹽水炒白朮防己各七分生地黃檳榔川芎各五分犀角屑甘草節木通黃連各三分上細切作一服水一盞半煎至一盞去渣食前溫服有熱加黃芩熱甚及天令暄熱加石膏有痰加竹瀝薑汁或南星便祕加桃仁小便祕澀加牛膝如常腫者專主乎濕熱肥人加痰藥健步丸蒼朮當歸尾各一兩生地黃陳皮芍藥各一兩半川牛膝五錢大腹子三錢茱萸條芩各五錢桂心二錢上為細末湯浸蒸餅為丸如梧桐子大每服一百丸白朮木通湯送下食前服加味四物湯治腳氣衝心本方加炒黃柏煎服更於湧泉穴用附子末津調捏作餅子貼穴上以艾炷多灸以泄引其熱下行蒼朮防己丸治食積流注蒼朮米泔浸炒防己黃柏酒炒南星炮裂川芎白芷犀角檳榔各等分血虛加川牛膝龜板上為細末酒糊為丸如梧桐子大每服七八十丸白湯下轉筋屬血熱四物湯加酒芩紅花煎服有筋動於足大指上至大腿近腰結了此奉養厚因風寒而作又當加蒼朮南星以上丹溪方法凡七條羌活導滯湯東垣治腳氣初發一身盡痛或肢節腫痛便溺阻膈先以此藥導之後用當歸拈痛湯以撤其邪羌活獨活各一錢二分防己當歸尾各七分大黃二錢四分枳實五分上細切作一服水一盞半煎至一盞去渣空心溫服當歸拈痛湯東垣治濕熱腳氣為病肢節煩疼肩背沉重胸脅不利兼遍身疼痛下注足脛腫痛腳膝生瘡赤腫及裡外生瘡膿水不絶或庠或痛並宜服之羌活一錢人參苦參升麻葛根蒼朮各四分甘草炙黃芩酒炒茵蔯酒洗各一錢防風當歸身酒洗知母去毛酒製澤瀉豬苓去皮白朮各五分上細切作一服水二盞煎至一盞去渣空心溫服臨臥再進一服開結導飲丸東垣治腳氣飲食不消心下痞悶白朮橘紅澤瀉神麯炒麥芽面炒半夏泡七次各一兩枳實麩炒巴豆霜各二錢半青皮乾生薑各五錢茯苓一兩上為細末湯浸蒸餅為丸如梧桐子大每服五十丸或七八十丸溫水下麻黃左經湯三因治風寒濕流注足太陽經腰腳攣痹關節重痛增寒壯熱無汗惡寒或自汗惡風頭痛腳軟等證並皆治之麻黃乾葛細辛白朮茯苓防己肉桂羌活各五分甘草防風去蘆各二分半上細切作一服加生薑三片大棗一枚水煎服半夏左經湯治足少陽經為風寒濕流注發熱腰脅疼痛頭目眩暈嘔吐不食熱悶煩心腿髀緩縱不能行步半夏乾葛細辛白朮麥門冬茯苓肉掛防風乾薑黃芩各五分小草甘草柴胡各三分上細切作一服加生薑三片大棗一枚水一盞半煎至一盞溫服如熱悶加竹瀝喘急加杏仁桑白皮六物附子湯三因治四氣流注於足太陰經骨節煩疼四肢拘急自汗短氣小便不利手足或肘浮腫附子炮肉桂防己各一錢甘草炙五分白朮茯苓各七分半上細切作一服加生薑三片水一盞半煎至一盞溫服換腿丸局方治足三陰經為四氣所乘發為攣痹緩縱上攻胸脅肩背下注腳膝疼痛足心發熱行步艱難薏苡仁炒南星炮裂石楠葉石斛檳榔萆薢川牛膝酒洗羌活防風木瓜各四兩黃耆當歸尾天麻續斷各一兩上為細末酒糊為丸如梧桐子大每服五十丸鹽湯下五積散局方治寒濕流注經絡腳膝腫滿疼痛等證方見腰痛門導水丸治腳氣跗腫疼痛或發熱惡寒濕熱大盛者大黃黃芩各二兩黑醜取頭末滑石各四兩上為細末滴水為丸如梧桐子大每服四五十丸溫水送下以利為度除濕丹治諸濕病腰膝腫痛足脛浮腫筋脈徑急津液凝澀便溺不利等證檳榔甘遂麵包水煮葳靈仙去蘆赤芍藥澤瀉葶藶子各二兩酒浸炒乳香沒藥各一兩黑醜五錢大戟炒三兩陳皮四兩上為細末麵糊為丸如梧桐子大每服五十丸溫水下以利為度三花神祐丸河間治濕熱流注足膝浮腫肢節煩疼行步重墜等證方見痰飲門祖傳方杉木節飲治腳氣發作惡寒發熱兩足腫大心煩體痛垂死者杉木節四兩檳榔七個大腹皮酒洗一兩青橘葉四十九片上細切作一服用順流水三升煎至一升分作三服一日服盡如大便通利黃水其病除根未愈過數日再煎一劑服之病根去為度外以杉木橘葉不拘多少煎湯洗之神效勝濕餅子治遠年腳氣足脛腫如瓜瓠者黑醜一兩取頭末五錢白醜一兩取頭末五錢甘遂連珠者五錢上三味再同研極細外用蕎麥麵一兩半連藥末和勻水調捏為餅子如折三錢大放飯上蒸熟每服一餅空心嚼茶清送下以利為度未利又服一餅忌甘草菘菜生冷油膩魚腥等物痛風古名痛痹論內經曰諸風掉眩強直支痛緛戾裡急筋縮皆足厥陰風木之位肝膽之氣也又曰風寒濕三氣雜至合而為痹其風氣勝者為行痹寒氣勝者為痛痹濕氣勝者為著痹以冬遇此為骨痹以春遇此為筋痹以夏遇此為脈痹以至陰六月也遇此為肌痹以秋遇此為皮痹夫古之所謂痛痹者即今之痛風也諸方書又謂之白虎歷節風以其走痛於四肢骨節如虎咬之狀而以其名名之耳丹溪曰大率因血虛受熱其血已自沸騰或加之以涉水受濕熱血得寒汙濁凝滯不得運行所以作痛夜則痛甚行於陰也治以辛溫監以辛涼流散寒濕開通鬱結使血行氣和更能慎口節欲無有不安者也脈法脈經曰脈澀而緊者痹少陰脈浮而弱弱則血不足浮則為風風血相搏則疼痛如掣盛人脈澀小短氣自汗出歷節痛不可屈伸此皆飲酒汗出當風所致也寸口脈沉而弦沉則主骨弦則主筋沉則為腎弦則為肝汗出入水中因水傷心歷節痛而黃汗出故曰歷節風也味酸則傷筋筋傷則緩名曰泄味鹹則傷骨骨傷則痿名曰枯枯泄相搏名斷泄榮氣不通衛不獨行榮衛俱微三焦無御四屬斷絶身體羸瘦獨足腫大黃汗出脛冷假令發熱變為歷節風疼痛不可屈伸方法丹溪曰因濕痰濁血流注為病以其在下焦道路遠非烏附氣壯不能行故用為引經若以為主治之非惟無益而有殺人之毒此病必行氣流濕舒風導滯血補新血降陽升陰治有先後須明分腫與不腫可也不可食肉肉屬陽大能助火素有火盛者小水不能制若食肉厚味下有遺溺上有痞悶須將魚腥麵醬酒醋皆斷去之先以二陳湯加酒浸白芍藥少佐以黃連降心火看作何應又為區處也大法用蒼朮南星川芎白芷當歸酒芩在上者加羌活桂枝桔梗葳靈仙在下者加牛膝防己木通黃柏加味四物湯治白虎歷節風證本方加桃仁煮數次去皮尖牛膝酒浸陳皮茯苓甘草白芷草龍膽各等分上細切作一服水二鍾煎至一鍾去渣溫服如痛在上者屬風加羌活桂枝葳靈仙在下者屬濕加牛膝防己木通黃柏氣虛者加人參白朮龜板有痰者加南星半夏生薑血虛者倍川歸川芎佐以桃仁紅花水煎服之因痰者二陳湯加酒洗黃芩羌活蒼朮因濕者用蒼朮白朮佐以竹瀝薑汁及行氣之藥或曰有濕鬱而周身走痛或關節間痛遇陰寒即發當作濕鬱治或用白朮一味酒煎服之其痛立愈肥人多是濕與痰飲流注經絡脈必滑瘦人多是血虛與熱脈必澀下部有濕腫痛用防己龍膽草黃柏知母固是捷藥若肥人病此宜蒼朮白朮南星滑石茯苓之類瘦人宜用當歸紅花桃仁牛膝檳榔等藥薄桂味淡者能橫行手臂領南星蒼朮等藥至痛處葳靈仙治上體痛風人虛弱勿用一方治上中下痛風黃柏酒炒蒼朮米泔浸一二宿南星各二兩神麯炒臺芎各一兩防風白芷桃仁各五錢葳靈仙酒炒桂枝橫行手臂羌活各二錢草龍膽一錢五分酒紅花五分上為細末神麯糊丸如梧桐子大每服一百丸空腹服大羌活湯治風濕相搏肢節疼痛羌活升麻各一錢獨活七分蒼朮防己葳靈仙川歸白朮茯苓澤瀉各五分上細切作一服水二盞煎至一盞去渣空心溫服四妙散治走注疼痛葳靈仙酒浸焙乾五錢羯羊角灰三錢蒼耳子一錢五分白芥子一錢半炒上為細末每服一錢匕薑湯調下一方治飲酒濕痰痛風黃柏酒炒葳靈仙酒炒各五錢蒼朮米泔浸一宿羌活各三錢甘草炙三錢陳皮去白芍藥各一錢上為細末每服一錢匕生薑湯調下凡因久痢後兩腳痠軟疼痛或膝腫如鼓捶者此亡陰也宜以芎歸熟地黃等補血藥治之自愈挾氣虛者加參耆挾風濕者加羌活防風白朮之類切不可純作風治反燥其血終不能愈氣血兩虛有痰濁陰火痛風人參山藥海石南星各一兩白朮熟地黃黃柏酒炒褐色龜板酥炙各二兩乾薑燒存性瑣陽各五錢上為末酒糊為丸服肢節腫痛痛屬火腫屬濕兼受風寒而發動於經絡之中濕熱流注於肢節之間而無已也麻黃去根節赤芍藥各一錢防風荊芥羌活獨活白芷蒼朮葳靈仙片芩酒浸枳實桔梗葛根川芎各五分甘草當歸稍升麻各三分上細切作一服水二盞煎至一盞去渣服下焦加酒黃柏婦人加酒紅花腫多加檳榔大腹皮澤瀉更加沒藥一錢定痛尤妙一云脈澀數者有瘀血宜用桃仁紅花芎歸加大黃微利之二妙散治腳膝下焦濕熱成痛黃柏酒浸焙乾二兩蒼朮米泔浸春秋二宿冬三宿夏一宿四兩上為細末沸湯入薑汁調服或用蒸餅為丸薑鹽湯送下二味皆有雄壯之氣表實氣實者加酒少許佐之有氣加氣藥血虛加補血藥痛甚者加生薑汁熱服潛行散用黃柏一味酒浸曝乾為細末每服方寸匕煎四物湯調下治血虛陰火痛風藥也多服帖數取效手臂痛是上焦濕痰橫行經絡中作痛也半夏酒芩白朮南星香附各一錢陳皮茯苓各五分蒼朮一錢半葳靈仙三錢甘草三分上細切作一服加生薑五片水二盞煎至一盞食後服加味二陳湯治臂痛本方加酒芩羌活葳靈仙入姜水煎食後溫服一方治痛風神效赤芍藥青皮各一錢半紫葳臺芎各七分半葳靈仙木鱉子各一錢半防風七分半甘草五分上細切作一服酒煎服之治婦人胸背脅走痛赤芍藥一錢桂枝蒼朮各五分香附炒黃柏各一錢甘草五分葳靈仙七錢半酒拌濕炒上細切作一服水二盞煎至一盞服治走注疼痛方葳靈仙蒼朮米泔浸桂枝川歸酒洗桃仁去皮尖炒各一錢生桃仁七個甘草二錢川芎一錢半上細切作一服加生薑五片水二盞煎至一盞入童便竹瀝各半盞再煎至一盞熱服忌豬羊雞肉魚腥濕面定痛丸治風濕一切痛乳香沒藥金星草地龍去土炒五靈脂木鱉子去殼上各等分為細末煉蜜為丸如彈子大每服一丸溫酒磨化下或只作小丸溫酒送下亦可世俗有用草藥而獲速效者如用石絲以為之君過山龍等以為之佐皆性熱而燥者不能養筋滋陰但能燥濕病之淺者濕痰得燥而開瘀血得熱而行故有速效若病之深而血少者愈劫愈虛而病愈深矣戒之戒之以上丹溪方法凡二十六條黃耆酒局方治風寒濕痹身體頑麻皮膚燥庠筋脈攣急語言蹇澀手足不遂等證黃耆防風桂枝天麻萆薢石斛虎脛骨酥炙白芍藥當歸雲母粉白朮茵芋葉木香仙靈脾甘草川續斷各一兩上細切以生絹袋盛用無灰好酒一斗以瓷罐浸之包封罐口勿令泄氣春五夏三秋七冬十日每服一盞溫飲之不拘時候獨活寄生湯局方治肝腎虛弱感冒風濕致痿痹兩足緩縱軟弱不仁方見腰痛門防風天麻散治風濕麻痹肢節走注疼痛中風偏枯或暴喑不語內外風熱壅滯昏眩防風天麻川芎羌活白芷草烏頭白附子荊芥穗當歸甘草炙各五錢白滑石二兩上為細末每服五分加至一錢熱酒化蜜少許調下覺藥力運行微麻為度或煉蜜為丸如彈子大每服半丸至一丸熱酒化下白湯亦可此藥散郁乾結宣風通氣之妙劑也舒筋湯局方治臂痛不能舉蓋是氣血凝滯經絡不行所致一名通氣飲子一名五痹湯其效如神片子薑黃二錢甘草炙羌活各五分海桐皮去外皮當歸去頭赤芍藥白朮各一錢上細切作一服加生薑三片水一盞半煎至一盞去渣磨沉香水少許入內溫服凡腰以上痛食後腰以下痛食前服祖傳方九藤酒治遠年痛風及中風左癱右瘓筋脈拘急日夜作痛叫呼不已等證其功甚速青藤釣鉤藤紅藤即理省藤也丁公藤又名風藤桑絡藤菟絲藤即無根藤天仙藤即青木香也陰地蕨名地茶取根各四兩忍冬藤五味子藤俗名紅內消各二兩上細切以無灰老酒一大斗用瓷罐一個盛酒其藥用真綿包裹放酒中浸之密封罐口不可泄氣春秋七日冬十日夏五日每服一盞日三服病在上食後及臥後服病在下空心食前服加味三妙丸治兩足濕痹疼痛或如火燎從足附熱起漸至腰胯或麻痹痿軟皆是濕為病此藥主之蒼朮四兩米泔浸黃柏二兩酒浸日乾川牛膝一兩去蘆當歸尾一兩酒洗川萆薢一兩防己一兩龜板酥炙一兩上為細末酒煮麵糊為丸如梧桐子大每服一百丸空心姜鹽湯下川木通湯一男子年四十歲因感風濕得白虎歷節風證遍身抽掣疼痛足不能履地者三年百方不效身體羸瘦骨立自分於死一日夢與木通湯服愈遂以四物湯加木通服不效後以木通二兩銼細長流水煎汁頓服服後一時許遍身癢甚上體發紅丹如小豆大粒舉家驚惶隨手沒去出汗至腰而止上體不痛矣次日又如前煎服下體又發紅丹方出汗至足底汗乾後通身舒暢而無痛矣一月後人壯氣復步履如初後以此法治數人皆驗故録於此以示後學熏洗痛風法治手足冷痛如虎咬者用樟木屑一斗以急流水一擔熬沸以樟木屑置於大桶內桶邊放一兀凳用前沸湯泡之桶內安一矮凳子令人坐桶邊放一腳在內外以草荐一領圍之勿令湯氣入眼恐壞眼其功甚捷痿證論內經曰肺熱葉焦五臟因而受之發為痿躄心氣熱為脈痿則脛縱而不任地肝氣熱為筋痿故筋急而攣脾氣熱為肉痿則胃干而渴肌肉不仁腎氣熱為骨痿則腰膝不舉骨枯而髓減又曰治痿者獨取陽明一經陽明者五臟六腑之海主潤宗筋能束骨而利機關也衝脈者經脈之海也主滲灌溪谷與陽明合於宗筋陰陽總宗筋之會會於氣衝而陽明為之長皆屬於帶脈而絡於督脈故陽明虛則宗筋弛縱帶脈不引故足痿不用也治法各補其滎而通其腧調其虛實和其逆順筋脈骨肉各以其時受月則病已矣言治諸痿宜調補各臟以待其旺月而病安也丹溪曰內經謂諸痿起於肺熱又謂治痿獨取陽明一經蓋肺金體燥居上而主氣畏火者也脾土性濕居中而主四肢畏木者也火性炎上若嗜欲無節則水失所養火寡於畏而侮所勝肺得火邪而熱矣木性剛急肺受熱則金失所養木寡於畏而侮所勝脾得木邪而傷矣肺熱則不能管攝一身脾傷則四肢不能為用而諸痿作矣瀉南方則肺金清而東方不實何脾傷之有補北方則心火降而西方不虛何肺熱之有故陽明實則宗筋潤能束骨而利機關矣治痿之法無出於此雖然天産作陽厚味發熱凡病痿者若不淡薄食味吾知必不能保其安全也又曰內經論風論痿各有篇目源流不同治法迥異局方乃以治風之藥通治諸痿何其謬哉按丹溪此論一出掃盡千古之弊叮嚀告戒極其明白學者睨而不視則為聵者之雷霆瞽者之日月耳夫醫者為人之司命其可不盡心於此乎脈法脈經曰肺痿脈必浮而弱其人欲咳不得咳咳則出干沫久久則小便不利寸口脈不出反為發汗陽脈早索陰脈不澀三焦踟蹰入而不出陰脈不澀身體反冷其內反煩多吐唇燥小便反難此為肺痿傷於津液便如爛瓜亦如豚腦但因誤發汗故也方法丹溪曰有濕熱有痰有血虛有氣虛亦有死血者有食積妨礙升降者盧氏曰上文論痿起於肺熱實痿之本論治法之大要也而此云然者蓋以其發而為病所因所挾或有不同而主治亦當各著其重也東垣取黃柏為君黃耆等補藥為輔佐以治諸痿無一定之方有兼痰積者有濕多者有熱多者有濕熱相半者有挾氣者臨病制方其善於治痿者乎濕熱用東垣健步丸加燥濕降火之劑黃柏黃芩蒼朮之類濕痰用二陳湯加蒼朮白朮黃芩黃柏之類入竹瀝薑汁血虛用四物湯加蒼朮黃柏下補陰丸氣虛用四君子湯加蒼朮黃芩黃柏黃柏蒼朮治痿之要藥也虎潛丸補腎丸皆可治痿加味四物湯治諸痿四肢軟弱不能舉動當歸身一錢熟地黃三錢白芍藥川芎各七分半五味子九枚麥門冬一錢人參五分黃柏一錢黃連五分知母三分杜仲七分半牛膝三分足不軟者不用蒼朮一錢上細切作一服水二盞煎至一盞空心溫服酒糊為丸服亦可一云血虛者以四物湯加黃柏蒼朮下補陰丸以上丹溪方法凡九條健步丸東垣治膝中無力屈伸不便腰背腿腳沉重行步艱難羌活柴胡滑石炒甘草炙栝蔞根酒洗肉桂各五分防風澤瀉各三錢防己酒洗一兩川烏炮苦參酒浸各三錢上為細末湯煮麵糊為丸如梧桐子大每服七十丸煎愈風湯下一云荊芥湯下按荊芥湯又號為愈風湯也大防風湯局方治兩足痿弱或沉重麻痹不能行動兩膝虛腫名曰鶴膝風等證方見中風門祖傳方治兩足痿弱軟痛或如火焙從足踝下上衝腿胯等證因濕熱所成者蒼朮米泔浸一二宿黃柏酒浸日乾各四兩牛膝去蘆二兩龜板酥炙虎脛骨酥炙防己各一兩當歸尾二兩上為細末麵糊為丸如梧桐子大每服七十丸或一百丸空心薑鹽湯下一方加炮附子五錢鹿角膠丸治血氣虛弱兩足痿軟不能行動久臥床褥之證神效鹿角膠一斤鹿角霜熟地黃各半斤川牛膝白茯苓菟絲子人參各二兩當歸身四兩白朮杜仲各二兩虎脛骨酥炙龜板酥炙各一兩上為細末另將鹿角膠用無灰酒三盞煬化為丸如梧桐子大每服一百丸空心薑鹽湯下諸蟲論內經曰腸胃為市無物不受無物不包又曰飲食自倍腸胃乃傷若夫飲食不能謹節則朝損暮傷自傷成積積久成熱濕熱相生而諸般奇形之蟲各從五行之氣而化生矣若腐草為螢之類是也外臺祕要所謂九蟲者皆能食人腑臟一曰伏蟲長四寸許二曰蛔蟲長尺許三曰白蟲長四五尺余四曰肉蟲狀若爛杏五曰肺蟲其狀如蠶六曰胃蟲狀如蝦蟆七曰弱蟲又名膈蟲狀如瓜瓣八曰赤蟲狀如生肉九曰蟯蟲狀如菜蟲形至細微其伏蟲又為諸蟲之主也蛔蟲生髮多則貫心即殺人白蟲母子相生其形轉大而長亦能殺人肉蟲食人令人煩滿肺蟲令人咳嗽胃蟲令人嘔吐咳逆喜噦弱蟲令人多唾赤蟲令人腸鳴蟯蟲居廣腸多則為痔劇則為癩因人瘡處以生諸癰疽癬瘻瘑疥齲蝕若蟲之類無所不為人亦不必盡有有亦不必盡多或偏有或偏無皆能為害者也凡此諸蟲依附腸胃之間若元氣尚實未為大害稍有虛損遂能侵蝕隨其蟲動而變生諸病也若夫膈噎勞瘵癩風蠱脹狐惑傷寒等證無不生蟲又如鼷鼠應聲蟲之類未易悉舉醫者宜於各類推而治之可也脈法脈沉實者生虛大者死尺脈沉而滑者為寸白蟲䘌蝕陰肛脈虛小者生緊急者死外臺云蟲脈當沉弱而弦今反洪大即知蛔蟲甚也方法丹溪曰濕熱之生蟲臟腑虛則侵蝕上半月蟲頭向上易治下半月蟲頭向下難治以上二月字恐並當作日字蓋蟲無半月一轉頭之理也先以蜜或砂糖或炒吃引蟲頭向上然後用殺蟲藥腹內熱腸胃虛蟲行求食上唇有瘡曰惑蟲食其臟下唇有瘡曰狐蟲食其肛以上丹溪方法凡二條治䘌桃仁湯活人治狐惑唇口生瘡上唇蟲食其臟下蜃蟲食其肛桃仁槐子艾各五錢大棗十五枚上用水二盞半煎至一盞半分二服雄黃鋭散活人治前證雄黃青葙子苦參黃連各二錢桃仁一錢上為末搗新艾汁和捏如小指頭大納穀道中治蟲食其肛也化蟲丸寶鑑治諸蟲鶴蝨去土檳榔苦楝根東引不出土者胡粉炒各一兩明白礬枯二錢半上為細末米糊為丸如梧桐子大一歲兒服五丸量人大小加減丸數溫漿水入生麻油三四點打勻送下清米飲亦可不拘時候其蟲細小者皆化為水大者自下集效丸寶鑑木香鶴蝨炒檳榔訶子麩裹煨去核蕪荑炒附子炮去皮臍乾薑各七錢半大黃一兩半烏梅十四個去核上為末煉蜜丸如麻子大陳皮湯或醋湯下一方加黃連黃柏各七錢半萬應丸外臺檳榔五兩大黃八兩黑醜四兩以上三味為末皂莢十挺不蛀者苦楝根皮一斤上先以皂莢苦楝用水二大碗熬成膏一處搜和藥末為丸如梧桐子大又以沉香木香雷丸各一兩為末為衣先以沉香衣次用雷丸衣又次用木香衣每服三丸四更時用砂糖水送下一方外臺用雞子炒白鑞塵酒糊丸服治寸白蟲一方外臺黑鉛炒成灰檳榔末等分和勻米飲調下化蟲丸外臺能化蟲為水硫黃一兩木香五錢密陀僧三錢附子一枚炮另為末上先以附子末醋一盞熬膏余藥研為細末以附子膏和勻丸如緑豆大每服二十丸荊芥茶清下一方外臺用苦楝根檳榔鶴蝨三味濃煎湯飲之前胡湯治脾勞身熱內有白蟲在脾為病令人好嘔而胸中咳嘔而不出前胡白朮赤茯苓細辛杏仁去皮尖另研草龍膽常山各二錢枳實松蘿各七分旋覆花五分竹葉七片上細切作一服水二大盞煎至一盞去渣溫服如腹中熱滿悶加芒硝五分梔子黃芩苦參各五分加水煎忌桃李雀肉醋生蔥菜等物茱萸根湯外臺治脾勞熱內有白蟲食脾為病與前證同吳茱萸根東引者一錢火麻子八錢陳皮一兩半上三味細切水煎服或下蟲或下黃汁此方治蟲甚驗五膈下氣丸外臺治肺勞熱瘦損內有肺蟲在肺為病令人咳逆氣喘或謂憂忿氣膈寒熱皆從勞之所生名曰膏肓疾針灸不著麥門冬五兩去心蜀椒炒出汗一兩遠志肉附子乾生薑甘草炙各五錢人參七錢半桂心二錢半百部白朮黃耆各七錢半細辛五錢杏仁去皮尖及雙仁者二十四粒上為細末煉蜜丸如彈子大每服一丸徐徐噙化咽汁忌豬肉冷水海藻菘菜生蔥桃李雀肉等物千金散外臺療腎勞熱四肢腫急蟯蟲生於腎中為病貫衆三兩炒乾漆二兩炒煙盡蕪荑胡粉槐白皮各一兩吳茱萸五十粒杏仁四十五粒去皮尖炒上為細末平旦以井花水調服方寸匕漸增之以病瘥止三聖飲子外臺治勞熱生蟲在肺為病吳茱萸根東引者五兩狼牙子三兩桑白皮東引者一升上三味細切以酒七升煮取一升半平旦服盡五鳳丸外臺治肝勞熱生長蟲在肝為病令人恐畏不安眼中赤壅烏雞卵五枚去黃黃蠟三兩乾漆四兩炒煙盡粳米粉半升東引吳茱萸根切三升上五味以茱萸根乾漆杵為細末和入銅銚中火煉可丸如小豆大隔宿勿食清晨以米飲下一百二十丸小兒五十丸蟲即爛盡雷公丸外臺治心勞發熱心裡有長蟲名曰蠱蟲長一尺許貫心即死雷丸炒五枚陳皮一兩二錢半貫衆蕪荑青葙子乾漆炒煙盡各一兩殭蠶十四枚炒亂髮如雞子大塊瓶內燒存性桃仁去皮尖另研一兩二錢半上為細末煉蜜丸如小豆大空心溫酒送下二十丸日三服自前胡湯以下七方治五臟勞蟲方也當與前勞極方互用廣濟療蛔蟲方外臺檳榔十枚細切酸石榴根東引者切二升上二味以水七升煮取二升半去渣以粳米煮稀粥平旦空腹食之少間蟲並死快利神效又治蛔蟲方外臺用苦楝根生子東引不出土者刮去外粗皮取內白皮二兩上以水三碗煮取一碗半去渣用晚粳米三合煮糜粥空心先以炒肉一二片吃引蟲向上然後進藥粥一二口少頃又吃一二口漸漸加至一碗或二碗其蟲盡下而愈祖傳方檳榔丸治小兒疳病積氣塊痛腹大有蟲等證三稜細切醋炒五錢莪朮細切醋炒五錢檳榔一兩枳實去穰麩炒黃色陳皮去白各五錢蕪荑二錢半雷丸五錢鶴蝨三錢略炒乾漆五錢炒無煙木香三錢不見火良薑二錢陳壁土炒砂仁一錢去殼麥糵面五錢炒胡黃連三錢炒甘草炙三錢神麯五錢炒黃色上為細末醋米糊為丸如緑豆大每服三五十丸空心淡薑湯下今加使君子肉五錢尤妙又方治婦人陰蝕瘡陰戶中有細蟲其癢不可忍食入臟腑即死令人發寒熱與勞證相似先用蛇床子煎湯洗淨挹干敷後藥梓樹皮不拘多少上焙乾為末入枯礬四分之一麝香少許敷之立效醫案豫曾治一婦人因採桑見桑有金蟲如蠶者被其毒謂之金蠶毒腹中㽲痛欲死召豫治豫以樟木屑濃煎湯與之大吐吐出有金絲如亂髮者一塊腹痛減十分之七八又與甘草湯連進二三盞而安
