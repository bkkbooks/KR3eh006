body:
  text: 卷之三痢論內經曰溲而便膿血知氣行而血止也愚按經文溲字下必缺一澀字溲即尿也溲澀而便膿血者言病因也蓋血因氣滯而大小二便俱不利耳氣行而血止者言治法也故河間闡明其說所謂和氣則後重自除而用木香檳榔枳殼等藥以和之即此意也河間曰行血則便膿自愈和氣則後重自除又曰後重則宜下腹痛則宜和身重則除濕脈弦則去風膿血稠黏以重藥竭之身冷自汗以熱藥溫之風邪外束宜汗之鶩溏為痢宜溫之又曰在表者發之在裡者下之在上者湧之在下者竭之身表熱者內疏之小便澀者分利之又曰盛者和之去者送之過者止之兵法云避其來銳擊其惰歸此之謂也夫古方以瀉痢滾同論治朱紫混淆殊不知瀉屬脾而痢屬腎也丹溪曰先水瀉而後膿血者此脾傳腎賊邪難愈先膿血而後水瀉者此腎傳脾微邪易愈是皆先哲之格言以為後學之繩墨醫者其可不詳究乎脈法脈經云腸澼下膿血脈沉小流連者生洪大數身熱者死又曰腸澼筋攣脈小細安靜者生浮大而緊者死方法丹溪曰痢赤屬血自小腸來白屬氣自大腸來原病式曰痢為濕熱甚於腸胃怫鬱而成其病皆熱證也俗以痢白為寒誤也如熱生瘡癤而出白膿可以白為寒乎陰陽水火一高則一下一盛則一衰若以白為寒赤為熱則兼赤白者乃寒熱俱甚於腸胃之間而為病乎況下迫窘痛小便赤澀而痢白者必多有之為熱明矣世有用辛熱藥而愈者蓋辛甘發散熱主出行故病微者則鬱結開通氣和而愈若病甚者鬱結不開其病轉加而死矣故治痢者必用寒以勝熱苦以燥濕微加辛熱佐之以為發散開通之用如此固無不效者仲景治痢可下者悉用承氣等湯加減下之大黃之寒其性善走佐以厚朴之溫善行滯氣緩以甘草之甘飲以湯液灌滌腸胃滋潤輕快積行即止局方用砒丹巴硇類聚成丸其氣凶暴其體重滯積氣已行而毒氣未消猶暴賊手持兵刃使之徘徊瞻顧於堂奧之間縱有愈病之功而腸胃清純之氣寧無損傷之患乎可溫者乃用姜附溫之局方例用熱藥為主澀藥為佐用之於下利清白者猶可其裡急後重經所謂下迫者皆屬火熱所為加以澀熱之劑非殺而何初得一二日間元氣未虛必推蕩之此通因通用之法用大承氣湯或調胃承氣湯下後看氣血調理氣用參術血用四物五日後不可下此亦大概言之氣血虛者雖一二日亦不可下實者十餘日後亦有下之而安者腹痛以白芍藥甘草為君當歸白朮為佐惡寒者加桂惡熱者加黃柏腹痛因肺金之氣鬱在大腸之間以苦梗發之後用痢藥一云實則可下虛則以苦梗發之初下痢腹痛者用溫藥薑桂之屬切不可驟用參術縱氣虛胃虛皆不可用後重者積與氣墜下之故兼升兼消尤當和氣木香檳榔丸保和丸之類身熱挾外感者不惡寒用小柴胡去人參發熱惡寒身首俱痛此為表證宜微汗和解加蒼朮川芎陳皮芍藥甘草生薑煎服愚每以上二方並治痢之挾外感者亦多獲奇效也發熱不止者屬陰虛用寒涼藥必兼溫藥升藥大孔痛肛門痛也因熱流於下也木香檳榔芩連加炒乾姜仲景法治大孔痛一曰溫之一曰清之若久病身冷自汗脈沉小宜溫之暴病身熱脈洪大宜清之下血者宜涼血活血當歸黃芩桃仁之類或用朴硝有風邪下陷宜升提之蓋風傷肝肝主血故也有濕傷血宜行濕清熱濕熱下痢小便澀少煩渴能食脈洪大而緩腹痛後重桂苓甘露飲送下保和丸二三十粒濕多熱少脾胃不和食少腹痛後重夜多利下胃苓湯送下保和丸二三十粒氣虛面色痿黃或枯白色人疲倦痢頻並痛後重不食脈細弱或微汗時出黃耆建中湯送下保和丸二三十粒濕熱為痢不渴者建中湯加蒼朮茯苓下保和丸脾胃不和食少腹脹痛後重脈弦緊宜平胃散加芍藥官桂葛根白朮茯苓下保和丸下痢血氣大虛腹痛頻並後重不食或產後得此證用四君子湯加當歸陳皮下保和丸二三十粒下痢白積者用芍藥湯加白朮陳皮甘草滑石桃仁下痢赤積身熱益元散加木通炒芍藥炒陳皮白朮煎湯送下保和丸加黃芩丸久下痢已數日不能起床不食疲弱之甚者用人參五分白朮一錢黃耆五分當歸七分芍藥一錢甘草炙三分御米殼醋炒三分地榆五分木香三分縮砂五分陳皮一錢升麻三分白豆蔻仁三分澤瀉五分上細切作一服水一盞半煎至一盞去渣溫服如下墜異常積中有紫黑血而又痛甚者此為死血證用桃仁細研及滑石行之血痢久不愈者屬陰虛四物為主下痢如豆汁者濕也蓋脾胃為水穀之海無物不受常兼四臟故有如五色之相染當先通利此迎而奪之之義如虛宜審之古方用厚朴專為行凝滯之氣滯氣稍行則去之枳殼雖少緩亦不宜久服只以陳皮和藥可也古方多用粟殼治嗽與痢但要先出病根乃收功後藥也如力倦氣少惡食此為挾虛證宜用白朮當歸身尾甚者加人參陳皮補之虛回而痢自止如久痢體虛氣弱滑泄不止亦當以澀藥止之訶子肉豆蔻白礬半夏牡蠣之類擇而用之然須以陳皮為佐恐太澀亦能作疼又甚者須灸天樞氣海取穴法見前霍亂門如痢已減十之七八穢積已盡糟粕未實用炒芍藥炒白朮炙甘草陳皮茯苓煎湯下固腸丸二三十粒此丸性多燥澀有去濕實腸之功若滯氣未盡除者不可遽用如痢後糟粕未實或食粥稍多或飢甚方食腹中作疼以白朮陳皮二味煎湯和之自安如氣行血和積少但虛坐努責此為無血證倍用歸身尾芍藥生地黃而以桃仁泥佐之陳皮和之血生自安如痢後腳弱漸細小用蒼朮二兩白芍藥龜板各二兩半黃柏五兩粥糊丸以四物湯加陳皮甘草煎湯送下噤口痢胃口熱甚故也用黃連人參煎湯終日呷之如吐則再強飲但得一呷下咽便好又用田螺搗盦臍中以引下其熱胃中熱結當開以降之人不知此多用溫藥甘味以火濟火以滯益滯也亦有誤服熱毒之藥犯胃者當推明而祛其毒用糞蛆焙乾為末清米飲調下一錢匕其效多有時疫作痢傳染相似宜推明運氣之勝復以治之小兒痢疾用黃連黃芩大黃甘草煎服赤痢加桃仁紅花白痢加滑石末同煎一小兒八歲下痢純血作食積治蒼朮白朮黃芩白芍藥滑石茯苓甘草陳皮神麯煎湯下保和丸凡下痢純血者如塵腐色者如屋漏水者大孔開如竹筒者唇如硃紅者俱死如魚腦髓者身熱脈大者俱半死半生經所謂身涼脈細者生身熱脈大者死亦大概言之耳不可一途而論也一方治熱痢血痢用大黃黃連黃芩黃柏枳殼白芍藥川歸滑石甘草桃仁白朮等分神麯糊丸如梧桐子大每服五六十丸白湯下清六丸治血痢神效溫六丸治痢及水瀉皆效以上二方並見泄瀉門固腸丸治濕熱下痢大便下血去腸胃陳積之後用此以燥下濕而實大腸樗根白皮不拘多少細切略炒上一味研為細末米糊為丸如梧桐子大每服三五十丸陳米飲送下或用炒芍藥炒白朮炙甘草陳皮茯苓煎湯下以上丹溪方法凡四十二條芍藥湯行血則便膿自愈和氣則後重自除此藥是也白芍藥二錢當歸尾黃連黃芩各一錢大黃七分甘草檳榔木香桂心各五分上細切作一服水一盞半煎一盞空心服如初病後重窘迫甚者倍大黃加芒硝一錢如痞滿氣不宣通加枳實一錢如臟毒下血加黃柏一錢黃芩芍藥湯河間治瀉痢腹痛或後重身熱久而不愈脈洪數者及膿血稠黏者黃芩芍藥各二錢甘草一錢上細切作一服水一盞半煎至一盞溫服腹痛甚加桂二分稍熱服之黃連湯河間治大便後下血腹中不痛謂之濕毒下血黃連當歸各二錢上細切作一服水一盞半煎至一盞去渣溫服芍藥黃連湯河間治大便後下血腹中痛者謂之熱毒下血芍藥川歸黃連各一錢五分大黃三分桂心一錢五分甘草三分上細切作一服水一大盞煎七分溫服大黃湯河間治痢久不愈膿血稠黏裡急後重日夜無度脈沉實人不甚困倦者或初得腹痛甚者窘迫不安者大黃一兩上細切作一服用好酒二大盞浸半日煎至一盞半去渣分作二服頓飲之如痢未止再進後服後以芍藥湯和之又再服黃芩芍藥湯以徹其邪此乃盪滌邪熱之劑用酒煎者蓋欲其上至頂巔外徹皮毛也香連丸局方治下痢膿血赤白相雜裡急後重黃連二十兩與吳茱萸十兩二味各以好酒拌濕同炒去茱萸木香四兩八錢不見火上為細末醋調麵糊為丸如梧桐子大每服三五十丸清米飲送下一方加石蓮肉半斤治噤口痢尤佳益元散河間謂此為治痢之聖藥也其功不能盡述桂府膩白滑石六兩粉甘草炙一兩上二味共為極細末每服三錢白水調無時神效參香散治痢疾日久穢積已少腹中不痛或微痛不後重窘迫但滑溜不止乃收功之後藥也粟殼去穰蒂醋炙一兩二錢陳皮一兩三錢肉豆蔻麵裹煨四錢茯苓去皮白扁豆炒各四錢木香人參各二錢上為細末每服一錢匕清米飲調下食遠丹溪活套云痢疾乃外感兼內傷之候之須分表裡治之在表者必惡寒發熱身首俱痛宜以小柴胡湯去人參棗子加蒼朮川芎陳皮生芍藥微汗以散之在裡者必後重窘迫腹痛下積早宜以大小承氣湯河間酒煎大黃湯之類下之餘邪未盡更以芍藥湯香連丸之類以徹其邪穢積已盡而更衣未息者此大腸不行收令故也宜以固腸丸參香散之類以止澀之噤口者須詳證按法調治切不可輕用粟殼肉豆蔻訶子之類以試之殺人於反掌之間也但凡痢證不問輕重若邪氣正盛而以粟殼之類止遏之雖不死亦成休息痢二三年不能愈也又不可輕用巴豆牽牛等熱毒之劑攻之蓋病因熱毒又得熱毒之劑以火濟火不死何待祖傳方和中飲治痢疾不分赤白久近服之無有不效者但發熱噤口不食者不可服陳皮白朮茯苓白芍藥各一錢草果仁七分甘草三分陳倉米二錢砂糖三錢粟殼醋炙一錢五分烏梅一個上細切作一服加生薑三片大棗一枚水二盞煎至一盞去渣溫服三根飲治休息痢年久不愈者其效如神五倍木根蒼耳草根臭樗木根刮取白皮上各等分細切每服七錢重加生薑三片大棗一枚大黑豆三十六粒糯米四十九粒水二盞煎至一盞去渣溫服二防飲治痢後不謹感冒寒濕或涉水履霜以致兩足痛痹如刀劙虎咬之狀膝臏腫大不能行動名鶴膝風此藥神效人參白朮黃耆各一錢甘草炙五分川歸川芎芍藥熟地黃各一錢防風防己羌活牛膝各七分杜仲薑汁拌炒萆薢各一錢附子童子尿浸三日去皮臍七分冬月一錢上細切作一服加生薑三片大棗二枚水二盞煎至一盞去渣空心溫服仁齋云下痢噤口不食者雖曰脾虛蓋亦熱氣閉隔心胸間所致也俗用木香則失之溫用山藥則失之閉惟真料參苓白朮散加石菖蒲末以道地粳米飲多年陳倉米尤佳溫調下或人參茯苓石蓮子肉入些少菖蒲為末與之胸次一開自然思食其參苓白朮散本方該有縮砂或少入木香見內傷門醫案一子年將五十夏秋間得痢疾月餘服藥而少愈穢積已但盡糟粕不食晝夜五六次入廁兼脫肛不安又半月諸藥不效予記祖傳一方用池塘中鱉一個如法修事多用生薑米糒作羹入沙糖一小塊不用鹽醬熟煮吃一二碗三日不登廁大腸自此實矣肛門亦收而不脫夫此證蓋因脾土受虛致肺與大腸俱失化源之所滋養是故大腸不行收令也此母能令子虛耳鱉乃介蟲屬金而有土性溫能補脾肺又況肺惡寒先得芩連等寒涼之味已多今用生薑之辛以補肺金用沙糖之甘以補脾土肺氣既實其大腸亦隨而實故得以行收令也故其功效如是之驗焉嘔吐論內經曰諸嘔吐酸暴注下迫皆屬於火東垣曰夫嘔吐噦三者俱屬於胃胃者揔司也以其氣血多少為異耳嘔者陽明也陽明多血多氣故有聲有物氣血俱病也吐者太陽也太陽多血少氣故有物無聲血病也噦者少陽也少陽多氣少血故有聲無物氣病也河間曰胃膈熱甚則為嘔火氣炎上之象也吐證有三氣積寒也皆從三焦論之上焦在胃口上通於天氣主納而不出中焦在中脘上通天氣下通地氣主腐熟水穀下焦在臍下下通地氣主出而不納是故上焦吐者皆從於氣氣者天之陽也其脈浮而洪其證食已即吐渴欲飲水大便燥結氣上衝胸而發痛其治當降氣和中中焦吐者皆從於積有陰有陽食與氣相假為積而痛其脈浮而長其證或先痛而後吐或先吐而後痛治法當以毒藥去其積檳榔木香行其氣下焦吐者皆從於寒地道也其脈沉而遲其證朝食暮吐暮食朝吐小便清利大便秘而不通治法當以毒藥通其秘塞溫其寒氣大便漸通復以中焦藥和之不令大便秘結而自愈也外有傷寒陽明實熱太甚而吐逆者有內傷飲食填塞太陰以致胃氣不得宣通而吐者有胃熱而吐者有胃寒而吐者有久病氣虛胃氣衰甚聞穀氣則嘔噦者有脾濕太甚不能運化精微致清痰留飲鬱滯上中二焦時時噁心吐清水者宜各以類推而治之不可執一見也脈法脈經曰嘔而脈弱小便複利身有微熱見厥者難治跌陽脈浮者胃氣虛寒氣在上噯氣在下二氣相爭但出而不入其人即嘔而不得食恐怖即死寬緩即瘥脈陽緊陰數其人食已則吐陽浮而數亦為吐寸口脈緊而芤緊則為寒芤則為虛虛寒相搏脈為陰結而遲其人則噎關上脈數其人則吐脈弦者虛也胃氣無餘朝食暮吐暮食朝吐變為反胃寒在於上醫反下之令脈反弦故名曰虛寸口脈微而數微則無氣無氣則榮虛榮虛則血不足血不足則胸中冷故吐方法丹溪曰胃中有熱膈上有痰二陳湯加炒梔子姜炒黃連生薑煎服凡嘔吐者切不可下逆之故也有久病吐者胃氣虛不納穀也生薑人參黃耆白朮香附治之凡痞滿短氣而嘔宜補中氣止可用調中益氣湯肝火出胃逆上嘔吐抑青丸方見火門夏月嘔吐不止五苓散加薑汁入湯調服吐蟲而嘔用黑錫炒成灰檳榔末米飲調服噁心吐清水者有熱有痰有虛皆用生薑隨證佐藥治之胃中有熱者二陳湯加薑汁製炒黃連黃芩挾虛者加人參白朮又云胃虛弱嘔者二陳湯加砂仁藿香白朮痰飲為患或因多食生冷脾胃不和以致嘔吐噁心或頭眩或胃脘懊憹不快或發寒熱二陳湯加丁香烏梅生薑煎服心下痞而痛者加草豆蔻仁痰熱噁心嘔吐氣盛者導痰湯加縮砂姜炒黃連竹茹以上丹溪方法凡十條藿香安胃散河間治胃氣虛弱不能飲食時時嘔吐噁心者藿香人參陳皮各一錢丁香五分上細切作一服水一盞煎至七分溫服和中桔梗湯河間治上焦熱氣上衝食已暴吐脈浮而洪宜先和中桔梗一錢五分半夏曲二錢陳皮去白一錢枳實麩炒黃色一錢白茯苓一錢白朮一錢五分厚朴薑汁拌炒一錢上細切作一服水一盞半煎至一盞去渣取清汁調木香散二錢空腹服三服後氣漸下吐漸止然後去木香散加芍藥二錢黃耆一錢半煎服病愈則已如大便燥結食不盡下以大承氣湯去芒硝微下之再服前藥補之如大便復結又依前微下之木香散河間木香檳榔各等分為細末前藥調之服荊黃湯河間治暴吐上焦熱氣所沖脈浮而洪者荊芥穗五錢人參二錢五分甘草一錢大黃一錢五分上細切作一服水二盞煎至一盞去渣調檳榔散二錢空腹服檳榔散河間檳榔三錢木香一錢五分輕粉少許上為細末用前藥調服為丸亦可用水浸蒸餅丸如小豆大每服二十丸食後服清鎮丸河間治上焦吐頭痛發熱有汗脈弦柴胡二兩去蘆黃芩七錢五分甘草五錢半夏五錢青黛二錢五分人參五錢上為細末薑汁浸蒸餅為丸如梧桐子大每服五十丸生薑湯送下食後服白朮湯河間治胃中虛損及有痰而吐者半夏曲五錢白朮二錢檳榔二錢五分木香一錢甘草一錢茯苓二錢上為細末每服二錢生薑湯調下食前服金花丸河間治吐食脈弦者肝乘於脾而吐乃由脾胃之虛宜治風安脾半夏湯泡七次一兩檳榔二錢雄黃一錢五分上為細末薑汁和蒸餅為丸如梧桐子大小兒丸如黍米大生薑湯送下從少至多漸加服之以吐止為度無羈絆於脾故飲食自下紫沉丸河間治中焦吐食由食積與寒氣相假故吐而痛宜服此藥半夏曲二錢烏梅肉二錢代赭石三錢杏仁去皮尖另研一錢砂仁三錢丁香二錢沉香一錢檳榔二錢木香一錢陳皮五錢白豆蔻五分白朮一錢巴豆霜另研五分上為細末入巴豆霜和勻醋麵糊為丸如黍米大每服五十丸食後生薑湯下吐愈則止小兒另丸如芝麻大治小兒食積吐食亦大妙小半夏湯仲景治陽明傷寒不納穀而嘔吐不已者半夏湯泡七次一兩生薑二錢上細切水三盞煎至一盞去渣分作二服服之生薑汁半夏湯活人治胸中似喘不喘似嘔不嘔似噦不噦徹心憒憒然無奈者半夏湯泡洗七次一兩上細切水一盞半生薑自然汁半盞同煎至一盞溫服仲景曰嘔多雖有陽明證慎不可下孫思邈曰嘔家多服生薑乃嘔家之聖藥也氣逆者以辛散之故以生薑為主治之藿香平胃散東垣治內傷飲食填塞太陰嘔吐不已藿香一錢厚朴薑製一錢蒼朮一錢五分陳皮一錢甘草炙三分砂仁五分研神麯五分炒上細切作一服加生薑五片大棗一枚水一盞半煎至一盞去渣溫服胃苓湯局方治證同前平胃散加五苓散加薑棗水煎服之黃連六一湯丹溪治因多食煎煿燒餅熱面之類以致胃脘當心而痛或嘔吐不已漸成反胃黃連六錢甘草炙一錢上細切作一服水一大盞煎至七分去渣溫服丁附治中湯局方治胃傷寒冷之物致心腹㽲痛而嘔噦不止人參五分白朮一錢乾薑一錢甘草炙三分陳皮青皮丁香各一錢附子二錢上細切作一服加生薑五片大棗二枚水一盞半煎至一盞去渣溫服加味二陳湯丹溪治胃中有伏火膈上有稠痰時常胃口作痛及噁心吐清水不快陳皮去白一錢半夏一錢五分炮茯苓一錢甘草炙三分梔子炒一錢黃連薑汁拌炒一錢五分川芎一錢白朮一錢乾薑炒五分蒼朮一錢香附一錢牡荊子炒另研一錢半挾虛者加人參一錢上細切作一服水二盞加生薑三片煎至一盞稍熱服如胃口痛甚入生薑自然汁一合和勻服丁香安胃湯東垣治嘔吐噦胃虛寒所致丁香五分吳茱萸一錢草豆蔻一錢黃耆二錢人參一錢柴胡五分甘草炙五分升麻當歸身陳皮各五分黃柏二分蒼朮一錢上細切作一服水一大盞煎至七分食前溫服茯苓半夏湯東垣治脾胃虛弱身重有痰噁心欲吐風邪羈絆於脾胃之間當先實其脾土白朮一錢茯苓一錢半夏一錢神麯炒一錢橘紅七分天麻七分麥糵面炒黃色一錢二分上細切作一服水一盞半加生薑五片煎至一盞熱服丹溪活套云胃中有熱膈中有痰令人時常嘔吐清水作噯氣吞酸等證用二陳湯加姜炒黃連梔子蒼朮川芎香附砂仁神麯山楂少加木香以行滯氣加姜水煎服久病虛者加人參白朮胃寒者加益智草豆蔻乾薑桂心之類去黃連梔子又甚者加丁香附子如脅痛或脾痛右關脈弦嘔吐不已此木乘土之分也本方加人參白朮升麻柴胡青皮芍藥川芎砂仁神麯之類如時常吐清水或口甘不喜食冷涎自下而湧上者此脾熱所致也本方加白朮芍藥升麻土炒黃連梔子神麯麥芽乾生薑或丸或煎皆可如時常噁心吐清水心胃作痛得食則漸止飢則甚者此胃中有蛔也本方加苦楝根使君子煎服即愈或用黑錫灰檳榔末等分米飲調下醫案在城黃氏婦年將三十產後困食傷致胃虛不納穀四十餘日矣聞穀氣則噁心而嘔聞藥氣亦嘔求予治予曰藥不能入口又將何法以治之乎懇求不已遂制一方用人參白朮茯苓各五錢甘草二分陳皮藿香砂仁各五分炒神麯一錢十年以上陳倉米一合順流水二大白盞煎沸泡伏龍肝研細攪渾放澄清取一盞加薑棗同煎前藥至七分稍冷服此藥遂納而不吐別以陳倉米煎湯時時與之日進前藥二三服漸能吃粥而安後以此法治十數人皆驗噎膈論內經曰三陽結謂之膈子和云三陽者大小腸膀胱也結謂熱結也小腸熱結則血脈燥大腸熱結則不能圊膀胱熱結則津液涸三陽既結則前後閉塞下既不通必反而上行所以噎食不下縱下而復出也此陽火不下降而上行也故經又曰少陽所至為嘔湧溢食不下此理明矣又先哲論膈噎反胃大率以血液乾槁其或咽喉窒塞食不能下其槁在吸門或食下則胃脘當心而痛須臾吐出食出痛止其槁在賁門此皆上焦之膈噎也其或食物可不良久復出其槁在幽門此中焦之膈噎也其或朝食暮吐暮食朝吐其槁在闌門大小腸之間此下焦之膈噎也雖然亦有斯須輕病而為醫所誤者丹溪論之詳矣謂夫氣之初病其端甚微或因些少飲食不謹或外胃風雨內傷七情或食味過厚偏助陽氣積成膈熱或資稟充實表密無汗或性急易怒相火上炎以致津液不行清濁相干惟氣之為病或痞或痛或不思食或噫腐吞酸或嘈雜痞悶醫者不求其本便認為寒遽以辛香燥熱之劑投之時暫得快以為神方厚味仍前不節七情反復相侵舊病被劫暫開濁液易於攢聚或半月或一月前證復作如此蔓延自氣成積自積成痰此為痰為飲為吞酸之由也良工未遇謬藥又行痰挾瘀血遂成窠囊此為痞為痛為嘔吐膈噎反胃之次第也醫者猶謂虛而積寒非尋常草木可療竟以烏附助佐丹劑專意服餌積而久也血液俱耗胃脘乾槁其槁在上近咽之下水飲可行食物難入間或可入食亦不多名之曰噎其槁在下與胃為近食雖可下難盡入胃良久復出名之曰膈亦曰反胃大便秘小若羊屎然名雖不同病出一體又曰噎病生於血乾血陰也陰主靜內外兩靜則臟腑之火不起而金水二臟有養陰血自生腸胃津液傳化合宜何噎之有醫者當知此意不可妄以燥熱之劑以火濟火則何以異刺人而殺之也慎之慎之脈法脈經曰寸緊尺澀其人胸滿不能食而吐吐止者為下之故不能食誤言未止者此為反胃故尺為微澀也誤一作設寸口脈緊而芤緊則為寒芤則為虛虛寒相搏脈為陰結而遲其人則噎關上脈數其人則吐脈弦者虛也胃氣無餘朝食暮吐暮食朝吐變為胃反寒在於上醫反下之令脈反弦故名曰虛趺陽脈浮而澀浮則為虛澀則傷脾脾傷則不磨朝食暮吐暮食朝吐宿穀不化名曰胃反脈緊而澀其病難治脈澀而小血不足脈大而弱氣不足方法丹溪曰大率屬血虛氣虛有痰戴氏曰氣虛者脈必緩而無力血虛者脈必數而無力痰者寸關脈必沉或伏而大有氣滯結者寸關沉而澀張雞峰曰噎當是神思間病惟內觀以自養可安此言深中病情屎如羊屎者不治大腸無血故也年高者不治年五十餘則不可治矣戴氏曰氣血俱虛者則口中多出沫但見沫大出者必死不治治法用童便韭汁竹瀝薑汁牛羊乳一本有驢屎氣虛入四君子湯血虛入四物湯切不可用香燥藥宜薄滋味一法用黃連三錢薑汁炒山楂肉二錢保和丸二錢同為末糊丸麻子大胭脂胚子為衣人參湯入竹瀝下五十丸一方用馬匏兒燒存性陳米湯調服即野田瓜北方多有原本書馬剝兒誤也一云馬匏兒燒存性一錢好棗肉四枚平胃散二錢溫酒調服食即可下然後隨病源調理一方用吳茱萸黃連貝母栝蔞子牛轉草丸服一方用韭汁二兩牛乳一盞生薑半兩搗汁和勻頓服效有氣結者用開導之劑有陰火上炎者作陰虛治有積血者當消息去之韭汁能下膈上瘀血古方用人參以補肺御米以解毒竹瀝以清痰乾薑以養血粟米以實胃蜜以潤燥姜以去穢有治寒者必為當時有實因於寒者用之也挾寒者間或有之今人悉因痰氣久誤於醫傳變而成其無寒也明矣以上丹溪方法凡十一條栝蔞實丸局方治膈噎胸膈痞痛徹背脅喘急妨悶栝蔞實去殼別研枳殼去穰麩炒半夏湯泡七次桔梗炒各一兩上為細末薑汁米糊為丸如梧桐子大每服五十丸生薑湯送下寬中進食丸東垣滋形氣喜飲食方見內傷門人參利膈丸東垣治膈噎胸中不利大便結燥痰嗽喘滿脾胃壅滯推陳致新治膈氣之聖藥也木香檳榔各七錢五分人參當歸藿香甘草枳實麩炒黃各一兩大黃酒濕蒸熟厚朴薑製一兩上為細末滴水為丸如梧桐子大每服五十丸溫水下丹溪活套云凡膈噎反胃悉用二陳湯加薑汁竹瀝童便韭汁之類為主治如胸中覺有熱悶本方加土炒黃連黃芩栝蔞仁桔梗之類如血虛瘦弱之人本方合四物湯少加杏仁泥紅花童便韭汁之類仍不可缺如飲酒人本方加砂糖驢屎入內服如朝食暮吐暮食朝吐或食下須臾即吐者此胃可容受而脾不能傳送也或大小腸秘結不通食返而上奔也本方加酒蒸大黃桃仁之類以潤之脾不磨者本方多加麥糵面神麯之類以助化之如氣虛肥白人膈噎者本方合四君子湯亦加竹瀝薑汁為要藥也有因七情鬱結成氣噎者本方加香附撫芎木香檳榔栝蔞仁砂仁之類凡膈噎大便燥結用大黃乃急則治其標之劑也仍用四物湯加童便韭汁多飲牛羊乳為上策也但不可以人乳代之蓋人乳內有飲食烹飪之火及七情之火存於中故不可代服也祖傳方潤腸膏治膈噎大便燥結飲食良久復出及朝食暮吐暮食朝吐者其功甚捷新取葳靈仙四兩搗汁四五月開花者生薑四兩搗汁真麻油二兩白砂蜜四兩煎沸掠出上沫上四味同入銀石器內攪勻慢火煎候如餳時時以箸挑食之一料未愈再服一料決效大力奪命丸治膈噎不下食及翻胃等證杵頭糠牛轉草各半斤糯米一斤上為細末取黃母牛口中涎沫為丸如龍眼大入鍋中慢火煮熟食之加沙糖二三兩入內丸尤佳一方治噎膈久不納穀者隔年炊飯干不拘多少上一味以急流順水煎煮糜爛取濃汁時時與之待能食後以調脾進食生血順氣之藥調治而安醫案蘇溪金賢九里年五十三夏秋間得噎證胃脘痛食不下或食下良久復出大便燥結人黑瘦殊甚求予治診其脈右手關前弦滑而洪關後略沉小左三部俱沉弦尺帶芤予曰此中氣不足木來侮土上焦濕熱鬱結成痰下焦血少故大便燥結陰火上衝吸門故食不下用四物以生血用四君子以補氣用二陳以祛痰三合成劑加姜炒黃連炒枳實栝蔞仁少加砂仁又間服潤腸丸或服丹溪墜痰丸半年服前藥百餘帖病全安梅林駱氏婦予妻嬸也年四十九身材略瘦小勤於女工得膈噎證半年矣飲食絕不進而大便結燥不行者十數日小腹隱隱然疼痛求予治診之六脈皆沉伏予以生桃仁七個令細嚼杵生韭汁一盞送下片時許病者云胸中略見寬舒以四物湯六錢加栝蔞仁一錢桃仁泥半錢酒蒸大黃一錢酒紅花一分煎成正藥一盞取新溫羊乳汁一盞合而服之半日後下宿糞若干明日腹中痛漸止漸可進稀粥而少安後以四物湯出入加減合羊乳汁服五六十帖而安𩚬逆韻書𩚬與𩚚通氣上逆作聲之名也古方皆以𩚚為咳逆諸書又多誤以咳嗽為咳逆孫真人又誤以噦為咳逆亦有書為吃逆者皆誤也𩚬於立切論內經曰諸逆衝上皆屬於火丹溪曰𩚚病氣逆也以其氣自臍下直衝上出於口之名也東垣謂火與元氣不兩立又謂火為元氣之賊古方悉以胃弱言之而不及火且以丁香柿蒂竹茹陳皮等劑治之未審孰為降火孰為補虛人之陰氣依胃為養胃土損傷則木來侮之矣謂之土敗木賊也陰為火所乘不得內守木挾相火之勢故其氣直衝清道而上言胃弱者陰弱也虛之甚也病者見此似為危證依正法而治之者尚不能保其一二而況誤醫者乎雖然亦有因實而為𩚚者不可不審或因飲食太過填塞胸中而氣不得升降者或有痰閉於上火起於下而氣不得伸越者有為傷寒熱病陽明內實過期而失下清氣不得升濁氣不得降以致氣不宣通而發𩚚者凡若此者皆實證也醫者宜專心致意察審虛實而調治之不可妄為處治以夭人之天年也幸甚脈法脈浮而緩者易治弦急而按之不鼓者難治脈結或促或微皆可治脈代者危右關脈弦者木乘土位難治方法丹溪曰大率有痰有氣虛有虛火上衝視有餘不足治之痰與食在上者吐之人參蘆稀涎散之類不足者補之人參白朮煎湯下大補丸痰用陳皮半夏氣虛用人參白朮陰火用黃連黃柏滑石或吐或補隨證施治𩚚逆自利滑石甘草黃柏芍藥人參白朮陳皮加竹瀝服痢疾發𩚚用人參白朮煎湯調益元散頻服自止以上丹溪方法凡六條陳皮竹茹湯活人治傷寒餘熱未解氣虛發𩚚甘草炙一錢人參二錢陳皮去白三錢青竹茹四錢上細切作一服加生薑三片大棗一枚水煎服橘皮半夏生薑湯治氣虛有痰發𩚚陳皮半夏乾生薑人參通草各一錢上細切作一服水一盞半煎至一盞去渣溫服六君子湯局方治痰挾氣虛發𩚚陳皮一錢半夏一錢五分茯苓一錢甘草一錢人參一錢白朮一錢五分上細切作一服加大棗二枚生薑三片新汲水煎服丹溪活套云凡傷寒發𩚚有四證不可不辨有中氣不足脈虛微氣不相續而發𩚚者宜用補中益氣湯加生脈散黃柏以降虛火或少加附子服之立愈有陽明內實失下而發𩚚者宜大承氣湯下之而愈有渴而飲水太過成水結胸而又發𩚚者宜小陷胸湯或用小青龍湯去麻黃加附子治水寒相搏發𩚚大妙有傳經傷寒熱證醫者誤用薑桂等熱藥助起火邪痰火相搏而為咳逆者宜用黃連解毒白虎湯及竹瀝之類治之祖傳方灸咳逆法乳根二穴直乳下一寸六分婦人在乳房下起肉處陷中灸七壯即止其效如神又氣海一穴直臍下一寸半灸三七壯立止醫案東陽李氏子病傷寒陽明內實醫與補藥治而成發𩚚十日後召予診其脈長而實大與大承氣湯大下之熱退而𩚚亦止盤松周氏子得傷寒證七日熱退而𩚚連聲不絕舉家徬徨召予診其脈六脈皆沉細無力人倦甚以補中益氣湯作大劑加炮附子一錢一日三帖兼與灸乳根氣海三處當日𩚚止脈亦充而平安吞酸論內經曰諸嘔吐酸皆屬於熱惟李東垣獨以為寒誠一偏之見也河間原病式曰酸者肝木之味也由火盛制金不能平木則肝木自甚故為酸也如飲食熱則易於酸矣是以肝熱則口酸也或言為寒者但謂傷生冷硬物而喜噫醋吞酸故俗醫主於溫和脾胃豈知人之傷於寒也則為病熱蓋寒傷皮毛則腠理閉密陽氣怫鬱而為熱證故傷寒熱在表而以麻黃湯熱藥發散使腠理開通汗泄熱退而愈也凡內傷冷物者或但陰勝陽而為病寒或寒熱相搏怫鬱而為病熱亦有內傷冷物而反病熱得汗泄熱退身涼而病愈也或微而止為中酸俗謂之醋心法宜溫藥散之亦猶傷寒解表之義若久吞酸不已則不宜溫宜以寒藥治之後以涼藥調之結散熱去則氣和矣所以中酸不宜食黏滑油膩者謂能令氣鬱不通暢如食物在器覆蓋熱而自酸宜飡糲食菜蔬能令氣之通利也曰寒曰熱於斯明矣學者詳之脈法脈弦而滑兩寸或浮而弦或浮而滑或沉而遲或緊而洪或洪而數或沉而遲胸中有寒飲洪數者痰熱在膈間時吐酸水欲成胃反也方法茱連丸吳茱萸去梗泡浸半日陳皮去白黃芩陳壁土炒各五錢黃連土炒一錢蒼朮米泔浸七錢半上為細末神麯糊丸如綠豆大每服二三十丸津唾嚥下一方茱萸連二味隨時令寒熱迭為佐使寒月倍茱萸熱月依本方蒼朮茯苓為補助湯浸蒸餅為小丸吞之治酸必用茱萸順其性而折之食鬱有痰二陳湯加南星黃芩之類加味平胃散治吞酸因食鬱所致生料平胃散加炒神麯炒麥芽薑棗同煎酸味宜節厚味必蔬食自養則病易安吐清水用蒼朮陳壁土炒茯苓滑石炒白朮陳皮煎服參萸丸上可治吞酸下可治自利又云治濕而氣滯者濕熱甚者用之為響導六一散一料吳茱萸一兩制上為飯丸服以上丹溪方法凡七條藿香安胃散東垣治脾胃虛弱飲食入胃嘔吐作酸不待腐熟藿香丁香人參各二錢五分陳皮五錢上為細末每服二錢加生薑水煎溫服加減二陳湯丹溪治痰飲為患嘔吐頭眩心悸或因食生冷硬物脾胃不和時吐酸水丁香五分半夏陳皮各二錢五分茯苓一錢五分甘草七分半上細切作一服加生薑三片水煎服曲術丸三因治中脘宿食留飲酸蜇心痛吐清水神麯炒三兩蒼朮米泔浸一兩半砂仁一兩陳皮去白一兩上為細末生薑汁別煮神麯糊為丸如梧桐子大每服七十丸薑湯送下祖傳方治吞酸方用黃連吳茱萸各一兩上以黃連細切同茱萸以井花水浸七日去連將茱萸焙乾每日清晨以米湯下四十九粒嘈雜噯氣論內經曰胃為水穀之海無物不受若夫濕面魚腥水果生冷以及烹飪調和黏滑難化等物恣食無節朝傷暮損而成清痰稠飲滯於中宮故謂嘈雜噯氣吞酸痞滿甚則為翻胃膈噎即此之由也夫嘈雜之為證也似飢不飢似痛不痛而有懊憹不自寧之狀者是也其證或兼噯氣或兼痞滿或兼噁心漸至胃脘作痛乃痰火之為患也治法以南星半夏橘紅之類以消其痰芩連梔子石膏知母之類以降其火蒼朮白朮芍藥之類以健脾行濕壯其本元又當忌口節欲無有不安者也脈法右寸關脈緊而滑兩寸弦滑胸中有留飲寸脈橫者膈上有橫積也右關弦急甚者木乘土位欲作胃反難治方法丹溪曰此為食鬱有熱炒梔子姜炒黃連乃必用之藥也肥人宜二陳湯少加撫芎蒼朮白朮梔子若濕痰氣滯不喜食用三補丸加蒼朮倍香附大抵嘈雜是痰因火動令人心嘈似飢非飢有積有熱也治痰為先宜用山梔薑汁炒黃連為君南星半夏陳皮為臣熱多加青黛若食鬱有熱梔子與姜炒黃連不可無蔣氏子心嘈索食以白朮黃連陳皮為丸白湯下七八十丸數服而止嘈雜眩遠是火動其痰二陳加梔子芩連之類噯氣胃中有火有痰用南星半夏軟石膏香附作丸或煎服之蓋胃中有鬱火膈上有稠痰也噫氣吞酸此係食鬱有熱火氣衝上黃芩為君南星半夏陳皮為佐以上丹溪方法凡八條三聖丸治嘈雜神效白朮四兩黃連五錢橘紅一兩上為細末神麯糊為丸如綠豆大每服五十丸津唾下或薑湯下術連丸治嘈雜白朮四兩黃連四錢五分上為細末神麯糊丸如黍米大津唾送下軟石膏丸治嘈雜噯氣南星泡製半夏泡洗軟石膏煅香附童便浸透梔子炒各等分上為細末粥丸如梧桐子大每服五十丸薑湯下曲術丸治中脘有飲則嘈宿食則酸方見吞酸門痞滿論內經曰備化之紀其病痞又曰太陰所至為積飲痞膈夫痞滿之證東垣論之詳矣謂太陰濕土主壅塞乃土來心下為痞滿也傷寒下之太早亦為痞滿乃寒傷榮血而然心主血邪入於本故為心下痞仲景以瀉心湯用黃連瀉心下之土邪功效甚速非止傷寒為然至於酒積雜病下之太過亦作痞滿蓋下多則亡陰也亡陰者謂脾胃水穀之陰亡也故胸中之氣因虛而下陷於心之分野故心下痞宜升胃氣以血藥兼之若全用利氣之藥導之則痞尤甚痞甚而復下之氣愈下降必變為中滿鼓脹皆非其治也又有虛實之異如實痞大便秘者厚朴枳實主之虛痞大便利者芍藥陳皮主之如飲食所傷而為痞滿者宜消導其胸中窒塞之氣上逆兀兀欲吐者則宜吐之所謂在上者因而越之是也學者宜詳究焉脈法脈經曰痞脈浮緊而下之緊反入里因作痞脈濡而弱弱反在關濡反在顛微反在上澀反在下微則陽氣不足澀則無血陽氣反微中風汗出而反躁煩澀則無血厥而且寒陽微不可下下之則心下痞堅右關脈多弦弦而遲者必心下堅此肝木克脾土鬱結涎閉於臟腑氣不舒則痞方法丹溪曰痞滿與脹滿不同脹滿內脹而外亦形痞則內覺痞悶而外無脹急之形也蓋由陰伏陽蓄氣血不運而成位乎心下之中䐜痞滿塞皆土邪之所為耳有因誤下裡氣虛邪乘虛而入於心之分野有因食痰積不能施化鬱而作痞者有濕熱太甚土來心下而為痞者用黃連黃芩枳實之苦以泄之厚朴生薑半夏之辛以散之人參白朮之甘溫以補之茯苓澤瀉之鹹淡以滲之大概與濕同治使上下分消可也以上丹溪方法凡二條厚朴溫中湯東垣治脾胃虛弱心腹脹滿疼痛時發時止厚朴薑汁拌炒陳皮去白各一錢茯苓草豆蔻甘草木香各五分乾生薑一錢上細切水煎服木香順氣湯東垣治䐜脹心腹滿悶木香益智陳皮蒼朮草豆蔻各五分厚朴薑製青皮各四分茯苓澤瀉半夏各六分乾生薑茱萸各三分當歸人參各五分升麻柴胡各一錢上細切作一服水一盞半煎至一盞溫服痞有痰挾血成窠囊者用桃仁紅花香附大黃之類治之七氣湯局方治七情所傷憂思鬱結腑臟氣不和平心腹痞悶半夏茯苓各二錢厚朴薑製一錢五分紫蘇葉一錢上細切作一服加生薑三片水一盞半煎至一盞溫服大消痞丸東垣治一切心下痞及年久不愈者乾生薑神麯炒甘草炙各二錢豬苓二錢五分澤瀉厚朴薑汁拌炒砂仁各三錢半夏湯泡七次去皮臍陳皮去白人參各四錢黃連陳壁土炒去土黃芩如連制各六錢枳實五錢去穰麩炒薑黃白朮各一兩上為細末湯浸蒸餅為丸如梧桐子大每服五十丸至百丸空心白湯下失咲丸一名枳實消痞丸東垣治右關脈弦心下虛痞惡食懶倦開胃進食乾生薑一錢甘草炙麥糵面炒白茯苓白朮各二錢半夏曲人參各三錢厚朴薑製四錢枳實麩炒黃色黃連各五錢上為細末蒸餅為丸如梧桐子大每服七八十丸白湯下消痞湯一名木香化滯湯東垣治因憂氣鬱結中脘腹皮里微痛心下痞滿不思飲食川歸枳實炒各四分陳皮生薑木香各六分柴胡七分甘草炙草豆蔻各一錢麵包煨半夏一錢五分紅花一分上細切作一服加生薑三片水二盞煎至一盞溫服黃連消痞丸東垣治心下痞滿壅滯不散煩熱喘促不安澤瀉薑黃各一錢乾生薑二錢甘草炙茯苓白朮各三錢陳皮五錢豬苓去黑皮五錢枳實麩炒黃色七錢半夏湯泡七次九錢黃連一兩黃芩二兩炒上為細末蒸餅為丸如梧桐子大每服五十丸白湯下黃芩利膈丸東垣除胸中熱利膈上痰生黃芩炒黃芩各一兩半夏黃連澤瀉南星各五錢枳殼麩炒去穰陳皮去白各三錢白朮二錢白礬一錢今加蘿蔔子五錢炒小皂角一錢上為細末湯浸蒸餅為丸如梧桐子大每服五十丸白湯下忌酒濕面魚腥丹溪活套云凡心下痞滿須用枳實黃連如肥人心下痞內有濕飲宜蒼朮半夏縮砂茯苓滑石之類如瘦人心下痞乃鬱熱在上焦宜枳實黃連以導之葛根升麻以發之如人飲食後因冒風寒飲食不消而作痞滿宜吳茱萸縮砂藿香草豆蔻之類溫以化之如脾氣虛弱轉運不調飲食不化而作痞者宜白朮山楂神麯麥芽之類以消之又曰痞滿之證不一有傷寒下早而作痞者枳殼桔梗湯小陷胸湯之類有因飲食填塞胸中而作痞者保和丸東垣枳實導滯丸木香化滯湯之類傷寒下多則亡陰而痞者四物湯加參苓白朮升麻柴胡少佐以陳皮枳殼之類除之或大病後元氣未夏而胸滿氣短者宜補中益氣湯陳皮枳朮丸木香枳朮丸之類夫痞滿之證不可執一全在活法詳脈證虛實而調之可也醫案山頭沈三十一丈年三十餘身材肥盛夏秋間因官差丈量田地辛苦至冬間得痞滿證兩脅氣攻胸中飽悶不能臥欲成脹滿證歷數醫者皆與疏氣耗散之藥皆不效十一月初旬召予診治兩手關前皆浮洪而弦澀兩關後脈皆沉伏予曰此膈上有稠痰脾土之氣敦阜肝木鬱而不伸當用吐法木鬱達之之理也奈何值冬月降沉之令未可行此法且先與豁痰疏肝氣瀉脾胃敦阜之氣用平胃散加半夏茯苓青皮川芎草龍膽香附砂仁柴胡黃連栝蔞子等藥病退之十有三四待次年二月初旬為行倒倉法平安腫脹論內經曰諸濕腫滿皆屬於脾又曰諸腹脹大皆屬於熱夫脾虛不能制水水漬妄行故通身面目手足皆浮而腫名曰水腫或腹大如鼓而面目四肢不腫者名曰脹滿又名鼓脹皆脾土濕熱為病腫輕而脹重也丹溪曰心肺陽也居上腎肝陰也居下脾居中亦陰也屬土經曰飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五精並行是脾具坤靜之德而有乾健之運故能使心肺之陽降腎肝之陰升而成天地交之泰是為平人今也七情內傷六淫外侵飲食不節房勞致虛脾土之陰受傷轉輸之官失職胃雖受谷不能運化故陽自升陰自降而成天地不交之否清濁相混隧道壅塞濕鬱為熱熱又生濕濕熱相生遂成脹滿經曰鼓脹是也以其外雖堅滿中空無物有似於鼓膠固難治又曰蠱者若蟲侵蝕有蠱之義理宜補脾又須養肺以制木使脾無賊邪之慮滋腎以制火使肺得清化之令卻鹽味以防助邪斷妄想以保母氣遠音樂戒暴怒無有不安醫者不察急於獲效病者苦於脹滿喜行利藥以求通快殊不知寬得一日二日復脹愈甚真氣已傷去死不遠矣俗謂氣無補法者以其痞滿壅塞似難於補不思正氣虛而不能運行邪滯著而不出所以為病經曰壯者氣行則愈怯者著而成病氣虛不補邪由何退病何由安且此病之起固非一年根深蒂固欲取速效自取禍耳知王道者可與語此其或受病之淺脾胃尚壯積滯不固者惟可略與疏導而不可峻與利藥也愚按先生此論詳明殆盡誠千古不易之定議也及視東垣脹滿論又以臟寒生滿病立說引脈經胃中寒則脹滿之語以為之證愚恐南北風土寒熱不同難以一途而論雖然愚嘗以丹溪法活人多矣是以東垣之論不與吻合故不敢採取其言以為後人之惑也脈法針經曰其脈大堅以澀者脹也脈經曰關上脈虛則內脹遲而滑者脹脈盛而緊者脹虛而緊澀者脹或弦而遲或浮而數皆脹也丹溪曰水腫脈多沉伏病陽水兼陽證脈必沉數病陰水兼陰證脈必沉遲煩渴小便赤澀大便秘結此為陽水不煩渴大便溏小便少而不赤澀此為陰水脈沉而滑為風水脈浮而遲弦而緊皆為腫也水病腹大如鼓脈實者生虛者死洪大者生微細者死腹脹便血脈大時絕劇脈小疾者死中惡腹大四肢腫脈大而緩者生浮而緊者死緊而榮衛俱絕面浮腫者死唇腫齒焦者死卒唇腫面蒼黑者死掌腫無紋者死臍腫凸出者死缺盆平者死陰囊莖俱腫者死脈絕口張足腫者死足趺腫膝如斗者死方法丹溪曰古方惟禹餘糧丸制肝補脾殊為切當然亦須隨時隨證加減一友人得脹疾自制此藥服之予曰溫熱藥多且煅煉之火尚存宜自加減彼不聽服之一月口鼻出血骨立而死朝寬暮急血虛暮寬朝急氣虛朝暮急氣血俱虛治腫脹大法宜補中行濕利小便以人參白朮為君蒼朮陳皮茯苓為臣黃芩麥門冬為使以制肝木少加厚朴以消腹脹氣不運加木香木通氣下陷加升麻柴胡提之血虛加補血藥痰盛加利痰藥隨證加減用之無不效者盧氏醫鏡以水腫隸於腎肝胃而不及脾又肺金盛而生水水溢妄行豈理也哉夫脾土受病肺為之子固不能自盛而生水然肺金氣清而能生水則滋長腎陰奉行降令為生化之源何病腫之有今為腫之水乃腐濁之氣滲透經絡流注溪谷灌入隧道血亦因之而化水欲借脾土以制之通腎氣以利之殊不知脾病則金氣衰木寡於畏而來侮土脾欲不病不可得矣治法宜清心經之火補養脾土全運化之職肺氣下降滲道開通其精氣之稍清者復回而為氣為血為津液其敗濁之甚者在上為汗在下而為溺以漸而分消矣腰以上腫者宜發汗腰以下腫者宜利小便此仲景之法東垣曰宜以辛散之以苦瀉之以淡滲利之使上下分消其濕正所謂開鬼門潔淨府開鬼門者謂發汗也潔淨府者利小便也產後浮腫必大補氣血少佐以蒼朮茯苓使水自降大劑白朮補脾壅滿者用半夏陳皮香附監之有熱當清肺金麥門冬黃芩之屬熱水腫用山梔子仁炒為末米飲調下三五錢若胃脘熱病在上者連殼用以上丹溪方法凡八條禹餘糧丸局方治中滿氣脹喘滿及水氣脹蛇含石三兩煅針砂五錢禹餘糧三兩同針砂炒以上三味為主其次量人虛實入下項藥木香牛膝蓬莪朮白蒺藜桂心川芎茴香白豆蔻三稜羌活茯苓乾薑青皮陳皮附子炮當歸各五錢上為末湯浸蒸餅為丸如梧桐子大每服五十丸空心溫酒下絜矩三和湯局方陳皮去白紫蘇甘草炙各七分厚朴薑製檳榔白朮各一錢海金砂四分木通二分上細切作一服加生薑三片水煎服紫蘇子湯濟生專治優慮過度致傷脾肺心腹脹滿喘促治腸鳴氣走漉漉有聲大小便不利脈虛而紫澀紫蘇子一錢研白朮二錢人參一錢大腹皮酒洗淨草果仁半夏厚朴木香陳皮枳殼麩炒黃色甘草炙各五分上細切作一服加生薑三片大棗一枚水煎溫服木香順氣湯東垣治濁氣在上則生䐜脹木香三分厚朴四分青皮陳皮益智茯苓澤瀉乾生薑半夏各二分吳茱萸湯泡二分川歸五分升麻柴胡各一分草豆蔻三分蒼朮五分白朮一錢上細切作一服水二盞煎至一盞溫服中滿分消丸東垣治中滿鼓脹氣脹水脹熱脹黃芩去朽細切酒拌炒二次六錢黃連枳實麩炒黃色半夏湯炮七次去皮臍各五錢薑黃白朮人參各二錢五分甘草炙豬苓去黑皮各一錢乾生薑白茯苓砂仁各二錢厚朴薑製五錢知母去毛酒炒澤瀉陳皮去白各三錢上為細末蒸餅糊丸如梧桐子大每服百丸焙熱白湯或淡薑湯下廣朮潰堅湯東垣治中滿腹脹內有積塊堅硬如石令人坐臥不寧二便澀滯上氣喘促或通身虛腫厚朴薑製黃芩黃連益智草豆蔻當歸各五分半夏七分廣朮升麻紅花吳茱萸各二分生甘草柴胡澤瀉神麯炒青皮陳皮各三分渴加乾葛四分上細切作一服加生薑三片水二盞煎七分溫服食遠忌酒醋濕面二服之後中滿減半止有積塊未消再服後藥半夏厚朴湯紅花蘇木各半分木香青皮各二分吳茱萸乾生薑黃連各一分肉桂蒼朮白茯苓澤瀉柴胡陳皮生黃芩草豆蔻麵裹煨生甘草各三分京三稜當歸梢豬苓升麻各四分神麯炒六分厚朴薑製八分半夏湯泡三錢桃仁七個去皮尖研如泥昆布五分如渴加乾葛三分上細切作一服水三盞煎至一盞稍熱服服此藥二帖之後前證又減一半卻於前藥中加減服之破滯氣湯一名木香化滯散東垣破滯氣心腹滿悶甘草炙一分白檀香藿香陳皮大腹子白豆蔻白茯苓桔梗各二分砂仁人參青皮檳榔木香薑黃白朮各四分上細切作一服水一盞半煎至一盞去渣溫服不拘時候草豆蔻湯東垣治腹中虛脹澤瀉一分木香三分神麯四分半夏泡枳實麩炒草豆蔻黃耆春夏不用益智甘草各五分青皮陳皮各六分茯苓當歸各七分上細切作一服加生薑三片水二大盞煎至一盞溫服冬月加黃耆五七分春夏止服正藥食遠溫服葶藶木香散河間治濕熱內外甚水腫腹脹小便赤澀大便滑泄此藥下水濕消腫脹止瀉利小便之聖藥也葶藶子茯苓去皮豬苓去白白朮各二錢五分木香五分澤瀉木通甘草各五錢辣桂二錢五分白滑石三兩上為細末每服三錢白湯調下食前服白朮木香散河間治喘嗽腫滿欲變成水病者不能臥不敢多食小便閉而不通者白朮木豬苓去皮甘草澤瀉木通赤茯苓各五分木香檳榔各三分陳皮去白二錢官桂二分滑石二錢上細切作一服加生薑三片水一盞半煎至一盞溫服二氣散河間治水氣蠱脹滿悶白醜黑醜各二錢上為細末外用大麥面四兩同一處拌勻做燒餅臨臥用茶清一盞下降氣為驗牽牛丸河間治一切濕熱腫滿等證大黃黑醜椒目黃芩滑石各等分上為細末酒煮麵糊為丸如梧桐子大每服五丸至七丸生薑湯下食後服看虛實加減丸數三花神祐丸河間治中滿腹脹喘嗽淋閟一切水濕腫滿濕熱腸垢陳積變生諸疾久病不已黃瘦困倦氣血壅滯不得宣通或風熱燥郁肢體麻痹走注疼痛風痰涎嗽頭目眩運瘧疾不已癥瘕積聚堅滿痞悶酒積食積一切痰飲嘔逆及婦人經病不快帶下淋瀝無問赤白並男婦傷寒濕熱腹滿實痛久新瘦弱俗不能辨兼治新舊腰痛並一切下痢及小兒驚疳積熱乳癖腹滿並宜服之甘遂大戟芫花醋拌濕炒各五錢黑醜二兩取頭末一兩淨大黃一兩輕粉一錢另包不研上為細末同輕粉拌勻滴水為丸如小豆大初服五丸每服加五丸溫水下日三服加至快利為度利後卻又常服病去乃止設病愈後惟老弱久病虛人勿服平人常服保養宜通氣血消進飲食病痞悶極甚者便多服則頓攻不開轉加痛悶宜初服二丸每服加二丸至快利為度以意消息小兒丸如麻子大隨強弱大小增減丸數三四歲者三四丸依前法服宣明雞屎醴飲詞出素問腹中論河間治鼓脹旦食則不能暮食痞滿壅塞難當大黃桃仁去皮乾雞屎上各等分為細末每服二錢水一盞生薑三片煎湯調下食遠臨臥服丹溪活套云凡腹脹須用薑製厚朴肥人腹脹必用利濕蒼朮茯苓滑石海金砂之類色白人腹脹必是氣虛用人參白朮白茯苓之類瘦人腹脹是熱必用黃連黃芩梔子厚朴之類如因有故蓄血而腹脹者用桃仁紅花甚者用抵當湯丸之類如因食積而腹脹者保和丸加木香檳榔阿魏之類有熱鬱而脹者木香檳榔丸之類下之有寒積鬱結而脹者局方丁香脾積丸東垣三稜消積丸之類如因外寒鬱內熱而腹脹者用藿香官桂升麻乾葛之類如因多怒鬱氣而脹者宜用蒼朮撫芎香附青皮芍藥柴胡及龍薈丸之類凡腹脹初得是氣脹宜行氣疏導之劑木香檳榔枳殼青皮陳皮厚朴之類久則成水脹宜行濕利水之劑祖傳方雞屎醴治鼓脹氣脹水脹等證羯雞屎一升上一味研細炒焦色地上出火毒再研極細百沸湯三升淋汁每服一大盞調木香檳榔末各一錢日三服空腹服以平為期又方治腫脹或通身水腫或腹大堅滿三稜莪朮各用醋炒陳皮去白青皮砂仁羌活防己澤瀉連翹檳榔各三錢甘遂二錢五分椒目木香乾漆炒煙盡各一錢白醜黑醜各二兩取頭末九錢大黃八錢雙頭連三錢上研為細末麵糊為丸如梧桐子大每服三錢重空心溫酒送下以利為度病退即止藥忌甘草菘菜鹽醬桃奴丸治婦人或室女月經不通漸成脹滿及男子墜馬跌撲損傷以致瘀血停積成血蠱病皆能治之桃奴桃樹上干朽嫩桃也十二月收用玄胡索豭鼠糞兩頭尖者是雄鼠糞也香附子官桂五靈脂砂仁桃仁去皮尖各等分上為末每服三錢溫酒調下醫案予族八一兄素能飲酒年五十得腫脹病通身水腫腹脹尤甚小便澀而不利大便滑泄召予治予曰若戒酒色鹽醬此病可保無危不然去生漸遠兄曰自今日戒起予以丹溪之法而以參朮為君加利水道制肝木清肺金等藥十帖而小水長大便實腫退而安又半月有二從弟平日同飲酒者曰天民弟素不飲酒山中之鹿耳我與兄水中之魚也鹿可無水魚亦可無水乎三人遂痛飲沉醉而止次日病作甚於前復來求治予曰不可為矣捱過一月而逝梅林妻侄孫駱智二得腫脹證亦令戒前四事用前法服藥四五十帖而愈頗安五年一日嘆曰人不吃鹽醬與死何異遂開鹽十數日後舊病大作再來求治不許又告欲行倒倉法予曰脾虛之甚此法不可行於今日也逾月膨脹而死予用丹溪之法治腫脹愈者多矣不能盡述特書此二人不守禁忌者以為後人病此者之戒云積聚論內經曰積聚留飲痞膈中滿濕積霍亂吐下癥瘕堅硬腹滿皆太陰濕土乃脾胃之氣積聚之根也難經曰積者陰氣也聚者陽氣也故陰沉而伏陽浮而動血之所積名曰積氣之所聚名曰聚故積者五臟所生聚者六腑所成也夫所謂積者陰氣也其始發有常處其痛不離其部上下有所終始左右有所窮處謂聚者陽氣也其始發無根本其痛或隱或見上下無所留止痛發無所定位是故肝之積名曰肥氣在左脅下如覆杯有頭足久不愈令人發咳逆痎瘧連歲不已心之積名曰伏粱起臍上大如臂上至心下久不愈令人煩心脾之積名曰痞氣在胃脘右側復大如盤久不愈令人四肢不收發黃疸飲食不為肌膚肺之積名曰息奔在右脅下大如覆杯久不愈令人灑淅寒熱喘咳發肺癰腎之積名曰奔豚在小腹上至心下若豚狀或上或下無時久不愈令人喘逆骨痿少氣東垣曰針經云其成積者蓋厥氣生足悗足悗生脛寒脛寒則血脈凝澀故寒氣上入腸胃所以腹脹腹脹則腸外之汁沫迫聚而不得散日以成積矣或盛食多飲則脾傷或起居不節用力過度則絡脈傷陽絡脈傷則血外溢血外溢則衄血陰絡脈傷則血內溢血內溢則便血腸胃之絡脈傷則血溢於腸外腸外有寒汁沫與血相搏則凝聚而成積矣或外中於寒內傷於憂怒則氣上逆氣逆則六腧不通溫氣不行凝血蘊裹不散津液凝澀滲著不去而成積矣又曰生於陰者蓋憂思傷心重寒傷肺忿怒傷肝醉以入房汗出當風則傷脾用力過度入浴則傷腎此內外三部之所生病也故難經中說五積各有其名如肝積曰肥氣在左脅下如杯而臍左有動氣按之牢若痛者是無是非也余積皆然治者當察其所痛以知其應有餘不足可補則補可瀉則瀉毋逆天時詳臟腑之高下如寒者熱之結者散之客者除之留者行之堅者削之按之摩之咸以軟之苦以瀉之全其真氣而補益之隨其所利而行之節飲食慎起居和其中外可使必已不然徒以大毒之劑攻之積不能除反傷正氣終難復也可不慎歟脈法脈經曰脈來細而附骨者積也在寸口積在胸中微出寸口積在喉中在關上積在臍傍在關中積在心下微下關積在少腹尺積在氣衝脈出在右積在右脈出在左積在左脈兩出積在中央各以其部處之也在關中一作上關上脈來小沉而實者胃中有積聚不下食食則吐肺積脈浮而毛按之辟易心積脈沉而芤上下無常處脾積脈浮大而長肝積脈弦而細腎積脈沉而急脈沉重而中散者因寒食成積脈左轉而沉重者氣症積在胸中脈右轉出不至寸口者內有肉症也方法丹溪曰塊乃有形之物氣不能成形痰與食積死血也在中為痰飲在右為食積在左為死血大法咸以軟之堅以削之行氣開痰為主治積塊方用海石三稜莪朮香附以上俱用醋煮桃仁紅花五靈脂之類為丸石𨢑白朮湯下黃蜀葵根煎湯入人參白朮青皮陳皮甘草梢牛膝煎成膏入細研桃仁玄明粉各少許熱飲之二服當見塊下病重者須補接之後加減再行石𨢑去痰積食積洗滌垢膩有功瓦壟子能消血塊次消痰瓦壟子即蚶殼也盧尚書移鎮嶺南改蚶名瓦壟子以其殼上有稜如瓦屋故名之耳出領表異錄積塊不可專用下藥徒損其氣病亦不去當消導使之熔化其死血塊去須大補以上丹溪方法凡六條三聖膏貼積塊用未化石灰半斤為末瓦上炒微紅提出候熱稍減入大黃末一兩炒熱仍提出入桂心末五錢略炒以米醋熬成膏厚攤烘熱貼之琥珀膏用大黃朴硝各一兩為末以大蒜搗膏貼之阿魏丸治肉積成塊阿魏山楂各一兩連翹五錢黃連六錢五分上以下三味為細末以阿魏用米醋煮糊為丸如梧桐子大每服五十丸脾胃虛者以白朮三錢陳皮茯苓各一錢煎湯送下一方加半夏一兩以皂角同煮透曬乾用石𨢑三錢又一方以醋煮神麯糊為丸無連翹又一方既兼諸方而又有栝蔞貝母南星風化硝胡黃連萊菔子麥糵面薑汁浸蒸餅為丸治諸般積聚用者更宜詳之大溫中丸小溫中丸俱治食積成痞塊面色痿黃肌膚虛腫飲食無味等證二方俱見黃疸門凡婦人腹中有塊多屬死血一方治婦人死血食積痰飲成塊在兩脅動作雷鳴嘈雜眩運身熱時作時止黃連一兩五錢一半以吳茱萸五錢同炒去茱萸一半以益智五錢同炒去益智萊服子一兩五錢炒臺芎梔子三稜莪朮醋煮麥曲炒桃仁去皮尖各五錢香附童便浸焙乾山楂各一兩上為細末蒸餅為丸如梧桐子大每服五十丸薑湯下一方治婦人血塊如盤有孕難服峻藥香附四兩醋煮桃仁一兩去皮尖另研海石二兩醋煮白朮一兩上為細末神麯糊丸服凡痞塊在皮裡膜外須用補氣藥及香附開之兼二陳湯先須斷厚味為要倒倉法用肥嫩黃牡牛肉二三十斤切成小片去筋膜長流水煮糜爛以布濾去渣滓取淨汁再入鍋中慢火熬至琥珀色則成劑矣令病者預先斷欲食淡前一日不食晚飯設密屋一間明亮而不通風處行之置穢桶及木瓦盆貯吐下之物一瓷瓶盛所出之溺令病者入室以汁飲一杯少時又飲一杯積數十杯寒月則重湯溫而飲之任其吐利病在上者欲其吐多病在下者欲其利多病在中者及在上覆在下者欲其吐利俱多全在活法而為之緩急多寡也視所出之物必盡病根乃止吐利後必渴甚不得與湯以所出之溺飲之名輪迴酒非惟可以止渴抑且可以盪滌余垢行後倦睡覺飢先與稠米飲次與淡稀粥三日後方可與小菜羹次與略厚粥軟飯調養半月或一月自覺精神煥發形體輕健沉疴悉能痊矣其後須忌牛肉數年夫牛坤土也黃土之色也以順為性而效法乎干以為功者牡之用也肉者胃之藥也熟而為液無形之物也橫散入肉絡由腸胃而滲透肌膚毛竅爪甲無不入也積聚久則形質成依附腸胃回薄曲折處以為棲泊之窠臼阻礙氣血津液熏蒸燔灼成病自非刮腸刮骨之神妙可以銖兩丸散窺犯其藩牆戶牖乎肉液之散溢腸胃受之其厚皆倍於前有似乎腫其回薄曲折處肉液充滿流行有如洪水泛漲其浮槎陳朽皆推逐盪漾順流而不可停留在表者因吐而汗其清道者自吐而湧濁道者自泄而去凡屬滯礙一洗而盡牛肉全重厚和順之性盎然渙然潤澤枯槁補益虛損寧無精神煥發之樂乎正似武王克商散財發粟以賑殷人之仰望也其方得於西域之至人凡人於中年後行一二次亦卻疾養壽之一助也夫倒倉法全借自飲輪迴酒十數杯以祛逐余垢迎接調勻新布榮衛使臟氣盲膜生意敷暢有脫胎換骨之功也多嫌其穢因致中輟而功虧一簣若非明物理通造化者其肯視為美醞良味乎此段乃丹溪與人書簡所論也愚按內經謂脾胃者倉廩之官五味出焉大腸者傳道之官變化出焉小腸者受盛之官化物出焉今詳此法名為倒倉謂傾倒倉廩之陳腐也其論中反復叮嚀之意無非只為腸胃中痰積膠固及化生諸般奇形之蟲誠恐痼疾難療愚常屢試明驗惟脾胃與大小腸有食積痰飲而為腹痛痞癖食瘧黃胖痞滿噁心噯氣嘈雜吞酸等證行之無不應手獲效其餘一應氣血虛損與夫反胃膈噎鼓脹癆瘵大風真病已成及肥白氣虛之人或一切證候脈虛軟無力者切不可輕試以自招咎愆丹溪有謂咯血吐紅久病嘗用此法而愈者蓋必其人胃中痰火太盛而真氣壯實未虧亦在丹溪之高見親手用之則可今人效顰而妄以似是而非者行之是乃徒取誚於他人而反謗以丹溪之法不堪信也慎之慎之廣朮潰堅湯東垣治有積塊堅硬如石形大如盤令人坐臥不安二便澀滯上氣喘促或通身虛腫中滿腹脹方見腫脹門半夏厚朴湯東垣治證同前方見腫脹門散聚湯三因治九氣積聚狀如癥瘕隨氣上下發作有時心腹㽲痛攻刺腰脅小腹䐜脹大小便不利半夏檳榔川歸各四分陳皮杏仁去皮尖另研桂心各一錢茯苓一錢甘草炙附子炮川芎各五分枳殼麩炒厚朴薑製吳茱萸湯泡去梗焙乾各一錢五分大黃酒拌濕蒸五分或一錢大便利即去之上細切作一服加生薑三片水二盞煎至一盞溫服大七氣湯濟生方治積聚狀如癥瘕隨氣上下發作有時心腹㽲痛上氣窒塞小腸脹滿益智陳皮京三稜蓬朮香附子炒各一兩五錢桔梗肉桂藿香葉甘草炙青皮各二錢半上㕮咀每服五錢水煎硝石丸千金止可磨塊不令人困須量虛實用之硝石六兩大黃八兩另研人參甘草各三兩上為細末以三年陳米醋三升置瓷器中以竹片作準每入一升作一刻先入大黃不住手攪使微沸盡一刻乃下余藥又盡一刻微火熬使可丸如雞子黃大每服一丸白湯化下或丸如梧桐子大每服三五十丸服後下如雞肝或如米泔赤黑色等物乃效下後忌風冷宜軟粥將息妙香丸局方治久年陳積方見火門導氣枳殼丸治氣結不散心胸痞痛逆氣上攻分氣逐風功莫盡述枳殼去穰麩炒木通青皮陳皮並去白桑白皮炒萊菔子炒白醜炒黑醜炒莪朮煨茴香炒京三稜炮上各等分為細末薑汁調面煮糊為丸如梧桐子大每服三十丸煎橘皮湯下木香三稜丸河間治一切氣悶胸膈痞滿榮衛不和口吐酸水嘔逆噁心飲食不化脅肋疼痛無問久新並皆治之青木香破故紙茴香黑醜甘遂芫花大戟京三稜蓬莪朮炮川楝子葫蘆巴巴戟以上各一兩巴豆不去油二分陳倉米三合與巴豆一處同炒黑砂仁一兩五錢上細切用好米醋二升除砂仁木香外余藥入醋中浸一宿入鍋內煮醋盡干為度同木香砂仁為細末醋煮麵糊為丸如綠豆大每服五丸或七丸食後服看虛實大小加減丸數隨湯水任下草豆蔻丸東垣治酒積或傷寒冷之物胃脘痛咽膈不通草豆蔻麩裹煨白朮各一兩大麥糵神麯各炒黃芩炒半夏各五錢湯炮七次枳實炒二兩陳皮青皮乾生薑各二錢炒炒鹽五錢上為極細末湯浸蒸餅為丸如綠豆大每服一百丸熟水下愚按此方乃飲酒過度恣食寒涼之物有痃癖積飲在胸腹間作痛者之所宜也肥氣丸治肝之積名曰肥氣在左脅下如覆杯有頭足久不愈令人發咳逆痎瘧連歲不已厚朴薑製五錢黃連七錢柴胡二兩川椒四錢炒去合口者巴豆霜五分乾薑泡五分川烏炮二分皂角去皮弦炙一錢五分白茯苓一錢五分廣莪朮炮二錢五分人參二錢五分甘草炙三錢昆布酒洗二錢五分上件除茯苓皂角巴豆霜另研末外諸藥共為極細末和勻煉蜜為丸如梧桐子大初服二丸一日加一丸二日加二丸漸漸加至大便微溏再從二丸起加服之周而復始積減大半勿服伏梁丸東垣治心之積名曰伏粱起臍上大如臂上至心下久不愈令人煩心黃連一兩五錢厚朴薑製人參各五錢黃芩三錢炒桂枝一錢乾薑炮菖蒲巴豆霜各五分紅豆蔻二分川烏頭炮五分茯神丹參炒各一錢上件除巴豆霜外為細末另研巴豆霜旋入末和勻煉蜜丸如梧桐子大服如上法淡黃連湯下痞氣丸東垣治脾之積名曰痞氣在胃脘復大如盤久不愈令人四肢不收發黃疸飲食不為肌膚厚朴薑製四錢黃連八錢吳茱萸三錢黃芩二錢炒白茯苓去皮人參去蘆澤瀉各一錢川烏炮五分川椒五分炒茵蔯酒炒乾薑炮砂仁各一錢半白朮二分巴豆霜四分桂皮四分上件除巴豆霜另研茯苓另末旋入外同為細末和勻煉蜜為丸如梧桐子大服如上法淡甘草湯下息奔丸東垣治肺之積名曰息奔在右脅下大如覆杯久不愈令人灑淅寒熱喘咳發肺癰厚朴薑製八錢黃連炒一兩三錢乾薑炮白茯苓去皮川椒炒去合口者紫菀各一錢五分川烏炮桔梗去蘆白豆蔻去殼陳皮去白京三稜醋煮天門冬去心各一錢人參二錢青皮五分去白巴豆霜四分上件除茯苓巴豆霜各另研旋入外同為細末和勻煉蜜為丸如梧桐子大服如上法淡薑湯送下以上四方秋冬加厚朴減黃連四分之一奔豚丸治腎之積名曰奔豚發於小腹上至心下若豚狀或上或下無時久不愈令人喘逆骨痿少氣及治男子內結七疝女人瘕聚帶下厚朴薑製七分黃連五錢炒白茯苓去皮澤瀉菖蒲各二錢川烏炮丁香各五分苦楝酒煮三錢玄胡索一錢五分炒全蠍去毒尾附子炮獨活各一錢肉桂一分去粗皮巴豆霜五分上件除巴豆霜茯苓各另研為末旋入外共為細末和勻煉蜜為丸如梧桐子大淡鹽湯下服如上法虛損論內經曰飲食飽甚汗出於胃驚而奪精汗出於心持重遠行汗出於腎疾走恐懼汗出於肝搖體勞苦汗出於脾又曰久視傷血久臥傷氣久坐傷肉久立傷骨久行傷筋若夫七情五志之火飛越男女聲色之欲過淫是皆虛損之所由也機要曰虛損之疾寒熱因虛而感也感寒則損陽陽虛則陰盛損自上而下一損損於肺皮聚而毛落二損損於心血脈虛少不能榮於臟腑婦人則月水不通三損損於胃飲食不為肌膚治宜以辛甘淡過於胃則不可治矣感熱則損陰陰虛則陽盛損自下而上一損損於腎骨痿不能起於床二損損於肝筋緩不能自收持三損損於脾飲食不能消克治宜以苦酸鹹過於脾則不可治矣又曰心肺損而色弊腎肝損而形痿難經曰治損之法損其肺者益其氣損其心者補其榮血損其脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精是皆虛損病因治法之大要也學者詳之脈法脈經曰脈來軟者為虛緩者為虛微者為虛弱者為虛弦者為中虛脈來細而微者血氣俱虛脈小者血氣俱少要略曰脈芤者為血虛脈沉小遲者脫氣又曰血虛脈大如蔥管又曰脈大而芤者脫血方法丹溪曰天為陽而運於地之外地為陰而居乎天之中天之大氣舉之日實也屬陽而運於月之外月缺也屬陰稟日之光以為明人受天地之氣以生天之陽氣為氣地之陰氣為血故陽常有餘而陰常不足氣常有餘而血常不足也又曰經曰精不足者補之以味味陰也補精以陰求其本也然味乃如谷菽果菜出於天賦自然沖和之味故有食人補陰之功非醯醬烹飪調和偏厚之味出於人為者也經曰陰之所生本在五味非天賦之味乎曰陰之五宮傷在五味非人為之味乎善攝生者不可謂味以補精而遂恣於口腹以自速其禍也又曰形不足者溫之以氣溫養也溫存以養使氣自充氣充則形完矣曰補曰溫各有其旨局方悉以溫熱藥佐輔名曰溫補豈理也哉又曰人年老或虛損精血俱耗陰不足以配陽孤陽幾於飛越天生胃氣尚爾留連又借水穀之陰故羈縻而定耳局方用溫劑劫虛蓋脾胃得溫而食進故亦暫可夫質有厚薄病有淺深設或失手何以收救吾寧稍遲計出萬全溫劑補虛決不敢用以上丹溪方法凡一條丹溪治老人虛損但覺小水短少即是病進宜以人參白朮為君牛膝芍藥為臣陳皮茯苓為佐春加川芎夏加黃芩麥門冬秋冬加當歸身倍生薑一日或一帖或二帖小水之長若舊乃止此老人養生之捷法也此丹溪養母之方也四君子湯局方治氣虛人參一錢五分白朮茯苓各二錢甘草一錢上細切作一服水煎如自汗或小水利者去茯苓加黃耆二錢無汗小水不利者只依本方四物湯局方治血虛川歸二錢川芎芍藥各一錢五分熟地黃二錢上細切作一服水煎服春倍川芎夏倍芍藥秋倍地黃冬倍當歸八物湯治氣血兩虛四君子合四物湯共為一劑如上法加減煎服六君子湯治氣虛挾痰方見𩚬逆門十全大補湯局方治氣血俱虛而挾寒者人參黃耆甘草白茯苓當歸白朮白芍藥肉桂熟地黃芎藭各等分上細切每服一兩重加生薑三片大棗一枚水二大盞煎至盞溫服加減法宜詳前論大補陰丸降陰火補腎水黃柏鹽酒拌新瓦上炒褐色知母去毛酒拌濕炒各四兩熟地黃須用懷慶者佳酒洗焙乾用龜板酥炙黃各六兩上為細末豬脊骨髓和煉蜜為丸如梧桐子大每服五十丸空心姜鹽湯下補陰丸一名虎潛丸丹溪黃柏半斤如前制知母去毛酒製炒熟地黃各三兩龜板酥炙四兩白芍藥煨陳皮牛膝各二兩虎脛骨一兩瑣陽酥炙當歸各一兩五錢上為細末酒煮羯羊肉為丸鹽湯下冬加乾薑五錢加味虎潛丸丹溪人參黃耆芍藥煨黃柏鹽酒炒當歸酒洗山藥各一兩瑣陽酥炙枸杞子虎脛骨酥炙菟絲子鹽酒浸三宿細研焙乾入諸藥再研龜板酥炙破故紙炒杜仲薑汁拌炒絲斷五味子各七錢五分牛膝去蘆酒洗二兩熟地黃四兩上為細末煉蜜和豬脊骨髓為丸如梧桐子大每服五六十丸溫酒或姜鹽湯下滋陰大補丸丹溪川牛膝去蘆山藥各一兩五錢杜仲薑汁拌炒絲斷巴戟去心山茱萸去核肉蓯蓉酒浸洗新瓦上焙乾五味子白茯苓去皮茴香炒遠志去心甘草同煮各一兩石菖蒲枸杞子各五錢熟地黃二兩上為細末紅棗肉和煉蜜為丸如梧桐子大每服七十丸淡鹽湯或溫酒空心下與上虎潛丸相間服之佳所謂補陰和陽生血益精潤肌膚強筋骨性味清而不寒溫而不熱非達造化之精微者未足以議於斯也補腎丸丹溪黃柏龜板各二兩杜仲各依前制牛膝陳皮各二兩乾薑五錢冬加五味子二錢冬用一兩上為細末薑汁糊或酒糊為丸服溫酒或白湯空心下補天丸紫河車一具即產孩胞衣也古方不分男女世傳男用女胎女用男胎者俱以初胎者為勝似為有理若不可得但求肥盛無病婦人者俱可用初取得長流水洗淨去筋膜以篾籠盛之外以紙糊使不泄氣焙乾要用時以米醋浸一宿焙乾用上以前補腎丸藥為末同河車再研極細酒糊為丸或新取紫河車蒸熟同前藥末搗爛為丸亦可虛勞者當以骨蒸藥佐之一云氣虛加補氣藥血虛加補血藥一方用側柏葉烏藥葉俱以酒浸九蒸九曝亦同紫河車為丸名補腎丸六味地黃丸局方治腎經虛損久新憔悴盜汗發熱五臟齊損瘦弱虛煩骨蒸痿弱下血咯血等證乾山藥山茱萸去核各四兩澤瀉去毛牡丹皮白茯苓各三兩熟地黃八兩上為細末煉蜜為丸如梧桐子大每服五十丸白湯下人參固本丸局方天門冬去心麥門冬去心生地黃各二兩人參去蘆一兩熟地黃二兩上各焙乾同磨為末勿犯鐵器煉蜜為丸或只以天門冬熟地黃二味量酒浸搗膏同三味末杵千餘下丸如梧桐子大每服五七十丸空心姜鹽湯下忌蘿蔔人參膏丹溪人參一味不拘多少去蘆細切量水於銀石器內慢火煎如稠餳瓷器盛貯每服一二匙白湯點服補中益氣湯東垣治飲食失節勞役所傷暴傷元氣惡寒發熱證似傷寒者方見內傷門益胃升陽湯東垣血脫益氣古聖人之法也先補胃氣以助生髮之氣故曰陽生陰長諸甘藥為之先務舉世皆以為補殊不知甘能生血從陽而引陰也故先理胃氣蓋人之身谷為寶也柴胡升麻各二分五釐當歸身酒洗炙甘草陳皮各五分人參久嗽不用炒神麯各七分五釐黃耆一錢蜜炙白朮一錢五分生黃芩二分上細切作一服水二盞煎至一盞溫服如腹中痛每服加白芍藥五分中桂二分如渴或口燥加葛根三分耆附湯嚴氏治陰虛氣弱虛汗大出不止肢體倦怠川附子炮黃耆蜜炙各二錢上細切作一服加生薑三片大棗二枚水一盞半煎至一盞溫服參附湯嚴氏治真陽虛乏上氣喘息自汗盜汗短氣頭旋眼花人參五錢川附子炮去皮臍一兩上細切分作三服加姜水煎溫服茯神湯濟生治六脈虛軟咳則心痛喉中介介或腫或痛茯神人參遠志通草麥冬去心黃耆蜜炙桔梗各六分甘草五味子各三分上細切作一服加生薑一片水煎服補氣湯瑞竹堂方治氣虛脈浮而軟怔忡無時黃耆二分一本作二錢人參甘草各一錢麥門冬去心桔梗去蘆各七分上細切作一服加生薑三片水二盞煎至一盞溫服延壽丹千金治諸虛百損怯弱欲成癆瘵及大病後虛損不復凡人於中年後常服可以卻疾延年五味子菟絲子煮爛另研川牛膝杜仲薑汁拌炒絲斷川歸酒浸山藥天門冬麥門冬去心生地黃熟地黃各一兩肉蓯蓉二兩人參白茯苓大茴香澤瀉地骨皮鹿茸菖蒲九節者花椒巴戟去心遠志去心覆盆子炒去汁枸杞子柏子仁各五錢上共磨為細末勿犯鐵器蒸搗煉蜜為丸如梧桐子大每服一百丸空心溫酒或姜鹽湯下如大便溏小便不利加車前子二兩如精滑或夢遺加赤石脂山茱萸肉各五錢忌蘿蔔菜斑龍丸青囊集方治真陰虛損老人虛人常服延年益壽鹿角膠炒成珠子鹿角霜菟絲子酒浸研細柏子仁取仁洗淨熟地黃各半斤白茯苓補骨脂各四兩上磨為細末酒煮米糊為丸或以鹿角膠入好酒烊化為丸如梧桐子大每服五十丸空心姜鹽湯下昔蜀中有一老人貨此藥於市自云壽三百八十歲矣每歌曰尾閭不禁滄海竭九轉金丹都謾說惟有斑龍頂上珠能補玉堂關下闕當時有學其道者傳得此方桂枝加龍骨牡蠣湯仲景治六脈芤動微緊男子失精女人夢交及盜汗自汗等證桂枝白芍藥各三錢甘草炙二錢龍骨牡蠣各三錢上細切加薑棗水煎愚恐此證不可用姜祖傳方治心虛手振川歸身一兩五錢川芎一兩粉甘草一兩五錢生地黃一兩五錢遠志去心二兩五錢酸棗仁柏子仁各三兩人參一兩辰砂五錢另研金箔二十斤麝香一錢琥珀三錢茯神七錢膽南星五錢半夏五錢石菖蒲六錢上為極細末蒸餅為丸如綠豆大辰砂為衣每服七八十丸津唾嚥下或薑湯送下醫案本邑在城金儒元國子生也年五十餘身略瘦十年前得內傷挾外感證一醫用發表疏利之劑十數日後熱雖退而虛未復胸中痞滿氣促眩運召予治以補中益氣湯間與東垣消痞丸陳皮枳朮丸等藥調理而安但病根未盡除而住藥故眩運或時而舉不甚重來延至此年因往杭城跋涉辛苦而兼色欲之過還家眩運大作歷數醫皆與防風羌活荊芥南星半夏蒼朮等去風散濕消痰之劑病愈重一日十數次厥去片時夏蘇凡動或轉側即厥不知人事舉家徨徨叫哭召予治診其六脈皆浮洪而濡予曉之曰此氣血大虛證幸脈不數而身無大熱不死但恐病愈後而有數年不能下榻行動病者曰只要有命臥亦甘心與大補氣血之藥倍人參黃耆或加附子引經合大劑一日三帖又煎人參膏及作紫河車丸補陰丸之類間服如此調理二月餘服煎藥二百餘帖丸藥三五料用人參五六斤其證漸不厥飲食如故但未能行動耳次年聞王布政汝言往京師道經蘭溪以舟載去彼俟候求診王公曰此證陰虛風痰上壅因誤服參耆多故病久不愈立方以天麻菊花荊芥川芎等清上之藥亦未見效住藥後越五六年方得起而步履如初儒元不思昔日病劇而借參耆等藥之功遂以王公之語歸咎於予用藥之誤噫彼時若非峻補何以得一儒元見王公耶嗚呼此誠得魚忘筌得兔忘蹄也可勝嘆哉東陽邑庠鄒掌教先生一證發大汗戰鼓慄振掉片時許發燥熱身如火燒又片時許出大汗如雨身體若冰冷而就發寒戰如前寒後有熱熱後有汗三病繼作而晝夜不息庠生盧明夫與作瘧症治不效召予診其右手陽脈數而浮洪無力陰脈略沉小而亦虛左三部比右差小而亦浮軟予曰此陽虛證也用補中益氣湯倍參耆減升柴一半加尿浸生附子一錢半炒黃柏三分乾薑薄桂各五分大棗一枚同煎服一服而病去三分二服而減半四服寒熱止而身尚有微汗減去桂附乾薑一半服二帖全愈勞極論內經曰陰虛生內熱又曰陰氣者靜則神藏躁則消亡飲食自倍腸胃乃傷又曰有所勞倦形氣衰少穀氣不盛上焦不行下脘不通而胃氣熱熱氣熏胸中故內熱是故欲養陰而延生者心神宜恬靜而毋躁擾飲食宜適中而無過傷風寒暑濕之謹避行立坐臥之有常何勞怯之有哉今也嗜欲無節起居不時七情六慾之火時動乎中飲食勞倦之過屢傷乎體漸而至於真水枯竭陰火上炎而發蒸蒸之燥熱或寒熱進退似瘧非瘧古方名曰蒸病或二十四種或三十六種名雖不同證亦少異大抵不過咳嗽發熱咯血吐痰白濁白淫遺精盜汗或心神恍惚夢與鬼交婦人則月閉不通日漸尫羸漸成勞極之候夫病此者始多未免姑息日久直至發熱不休形體瘦甚真元已脫然後求醫治療雖倉扁復生莫能救其萬一良可嘆哉雖然一人未足憐也況其侍奉親密之人或同氣連枝之屬薰陶日久受其惡氣多遭傳染名曰傳屍又曰喪屍曰飛屍曰遁屍曰𣩄殜曰屍注曰鬼注蓋表其傳注酷虐而神妙莫能以測之名也雖然未有不由氣體虛弱勞傷心腎而得之者初起於一人不謹而後傳注數十百人甚而至於滅族滅門者誠有之矣然此病最為可惡其熱毒鬱積之久則生異物惡蟲食人臟腑精華變生諸般奇狀誠可驚駭是以勞傷於肝膽者則為毛蟲如刺蝟瓦蛆之屬食人筋膜勞傷於心與小腸者則為羽蟲如燈蛾蚊虻禽鳥之形食人血脈勞傷於脾胃者則為倮蟲如嬰孩蚯蚓之類食人肌肉勞傷於肺與大腸者則為介蟲如龜鱉蝦蟹之狀食人膚膏傷於腎與膀胱者則為鱗蟲如魚龍鯪鯉之形食人骨髓或挾相火之勢亦如羽蟲之酷者鴟梟之類為狀不一不可勝紀凡人覺有此證便宜早治緩則不及事矣治之之法一則殺其蟲以絕其根本一則補其虛以復其真元分經用藥各有條理務如庖丁解牛動中肯綮無有不安者也若待病勢已劇元氣已脫雖依古法取蟲滋補患者百無一生但亦可絕後人之傳注耳學者詳之脈法脈經曰男子平人脈大為勞極虛亦為勞男子勞之為病其脈浮大手足煩春夏劇秋冬瘥陰寒精自出足痠軟不能行少陰虛滿人年五十六十其病脈大者痹俠背行苦腸鳴馬刀挾癭者皆為勞得之男子平人脈虛弱微細者喜盜汗出也男子面色薄白主渴及亡血卒喘心悸其脈浮者裡虛也男子脈虛沉弦無寒熱短氣裡急小便不利面色白時時目瞑此人喜衄小腹滿此為勞使之然男子脈微弱而澀為無子精氣清冷也夫失精家小腹強急陰頭寒目眶痛一云目眩發落脈極虛芤遲為消穀亡血失精脈得諸芤動微緊男子失精女人夢鬼交通脈沉小遲者名脫氣其人疾行則喘喝手足逆寒腹滿甚則溏泄食不消化脈弦而大弦則為減大則為芤減則為寒芤則為虛虛寒相搏此名為革婦人則半產漏下男子則亡血失精方法丹溪曰此陰虛之極痰與血病多有蟲者其傳屍一證不可云無大法四物湯加童便竹瀝薑汁身瘦屬火因火燒爍也肉脫甚者難治氣血虛甚發熱成癆者補天丸加骨蒸藥佐之骨蒸藥知母黃柏地骨皮麥門冬秦艽青蒿鱉甲石膏竹葉烏梅之類傳屍勞寒熱交攻久嗽咯血日益羸瘦先以三拗湯次以蓮心散蓮心散川歸黃耆甘草炙鱉甲醋炙黃前胡獨活羌活防風防己茯苓半夏黃芩陳皮阿膠炒成珠官桂芍藥麻黃不去根節杏仁另研蓮肉此味當用蓮花內須南星川芎枳殼麩炒各五分芫花醋炒黑色一撮柴胡五分上細切作一服加生薑三斤大棗一枚水二盞煎至一盞去渣溫服須待吐有異物芫花漸減少蓋芫花與甘草相反其反甘草所以殺蟲炒之所以斷熱去寒妙處在此以上丹溪方法凡四條青蒿飲子丹溪治勞瘵青蒿一斗五升童便三斗上以文武火熬約童便減去二斗去蒿再熬至一升入豬膽汁七十或加辰砂檳榔末三五錢再熬數沸甘草末收之每服抄一匙清湯點服極妙白蠟塵一味大殺瘵蟲可入丸散藥中用丹溪秘傳取傳屍勞蟲鬼哭飲子青囊集方天靈蓋酥炙黃色鱉甲醋炙黃色柴胡去蘆各二錢五分木香一錢二分半桃仁二十一枚去皮另研鼓心醋炙酥黃色青蒿半握阿魏一錢安息香一錢貫眾二錢五分甘草一錢生用上十一味細切杵為粗末先以童子小便二升隔夜浸露星月至四更時煎至八分去渣分作三服每服調後散子一帖五更初溫服即穩臥至三點時又進一服至日出時覺腹中欲利如未利又進服已利勿服散子方用檳榔二錢五分辰砂一錢二分半赤腳蜈蚣以竹筒盛薑汁浸焙乾一條麝香一錢另研烏雞糞二錢五分先將雞於五日前以火麻子喂之然後取其糞用上以五味研為細末和勻分為三帖各入前煎藥內服服前藥必利下惡物並蟲以盆盛之急用火燒殺之或油煎殺之其病人所穿衣服及薦褥盡易燒之食蔥粥將息以復元氣如取下蟲視其色青赤黃者可愈黑色者難療也雖蟲老病不可療亦能絕後人之傳注耳合此藥時不可令患者知之與聞其氣息蟲聞氣變化難取也治勞瘵取蟲經驗天靈蓋散青囊方天靈蓋二指大用白檀香煎湯洗酥炙黃色檳榔五個為末阿魏二錢細研麝香三分另細研辰砂一錢另研甘遂連珠者二錢為末安息香三分銅刀切細研上七味各研極細和勻每服三錢後湯調下薤白二七莖青蒿二握甘草五寸許蔥白二七莖桃枝柳枝桑枝酸石榴枝梅枝各七寸以上五枝俱取向東南者上九味用童子小便四升於銀石器內以文武火煎至一升去渣分作三盞調前藥末服五更初服一盞服後如覺欲吐以白梅肉噙止之五更盡覺臟腑鳴須轉下蟲及惡物黃水若一服未下如人行五七里又進一服至天明又進一服如瀉不止用龍骨黃連等分為末熟水調下五錢或吃白粥補之此藥煎時不可令患者知麝香散治男子婦人骨蒸發熱五勞七傷等證天靈蓋二錢半柴胡一兩犀角屑半兩甘草三寸東引桃枝東引柳枝東引榴枝青蒿各一握阿魏一錢另研薤白蔥白各七寸麝香二錢半上細切杵為粗末用童便二升半浸藥一宿明日早煎至一升半去渣分作三服每服用檳榔細末三錢溫服五更初進一服約人行五七里再進一服若噁心兀兀欲吐嚼白梅止之三服後瀉出惡物異蟲或身如蟻行不可名狀後用蔥粥止之忌風一月及忌食油膩濕面鹹酸並牛羊雞豬犬肉魚腥年遠重病不過二服全安凡取蟲後須以後大補茯神散補之取屍蟲神仙方青囊青桑枝柳枝梅枝桃枝石榴枝各七莖俱長七寸皆取東引者青蒿一握蔥白七莖阿魏一錢另研安息香一錢去石另研上除阿魏安息香二味外余藥用童子小便一升半煮去一半去渣將藥汁阿魏安息香細研再煎十數沸分作二服調辰砂檳榔末各五分麝香少許另研上三味亦分作二服入前湯五更初進一服三點時又進一服至巳午晚必取下蟲其嘴紅者可治青黑者不治但可絕後人之傳注耳取蟲後進軟粥溫和將息忌食生冷毒物仍服紫河車丸凡合此藥不可令患者先知氣味神授散局方此方得之於河南郡王府濟世既久功不可述也川椒二斤擇去閉口者與梗略炒出汗上一味為細末每服二錢空心米湯送下或用酒米糊為丸如梧桐子大每服二三十丸漸加至八九十丸空心酒下或米湯下凡人得傳屍勞病氣血未甚虛損元氣未盡脫絕者不須多方服食但能早用此藥無有不愈者真濟世之寶也愚常治一婦人用花椒二分苦楝根一分丸服屍蟲盡從大便泄出治勞極禁方無比丸一名紫河車丸一名調鼎方治傳屍勞瘵二月可愈其餘勞怯之症服一月平安紫河車一具初生者佳或無病壯年婦人者亦可一說男病用女女病用男者若不可得亦不必拘束米醋浸一宿焙乾用草龍膽甘草炙各二錢鱉甲酥炙五錢桔梗胡黃連大黃酒拌濕蒸苦參黃柏一本黃藥子誤知母去毛秋石另研不必用煎煉者但尿桶上凝結多年者亦可又名人中白長流水洗淨用以上各二錢五分貝母二錢五分去心犀角屑蓬莪朮硝石各一錢五分敗鼓皮心一本鼓心誤也本草謂鼓心通靈能逐飛屍鬼注故用之米醋炙黃二錢五分辰砂一兩另研上共為細末煉蜜為丸如梧桐子大辰砂為衣每服二十丸加至三十丸溫酒送下脅熱食前膈熱食後服秘傳取勞蟲禁方青囊方啄木禽一隻上用硃砂四兩精豬肉四兩將肉切作片子共硃砂杵如綠豆大塊二味拌勻喂禽一晝夜食肉盡為度以鹽泥固濟其禽在內剛火煅一夜來日不見太陽取出不得打破埋入地中二尺許一晝夜取出去鹽泥銀石器內研為細末以無灰酒入麝香少許作一服調下置患者在帳中四下緊閉用鐵鉗等候其蟲必從口鼻中出即以鉗鉗入沸油中煎殺之如蟲出之後更進局方嘉禾散一服軟粥將息紫河車丹青囊方治飛屍鬼注虛勞羸瘦喘嗽痰氣等證其法取首生男子胞衣以皂角水洗淨次放銅銚子內以米醋揲洗控干做一小篾籠子盛之圍以紙密糊之不令泄氣以烈火焙乾加入後藥人參一兩五錢白朮一兩木香白茯苓各五錢茯神川歸熟地黃各一兩乳香四錢另研沒藥四錢另研硃砂二錢另研麝香二分上為細末和勻酒糊為丸如梧桐子大每服五十丸煎人參湯送下日三服空腹服之煉蜜為丸服亦可治虛勞柴胡散柴胡去蘆三錢人參茯苓去皮各一錢桔梗芍藥酒浸炒川歸酒浸各二錢青皮去白麥門冬各三分去心甘草一分上細切作一服杵細水一盞煎七分溫服治虛勞鱉甲散青囊方鱉甲大者一個醋煮柴胡去蘆川歸甘草炙桔梗芍藥人參各一兩麝香五分杏仁去皮尖炒另研胡黃連各二錢官桂五錢去粗皮地骨皮宣黃連各二錢五分真酥三兩木香五錢白沙蜜三兩上為細末用青蒿一斤童便五升熬青蒿汁約二升濾去渣入酥蜜再熬成膏候冷入藥末搜和為丸如梧桐子大每服十五丸溫酒送下米飲亦可日進三服如秋冬時更入桃柳心七個與前柴胡散同煮間服之去三尸九蟲貫眾丸貫眾五分殺伏屍蟲白藿蘆三分殺屍蟲乾漆三分殺白蟲炒厚朴三分殺肺蟲狼芽子四分殺胃蟲殭蠶四分殺膈蟲雷丸六分殺赤蟲雄黃三分殺屍蟲上件焙乾炒令黃色研為細末煉蜜為丸如梧桐子大新汲水下五丸三服後漸加至十丸服之二十日百病皆愈三尸九蟲盡滅更無傳注之患耳治勞嗽輕骨散烏梅龍膽草胡黃連貝母知母鱉甲酥炙桔梗秦艽柴胡甘草炙梔子人參青蒿酒煮阿膠炒成珠子杏仁去皮尖炒上件各等分曬乾為末用好京墨一塊以井花水磨調前藥末作餅子如大指頭大透風處陰乾二七日每用一餅以井花水磨化又用沒藥五分磨成一盞更加黃柏末二錢同煎數沸傾入盞內頻頻打轉於五更時輕輕起服服後就睡仰臥甚者不過三服治勞嗽蛤蚧散白茯苓一兩去皮細切入銚內慢火炒知母二兩去毛用酥醋炙令黃熟杏仁六兩去皮尖及雙仁者炒乾用紙包敲出其油桑白皮二兩以真酥炙黃色貝母二兩用酥醋炙令黃色甘草二兩酥醋炙三五次紫黃色蛤蚧雌雄一時入酥醋內浸透慢火干再用酥醋別炙七次令黃色不得焦人參一兩用酥醋炙三五次令黃色不得焦乳酥真者四十兩切作骰子大塊入罐內溶成汁入極酸上好米醋半斤和勻用制前藥醋不宜多多則稀不堪用上為末每服二錢水一盞煎至七分和渣服忌油膩生冷毒物久患嗽者初服此藥必鬥嗽加甚須勤服久則可安須自保養為妙治勞熱蛤蚧飲子青囊方黃芩五錢蛤蚧一對洗淨酒醋浸炙黃色麻黃不去根節胡黃連秦艽去蘆青蒿人參柴胡去蘆甘草生生地黃酒浸洗熟地黃酒洗知母去毛酒洗貝母杏仁去皮尖及雙仁者炒另研以上各五錢鱉甲一兩酒酥炙桔梗草龍膽木香各二錢五分上為細末每服二錢加烏梅薑棗煎服附蒸病古今錄驗五蒸湯丹溪人參知母黃芩各一錢竹葉七片生地黃乾葛各一錢五分茯苓一錢甘草炙五分石膏二錢五分粳米一合上細切先以水三盞煎小麥二合至二盞去麥煎藥至一盞溫服隨證加減於後實熱加黃芩黃連黃柏大黃虛熱加烏梅秦艽柴胡蛤蚧青蒿牡丹皮鱉甲肺蒸鼻乾加烏梅天門冬麥門冬紫菀茸大腸蒸右鼻孔干痛加大黃芒硝皮蒸舌白唾血加石膏桑白皮膚蒸昏昧嗜臥加牡丹皮氣蒸鼻乾喘促通身氣熱加人參黃芩梔子心蒸舌乾加黃連生地黃小腸蒸下唇焦加赤茯苓生地黃木通血蒸發焦加生地黃當歸桂心童便脈蒸唾白浪語脈絡溢脈緩急不調加當歸生地黃脾蒸唇焦加白芍藥木瓜苦參胃蒸舌下痛加石膏粳米大黃芒硝乾葛肉蒸食無味而嘔煩躁不安加白芍藥肝蒸眼黑加川芎當歸前胡膽蒸眼色白加柴胡栝蔞筋蒸甲焦加川歸川芎三焦蒸乍熱乍寒加石膏竹葉腎蒸兩耳焦加生地黃石膏知母寒水石膀胱蒸右耳焦加澤瀉茯苓滑石腦蒸頭眩熱悶加生地黃防風羌活髓蒸髓沸骨中熱加生地黃當歸天門冬骨蒸齒黑腰痛足逆變蟲食臟加鱉甲地骨皮牡丹皮當歸生地黃臀蒸肢細股腫腑臟俱熱加石膏黃柏胞蒸小便赤黃加澤瀉茯苓生地黃滑石沉香丹溪活套云勞極之證五臟必歸重於一經假如足脛痠疼腰背拘急遺精白濁面色黧黑耳輪焦枯脈沉細數知其邪在腎也宜以四物湯加知母黃柏五味子麥門冬天門冬澤瀉杜仲肉桂之類煎入童便韭汁竹瀝服其或心神驚惕怔忡無時盜汗自汗心煩熱悶口舌生瘡咯血面赤脈洪而數知其邪在心也宜以前方去杜仲澤瀉肉桂加茯神胡黃連蓮心遠志菖蒲硃砂之類其或咳嗽喘促衄血嗽血皮膚枯燥鼻塞聲沉時吐痰沫脈微虛而澀數知其邪在肺也宜以四物湯加沙參麥門冬五味子知母貝母桔梗桑白皮地骨皮款冬花紫菀馬兜鈴百合百部之類煎入童便竹瀝姜韭汁服其或脅痛目赤面青頰赤多怒虛陽不斂夢與鬼交甚則卵縮筋急脈弦而數知其邪在肝也宜以四物湯加竹茹草龍膽柴胡黃芩青皮竹葉之類其或面色萎黃唇吻焦燥飲食無味腹痛腸鳴瀉利四肢倦怠脈虛濡而數知其邪在脾也宜以四君子湯加酒炒白芍藥蓮肉薏苡乾山藥豬苓澤瀉白扁豆之類凡骨蒸勞熱元氣未脫者灸崔氏四花六穴無有不安者也灸崔氏四花穴法先二穴令患人平身正立取一細繩蠟之勿令展縮於男左女右腳底貼肉堅踏之其繩前頭與大拇指端齊後頭循當腳根中心向後引繩從腳腨肚貼肉直上至曲䐐中大橫紋截斷橫紋即委中穴又令患人解發分兩邊令見頭縫自囟門平分至腦後卻平身正坐取向所截繩一頭令與鼻端齊引繩向上正循頭縫至腦後貼肉垂下循脊骨引繩向下至繩盡處當脊骨中以墨點記之墨點不是灸處又取一繩子令患人合口將繩子按於口上兩頭至吻卻鉤起繩子中心至鼻柱根下如此便齊兩吻截斷將此繩展令直於前量脊骨上墨點處橫量取平勿令高下其量口繩子先中折當中以墨記之卻展開繩子橫量卻以中折墨點記處按於脊骨中先點處兩頭是穴也兩頭以白圈記之以上是第一次點二穴次二穴令患人平身正坐稍縮臂膊取一繩繞項向前雙垂頭與鳩尾齊胸前歧骨間盡處也雙頭齊截斷卻翻雙繩頭向後以繩子中心按於喉嚨結喉骨上其繩兩頭雙垂循脊骨以墨點記之墨點不是灸處又取一繩子令患人合口橫量齊兩吻截斷還於脊骨上墨點橫量如法繩子兩頭以白圈記之白圈是灸處以上是第二次點二穴通前共四穴同時灸各三七壯累灸至一百餘壯候灸瘡將瘥又依後法灸二穴又次二穴以第二次量口吻繩子於第二次雙繩頭盡處墨點上當脊骨直上下豎點其繩子中心放在墨點上於上下繩頭盡處以白圈記之白圈是灸處也以上是第三次點二穴通前共六穴也擇取離日及火日灸之一應虛勞發熱尫羸等證灸之立愈真濟世之妙法也白圈是穴黑點不是穴
