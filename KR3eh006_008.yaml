body:
  text: 卷之八小兒科論嘗聞小方脈科古人謂之啞科最費調治誠哉是言也蓋以嬰兒之流難問證難察脈耳抑且臟腑脆嫩而孟浪之劑與夫峻寒峻熱之藥俱不可輕用試詳論之夫孺子之在襁褓中也內無七情六欲之交戰外無大風大寒之相侵奚其幼科之疾若是之繁且甚歟抑考其證大半胎毒而少半傷食也其外感風寒之證十一而已曰變蒸曰痘疹曰斑爛曰驚悸曰風癇曰發搐曰痰壅曰赤瘤曰白禿曰解顱曰重舌木舌以上諸證豈非孕母不謹胎毒之所致歟夫小兒之在胎之母飢亦飢母飽亦飽辛辣適口胎氣隨熱情欲動中胎息輒躁或多食煎煿或恣味辛酸或嗜欲無節或喜怒不常皆能令子受患其為母者胎前既不能謹節産後又不能調護是以惟務姑息不能防微杜漸或未滿百晬而遂與鹹酸之味或未夠周歲而輒與肥甘之物百病由是而生焉曰吐瀉曰黃疸曰五疳曰腹脹曰腹痛曰水腫曰瘧曰痢曰痰喘豈非吃食過傷調養失宜之所致歟先正所謂古者婦人妊子寢不側座不邊立不蹕不食邪味等語厥有旨哉其餘飲食男女養胎幼幼之法必深得造化生生不息之意故古人多壽考兒少夭折者即此之由也嘗見今有稟性溫良之婦有娠不嗜欲縱口生子少病而痘疹亦稀亦可以為師法矣為兒醫者臨證之際宜察色觀容不可鹵莽假如額赤知為心熱鼻紅知為脾熱左腮青知為肝有餘右腮白知為肺不足頦白知為腎虛之類更參之以虎口三關之脈其小兒之病情斯過半矣傳曰幼吾幼以及人之幼仁人之心斯言其可忽諸又論變蒸夫小兒之初生血氣未足陰陽未和臟俯未實骨格未全有變蒸之候每三十二日一發熱或吐或汗或呻吟不食此為長血脈全智意之常候不須治而自愈按諸家所論皆謂乃小兒長骨脈臟腑與神志也自生之日始每三十二日一變凡人有三百六十五骨除手足四十五碎骨外止有三百二十骨自生下骨而上一日十骨三十二日乃為一變骨氣始全一變生一臟或一腑十變則臟腑始足每變發為虛熱諸證亦有胎氣壯實暗變而無發熱證者此骨節臟腑由變而全胎毒亦因變而散也為兒醫者可不審乎脈法總論按古法曰凡小兒證候難以手太陰尺寸脈診如一歲至六歲曰嬰孩惟以男左女右手次指三關之脈以為驗病輕重死生之訣第一節名風關無脈則無病有脈則病輕第二節名氣關脈見則病重尚可藥治而已第三節名命關脈見則病劇乃九死一生之惡候也多不可治七歲八歲曰齔九歲十歲曰髫始可以一指探掌後尺寸三部之脈而以一息七八至為無病之常脈十一歲至十四歲曰童稚而以一息五六至為常脈也數則為熱遲則為寒浮則為虛為風沉則為實為積為痛浮而數者為乳癇驚悸虛而軟者為慢驚瘛瘲緊而實者為風癇牢而革者為便祕沉而弦者為食積為腹痛緊而弦者為氣急為風寒洪數者為熱伏結為傷食軟細者為蟲疳若氣促脈代散亂無倫次者死在須臾而不治也業幼科者其可不盡心於此乎今將手指三關之脈繪圖分注開列於後一風關易治二氣關病重三命關死候三關青是四足驚三關赤是水驚三關黑是人驚如有此三關通度脈候是極重之證必死余並可治風關青如魚刺易治乃初驚之候也黑色難治氣關青如魚刺主疳芬身熱易治命關青如魚刺主虛風邪傳脾難治風關青黑色如懸針主水驚易治氣關赤色如懸針主疳病兼肺臟積熱猶可為治命關凡有此脈不問五色皆是死候又三關通度如懸針者主慢驚風難治風關如水字主驚風入肺咳嗽面赤氣關如水字主膈上有涎並虛積停滯命關如水字主驚風疳極夾驚候不拘五色三關通度者不治風關如乙字主肺臟驚風易治氣關如乙字主驚風病重命關如乙字青黑色主慢驚風難治風關如曲蟲主疳病積聚胸前如橫推算子肚皮如吹胖豬脬氣關如曲蟲主大腸有穢積命關如曲蟲主心痛傳肝難治風關如環主肝臟有疳積積聚氣關如環主疳入胃吐逆不治命關如壞惡候不治此紋若在風氣二關易治若在命關通度難治此紋若在手上或面上或左右腹脅上或在左右臉邊皆死候脈曲向里者是氣疳脈曲向外者是風疳脈斜向右者是傷寒身熱不食無汗脈斜向左者是傷風身熱不食有汗雙鉤脈者是傷寒三曲如長蟲者是傷硬物兩曲如鉤者是傷冷物脈一頭如環有獨腳者是傷冷面上有此點子必是再發之候凡頭面上或肚腹上有大脈並青筋如此者並是食物毒及驚積難治脈如亂蟲是常疳亦有蟲疳蛔疳食積之疳皆可治凡脈微細不足者並是風氣俱宜消疳然後取蟲積肥孩兒是良法也附湯氏察小兒神色總斷凡看小兒病宜先觀形證神色然後察脈假如肝之為病則面青心之為病則面赤脾之為病則面黃肺之為病則面白腎之為病則面黑先要分別五臟形證次看稟受盈虧胎氣虛實明其標本而治之無不可者面上諸候形證歌凡七首痢疾眉頭皺驚風面頰紅渴來唇帶赤毒熱眼朦朧山根若見脈橫青此病明知兩度驚赤黑困疲時吐瀉色紅啼夜不曾停青脈生於左太陽須驚一度見推詳赤是傷寒微燥熱黑青知是乳多傷右邊青脈不須多有則頻驚怎奈何紅赤為風抽眼目黑青三日見閻羅指甲青兼黑暗多唇青惡逆病將瘥忽作鴉聲心氣急此時端的命難過蛔蟲出口有三般口鼻中來大不堪如或白蟲兼黑色靈丹縱服病難安四肢瘡痛不為祥下氣衝心兼滑腸氣喘汗流身不熱手拿胸膈定遭殃內八段錦凡四首紅淨為安不用驚若逢紅黑便難寧更加紅亂青尤甚取下風痰病立輕赤色輕微是外驚若如米粒勢難輕紅散多因乘怒亂更加搐搦實難平小兒初誕月腹痛兩眉顰此號盤腸氣啼哭又呻吟如反目仰視者天吊風也小兒初誕月肌體瘦尫羸發禿毛稀少原因鬼王胎外八段錦凡十首先望孩兒眼色青次看背上冷如冰陽男搐左無妨事搐右令人甚可驚女搐右邊猶可治若逢搐左疾非輕歪斜口眼終為害縱有仙丹也莫平眼中赤脈實難量大數原來不一樣最怕亂紋鋪目下更嫌赤脈貫瞳光囟門腫起定為風此候應知最是凶忽陷成坑如盞足未過七日命須終鼻門黑燥渴難禁面黑唇青命莫存肚大青筋俱惡候更嫌腹有直身紋忽見眉間紫帶青看來立便見風生青紅碎雜風將起必見疳症膈氣形亂紋交錯紫嫌青急急求醫免命傾盛紫再加身體熱須知臟腑惡風生紫少紅多六畜驚紫紅相等即疳成紫點有形如米粒傷寒夾食證堪評紫散風傳脾臟間紫青口渴是風癇紫隱深沉難治療風痰祛散命須還黑輕可治死還生紅赤傷寒痰積停赤青脾受風邪證青黑脾風作慢驚紅赤連兮赤紋輕必然乳母不相應兩手忽然無脈見定知沖惡犯神靈急慢驚風論內經曰諸風掉眩皆屬肝木夫小兒八歲以前曰純陽蓋其真水未旺心火已炎故肺金受制而無以平木故肝木常有餘而脾土常不足也為父母者而有失於保養其或衣服寒暄不調以致外邪侵襲或飲食之飢飽失節以致中氣損傷是故急慢驚風之候作矣夫惟急驚屬肝木風邪有餘之證治宜清涼苦寒瀉氣之藥慢驚屬脾土中氣不足之候治宜中和甘溫補中之劑若夫急驚之候因聞不常之聲或遇驢馬禽獸之號以致面青口噤或聲嘶而厥發過則容色如故良久復作其身熱面赤引飲口鼻中氣熱大小便黃赤色惺惺不睡蓋熱甚則生痰痰盛則生風偶因驚而發耳宜用錢氏利驚丸瀉青丸抱龍丸宣風散五福化毒丹等藥慢驚之證多因飲食不節損傷脾胃以致吐瀉日久中氣大虛而致發搐發則無休止時其身冷面黃不渴口鼻中氣寒大小便青白昏睡露睛目上視手足瘛瘲筋脈拘攣蓋脾虛則生風風盛則筋急俗名天吊風者即此候也治宜東垣黃耆湯錢氏鉤藤丸溫白丸丹溪參朮湯送下硃砂安神丸之類錢氏謂急驚為無陰之證因心經實熱而陰不能以配陽是為陽盛陰虛之候也謂慢驚為無陽之證因脾土虛甚而陽不能以勝陰是為陰盛陽虛之候也愚按小兒急慢驚風之證其虛實寒熱如天淵之隔故急驚者十生一死慢驚者十死一生俗醫多不諳此理混為一途而治誤人多矣業幼科者宜推幼幼及人之心為心庶幾斯世無夭折之赤子矣幸甚脈法並見前總章方法丹溪曰錢氏方乃小兒科之祖其立例極妙若能增損而用之無不驗也又曰驚風有二慢驚屬脾虛所主多死宜溫補一云當養脾用參朮煎湯下安神丸急驚屬痰熱宜涼瀉一云用養血藥作湯下降火清痰丸子抱龍丸之類世以一藥通治二證甚謬以上丹溪方法凡二條東垣治驚論曰外物驚宜鎮心以黃連安神丸若氣動所驚宜寒水石安神丸大忌防風丸治風辛溫之藥必殺人何也辛散浮溫熱者火也因驚而泄青色先鎮肝以硃砂之類勿用寒涼之藥大禁涼驚丸風木旺必克脾胃當先實其土後瀉其木閻孝忠編集錢氏方以益黃補土誤矣其藥有丁香辛熱助火火旺土愈虛矣青橘皮瀉肺金丁香辛熱大瀉肺與大腸脾實當瀉子今脾胃虛反更瀉子而助火重虛其土殺人無疑矣其風木旺證右關脈洪大掌中熱腹皮熱豈可以助火瀉金如寒水來乘脾土其病嘔吐腹痛瀉痢青白益黃散聖藥也今立一方先瀉火補其土是為神治之法黃耆湯東垣治慢驚風之神藥也黃耆二錢人參一錢炙甘草五分加白芍藥一錢上細切作一服水一盞煎至半盞去渣食遠溫服上三味皆甘溫能助元氣甘能瀉火內經云熱淫於內以甘瀉之以酸收之白芍藥酸寒寒能瀉火酸味能瀉肝而大補肺金所補得金土之位金旺火虛風木何由而來剋土然後瀉風之邪又曰夫益黃散理中丸養神丸之類皆治脾胃寒濕太盛神品之藥也若得脾胃中伏熱勞役不足之證及服熱藥巴豆之類致胃虛而成慢驚之證用之必傷人命夫慢驚風者皆由久瀉脾胃虛而生也錢氏以羌活膏療慢驚風誤矣脾虛者由火邪乘其土位故曰從後來者為虛邪火旺能實其木木旺故來剋土當於心經中以甘溫補土之源更於脾土中瀉火以甘寒更於脾土中補金以酸涼使脾土中金旺火衰風木自虛矣損食多進藥愈上藥是也益黃散東垣治胃中風熱又治風木旺右關脈洪大掌中熱腹皮熱或寒水乘脾土嘔吐腹痛瀉痢青白亦佳黃耆二錢陳皮去白人參各一錢白芍藥七分生甘草炙甘草各五分黃連少許上為細末分三服每服用水一盞煎至半盞食前服安神丸錢氏治邪熱驚啼心疳面黃頰赤壯熱麥門冬去心馬牙硝白茯苓乾山藥寒水石甘草炙各五錢硃砂一兩龍腦一字上為細末煉蜜為丸如芡實大每服半丸砂糖水磨化下慢驚用參朮煎濃汁化下白朮散錢氏治積痛和胃生津止瀉頻瀉利將欲成慢驚風者服之決效人參白朮木香白茯苓去皮炙甘草藿香各一錢乾葛二錢上細切分二服每服水一盞煎至半盞溫服丹溪加山藥白扁豆炒肉豆蔻麵裹火煨各一錢用生薑一片煎若慢驚風已作加細辛天麻各一錢全蠍三枚去梢毒白附子八分麵裹煨同煎服不拘時候一方治驚風用母丁香一粒細嚼人中白少許以其母中指取血調擦牙上即蘇急慢驚風發熱口瘡手心伏熱痰熱痰嗽痰喘並用湧法重劑用瓜蒂散輕劑用苦參赤小豆末以酸虀汁調服吐之吐後稍定更用防風通聖散為末蜜丸服之間以桑羊干為末米飲調服以平其風氣又方治急慢驚風薄荷葉寒水石各五錢青黛白殭蠶硃砂各一錢全蠍二枚炒豬牙皂角槐角各五分上為細末燈草湯和乳汁調時時灌之又方治慢驚風子母俱服人參白朮各一錢茯苓陳皮各五分甘草薄荷各二分半夏天麻各七分細辛三分全蠍去毒炒一枚上細切作一服加姜三片水一盞煎至七分服鎮驚丸鎮驚寧神退心熱夜啼化痰止嗽珍珠一錢琥珀天竺黃雄黃各三錢金箔研十片膽星五錢牛黃二錢麝香五分硃砂三錢半上為細末麥麵糊為丸如梧桐子大每服五六丸薄荷薑蜜湯化下奪命丹治急驚不省人事目定直視牙關不開唇白或黑者南星半夏各四錢為末以生薑汁捏和作餅子焙乾珍珠新白者二錢研巴豆去油淨一錢硃砂四錢金箔銀箔各十片輕粉麝香各五分上為細末麵糊丸如黍米大每一歲兒一丸燈心湯化下利驚丸治急驚風神效天竺黃二錢輕粉青黛各一錢黑醜頭末半兩生用上為細末研勻煉蜜丸如梧桐子大一歲兒一丸三歲兒二丸五歲兒三丸溫薄荷水下食後服瀉青丸又名瀉肝丸治肝熱急驚搐搦等證羌活川芎梔子仁草龍膽當歸防風去蘆川大黃濕紙裹煨各等分一本無大黃上為細末煉蜜丸如芡實大每服半丸至一丸煎淡竹葉湯同砂糖溫水化下抱龍丸治傷風瘟疫身熱昏睡氣粗風熱痰實壅嗽又治驚風潮搐及蠱毒中暑沐浴後並可服壯實小兒宜時與服之則免痰熱驚悸之證雄黃二錢半水飛辰砂另研五錢天竺黃一兩天南星焙為末臘月納牛膽中陰乾百日取研稱四兩如無只將生乾者去皮臍炒熱用然不及膽星麝香五錢別研恐太多今用二錢半上為末煮甘草膏和丸如皂子大溫水化下百日兒每丸分作三服一歲兒半丸五歲兒二丸童草三五丸室女白帶伏暑用鹽少許細嚼一二丸新汲水送下臘月用雪水煮甘草和丸尤佳一法用漿水或新水浸南星三日煮三五沸去皮取白肉切焙炒黃色為末每八兩以甘草二兩半拍破用水二碗慢火煎至半碗去渣旋旋灑入南星末徐徐研之令甘草水淨入余藥龍膽湯千金治嬰兒出腹血脈實盛寒熱交作四肢驚掣並諸疳驚等證草龍膽釣鉤藤柴胡黃芩桂枝茯神芍藥甘草各三錢蜣螂七枚炒大黃五錢上細切用水一升煮至五合徐徐服之宣風散治急驚風搐搦不定檳榔二枚陳皮甘草各五錢黑醜四兩半生半炒取頭末二兩上為細末二三歲兒蜜湯調下半錢以上一錢食前服五福化毒丹治急驚風痰熱搐搦等證桔梗微炒玄參洗焙各六兩青黛研牙硝枯各二兩人參三兩去蘆茯苓去皮五兩炙甘草一兩半銀箔八片為末金箔八片為衣麝香五分另研上為細末入研藥拌勻煉蜜丸每兩分作十二丸一歲兒每一丸分四服薄荷水化下瘡疹餘毒上攻口齒涎血臭氣以生地黃自然汁化一丸以雞翎刷口內金箔丸治急慢驚風痰涎壅盛半夏湯泡七次天南星煨裂白附子炮防風去蘆各五錢雄黃硃砂各二錢半生犀末一錢牛黃龍腦麝香各五分金箔二十片上為細末薑汁調面打糊為丸如麻子大每服三五丸至一二十丸人參湯下慢驚風去龍腦鉤藤飲治吐利脾胃氣弱虛風慢驚釣鉤藤五分蟬蛻防風去蘆人參麻黃去節白殭蠶炒天麻蠍尾去毒炒各二分甘草炙川芎各一分半上細切作一服水一盞煎至六分溫服量人大小加減分數與之虛寒者加附子末半分溫白丸治小兒脾氣虛弱泄瀉瘦怯冷疳洞泄及吐瀉久病轉成慢驚身冷瘛瘲等證天麻五錢白殭蠶炒白附子生全蠍去毒炒天南星湯泡七次焙各二錢五分上為細末湯浸寒食麵為丸如緑豆大每服五七丸至二三十丸空心姜米湯下涼驚丸治驚疳草龍膽防風去蘆青黛各三錢鉤藤二錢黃連一兩二錢龍腦一錢牛黃麝香各一錢上為細末麥麵糊丸如黍米大每服三五丸至一二十丸煎金銀湯送下發搐男發搐目左視無聲右視有聲女發搐目右視無聲左視有聲相勝故也更看所發時候早辰發搐因寅卯辰時潮熱目上視手足動搖口流熱涎頸筋急此肝木大旺當補腎抑肝補腎地黃丸抑肝瀉青丸主之日午發搐因巳午未時潮熱心神驚悸目上視白睛赤色牙關緊急口流涎手足動搖此心火大旺也當補肝瀉心補肝地黃丸瀉心導赤散冷驚丸主之日晚發搐因申酉戌時潮熱搐而喘目微斜視睡則露睛手足冷大便下薄淡黃水此是肺病當補脾而抑心肝補脾益黃散抑心導赤散抑肝瀉青丸主之夜間發搐因亥子丑時潮熱不甚搐而臥不穩身體溫無壯熱目睛緊斜視喉中有痰大便銀褐色乳食不消多睡不醒當補脾抑心補脾益黃散抑心導赤散涼驚丸主之傷風發搐口中氣出熱呵缺煩悶手足動搖當發散大青膏主之小兒稟賦素怯者多病此傷食發搐身體溫多睡多唾或吐不欲食而搐當先定搐搐退用白餅子後服安神丸百日內發搐有真假二證真者不過二三次必死假者發頻不為重真者內生驚癇假者外傷風冷蓋血氣未實不能勝邪乃發搐也奚知假者口中氣出熱也治之宜發散大青膏主之及用塗囟法與沐體法補腎地黃丸見疳病門瀉青丸見前驚風門導赤散治心熱生乾地黃木通甘草炙各等分上細切每服三錢水一盞入淡竹葉七片同煎至半盞食後溫服一本無甘草有黃芩涼驚丸方見前益黃散方見疳病門大青膏治小兒傷風吐瀉心溫乍涼乍熱天麻青黛各一錢白附子一錢五分蠍尾去毒烏蛇肉酒浸焙乾硃砂天竺黃麝香各一錢上為細末生蜜和成膏每服半皂子大或一皂子大月中兒粳米大同牛黃膏溫薄荷水化一處服之五歲以上同甘露飲服錢本有天麻無大青按此知閻孝忠加減方也牛黃膏治熱及傷風壯熱引飲雄黃甘草甜硝寒水石生各二錢五分鬱金一錢緑豆粉五錢腦子一錢上為細末和勻蜜和成膏薄荷水化下半皂子大食後服甘露飲治心胃熱咽喉痛口舌生瘡並瘡疹已發未發皆可服又治熱氣上攻牙齦腫牙齒動搖含漱並服方見痘疹門白餅子又名玉餅子治小兒腹中有癖但飲乳嗽而生痰滑石輕粉半夏湯泡七次南星各一錢巴豆二十四粒去皮膜用水二升煮水盡為度一作水三升上研勻巴豆後入衆藥以糯米飯為丸如緑豆大捏作餅子三歲以上兒三五餅以下一二餅煎薄荷湯下臨臥服塗囟法麝香蜈蚣末牛黃末青黛末各一字蠍尾去毒為末五分薄荷葉五分上為細末研勻熟棗肉劑為膏新綿上塗勻貼囟上四方可出一指許火上炙手頻尉百日裡外兒可用此及浴法浴體法治胎肥並胎怯胎熱烏蛇肉酒浸焙為末白礬青黛各二錢天麻二錢蠍尾去毒為末硃砂各五分麝香一字上同研為細末每服用三錢水三碗帶葉桃枝一握同煎至十數沸溫熱浴之勿浴背五癇凡治小兒五癇皆當隨臟治之每臟各有一獸所屬如犬癇反折上竄犬叫肝也牛癇目直視腹滿牛叫脾也雞癇驚跳反折手縱雞叫肺也豬癇如尸吐沫豬叫腎也羊癇目瞪吐舌羊叫心也五癇重者死病後甚者亦死治法並用五色丸主之五色丸硃砂另研珍珠末各五錢雄黃一兩一作三兩水銀二錢半一作二兩黑鉛二兩同水銀熬按用黑鉛二兩水銀當作二兩者為是無疑矣上煉蜜丸如麻子大每服三四丸煎金銀薄荷湯下諸疳證論內經曰數食肥令人內熱數食甘令人中滿蓋其病因肥甘所致故命名曰疳若夫襁褓中之乳子與四五歲之孩提乳哺未息胃氣未全而穀氣尚未充也父母不能調攝惟務姑息舐犢之愛遂令恣食肥甘與夫瓜果生冷及一切烹飪調和之味朝餐暮食漸成積滯膠固以致身熱體瘦面色痿黃或肚大青筋蟲痛瀉利而諸疳之證作矣錢仲陽曰小兒病疳多因大病後或吐瀉後以藥下之致脾胃虛損亡津液而成蓋此證實由愚醫之所害耳斯言也特一端耳未可悉以為然其所謂大病吐瀉豈非飲食之所致歟夫仲陽為兒醫之祖豈有誤邪其所論諸疳形證治法班班可考學者不可不審如疳在肝則白膜遮睛法當補肝地黃丸主之疳在心則面頰赤身體壯熱法當補心安神丸主之疳在脾則體黃腹大好食泥土法當補脾益黃散主之疳在肺則氣喘口鼻生瘡亦當補脾益黃散主之此虛者補其母也疳在腎則極瘦而身生瘡疥法當補腎地黃丸主之筋疳則瀉血而瘦當服補肝地黃丸骨疳喜臥冷地當服補腎地黃丸內疳則目腫腹脹利色無常或沫青白漸而瘦弱此冷證也宜服木香丸外疳鼻下赤爛自揉鼻頭有瘡不結痂繞耳而生當用治瘡爛蘭香散白粉散等藥法曰諸疳皆依本臟而補其母則子自安假令日中潮熱是心經虛熱也肝為心之母宜先補肝肝實而後瀉心心得母氣則內平而潮熱愈矣余皆仿此大抵疳病當辨冷熱肥瘦而治其初病者為肥熱疳久病者為瘦冷疳冷則用木香丸熱則當用胡黃連丸冷熱疳並宜用如聖丸之類惟小兒之腑臟柔弱不可痛擊大下必亡津液而成疳證為兒醫者常當以幼幼之心為心而善調之毋縱巨膽妄為施治以絶人之嗣續幸甚脈法並見前總章方法地黃丸補肝腎虛治肝疳白膜遮睛筋疳瀉血腎疳身瘦瘡疥骨疳喜臥冷地又治胃怯不言解顱小兒年長不能行者專服神效熟地黃酒洗八錢山茱萸乾山藥各四錢澤瀉牡丹皮白茯苓各三錢上為細末煉蜜為丸如梧桐子大三歲以下兒三丸至五丸熟水空心化下年長者量增丸數安神丸治邪熱驚啼心疳面黃頰赤壯熱方見驚風門益黃散又名補脾散治小兒脾胃虛寒脾疳體黃腹大好食泥土肺疳氣喘口鼻生瘡等證陳皮一錢青皮訶子皮甘草炙各五分丁香二分上作一服細切水一盞煎至六分溫服愚每於本方加參術各一錢效木香丸治瘦冷疳木香青皮檳榔肉豆蔻各二錢半麝香一錢另研續隨子一兩去油蝦蟆大壯者一名蟾酥俗名風雞三個燒存性上為細末煉蜜丸如緑豆大每服三五丸至一二十丸薄荷湯送下胡黃連丸治肥熱疳胡黃連宣黃連各五錢硃砂二錢半另研上為細末和勻填入獖豬膽內用淡漿煮以杖子加銚子上用線釣之勿著底候一炊時取出研入蘆薈麝香各一分飯丸如麻子大每服五七丸至一二十丸米飲下一方去足蝦蟆五錢焙乾不燒蘭香散治外疳鼻下赤爛蘭香葉收二錢燒存性銅青輕粉各五分上為細末干敷之白粉散治疳瘡烏賊魚骨末七錢白芨末三錢輕粉一錢上為末和勻先用清漿水洗瘡拭乾敷之如聖丸治冷熱疳瀉使君子一兩去殼胡黃連川黃連白蕪荑去皮炒各二兩麝香五分另研干蝦蟆五個酒煮搗膏上為細末以蝦蟆膏和丸如麻子大二三歲兒五七丸以上十丸至十五丸人參湯下不拘時服香蟾丸治疳消食積蟲積肉積及治腹脹大三稜醋浸炒蓬莪朮醋浸炒青皮去白神麯炒麥糵曲炒草龍膽酒浸炒檳榔各五錢木香二錢川楝子去核酒煮使君子去殼胡黃連川黃連各四錢陳皮五錢白朮二兩一作一錢乾蟾五個上以白朮以上藥俱研為細末以乾蟾用醋煮爛搗成膏和藥如干再加醋糊為丸如麻子大每服十五丸清米湯送下蘆薈丸治小兒疳氣腹脹骨熱蘆薈另研木香檳榔各二錢半蝦蟆酒浸炙黃去骨黃連各一兩蕪荑去皮青皮去白陳皮各五錢巴豆三七粒去殼同上四味炒黃去豆上為細末豬膽汁丸如小豆大三歲兒三十丸米湯下又方治疳積腹大胡黃連去疳積果積阿魏醋浸去肉積各五分麝香當門子四粒神麯炒去食積川黃連炒去熱積又去酒積各二錢上為細末豬膽汁和丸如麻子大每服三十丸白朮湯送下一方有蘆薈五分又方治小兒疳病黃連白朮山楂肉各五錢胡黃連蘆薈各三錢另研蕪荑二錢五分神麯炒二錢上為細末豬膽汁為丸如麻子大量兒大小加減丸數與之祖傳方檳榔丸小兒疳病積氣成塊腹大有蟲等證其效如神檳榔一兩三稜煨去毛切醋炒蓬莪朮醋炒各五錢青皮去穰麩炒黃色陳皮去白各五錢雷丸去殼五錢蕪荑水洗淨二錢半鶴蝨三錢略炒乾漆五錢炒無煙木香三錢不見火砂仁一錢良薑二錢東壁土同炒麥糵面五錢炒胡黃連三錢甘草三錢炙神麯五錢炒黃色山楂肉五錢上為細末醋糊為丸如緑豆大每服三五十丸空心淡薑湯送下吐瀉論內經曰諸嘔吐酸暴注下迫皆屬於熱又曰濕勝則濡泄夫小兒之吐瀉皆由乳食過度傳化失常蓋食鬱則成熱熱鬱則有酸酸而成吐成瀉此必然之理也又曰食滯於胃口者為吐食滯於大小腸者為瀉有生下而遂吐不休者胞胎中移惡流於腸胃而為吐也丹溪曰錢氏五補五瀉之法俱可選用謹遵而依法具録如下脈法並見前總章方法錢氏曰小兒初生下吐蓋拭掠兒口中移惡不盡咽入喉中故吐木瓜丸主之凡生子於未發聲之先急宜取口中惡血以綿拭令淨盡以黃連甘草二味等分煎汁灌一二匙則無以上等病出痘疹亦稀少若啼聲一發則咽下矣亦當用黃連甘草汁飲之不可忽也木瓜丸木瓜末木香末麝香末膩粉即輕粉檳榔末各一字上再研勻麵糊為丸如黍米大每服三二丸甘草湯送下初生三日內吐瀉壯熱不思乳食大便乳食不消或白色知是傷食當下之而後和胃下用白餅子和胃用益黃散上二方俱見前初生三日以上至十日吐瀉身不熱或乍熱乍涼不思乳食大便青白色乳食不消此上實下虛也更有五臟兼見證宜詳肺病則睡悶露睛喘氣心則驚悸飲水脾則困倦饒睡肝則呵缺煩悶腎則不語畏明當先見貌兼臟補脾益黃散主之蓋此二證多病於夏秋也當先見貌兼臟其義未詳恐有脫簡以俟知者正之五月二十五日以後夏至後十日也吐瀉身壯熱此熱乃臟腑中十分中九分熱也或因傷熱乳食吐乳不消瀉深黃色玉露散主之玉露散一名甘露散石膏寒水石各五錢生甘草二錢五分上為細末每服一字或半錢溫水調下六月十五日以後大暑節後吐瀉身溫似熱臟腑六分熱四分冷也嘔吐乳食不消瀉黃白色似渴或食乳或不食食前少服益黃散食後多服玉露散按丹溪用去桂五苓散倍白朮加蒼朮甚者二術炒用或入益元散和勻米湯調下甚效七月七日以後立秋後七日也吐瀉身溫涼三分熱也七分冷不能食乳多似睡悶亂哽氣長出氣睡露睛唇白多噦欲大便不渴食前多服益黃散食後少服玉露散八月十五日以後秋分後也吐瀉身冷無陽也不能食乳乾噦瀉青褐水當補脾益黃散主之不可下也吐瀉泄黃傷熱乳也吐瀉泄青傷冷乳也皆當下白餅子主也傷熱乳者甘露散傷冷乳者益黃散溫中丸並於下後服之亦有不須下但服此藥愈者溫中丸人參甘草炙白朮各一兩上為細末薑汁麵糊為丸如緑豆大每服一二十丸粳米飲下虛弱脾胃不和不能食乳致肌肉消瘦亦有因大病後或吐瀉後脾胃尚弱不能傳化穀氣也有冷者時時下利唇口青白有熱者身溫壯熱肌肉微黃此冷熱虛羸也冷者木香丸夏月不可服如有證亦須少服之熱者胡黃連丸冬月不宜服有證須少服木香丸胡黃連丸二方並見前吐瀉調脾平胃散入熟蜜和蘇合香丸名萬安膏米飲調服一方治吐瀉黃疸三稜莪朮青皮陳皮神麯炒麥糵面炒黃連甘草炙白朮茯苓各等分上為細末溫水調服傷乳食吐瀉加山楂時氣吐瀉加滑石發熱加薄荷夏月吐瀉用益元散極效當表而出之附證愚按小方脈科惟急慢驚風與夫痘疹等證最為酷疾以其吉凶反掌生死須臾故也次則五疳吐瀉為證不一亦不可以易而治也以上四證各立篇目辨論詳明外其餘一切小疾繁瑣多端一一不能詳盡故各附於吐瀉之後以備檢閲參用云爾一腹脹二腹痛三夜啼四痰熱五解顱六吃泥七脫囊八脫肛九赤瘤十臍汁出十一頭瘡十二尾骨痛十三弄舌十四龜胸龜背十五重舌木舌十六鵝口口瘡十七走馬牙疳十八臍風撮口腹脹論夫腹脹由脾胃虛氣攻作也亦有實者必悶亂喘滿可下之宜用紫霜丸白餅子不喘滿者虛也不可下若誤下致脾虛氣上附肺而行肺與脾子母皆虛肺主目胞腮之類脾主四肢母氣虛甚則目胞腮腫也色黃者屬脾也治用搨氣丸漸消之未愈漸加丸數不可以丁香木香桂皮豆蔻大溫散藥治之蓋脾虛氣未出腹脹而不喘者可以溫散藥治使上下分消其氣則愈也若虛氣已出附肺而行則脾胃內弱每生虛氣入於四肢面目矣小兒易為虛實脾虛不受寒溫服寒則生冷證服溫則生熱證當識此不可忽也胃久虛熱多生疸病或引飲不止脾虛不能勝濕隨肺之氣上行於四肢若水狀濕氣浸浮於肺則大喘也此當服搨氣丸而愈搨氣丸治小兒虛脹如腹大者加蘿蔔子名褐丸子胡椒一兩蠍尾去毒五錢一方二味各四十九個上為細末麵糊為丸如粟米大每服五七丸至一二十丸陳米湯下一方有木香一錢治小兒腹虛脹先服搨氣丸不愈腹中有食積結糞小便黃微喘脈伏而實時欲飲水能食者可下之宜消積丸紫霜丸蓋脾初虛而後結有積所治宜先補脾而後下之後又補脾則愈也不可補肺恐生虛氣一方腹脹蘿蔔子紫蘇梗乾葛陳皮各等分甘草少許上細切水煎服食少者加白朮腹痛多是飲食所傷白朮一錢五分陳皮去白青皮去穰各七分山楂去核神麯炒麥芽炒砂仁各一錢甘草炙五分有熱加黃芩有寒加藿香吳茱萸上為細末每服一錢七分清米飲或白湯調下腹痛口中氣溫面黃色目無精彩或白睛多及多睡畏食或大便酸臭者當磨積宜消積丸甚者用白餅子下之後和胃用白朮散白餅子方見發搐條下白朮散方見驚風門消積丸丁香九粒砂仁十二個巴豆二個去皮心膜及油上為細末麵糊為丸如黍米大三歲以上三五丸以下一二丸溫水下心腹痛面㿠白口中沃沫及清水出發痛有時當作蛔蟲治又曰凡積痛食痛蟲痛寒痛大同小異惟蟲痛者當口淡而沫自出小兒本怯故胃寒冷則蟲動而心頭痛與癇略相似但目不斜而手不搐耳安蟲散主之安蟲散寶鑑用米糊為丸名安蟲丸胡粉炒黃色檳榔川楝子去核鶴蝨各二兩白礬二錢五分火枯上為細末每服一字大者五分或一錢溫米飲下臨痛時服集效丸治蟲痛木香鶴蝨炒檳榔訶子煨去核蕪荑附子去皮臍炮乾薑各二兩大黃半兩烏梅去核二錢五分上為細末煉蜜為丸陳皮湯下或醋湯下一方加黃芩黃連一方治蟲用雞子炒白蠟塵酒糊丸服一云治寸白蟲一方治蛔蟲作痛用二陳湯加苦楝根煎服或只以苦楝根向東南生不出土者刮去粗皮取白皮細切濃煎汁一盞徐徐飲之不可飲多先以糖蜜或炒肉食之引蟲頭向上然後服之看兒大小斟酌與之小兒吃粽腹痛用白芍藥加黃連末合研湯調服之即愈一方治小兒腹痛甘草炙乾薑各二錢伏龍膽一兩人參茯苓百草霜白朮各五錢上為細末粥丸梧桐子大每服三五十丸陳皮湯下小兒夜啼作心經有熱有虛治人參黃連薑汁炒各一錢五分甘草五分竹葉二十片上為細切分作二帖每帖加生薑一片水煎服一本無人參錢氏曰小兒夜啼者脾臟冷而痛也當以溫中之藥宜益黃散花火膏之類愚按上二說不同一曰心熱一主脾寒當審外證而區別之如面青白手腹俱冷不思乳食者寒也蓋夜屬陰陰盛則脾臟之寒愈盛脾為至陰喜溫而惡寒寒則腹中作痛曲腰而啼如面赤手腹俱暖口中氣熱者熱也蓋火屬心見燈則煩熱內生兩陽相搏故仰身而啼外有面色白黑睛少腎氣不足至夜陰虛而啼也花火膏燈花三顆以乳汁調抹兒口或抹母乳上令兒吮之治驚啼邪熱乘心也安神丸主之方見前小兒風痰壅盛用南星五錢切片以白礬湯泡曬乾白附子二兩上二件共為末麵糊為丸如芡實大每服一丸薑蜜薄荷湯化下小兒痰熱骨蒸用二陳湯五錢加升麻二錢葛根白芍藥各一錢五分人參一錢五味子三十粒上細切分三帖加薑棗水煎服又方治前證用胡黃連檳榔各一錢陳皮雷丸各一錢五分神麯半夏曲使君子白花蓼各二錢上為細末麵糊為丸如黍米大每服三五十丸白湯下小兒解顱頭縫不合也因母氣虛與熱多也錢氏曰生下而顱不合腎氣未成也雖長必少笑更有目白睛多面㿠白色瘦者多愁少喜也丹溪用四君子湯合四物湯有熱加黃連酒炒煎服更以帛緊束及以白蘞末敷之小兒吃泥胃氣熱也用軟石膏黃芩陳皮茯苓白朮煎服小兒脫囊陰囊腫大墜下而不收也亦有囊皮脫爛者木通甘草黃連當歸黃芩煎服囊爛者以野紫蘇葉面青背紅者是為末香油調敷皮脫兩丸露者外以青荷葉包之敷藥後自生皮脫肛肛門大腸頭脫下也用東壁土泡湯先熏後洗又方治前證用五倍子為細末敷而頻托入之又方治前證用鱉頭燒存性香油調敷一方以此物燒煙燻之良久自收小兒赤瘤俗名赤遊風也此蓋熱毒氣客於腠理搏於血氣發於皮外赤如丹也用生地黃木通荊芥一本有芍藥桃仁苦寒帶表之藥外以芒硝泡湯洗之又以芭蕉油塗之錢氏用白五散敷之皆效白玉散白堊音惡白色土也五錢寒水石一兩上為細末米醋或新汲水調小兒臍中汁出並痛用白礬火煅枯干敷或用黃柏末敷之癩頭用通聖散酒拌除大黃另用酒炒共為末再以酒拌焙乾每服一錢水煎服外以白炭燒紅淬入水中乘熱洗之更以胡荽子伏龍肝懸龍尾黃連白礬為末油調敷之又方治癩頭以松樹厚皮燒存性二兩黃丹火飛一兩白礬火枯黃連大黃各五錢白膠香火飛傾石上一兩輕粉四録共為末熟香油調敷丹溪治一小兒二歲滿頭生瘡一日瘡忽自平遂患痰喘知其為胎毒也詢其母孕時多食辛熱物遂以人參連翹黃連甘草陳皮川芎芍藥木通濃煎入竹瀝與之數日而安尾骨痛屬陰虛有痰陰虛用四物湯加炒黃柏酒知母少用桂為引或以前胡木香為引如痛不止加乳香沒藥痰用二陳湯加知母黃柏澤瀉必用前胡木香為引蓋陰虛故痰盛也如痛不止亦加乳香沒藥二法必先以玉燭散或通經散痰小胃丹大下後用之或神祐丸十棗湯皆可與治帶同小兒弄舌因脾臟有微熱令舌絡微緊時時虛舌舐之勿用冷藥及下之少與瀉黃散徐徐服之有欲飲水者非熱也脾胃中津液少也不可下若大病後弄舌者凶瀉黃散藿香葉七分梔子一錢石膏五分甘草七分半防風去蘆四分上細切作一服用蜜酒炒香熟以水一盞煎至半盞去渣時時與之龜胸乃肺熱脹滿攻於胸膈即成龜胸又乳母多食五辛熱物亦成此證宜瀉白散加黃芩瀉白散桑白皮蜜水拌炒黃色一錢地骨皮一錢甘草炙五分加黃芩一錢上作一服水煎龜背兒生下客風入脊逐於骨髓即成龜背治之以龜尿點骨節即平取龜尿法用蓮葉置龜於上尿自出重舌木舌乃小兒舌下生舌也用三稜針於舌下紫脈刺之出惡血即愈又方用竹瀝調蒲黃末敷舌上神效又方治小兒木舌塞口欲滿者用紫雪二錢竹瀝半合細研和勻頻敷口即愈治小兒口瘡用鹽白梅燒存性紅棗連核燒存性鉛丹火飛人中白火飛龍腦少許共為細末敷之神效治小兒鵝口瘡因白屑滿舌及兩吻故名鵝口用發纏指頭蘸井花水拭口令淨又用濃煮粟米汁以綿纏箸頭拭之更以煅過黃丹摻之即愈又方治鵝口瘡不能食乳用地雞擂水塗瘡即愈地雞即匾蟲也人家磚石下多有之治小兒口瘡瀉心湯用黃連為細末蜜水調服治小兒口瘡用黃柏細辛各等分為細末敷之治小兒頦上生瘡痛癢難忍用白楊木枝燒於刀上出瀝敷之及治鵝口瘡神效治小兒走馬牙疳用白礬置於五倍子內煅過為末敷之治小兒臍風撮口因臍斷傷風或尿在胞中遂成臍風發熱面赤啼聲不出名曰撮口風瞿麥五分蠍稍四個殭蠶七個赤腳金頭蜈蚣一條上為細末鵝毛管吹些少入鼻中如噴嚏叫聲可治後用薄荷汁調與服之痘疹論內經曰諸痛癢瘡瘍皆屬心火夫小兒痘疹之證最為酷疾不日之間死生反掌蓋因胎毒藏於命門遇歲火太過熱毒流行之年則痘毒因之而發作矣一發則出於心肝脾肺四臟而腎無留邪者為吉若初發便作腰痛見點則紫黑者多死蓋毒氣留於腎間而不發越故耳錢氏雖有百祥丸大下之法然活者十無一二大抵痘瘡之法多歸重於脾肺二經蓋脾主肌肉而肺主皮毛故遍身為之斑斕也其為證也宜發越不宜鬱滯宜紅活凸綻不宜紫黑陷伏瘡出之後醫者當察色詳證以辨表裡虛實用藥其吐瀉不能食為裡虛不吐瀉能食為裡實灰白色陷頂多汗為表虛紅活凸綻無汗為表實又諸痛為實諸癢為虛外快內痛為內實外虛外痛內快為內虛外實裡實而補則結癰毒表實而復用實表之藥則潰爛不結痂也如表虛者瘡易出而難靨表實者瘡難出而易收裡實則出快而輕裡虛則發遲而重表實裡虛則陷伏倒靨裡實表虛則發慢收遲治之之法三日以前未見紅點必用升麻湯參蘇飲之類以發其表務令微汗為度若未汗如表猶未解雖略見紅點隱約於肌肉間而升散開發之劑尚未可除凡見出遲發慢者根窠缺紅冷者便當憂慮調攝切勿袖手待斃夫古人用藥寒熱迥別主意不同醫者再宜臆度寒暄推詳運氣而治如陳文中之木香散異功散用丁附薑桂等峻熱之藥而與內經病機不合丹溪特發揮其誤亦有用得其當者屢獲捷效若劉河間張子和輩悉用芩連大黃等寒涼之劑丹溪亦曰酒炒芩連各解痘毒依法用之而獲安者亦不少也今之醫者往往不同依陳氏而行者多用熱藥宗劉張而治者多用涼劑是故不偏於熱則偏於寒此刻舟求劍之道也愚按內經有曰寒者熱之熱者寒之微者逆之甚者從之又曰逆者正治從者反治從少從多觀其事也陳氏用從治之法權也劉張用正治之法常也然皆不外乎參朮耆草芎歸茯苓芍藥等補氣血藥為主治焉亦當看時令寒熱緩急施治固不可執一見也楊氏曰痘瘡發於肌肉陽明胃氣主之脾土一溫胃氣隨暢決無陷伏之患湯氏曰如庖人籠蒸之法但欲其松耳滄洲翁呂復折衷衆說著方立論適中用藥寒熱攻補斟酌時宜未嘗執一治也學者能遵守其法而行之庶無一偏之患矣方法夫小兒痘瘡大抵與傷寒相似發熱煩躁臉赤唇紅身痛頭疼乍寒乍熱噴嚏呵缺喘嗽痰涎始發之時有因傷風傷寒而得有時氣傳染而得有因傷食發熱嘔吐而得有因跌撲驚恐蓄血而得或為目竄驚搐如風之證或口舌咽喉肚腹疼痛或煩躁狂悶昏睡或自汗或下利或發熱或不發熱證候多端卒未易辨必須以耳冷尻冷驗之蓋瘍疹屬陽腎臟無證其耳與尻俱屬腎故腎之所部獨冷又不若視其耳後有紅脈赤縷為之真如此可以稽驗矣治療之法首尾俱不可妄下但溫涼之劑兼而濟之解毒和中安表而已虛者益之實者損之寒者溫之熱者清之是為權度昔人有喻云如庖人籠蒸之法但欲其松耳蓋毒發於表如苟妄汗則榮衛益虛重令開泄轉增瘡爛由是風邪乘間變證者多矣毒根於裡如苟妄下則內氣益虛毒不能出而返入焉由是土不勝水變黑歸腎身體振寒耳尻反熱眼合肚脹其瘡黑陷十無一生汗下二說古人深戒以此觀瘡疹證狀雖與傷寒相似而其治法實異傷寒從表入里瘡疹從里出表故也解肌之法葛根升麻紫蘇之類可也其或氣實煩躁熱熾大便祕結則與犀角地黃湯或人參敗毒散又或紫草飲多服亦能利之故雖云大便不通者少與大黃尤宜仔細斟酌不可妄用猛浪如小便赤澀者分利小便則熱氣有所滲而出凡熱不可驟遏但輕解之若無熱則瘡又不能發也凡痘疹春夏為順秋冬為逆凡痘疹分人清濁就形氣上取勇怯凡痘疹但覺身熱證似傷寒疑似未明便當先與惺惺散或參蘇飲熱甚者升麻葛根湯人參敗毒散若見紅點便忌葛根湯恐發得表虛也凡痘瘡初欲出時身發熱耳尻冷呵缺咳嗽面赤必是出痘之候便宜服升麻葛根湯加山楂大力子其瘡出必稀少而易愈凡痘瘡初出時或未出時宜服後藥多者可少少者可無重者可令輕也一方用苦絲瓜俗名天蘿近蒂三寸連皮子燒存性細研砂糖拌干吃入硃砂尤妙又方以硃砂一味為細末看兒大小或半錢或一錢蜜水調服亦云多者可少少者可無凡痘瘡發熱之時更以惡實子為末蜜調貼囟門免眼障之患凡痘瘡初出之際須看胸前若稠密急宜服消毒飲加山楂黃芩酒洗紫草減食者加人參凡痘瘡初出之時色白者便當大補氣血參朮耆芎升麻乾葛甘草木香丁香酒當歸白芍藥如大便泄加訶子肉豆蔻凡痘瘡初起發時自汗不妨蓋濕熱熏蒸故也甚者當以參耆等實表之藥以防其難靨也凡痘瘡初起發時煩躁譫語狂渴引飲若飲水則後來靨不齊急以涼藥解其標如益元散之類凡痘瘡已出可少與化毒湯出不快者加味四聖散紫草飲子紫草木香湯快斑散絲瓜湯之類凡痘瘡出稠密甚者人參敗毒散犀角地黃湯凡痘瘡疏則毒少密則毒甚宜以清涼之藥解之酒炒芩連之類雖數服亦不妨庶無害眼之患凡痘瘡爐灰色白淨者作寒者紫黑色者齊湧者煩躁者作熱者黑屬血熱涼血為主白屬氣虛補氣為主中黑陷而外白起得遲者則相兼而治凡痘瘡當分表裡虛實吐瀉少食為裡虛不吐瀉能食為裡實裡實而補則結癰毒陷伏倒靨灰白色者為表虛紅活凸綻者為表實表實而復實其表則潰爛不結痂也表虛不起發者或用燒人屎驗凡痘瘡須分氣虛血虛用補藥氣虛者人參白朮加解毒藥血虛者四物湯加解毒藥酒炒芩連各解毒蓋芩連為瘡家之要藥加酒炒以制其峻寒之性獨存清涼解毒之能是故痘瘡之症當用以殺其毒耳凡痘瘡雖分氣血虛實大抵多屬氣血不足然當於不足中以別其優劣而以補氣血藥中分輕重為用以平為期耳有挾外邪而實者少加防風等藥大法活血調氣安表和中輕清消毒溫涼之劑兼而治之此平治之法也溫如黃耆當歸木香輩涼如前胡乾葛升麻輩佐之以川芎白芍藥枳殼桔梗羌活木通紫草之屬則可以調適矣黑陷二種因氣虛而毒氣不能盡出者酒炒黃耆紫草人參等藥凡黑陷甚者亦用燒人屎別用無病小兒糞燒存性蜜水調服一方用人貓豬犬四糞於臘月燒灰名萬金散癢塌者於形色脈上分虛實實則脈有力氣壯虛則脈無力氣怯癢以實表之劑加涼血藥實癢如大便不通者以大黃等寒涼之藥少與之下其結糞氣怯輕者用淡蜜水調滑石末以鵝翎刷瘡上潤之瘡乾者宜退火止用輕清之劑荊芥薄荷升麻乾葛之類瘡濕者肌表間有濕氣也宜瀉濕藥白芷防風之類蓋風藥能勝濕也咽喉痛者如聖散鼠黏子湯喘滿氣壅者麻黃黃芩湯煩渴者甘草散烏梅湯下利嘔逆者木香理中湯顏色正者以前法平治則安將欲成就腳色淡者宜助血藥用當歸川芎酒芍藥之類或少加紅花以潤血色將成就之際腳色紫者屬熱用涼藥解其毒升麻葛根湯炒芩連及連翹之類甚者必用犀角蓋犀角大解痘毒將靨時金白色如豆殼者蓋因初起時飲水多其靨不齊名曰倒靨不好宜服實表之藥及消息大小便何如大便祕宜利大便小便祕宜利小便如小便赤澀者大連翹湯甘露飲大便祕結內煩外熱者小柴胡湯加枳殼最穩當或少服四順清涼飲子夫瘡疹用藥固有權度大小二便不可不通其大便看所下黃黑色其毒氣已盛不可多與熱劑但少用化毒湯可也或不用亦可若大小二便一有祕結則腸胃壅遏脈結氣滯毒氣無從發泄目閉聲啞肌肉黧黑不旋踵而變矣陷入者加味四聖散更以胡荽酒薄敷其身厚敷其足噴其床帳衣被並以厚綿衣蓋之若未起獨聖散入木香煎服若其瘡已黑乃可用宣風散加青皮錢氏云黑陷青紫者百祥丸下之不黑者慎勿下余知其所下者瀉膀胱之邪也又云下後身氣溫欲飲水者可治水穀不消或寒戰者為逆余知其脾強者土可以制水也百祥丸恐太峻當以宣風散代之瀉後溫脾則用人參茯苓白朮等分厚朴木香甘草各減半為妙蓋瘡發肌肉陽明主之脾土一溫胃氣隨暢獨不可消勝已泄之腎水乎此錢氏不刊之祕旨也其壞瘡者一曰內虛泄瀉二曰外傷風寒三曰變黑歸腎近時治痘瘡者悉宗陳文中木香散異功散殊不知彼立方之時必運氣在寒水司天之令及值嚴冬大寒為因氣鬱遏痘瘡不得起發紅綻故用辛熱之劑發之其宜也今人不分時令寒熱一槩施治誤人多矣或有雖值溫熱之時山野農家貪賤之人其或偶中一二不可以為常法也以上丹溪方法凡三十三條愚按陳氏木香散異功散二方乃素問從治之法又謂之熱因熱用者也蓋痘瘡熱毒怫鬱於內而不得起發故用丁附木香桂心豆蔻等辛散劫郁之劑一二服劫而開之使向之鬱於內者盡因藥氣而發越乎外故痘子陷伏灰白色者皆翕然紅活凸綻而內無遺邪矣切勿過劑如一二服後劫不起者亦不可多與多則反助其毒轉增黑爛咽閉聲沉而死近世儒醫悉引內經病機諸痛癢瘡瘍皆屬心火之語以正陳氏之失此知常而不知權之論也故使後學狐疑不決當用而不敢用是以袖手待斃哀哉痘瘡初發時五臟形證一面及腮頰赤噴嚏屬肺呵缺頓悶屬肝時發驚悸屬心乍涼乍熱手足冷多睡屬脾尻涼耳涼腎之平症一方腎在腑下不受穢濁獨無證痘瘡五臟形色二肝臟發水疱色微青以液為淚故疱色如水其形小肺臟發膿疱色多白以液為涕故膿稠濁如涕其形大脾臟發疹脾為裹血其色如淺黃或如糠麩其形小如斑心臟發斑其色主血故純赤其形小次於水疱腎臟居下獨不受穢毒故無候但耳尻冷耳若痘瘡黑陷耳及尻反熱者為逆斑痘所發之源三夫嬰兒之胚腪也必資胎養以長其形焉緣母失節慎縱欲恣餐感其穢毒之氣藏之臟腑近自孩提遠至童稚值寒暄不常之候瘡疹由是而發因其所受淺深而為稀稠焉其原實保於心一云相火之氣所為故入於肺則成膿疱俗名豌豆亦名麻豆以相火乘金故破肌也入於肝則成水疹俗名麩瘡入於脾則成癮疹入於心則成斑以火處於子母之分不傷皮毛彰君之德也或云瘡發焮腫於外者屬少陽三焦火也謂之斑色小紅而行於皮膚中出者屬少陰君火也謂之疹楊氏曰痘瘡發於肌肉陽明胃氣主之脾土一溫胃氣隨暢土可勝水決無陷伏之患辨內外因四凡瘡欲出而未出因發搐者是外感風寒之邪而內發心熱也宜王氏惺惺散或升麻葛根湯木香參蘇飲凡瘡欲出未出而吐利者是中焦停寒或挾宿食也宜四君子湯加砂仁陳皮或和中散如挾宿食者用紫霜丸惺惺散王氏白朮炒桔梗去蘆細辛人參茯苓甘草栝蔞根各三分上細切作一服入薄荷葉三片水一盞煎七分時時與之升麻葛根湯升麻葛根芍藥甘草炙各一錢上細切作一服水一盞煎七分溫服無時木香參蘇飲人參三分蘇葉桔梗乾葛前胡各四分陳皮茯苓各五分枳殼炒三分半木香一分半半夏四分上細切作一服生薑三片水一盞煎七分溫服四君子湯人參白朮茯苓各一錢甘草五分上細切水一盞煎六分食前溫服加縮砂陳皮名六君子湯和中散甘草三分炙厚朴薑汁製炒一錢白朮五分乾薑炮三分上細切作一服加生薑一片水一盞煎六分稍熱服紫霜丸杏仁五十枚去皮尖赤石脂一兩另研巴豆三十粒去膜油代赭石煅醋淬一兩研上各另研為末和勻湯浸蒸餅為丸如黍米大三歲以下兒二三丸八歲以上十數丸食前米飲或乳汁送下辨形氣病五如瘡已出而聲不變者形病也瘡未出而聲變者氣病也宜補肺散加生黃耆瘡出而聲不出者形氣俱病也形病身溫者宜解毒防風湯大便閉者宜當歸丸形氣俱病小兒稟賦素弱者宜豫服十奇散倍歸耆少加木香煎服補肺散阿膠一錢半炒成珠牛蒡子炒三分馬兜鈴五分甘草二分半杏仁三粒去皮糯米一錢炒加生黃耆五分上為末分二服水一小盞煎六分食後時時與之解毒防風湯防風去蘆一錢地骨皮生黃耆芍藥荊芥穗鼠黏子炒各五分上細切作一服水煎或為細末用溫水調服亦可當歸丸當歸五錢黃連炒一錢五分大黃二錢五分甘草炙一錢一本作一兩上先以當歸熬成膏子以下三味研為細末以膏和為丸如胡椒大三歲以下兒十丸七八歲兒二十丸食前清米飲下漸加至以利為度十奇散即托裡十補散又名十宣散出和劑方黃耆人參當歸各二錢厚朴薑製桔梗去蘆各一錢桂心三分川芎防風去蘆甘草白芷各一錢上為細末每服一錢或二錢溫酒調下細切水煎亦可辨三陰三陽經候六太陽病惡寒身熱小便赤澀出不快宜荊芥甘草防風湯少陽病乍寒乍熱出不快宜連翹防風湯陽明病身熱目赤大便閉實瘡遍肌肉出不快宜升麻葛根湯加紫草太陰病自利四肢逆冷宜附子理中湯木香散少陰病瘡黑陷口舌燥宜四物湯加紫草紅花厥陰病舌卷卵縮時發厥逆宜異功散三陰病法當救里故宜以溫劑助之荊芥甘草防風湯荊芥薄荷牛蒡子防風甘草炙各六分上細切作一服水一盞煎六分食前稍溫服連翹防風湯連翹防風瞿麥荊芥穗木通車前子當歸柴胡赤芍藥白滑石蟬蛻黃芩紫草茸各三分甘草炙一分上細切作一服水一盞煎七分隨兒大小量數輕重與之大小便自利者不宜用升麻葛根湯方見前辨內外因條每服加粳米五十粒紫草半錢煎又一方升麻湯治斑在面升麻一錢犀角射干黃芩酒浸焙乾人參甘草各五分上細切作一服水一盞煎六分食前溫服理中湯人參甘草炙乾薑炮各八分白朮八分上細切作一服加炮附子三分甚者五分量兒大小加減水煎食前稍熱服木香散木香大腹皮酒洗淨人參桂心青皮赤茯苓前胡訶子煨去核半夏薑製丁香甘草各三分上細切作一服加生薑三片棗一枚水煎量兒大小加減分數與之異功散木香當歸酒洗去蘆桂心白朮麩炒茯苓陳皮厚朴薑製人參肉果麵裹煨丁香半夏湯炮七次附子泡各三分上細切作一服加生薑三片大棗一枚水煎溫服辨三陽證治七凡痘疹春夏為順當純陽之時也古人治法與傷寒同足脛熱兩腮紅大便祕小便澀渴不止上氣急脈洪數以上七證不宜服熱藥若痘疹一發有密如蠶種布或如糠秕者合清表宜連翹升麻湯或未出而先發搐是兼外感風寒之邪宜茶湯下解毒丸及犀角地黃湯瘡出不快清便自調知其在表當微發散升麻葛根湯若瘡青乾黑陷身不大熱大小便澀滯是熱蓄於內宜煎大黃湯下宣風散若表大熱者不可下黑陷甚者百祥丸若瘡已發稠密微喘渴欲飲水宜微下之當歸丸及龐氏地黃膏外以黃柏膏塗面佳值盛夏暑熱正熾適瘡大發煩渴大便實者宜玉露散及甘露飲子或昏冒不知人時作搐搦瘡倒靨黑陷者宜豬心龍腦膏連翹升麻湯即升麻葛根湯加連翹一分是也犀角地黃湯犀角鎊生地黃牡丹皮赤芍藥各等分上細切水煎服解毒丸寒水石研石膏研各一兩青黛五錢上以二石細研如粉入青黛和勻湯浸蒸餅為丸如芡實大每服一丸食後新汲水化下或細嚼姜水下亦可三歲兒服半丸量歲數加減服之宣風散檳榔二枚陳皮甘草各五錢黑醜四兩取頭末一兩上為末量兒大小以蜜湯調服百祥丸紅牙大戟不拘多少陰乾漿水煮極軟去骨日中曝乾復納汁中煮汁盡焙乾為末上一味以湯浸蒸餅為丸如粟米大每服三十丸研碎升麻湯下量兒大小加減丸數與之地黃膏龐氏生地黃四兩豆豉半升雄黃一錢麝香五分上以豬膏一斤和勻露一宿煎五六沸令三分去一絞去渣下雄黃麝香攪勻稍稍飲之毒從皮膚中出即愈黃柏膏黃柏一兩去粗皮酒炒緑豆一兩去殼甘草四兩上為細末以生芝麻油調從耳前至眼眶並厚塗之日三二次如用早能令瘡不至面縱有亦稀少玉露散方見前吐瀉門王海藏云非腎熱相火盛者不宜服此藥利北方甘露飲子生地黃熟地黃並用酒洗天門冬去心麥門冬去心枇杷葉炙去毛枳殼麩炒黃色黃芩石斛去根子山茵陳甘草各等分炙上細切作一服水一盞煎六分食後溫服豬心龍腦膏梅花腦子一字研上取新宰獖豬心血一個為丸如芡實大每服一丸或半丸量兒大小與之紫蘇湯下或井花水化下亦可辨三陰證治八凡瘡發於秋冬為逆當純陰之時也足脛冷腹虛脹糞青色面㿠白嘔乳食目睛青脈沉微以上七證不宜服寒藥痘瘡盛出四肢逆冷或自利系在太陰脾經宜急溫之用異功散附子理中湯調中丸痘瘡平塌灰白色不澤此是正氣不足宜十補托裡散倍黃耆加熟附子或四肢厥逆時作搐搦系在厥陰宜溫之異功散加防風青皮或和中散去乾葛藿香加附子肉桂心調中丸白朮五錢炒人參五錢甘草炙五錢乾薑炮四錢上為細末煉蜜為丸如緑豆大每服多不過二十丸溫水食前送下辨形氣不足九肺主氣氣不足則致後三證自汗聲不出瘡頂陷塌不綻肥並宜十奇散自汗倍黃耆聲不出倍桔梗心主血血不足則致後三證灰白色根窠不紅不光澤並宜芎歸湯加芍藥紫草紅花良驗芎歸湯川歸川芎各二錢半上細切水煎服辨表裡虛實十表裡俱實其瘡難出而易靨表裡俱虛其瘡易出而難靨諸痛為實內快外痛為外實內虛內痛外快為內實外虛諸寒為痛凡瘡發身痛不為外寒所折則肉腠厚密宜分而治之若紅點方見為寒所折而肉體有熱宜木香參蘇飲輕者消毒飲或葛根升麻加芍藥湯肉腠密者宜活血散勻氣散諸癢為虛凡血氣不足多癢此證所謂諸癢為虛也宜十補托裡散及木香散加丁香官桂胃主肌肉尤宜四君子湯加歸芎木香紫草煎服或患者不能忌口因食毒物而作癢者二物湯百花膏或四君子湯加解毒藥消毒飲牛蒡子三錢炒一名鼠黏子一名大力子荊芥一錢甘草五分生用防風去蘆五分上細切作一服水煎加生犀角尤妙葛根升麻加芍藥湯升麻葛根湯倍芍藥是也活血散白芍藥上為細末每服一錢溫水調下止痛用酒調下尤驗王海藏云四肢出不快加防風一方用赤芍藥勻氣散即濟生方八味順氣散加木香也白朮白茯苓白芷陳皮烏藥人參各五分甘草炙二錢半木香一分半青皮五分上細切作一服水一盞煎七分服或細末酒調亦可二物湯蟬蛻洗淨二十一枚甘草炙一兩上為末水煎時時服之百花膏石蜜不拘多少略用湯和時時以鵝翎刷之瘡痂易落無痕平治諸方十一以平為期萬不失一石壁胡氏曰小兒難任非常之熱亦不可任非常之冷如熱藥太過輕則吐利腹脹重則陷伏倒靨是宜溫涼適中可也仁齊楊氏曰諸熱不可驟去宜輕解之蓋痘瘡無熱則不能起發史氏曰比之種豆值天時暄暖則易生凡值天時不正鄉鄰痘瘡盛發宜服禁方不出方三豆湯油飲子鳳龍膏凡初覺痘瘡欲發當先解利與傷寒相類疑似之間兼用解表胡氏云非微汗則表不解解表當於紅斑未見之時宜用王氏惺惺散錢氏惺惺散張氏防風湯升麻葛根湯張氏四物解肌湯參蘇飲三豆湯赤小豆大黑豆緑豆各一升甘草三兩上以三豆淘淨用水八升煮豆熟為度逐日空心任意飲豆汁七日永不出油飲子真麻油一升上逐日飲盡永不出以上二方出扁鵲倉公方鳳龍膏烏雞卵一個地龍一條活者細小者上以雞卵開一小竅入地龍在內夾皮紙糊其竅飯鍋上蒸熟去地龍與兒食之每歲立春日食一枚終身不出痘瘡覺鄰里有此症流行時食一二枚亦好惺惺散錢氏方見前辨內外因條與王氏同但一方有防風川芎減半解毒防風湯方見前四物解肌湯白芍藥黃芩升麻葛根各七分上細切作一服水一盞煎六分溫服不拘時瘡出不快十二活血散加防風湯方見前辨表裡虛實條紅花湯龐氏紅花子一合上以水半升煎百沸服之紫草湯治瘡出不快及大便自利一名紫草木香湯紫草木香茯苓白朮各一錢甘草五分上細切作一服入糯米一百粒水一盞煎六分食前服四聖散紫草木通各一錢甘草枳殼麩炒黃色各半錢上細切作一服水一盞煎七分溫服不拘時樺皮飲子樺木皮二兩上用水一升煮取半升時時細飲凡痘瘡出不快者有五證臨病審兒調之一證天時嚴寒為寒所折不能起發宜散寒溫表冬三月寒甚紅斑初見宜五積散正氣散參蘇飲楊氏調解散陳氏木香散五積散白芷川芎各三分桔梗去蘆一分半芍藥茯苓甘草炙川歸肉桂去粗皮半夏各二分陳皮去白枳殼去穰麩炒麻黃去根節各五分蒼朮米泔浸一錢乾薑炮四分厚朴薑製四分上除肉桂枳殼二味別為粗末外餘十三味細切慢火炒令轉色攤冷次入二味末令均作一服水一盞半入生薑三片煎至一盞去渣稍熱服正氣散甘草炙三分半陳皮藿香去梗白朮各五分厚朴薑製半夏薑製各一錢半上細切作一服加生薑三片大棗一枚水煎服調解散青皮陳皮枳殼麩炒桔梗去蘆炒人參半夏泡七次川芎木通乾葛各四分甘草紫蘇各二分上細切作一服加生薑三片大棗一枚水煎服一方加紫草糯米一證炎暑隆盛煩渴昏迷瘡出不快宜辰砂五苓散煎生地黃麥門冬調服身熱甚者小柴胡加生地黃煩渴而便實者白虎加人參湯輕者人參竹葉湯加生地黃煎服辰砂五苓散五苓散加辰砂細研為末是也小柴胡湯人參白虎湯人參竹葉湯方俱見傷寒門一證服涼藥損傷脾胃或胃虛吐利當溫中益氣宜理中湯吐利甚者加附子或陳氏異功散木香豆蔻丸肉豆蔻丸木香砂仁白龍骨訶子肉各五錢赤石脂枯白礬各七錢半肉豆蔻五錢濕麵裹煨熟上為細末麵糊為丸如黍米大每服三十丸至五十丸煎異功散送下一證或成血疱一半尚是紅點此毒氣發越不透必不能食大便如常者宜半溫里半助養之劑用四聖散加減及紫草木香湯絲瓜湯阮氏萬全散湯氏安斑湯四聖散紫草木香湯即紫草湯方並見前絲瓜湯苦絲瓜不拘幾個連皮子燒存性為末上每服一抄時時用米湯調服此物發痘瘡最妙或以紫草甘草煎湯調服尤佳萬全散阮氏治痘瘡出不紅潤防風人參蟬蛻各等分上細切每服四錢水一盞入薄荷三葉煎六分溫服熱而實者加升麻安斑湯湯氏紫草木通各五分蟬蛻防風各三分甘草二分上細切水一鍾煎五分溫服一證外實之人皮膏厚肉腠密毒氣難以發泄因出不快宜消毒飲透肌散如大便祕實於消毒飲內加大黃梔子仁煎服瘡出太稠宜犀角地黃湯張氏解毒防風湯血氣不足宜十奇散咽嗌不利宜如聖湯加薄荷枳殼口中氣熱咽痛口舌生瘡宜甘露飲子驚風搐搦宜抱龍丸煩渴宜獨參湯黃耆六一湯透肌散紫草茸緑升麻粉甘草各一錢上細切水煎服或與消毒飲同煎服尤妙如聖湯桔梗二錢甘草一錢一方加牛蒡子麥門冬各一錢上細切水煎時時服之抱龍丸見驚風門辨外證逆順十三身體溫暖者順寒涼者逆能食大便實者順不能食大便利者逆辨外證輕重十四輕者作三次出大小不一頭面稀少耳中無根窠紅活肥滿光澤重者一齊並出如蠶種布灰白色瀉利而渴身溫腹脹頭溫足冷辨痘瘡初末形證十五微者其邪在腑發為細疹狀如蚊喙所螫點點赤色俗名麩瘡甚者其邪在臟為痘瘡狀如豌豆根赤頭白穴出膿水俗名疱瘡二三日始見微微欲出如粟如黍或如緑豆或如水珠光澤明淨者佳四日大小不等根窠紅光澤者輕如稠密陷頂並瀉者重六日七日瘡形肥紅光澤者輕如身熱氣喘口乾腹脹足指冷者重八日九日長足紅滿瘡蠟色者輕如寒戰悶亂腹脹煩渴氣急咬牙者重之至也十日十一日瘡當結靨痂欲落之時將愈十二十三日當靨而不靨者為逆身稍熱利之以防其餘毒身不壯熱或腹脹或瀉渴用十二味異功散救之辨不藥而愈十六痘腳稀疏根窠紅綻不瀉不渴乳食不減四肢溫和身無大熱以上六證並不須服藥惟宜善加調護須使房室溫盎屏諸穢氣忌見外人毋犯房色及往來婦人月水並腋臭者皆不可近惟宜燒大黃蒼朮以辟惡氣勿宜燒沉檀降真乳香腦麝幃帳之內宜懸胡荽或以胡荽浸灑噴床帳並燒木香為佳夫痘瘡之毒最怕穢惡之氣觸犯切不可信僧道看經解穢況無纖毫之力而反恐被其穢惡之氣觸犯亦不可恃其能解而不預防戒之戒之辨五不治證十七癢塌寒戰咬牙渴不止痘紫黑色喘喝不寧灰白色陷頂腹脹頭溫足冷悶亂飲水氣促泄瀉渴辨疹有陰陽二證十八赤疹屬陽遇清涼而消白疹屬陰遇溫暖而減傷寒時氣發斑附十九溫毒發斑宜玄參升麻湯重用荊防敗毒散胃爛斑因陽明胃實失下或下之太早所致宜化斑湯龐氏石膏湯時氣斑宜石膏湯陽毒斑胃實之人誤服熱劑或加以風暑宜陽毒升麻湯玄參升麻湯玄參去苗洗升麻甘草各一錢半上煎服荊防敗毒散柴胡甘草人參桔梗川芎茯苓枳殼前胡羌活獨活荊芥穗防風各四分上細切作一服水一盞煎七分溫服或加薄荷五葉化斑湯即白虎湯加玄參也石膏湯龐氏香豉一合蔥白五錢石膏一兩梔子一錢生薑五錢大青升麻芒硝各一錢半上細切作一服水一升半煮取七合去渣下芒硝放溫徐徐服之陽毒升麻湯升麻犀角鎊射干黃芩人參甘草各一錢上細切作一服水一盞半煎至一盞食前溫服辨瘡後餘毒二十一毒氣流於太陰脾經則癰發四肢手腕並膝臏腫痛宜消毒飲重者十六味流氣飲加附子或酒浸大黃煎服及必勝膏蜆子水等敷之消毒飲方見前十六味流氣飲川芎川歸芍藥防風人參木香黃耆桂心桔梗白芷檳榔厚朴烏藥甘草紫蘇枳殼各四分上細切作一服水一盞煎七分服氣血虛而自利者加熟附子大便實加大黃必勝膏馬齒莧杵汁豬膏脂石蜜上以三味共熬為膏塗腫處蜆子水蜆子不拘多少活者以水養五日旋取此水洗手面漸生肉無瘢痕一毒氣流於太陰肺經則臑內並手腕腫流為赤癰毒宜消毒飲如聖湯五福化毒丹雄黃解毒丸利之氣血虛者十補湯加桔梗枳殼犀角煎服咽喉不利或腫痛宜薄荷如聖湯五福化毒丹方見驚風門每兩分作十二丸一歲兒一丸分作四服用薄荷水化下瘡餘毒上攻口齒涎血臭氣以生地黃自然汁化一丸用翎刷入口內如聖湯方見前雄黃解毒丸鬱金雄黃研飛各一錢半巴豆去皮膜油四十粒上為細末醋煮麵糊為丸如緑豆大每服二三丸熟茶清下量兒大小與之一毒氣流入大腸則便膿血或下腸垢或大便祕結宜犀角地黃湯身煩熱渴宜黃連解毒湯熱勢盛者小承氣湯下利者黃連解毒湯黃連阿膠丸駐車丸黃連阿膠丸黃連三兩阿膠炒成珠子一兩茯苓去皮二兩上以黃連茯苓同為細末水調阿膠末搜和為丸如梧桐子大每服二十丸溫米飲送下駐車丸阿膠炒成珠醋煮膏當歸去蘆各十五兩黃連三十兩乾薑炮十兩上為末以阿膠膏和成餅丸如梧桐子大每服二十丸食前清米飲下日三服小兒丸如麻子大量兒大小加減一痘瘡入眼宜決明散密蒙花散撥雲散蛤粉散決明散草決明赤芍藥天花粉甘草上各等分為細末每服半錢匕食後茶清調下密蒙花散密蒙花青葙子決明子車前子上各等分為細末用羊肝一片破而為三摻藥入肝內令均卻仍搗合併為一以酒水濕紙七重包裹於煻灰中煨熟勿令焦焙乾研末入麝香少許每服二錢重食後米飲調下撥雲散羌活防風甘草炙柴胡各等分上為細末每服二錢水一盞煎七分食後臨臥服薄荷汁茶清或菊花苗煎湯調皆可忌藏鹽鮓醬濕面炙煿炊氣及一切發風動火之物蛤粉散穀精草海蛤粉各等分上為細末每服二錢匕用獖豬肝二兩許以竹刀批開摻藥在內捲了外以青箭箬包裹麻線扎縛定用水一碗煮令熟入小口瓶內熏眼候溫取食之日一服不過十服遂退一熱毒流於三陽之後經則腮項結核腫痛宜荊防敗毒散托裡十補散減桂服消毒飲倍加忍冬藤煎服荊防敗毒散方見前傷寒時氣發斑附條托裡十補散即十奇散也方見前辨形氣病條消毒飲方見前祖傳方凡痘後不問癰毒發於何經初起紅腫時卻用黑緑赤三豆以酸醋浸研漿時時以鵝翎刷之隨手退去其效如神醫案一小兒痘後二十日不大便其糞燥作痛垂死曾用大黃芒硝枳殼巴豆等藥及用蜜導法又服香油一碗許俱不通愚令一人以真麻油含口內用小竹筒一個納穀道中吹油入腸內須臾即通真良方也古人拯治痘瘡要法二十一王氏指迷云痘瘡亦時氣之一端一人受症傳染其餘又云瘡疹有熱則易出一出遍及於肌膚張氏煥曰痘子氣均則出快蓋血隨氣行氣逆則血滯王氏曰疹者脾所生脾虛肝旺乘之木能勝土熱動心神而生驚錢氏曰肝風心火二臟交爭而致搐又曰痘症未形而先搐大忌涼心蓋瘡屬心心主血心寒則血不能行痘欲出而不可得也切須慎之大抵治驚惟平肝利小便均氣最妙仁齊楊氏曰大熱當利小便宜五苓散導赤散小熱當解毒宜消毒飲四聖散陷伏倒靨黑陷一證變壞歸腎黑陷宜錢氏百祥丸宣風散一證外感風寒所致冬時宜五積散減麻黃加桂心紫草春時不換金正氣散加川芎白芷防風或風邪所襲宜消風散加紫草兼服一證乳食所傷內氣壅遏宜楊氏調解散或四君子湯加縮砂木香川芎紫草大便自利宜附子理中湯一證或因父母不謹犯房事月水及乳母腋氣穢濁諸忤所致宜阮氏闢穢丹焚而熏之仍以胡荽酒噀幃帳及懸胡荽於床帳中甚者以胡荽湯化下蘇合香丸兼塗熏亦妙聖制再蘇散神效一證毒氣入里黑陷宜豬尾膏神驗不換金正氣散厚朴薑製藿香去梗甘草炙半夏湯泡七次去皮臍蒼朮米泔浸陳皮各五分上細切作一服生薑三片棗二枚水一盞煎七分服闢穢丹蒼朮北細辛甘松川芎乳香另研降真香各等分上為細末烈火焚之今世俗例以黃茶燒煙燻之最好再蘇散治痘瘡觸犯毒氣入內明白礬地龍去土炒各一兩上為末每服半錢用豬尾血一橡斗許用新汲水少許調下不拘時豬尾膏即前龍腦膏錢氏用小獖豬尾取血研用之凡痘瘡膿汁不幹蓋瘡出太盛表虛難靨以致膿水黏衣著席濕痛不能轉側宜白龍散敗草散等敷之白龍散黃牛糞日乾火煅成灰取心中白者為末帛裹敷之敗草敗用蓋屋及牆背上遠年腐草洗淨焙乾為細末帛裹敷之及鋪床席上佳天花散馮氏治痘後失音天花粉桔梗白茯苓去皮訶子肉石菖蒲甘草各等分上為末用水調半匙在碗內外以小竹七莖黃荊七條縛作一束點火在碗內煎臨臥服凡孕婦身發痘瘡宜馮氏罩胎散若胎動不安宜獨聖散安胎飲身熱甚宜木香參蘇飲或瘡稠密宜十齊散倍芍藥當歸減桂加香附烏藥如胎已五月則半夏桂心之屬俱不必禁罩胎散赤茯苓白朮川歸白芍藥赤芍藥北柴胡乾葛人參桔梗條芩防風陳皮荊芥枳殼紫草阿膠糯米白芷甘草川芎縮砂大熱加鬱金各三分上細切作一服水一盞半煎至一盞乾柿蒂七個野苧根七寸甜瓜蒂一個用銀器煎以荷葉蓋定熬至八分去渣仍用荷葉蓋復空心溫服獨聖散用連殼縮砂慢火炒去殼為末每服半匙熱酒調下胎動則服服後覺胎熱則安矣安胎散大腹皮酒洗極淨焙乾再用烏豆汁洗人參陳皮白朮白芍藥川歸川芎香附米童子尿浸砂仁紫蘇茯苓甘草各半錢上細切作一服水一盞半燈草七莖糯米一搨煎一盞食前溫服滄州翁先生跋云凡乳嬰之與童草當歧為兩途以治之乳嬰當兼治乳母俾其氣血清和飲食有節投以調氣通茶之劑以釀其乳使兒飲之則其瘡心肥滿光澤無陷伏之憂童草之子必當備切其脈審其表裡虛實以汗下之苟不實不虛則但保其沖和使脾氣流暢則肺金籍母之助易於灌膿速於成痂無倒塌之患或至壯盛而膚腠厚密尤須預為汗解或大便結與溲澀者尤宜下之利之庶無患也餘證則當於藥內倍其分兩百無一失學者宜致思焉
