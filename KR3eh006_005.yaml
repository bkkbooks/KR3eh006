body:
  text: 卷之五麻木論內經曰風寒濕三氣合而為痹故風氣勝者為行痹寒氣勝者為痛痹濕氣勝者為著痹河間曰留著不去四肢麻木拘攣也經又曰痛者寒氣多也有寒故痛也其不痛不仁者病久入深榮衛之行澀經絡時疏故不痛皮膚不營故為不仁夫所謂不仁者或周身或四肢唧唧然麻木不知痛癢如繩扎縛初解之狀古方名為麻痹者是也丹溪曰麻是氣虛木是濕痰死血然則曰麻曰木者以不仁中而分為二也雖然亦有氣血俱虛但麻而不木者亦有虛而感濕麻木兼作者又有因虛而風寒濕三氣乘之故周身掣痛兼麻木並作者古方謂之周痹治法宜光汗而後補也醫者宜各以類推而治之不可執一見也脈法脈浮而濡屬氣虛關前得之麻在上體關後得之麻在下體也脈浮而緩屬濕為麻痹脈緊而浮屬寒為痛痹脈澀而芤屬死血為木不知痛癢方法丹溪曰十指麻木是胃中有濕痰死血宜二陳湯加蒼朮白朮桃仁紅花少加附子行經以上丹溪方法凡一條人參益氣湯東垣治兩手麻木四肢困倦怠惰嗜臥熱傷元氣也黃耆二錢炙甘草升麻各五分五味子三十粒柴胡六分生甘草人參各一錢二分半白芍藥七分上細切作一服水二盞煎至一盞去渣稍熱服導氣湯東垣治兩腿麻木沉重黃耆二錢甘草一錢五分青皮一錢升麻柴胡當歸梢澤瀉各五分陳皮二分半紅花少許五味子三十粒上細切作一服水二盞煎至一盞去渣溫服天麻黃耆湯東垣治素有風證因連日醉飲其證復來右口角並眼牽引側視及左手腳腿麻木疼痛天麻芍藥神麯炒羌活如肢節不痛不用茯苓各三分人參黃連各四分川歸五分黃耆甘草升麻葛根黃柏蒼朮各六分澤瀉七分柴胡九分或加豬苓六分上細切作一服水二盞煎至一盞去渣溫服補氣升陽和中湯東垣一婦人病診得六脈俱中得弦洪緩相合按之無力弦在上是風熱下陷入陰中陽道不行其證閉目則渾身麻木晝減而夜甚覺而升目則麻木漸退久則絶止常開目則此證不作是以不敢閣眼致不得臥身體皆重時有痰嗽覺胸中不利煩躁氣短喘促肌膚充盛飲食不減大小便如常此非風邪乃氣不行也治宜補益肺氣自愈如經脈中陰火乘其陽分火動為麻木者當兼去其陰火則安矣生甘草去腎熱黃柏酒炒除濕熱白茯苓除濕導水澤瀉除濕導水升麻行陽助經柴胡以上各二分蒼朮除濕補中三分陳皮當歸身白朮各四分人參白芍藥各六分佛耳草炙甘草各八分黃耆一錢草豆蔻益陽闢外寒三分上細切作一服水二盞煎至一盞去渣食遠服麻黃桂枝升麻湯東垣治婦人先患渾身麻木睡覺則少減開目則已其證愈後又因心中煩惱遍身骨節痛身體沉重飲食減少腹中氣不轉運木香生薑各二分桂枝半夏陳皮草豆蔻厚朴薑汁製黑附子炮去皮臍黃柏各三分炙甘草升麻白朮茯苓澤瀉各四分黃耆麻黃不去節人參各五分上細切作一服水二盞煎至一盞去渣食遠服神效黃耆湯東垣治渾身麻木不仁或頭面手足胕背腿腳麻木並皆治之及兩目羞明畏日隱澀難開視物昏花睛痛亦皆治之蔓荊子二分陳皮五分人參八分炙甘草一錢白芍藥一錢黃耆二錢上細切作一服水二盞煎至一盞去渣臨臥稍熱服如麻木不仁雖有熱不加黃柏只加黃耆一錢通三錢如麻木甚者加芍藥一錢通二錢如小便淋澀加澤瀉五分一服去則止如有大熱證加酒洗黃柏三分補氣湯治皮膚麻木神效黃耆陳皮甘草各一錢二分澤瀉六分芍藥八分上細切作一服水一盞半煎至一盞溫服沖和補氣湯治閣眼則麻木開則不麻四肢無力痿厥醋心目昏頭眩神效羌活七分獨活川歸黃柏各三分柴胡神麯木香草豆蔻各二分人參白朮澤瀉獵苓各一錢甘草升麻各五分芍藥一錢黃耆二錢蒼朮陳皮各一錢黃連二分麻黃不去節二分上細切分作二服每服用水一盞半煎至一盞溫服祖傳方三妙丸治濕熱下流兩腳麻木或如火烙之熱黃柏四兩切片酒拌略炒蒼朮六兩米泔浸一二宿細切焙乾川牛膝去蘆二兩上為細末麵糊為丸如梧桐子大每服五七十丸空心薑鹽湯下忌魚腥蕎麥熱面煎炒等物耳病論內經曰腎者作強之官技巧出焉又曰耳為腎之外候一曰腎通竅於耳一曰心通竅於耳夫腎之為臟水臟也天一生水故有生之初先生二腎而一陰藏焉而又有相火存乎命門之中也每挾君火之勢而侮所不勝經所謂一水不能勝二火是矣其或嗜欲無節勞役過度或中年之後大病之餘腎水枯涸陰火上炎故耳癢耳鳴無日而不作也或如蟬噪之聲或如鐘鼓之響甚為可惡早而不治漸而至於龍鍾良可嘆哉治法宜瀉南方之火補北方之水無有不安者焉錢仲陽曰腎有補而無瀉厥有旨哉脈法兩寸脈浮洪上魚為溢兩尺脈短而微或大而數皆屬陰虛法當補陰抑陽左寸洪數心火上炎兩尺脈洪或數者相火上炎其人必遺精夢與鬼交兩耳蟬鳴或聾方法丹溪曰大病後耳聾及陰虛火動而聾者宜補陰降火四物湯加黃柏主之耳鳴宜當歸龍薈丸多飲酒人宜木香檳榔丸耳聾以茱萸烏頭尖大黃三味為末津調貼湧泉穴以引火下行又方治耳痛以白礬枯吹入耳中及青礬燒灰吹之皆效又方治耳痛及聤耳用桑螵蛸炙黃為末加麝少許吹入耳中極效或用胭脂胚子蛀竹末加麝香少許吹入妙又方治諸蟲入耳用香油滴入耳中其蟲即出或死於耳內或用驢牛乳或雞冠血滴入皆好又方治諸蟲入耳用桃葉卷作角子切齊其頭納入耳中其蟲從角中走出大補丸治耳鳴欲聾用黃柏一味不拘多少細切鹽酒拌新瓦上炒褐色為細末滴水丸如梧桐子大每服一百丸如氣虛以四君子煎湯下血虛以四物湯下凡耳鳴耳聾皆是陰虛火動或補腎丸或虎潛丸或滋陰大補丸皆好以上丹溪方法凡九條滋腎丸東垣治耳鳴耳聾黃柏鹽酒炒一兩知母去毛酒浸一兩肉桂五分上為細末煉蜜為丸如梧桐子大每服五十丸淡鹽湯下柴胡聰耳湯東垣治耳中乾結耳鳴而聾連翹四錢柴胡三錢炙甘草少許當歸身人參各一錢水蛭五分炒另研虻蟲三個去翅足炒另研麝香少許另研上除後三味別研外其餘細切作一服加生薑三片水二盞煎至一盞去渣加三味末子再煎一二沸食遠服蔓荊子散東垣治上焦熱耳鳴而聾及出膿汁炙甘草升麻木通赤芍藥桑白皮蜜制麥門冬生地黃前胡甘菊花赤茯苓蔓荊子各五分上細切作一服加生薑三片大棗一枚水盞半煎至一盞去渣食後服鼠黏子湯治耳痛生瘡昆布蘇木生甘草蒲黃草龍膽各二分鼠黏子連翹生地黃當歸梢黃芩炙甘草黃連各三分柴胡黃耆各四分桔梗一錢五分桃仁三個去皮尖另研紅花少許上細切作一服水二盞煎至一盞稍熱食後服忌寒藥利大便祖傳方治耳內忽大痛如有蟲在內奔走或有血水流出或干痛不可忍者用蛇蛻皮燒存性細研以鵝翎管吹入耳中立愈目病論東垣曰按陰陽應象論云諸脈者皆屬於目又曰目得血而能視五臟六腑之精氣皆上注於目而為之睛睛之窠為眼骨之精為瞳子筋之精為黑眼血之精為目窠之總絡氣之精為白眼肌肉之精則為約束裹擷筋骨血氣之精而與脈並而為系上屬於腦後出於項是故瞳子黑眼法於陰白眼赤脈法於陽故陰陽合德而為睛明也是以五臟六腑十二經脈三百六十五絡其血氣皆稟受於脾土而上貫於目而為明故目者心之使也心者神之舍也故精神亂而不守卒然見非常之怪若邪中其睛則精散精散則視歧視一物為兩也因事煩擾飲食失節勞役過度致脾胃虛弱心火大旺則百脈沸騰血脈逆行經曰天明則日月不明邪害空竅是也夫脾者諸陰之首目者血脈之宗也故脾虛則五臟之精氣皆失所司不能歸明於目矣心者君火也主藏神明宜靜而安相火代行其令相火乃包絡之火主百脈皆榮於目既勞役妄動又因邪氣所並而損血脈是故諸病生焉醫目者若不先理脾胃及養血安神乃治標不治本是不明主理者也學者其可不用心乎脈法左寸脈洪數心火炎也關弦而洪肝火盛也右寸關俱弦洪肝木挾相火之勢而來侮所不勝之金而制己所勝之土也方法丹溪曰目病屬風熱血少神勞腎虛河間曰在腑則為表當除風散熱在臟則為里當養血安神如暴失明昏澀翳膜眵淚斑入眼皆風熱也一云斑入眼此肝氣盛而發在表也宜表散以去之如昏弱不欲視物內障見黑花瞳子散大皆里也血少神勞腎虛也宜養血補水安腎以調之瞳子散大皆辛熱所為也辛主散熱乘之當除風熱涼血益血以收耗散之氣芩連苦寒除邪氣之盛為君當歸身生地黃養血涼血為臣五味子酸溫體浮收瞳子散大地骨皮天門冬瀉熱補氣或用滋陰地黃丸最妙久病昏暗以熟地黃當歸根為君羌活防風甘菊花之類佐之暴發赤腫以黃芩防風為君以瀉火黃連當歸為臣以養血羌活柴胡升麻白芷甘草為使白睛紅加白豆蔻少許又方治血熱壅痛四物湯加草龍膽防己防風羌活一云實熱上衝眼痛用黃連瀉火當歸補血勞役飲食不節內障昏暗蔓荊子湯蔓荊子人參甘草炙黃耆黃柏白芍藥酒炒各一錢上細切水煎服又方治眼痛用生地黃酒浸搗爛盦眼上又用草烏南星乾薑桂枝為末醋調貼兩足心時用牛膝膏洗眼肥人風熱上壅眼目疼痛防風羌活荊芥酒芩各二錢水煎服瘦人目痛乃是血少兼熱須用養血藥少加風藥當歸生地黃酒洗玄參防風荊芥菊花川芎各等分上細切水煎服以上丹溪方法凡十條滋陰地黃丸東垣熟地黃一兩生地黃一兩五錢柴胡八錢天門冬炙甘草枳殼地骨皮黃連五味子各三錢當歸身酒浸洗黃芩各五錢人參二錢上為細末煉蜜為丸如緑豆大每服一百丸茶清下祕傳撥雲退翳丸又名神仙退云丸祕傳治一切內外障膜遮睛昏暗大效栝蔞根枳實甘草炙蔓荊子薄荷各五錢川芎密蒙花荊芥穗地骨皮甘菊花白蒺藜羌活各一兩蛇蛻蟬蛻黃連各三錢川椒七錢五分去目炒當歸一兩五錢酒浸焙草決明五錢炒木賊童便浸一宿去節焙乾上為細末煉蜜為丸每兩分作十丸每服一丸食後臨臥服日進三服翳障米飲下睛暗當歸湯下內障木香湯下退云丸有犀角五錢乾地黃一兩無蔓荊子甘草川椒婦人當歸湯下有氣木香湯下羊肝丸局方治一切目疾不問內外翳障青盲等證白乳羊肝一具以竹刀去膜黃連一兩甘菊花防風薄荷去梗荊芥穗羌活當歸川芎各三錢上為細末將羊肝蒸熟同藥末杵爛為丸漿水下春雪膏東垣點赤眼效朴硝不拘多少置豆腐上蒸化待流下以瓷器盛之爛翳驗方用茜草根燒灰以燈心點之須臾大痛以百節草刮之神效明目湯東垣治眼楞緊急致倒睫拳毛及上下瞼皆赤爛睛疼昏暗晝則冷淚常流夜則眼澀難開細辛二分蔓荊子五分防風一錢葛根一錢五分甘草二錢一方加黃耆一錢上細切作一服水二盞煎至一盞去渣臨臥溫服明目細辛湯治兩目發赤微痛羞明畏日怯風寒怕火光眼睫成紐眵糊多隱澀難開眉攢腫悶鼻塞涕唾稠黏大便微硬川芎二分生地黃酒浸洗蔓荊子各三分當歸身梢白茯苓藁本各四分荊芥穗五分防風麻黃根羌活各八分細辛少許紅花少許川椒四粒桃仁七個去皮尖細研上細切作一服水一盞半煎至一盞去渣臨臥稍熱服忌酒醋濕面復明散東垣治內障青皮去穰三分陳皮去白川芎蒼朮各五分炙甘草生地黃連翹柴胡各一錢黃耆一錢五分當歸身二錢上細切作一服水二盞煎至一盞去渣稍熱服忌酒醋濕面辛熱大料物之類助陽和血湯東垣治眼發之後微有上熱白睛紅隱澀難開睡多眵淚蔓荊子一分香白芷三分柴胡黃耆炙甘草當歸身酒洗防風各五分升麻七分上細切作一服水一盞半煎至一盞去渣稍熱服歸葵湯一名連翹飲子東垣治目中溜火惡日與火光隱澀難開小角緊視物昏花迎風有淚柴胡三分生甘草蔓荊子連翹生地黃當歸身紅葵花人參各四分五釐黃耆酒黃芩防風羌活各七分半升麻一錢上細切作一服水二盞煎至一盞去渣食後服救苦湯東垣治眼暴發赤腫瞼高苦疼不可忍者桔梗連翹紅花細辛各二分當歸身夏月減半甘草炙各一錢蒼朮草龍膽各一錢四分半羌活太陽升麻陽明柴胡少陽防風藁本黃連各二錢生地黃黃柏黃芩知母各三分川芎六分上細切作一服水二盞煎至一盞去渣食後服若苦疼則多用苦寒藥兼治本經之藥再行加減如睛昏加知母黃柏益陰腎氣丸東垣此壯水之主以鎮陽光澤瀉茯神各二錢五分生地黃酒洗牧丹皮山茱萸當歸梢酒洗五味子乾山藥柴胡各五錢熟地黃二兩上為細末勿犯鐵器蒸搗煉蜜丸如梧桐子大每服五十丸空心淡鹽湯下當歸龍膽湯東垣治眼中白翳防風石膏各二分柴胡羌活五味子升麻各三分甘草酒黃連黃耆各四分半黃芩酒炒黃柏酒炒當歸身酒洗草龍膽酒洗芍藥各七分五釐上細切作一服水二盞煎至一盞去渣入酒少許熱服瀉陰火丸一名連柏益陰丸東垣石決明三錢煅羌活獨活當歸梢甘草五味子防風各五錢草決明條黃芩黃連酒炒黃柏鹽酒炒知母各二錢上為細末煉蜜為丸如緑豆大每服五十丸茶清下療本滋腎丸東垣黃柏酒炒知母酒炒各等分為細末滴水為丸如梧桐子大每服一百丸至一百五十丸空心淡鹽湯下加味滋腎丸東垣肉桂三分黃連一錢薑黃一錢苦參三錢苦葶藶酒洗炒石膏覺肚冷勿用黃柏酒炒知母去毛酒炒各五錢上為細末麵糊為丸如梧桐子大每服一百丸白湯送下空心服以食壓之退翳膏東垣治黑白翳蕤仁升麻各三分連翹防風青皮各四分甘草柴胡各五分當歸身六分荊芥穗水半盞浸生地黃各一錢五分黃連三錢上細末水一碗煎至半碗去渣更上火煎半盞入荊芥水二匙入蜜少許再上火熬勻瓷器盛貯頻點之龍膽飲子東垣治疳眼流膿生疳翳濕熱為病穀精草川鬱金蛇蛻炙甘草各五分麻黃一錢五分升麻二錢青蛤粉草龍膽黃芩炒羌活各三錢上為細末每服二錢溫茶清調下還睛紫金丹治目眶歲久赤爛俗呼為赤瞎是也當以三稜針刺目眶外以瀉濕熱如眼生倒睫拳毛兩目緊蓋內伏火熱而攻陰氣法當去其熱內火邪眼皮緩則毛立出翳膜亦退用手法攀出內瞼向外以針刺之出血白砂蜜二十兩爐甘石二十兩火煅七次淬水內連水浸半日黃丹六兩水飛烏賊骨二錢麝香硼砂各一錢入盞內放於瓶口上熏干白丁香直者五分輕粉一字上將白砂蜜於砂石器內慢火熬掠去沫下甘石次下丹以柳枝攪次下余藥以不黏手為度作丸如雞頭實大每用一丸溫水化開洗之重明散河間治一切風熱內外障膜眼疾川獨活川羌活川芎吳射干仙靈脾防風甘草井泉石蒼朮各五錢丹參白朮石決明草決明各三錢上為細末每服二錢水一盞半煎至一盞溫服日三服石膏羌活散河間治久患雙目不明遠年近日內外翳障風熱昏暗倒睫拳毛一切眼疾頭風並皆治之羌活治腦熱頭風密蒙花治羞明怕日木賊退翳障白芷清利頭目細辛乾菜子二味起倒睫麻子起拳毛川芎治頭風蒼朮明目暖水臟黃芩洗心退熱甘菊花荊芥穗治目生瘡石膏治頭痛退熱藁本治偏頭風一方治頂痛甘草解藥毒上各等分為細末每服一錢至二錢食後臨臥用蜜水調下茶清亦可日進三服服至十日漸明二十日平安黃連膏河間治一切眼目疼痛瘀肉扳睛風癢淚落不已黃連半斤朴硝一斗以水淘淨陰乾用白丁香五升以水一斗淘淨去土研細用上量水入硝香釜內熬至七分淘出令經宿水面浮芽者取出挖干以紙袋子盛風中懸至風化將黃連細末熬清汁灑干入風硝更加豬羊膽和蜜令勻點眼極妙滌昏膏河間治一切風壅眼目疼痛不可忍者白砂蜜一斤黃連一兩沒藥五錢黃丹一兩炒紫色上以蜜同黃丹熬黑以水二大盞煎黃連成稠汁去渣入前丹蜜內煎熬稠更入沒藥末同煎數沸濾去渣洗眼甚妙金絲膏河間治一切目疾昏暗視物如絲羅所遮或癢或痛宣黃連半兩細切水一盞浸一宿取汁再添水浸渣經半日許取汁並放用山梔子二錢捶碎入前黃連汁內加水同煎六七十沸白砂蜜一兩白礬一兩井鹽一分如無以青鹽代之上用銀瓷器煎藥十餘沸用上細片絹加紙數重再濾過銀罐子盛貯時常點眼地芝丸東垣治不能遠視而能近視以此除風熱生地黃天門冬各四兩枳殼炒甘菊花各二兩上為末煉蜜丸茶酒任下眼睫方東垣即倒睫拳毛也木鱉子一個去殼為末綿裹塞鼻中左目塞右右目塞左一二夜其睫自正點眼光明丹治一切風熱上壅兩目赤腫澀痛風弦爛眼及內外翳障等證白爐甘石一兩以黃連五錢煎濃汁濾去渣用炭火煅爐甘石通紅淬黃連汁內如此者七次研辰砂一錢硼砂二錢輕粉五分片腦三分多至五分麝香一分如赤眼腫痛加乳香沒藥各五分內外翳障加珍珠五分鴨嘴膽礬二分熊膽二分爛弦風眼加銅青五分飛丹五分或以諸藥總合為一治諸般眼疾上各研為極細末一處和勻再研一二日無聲銀瓶盛貯密封口不可令泄氣點眼極妙丹溪活套云東垣謂目能遠視而不能近視火盛而水虧也法當補腎六味地黃丸主之目能近視而不能遠視有水而無火也法當補心定志丸加茯苓主之又曰不能近視晨服地黃丸不能遠視臥服定志丸是皆通手足少陰經也是以知不能近視者腎水虧缺也不能遠視者心血不足也凡目暴發赤腫宜用羌活防風柴胡白芷升麻酒製芩連甘草生地黃當歸身白睛紅少加白豆蔻又曰凡眼暴發赤腫須以防風黃芩為君當歸生地黃黃連和血瀉火藥為臣使凡目久痛或內障昏暗須以熟地黃當歸根為君以羌活防風菊花荊芥穗生甘草之類為佐使也祖傳方固本還睛丸治遠年一切目疾內外翳膜遮睛風弦爛眼及老弱人目眵多糊迎風冷淚視物昏花等證悉皆治之天門冬去皮心酒浸一宿另杵如泥麥門冬去心焙乾生地黃酒浸焙勿犯鐵熟地黃酒洗淨再用瓷蒸勿犯鐵以上各三兩人參一兩五錢白茯苓乾山藥枸杞子各一兩五錢川牛膝一兩酒洗石斛一兩去蘆酒洗草決明微炒杏仁去尖皮另研甘菊花用小金錢菟絲子酒浸三宿另研焙乾枳殼麩炒黃色羚羊角以上各一兩細銼取淨末八錢烏犀角八錢銼細生用五味子七錢焙乾甘草七錢炙防風八錢去蘆白蒺藜七錢杵去刺黃連七錢去毛川芎七錢青葙子八錢微炒上為細末煉蜜丸如梧桐子大每服五七十丸鹽湯下復明膏去翳膜立效人參川歸硼砂生研各一錢五分青鹽乳香另研沒藥另研蘆薈各一錢珍珠五分麝香五分後加黃丹一兩水飛炒海螵蛸五錢炒黃連四錢炒黃柏六錢赤爐甘石淬數次白沙蜜半斤蕤仁五錢去殼白蘞一錢五分上各研為極細末先將白蜜煎沸掠去沫再熬滴水中沉碗底不散可用然後入前藥末略沸攪勻瓷罐收貯日三五次點之效口病論內經曰中央黃色入通於脾開竅於口藏精於脾故病在舌夫口之為病或為重舌木舌或為糜爛生瘡或見酸苦甘辛鹽味原其所因未有不由七情煩擾五味過傷之所致也經曰陰之五宮本在五味陰之五宮傷在五味是也是以肝熱則口酸心熱則口苦脾熱則口甘肺熱則口辛腎熱則口咸有口淡者知胃熱也外有謀慮不決肝移熱於膽而口苦者亦有脾胃氣弱木乘土位而口酸者或膀胱移熱於小腸膈腸不便上為口糜生瘡潰爛則傷寒狐惑之證上唇生瘡蟲食其臟下唇生瘡蟲食其肛其為口之為病種種不同醫者各類推而治之無有不安者也脈法脈經曰左寸洪數心熱口苦右寸浮數肺熱口辛左關弦數而虛膽虛口苦甚洪而實肝熱口酸右關沉實脾胃有實熱口甘兼洪數者口瘡或為重舌木舌脈虛者中氣不足口瘡若服涼藥不愈宜理中湯方法丹溪曰脾熱口甘三黃丸主之三黃丸兼治五癆七傷消渴不生肌肉黃芩春四夏秋六冬三兩黃連春四夏五秋三冬二兩大黃春三夏五秋二冬一兩上三味煉蜜為丸如梧桐子大每服五丸未愈加至七丸日三服一月病愈久服行及奔馬愚按此方惟實熱者可用虛者勿用膽熱口苦謀慮不決所致小柴胡湯加麥門冬酸棗仁地骨皮遠志煎服益膽湯治謀慮不決肝膽虛氣上溢則口苦證黃芩去朽甘草炙人參各一錢官桂五分苦參茯神各三分遠志取肉去骨七分上細切作一服水一盞半煎至一盞去渣溫服柴胡地骨皮湯治膀胱移熱於小腸膈腸不便上為口糜生瘡潰爛心胃壅熱水穀不化等證柴胡去蘆地骨皮各等分上細切每服五錢水一盞半煎至一盞食後溫服如病人大便實者加大黃朴硝以利之治口瘡用西瓜漿水徐徐飲之無瓜時以瓜皮燒灰敷之又方細辛黃柏炒各等分為末摻舌上吐涎乃愈又方用焰硝硼砂含口勿開外以南星為末醋調貼足心湧泉穴上神效又方用好酒煮黃連成汁呷下即愈又方用五倍子一兩黃柏蜜炙滑石各五錢銅緑五錢麝香一字為末摻之極效凡口瘡服涼藥不愈者乃中氣不足虛火泛上無制用理中湯反治之而愈甚者加附子或用官桂噙之亦妙又方治赤口瘡白礬枯沒藥另研乳香另研各一錢銅緑另研少許上為細末摻之又方治白口瘡雄黃沒藥乳香各一錢輕粉五分巴豆霜少許上為細末摻之治實熱口中生瘡用涼膈散甘桔湯皆效一小兒口瘡不下食衆以狐惑治之必死後以礬湯於腳上浸半日頓寬更以黃柏蜜炙殭蠶炒為末敷之而愈又方治唇緊燥裂生瘡用青皮燒灰敷之立愈又方治唇緊以皮紙然於刀上熏取瀝敷立效又方治口糜用野薔薇花根煎湯漱之一云白薔薇根杵汁敷之又方治口內生瘡用明礬枯黃丹炒鹽白梅燒存性各一錢人中白半錢煅麝香另研少許上為細末乾摻口內甚者加硼砂五分片腦一分以上丹溪方法凡十八條硼砂散治口舌生瘡及咽喉腫病皆效硼砂馬牙硝滑石寒水石枯白礬各二錢片腦二分上為細末每服半錢許食後新汲水調下碧雪治口瘡及咽喉腫痛神效蒲黃青黛硼砂焰硝生甘草上各等分為細末敷之咽喉腫痛鵝管吹入祖傳方治舌腫大塞口不能飲食者真蒲黃一味頻刷舌上自退若能咽藥即以黃連一味煎濃汁細細呷之以瀉心經之火則愈丹溪活套云肝膽有實熱令人口酸而苦小柴胡湯加甘草龍膽青皮之類甚者當歸龍薈丸若謀慮不決肝膽虛而苦者人參遠志茯神甘草為君柴胡草龍膽為佐使甚者錢氏地黃丸虛者補其母也心熱而口苦或口舌生瘡黃連瀉心湯牛黃清心丸涼膈散之類脾熱而口甘者三黃丸平胃散之類肺熱而口辛者甘桔湯瀉白散金沸草散之類腎熱而口咸者滋腎丸大補陰丸滋陰大補丸之類喉病論內經曰一陰一陽結謂之喉痹王注謂一陰即厥陰肝與胞絡是也一陽即少陽膽與三焦是也四經皆有相火存焉子和曰膽與三焦尋火治肝和胞絡都無異東垣曰火與元氣不兩立一勝則一負蓋元氣一虛則相火隨起而喉痹等暴病作矣夫喉之為會厭者經謂之吸門是也以其司呼吸主升降為人身緊關之槖籥門戶也若夫卒然腫痛水漿不入言語不通死在須臾誠可驚駭其會厭之兩傍腫者俗謂之雙乳蛾易治會厭之一邊腫者俗謂之單乳蛾難治古方通謂之喉痹皆相火之所沖逆耳經曰一水不能勝二火又曰一水不能勝五火甚言其真水之易虧而相火之易動也如大怒則火起於肝房勞則火起於腎飲食失節則火起於脾胃之類是故知火者痰之本痰者火之標火性急速故病發則暴悍治之之法必先大涌其痰或以鈹針刺其腫處此急則治標之法也用藥者必須以內經從治之法而以桔梗甘草玄參升麻防風羌活荊芥人參白朮茯苓之類少加乾薑附子等藥為嚮導徐徐頻與不可頓服此為治之大法也切不可驟服寒涼之藥非徒無益而且促其死耳俗人未諳此理而峻用芩連梔柏之類而正治之又甚者雜進以大寒草藥頻與頓服但覺腫勢稍退語言略通而醫者病者皆謂獲效而喜殊不知上熱未除中寒復生其毒氣乘虛而入腹漸而至於發喘不休不可治矣良可嘆哉外有天行一種名曰大頭病俗呼捏頸瘟其證甚為凶惡染此者十死八九宜推運氣治之治法亦不甚相遠也東垣普濟消毒飲子甚妙實為百發百中之劑學者再宜詳究而擴充之務活人於斯世也幸甚脈法兩寸脈浮洪而溢者喉痹也脈微而伏者死方法丹溪曰喉痹多屬痰重者宜用吐法或只以桐油燈油腳用鵝翎探吐之病輕者新取園中李實根噙之更研水於項上敷之盧氏曰按本草蠡實根即馬藺草根也能治喉痹北方多有之此又曰園中李實根未知孰是纏喉風屬痰熱亦宜吐之又方用遠志去心為末水調敷項上又方用燈心草燒灰吹入喉中一方治咽喉腫痛荊芥穗當歸身桔梗甘草各等分上細切水煎放溫嗽而服之有熱加黃芩枳殼宜刺少商出血立愈又方治喉乾燥痛用四物湯加桔梗荊芥黃柏知母立已又方治喉瘡並痛者多屬虛火遊行無制用人參黃柏蜜炙荊芥虛火用人參竹瀝血虛用四物湯加竹瀝又方用黃撩郎根俗名倒摘刺入好酒少許研汁滴入喉中愈又方以燈籠草炒焦為末酒調敷喉中瀉實熱火用黃連荊芥薄荷硝石為末薑汁蜜調噙化喉舌之疾皆屬火熱雖有數種之名輕重之異乃火之微甚故也微而輕者可以緩治甚而急者惟用砭針刺血最為上策以上丹溪方法凡十一條通關飲東垣治喉痹腫痛不能語言者但可進藥無不愈者此從治之法也一方有鼠黏子無白朮茯苓乾薑附子名利膈湯治一切咽喉生瘡腫痛人參白朮茯苓各一錢炙甘草一錢五分桔梗去蘆二錢防風去蘆七分荊芥五分薄荷五分乾薑炮五分或加附子炮五分上細切作一服水二盞煎七分徐徐與之又方東垣治喉痹用鴨嘴膽礬三分或五分吹入喉中吐痰愈普濟消毒飲子東垣治天行喉痛等證方見瘟疫門桔梗湯東垣治咽喉微覺腫痛聲破難語當歸身馬勃各一錢白殭蠶炒黃芩各三分麻黃去節五分桔梗去蘆甘草炙各一錢桂枝少許上細切作一服水二盞煎至一盞去渣溫服又治喉痹方新取青艾葉杵汁灌入喉中即愈又方用蛇床子於有嘴瓶中燒令病者以瓶嘴含口中吸烟入喉內立愈吹喉散治咽喉一切腫痛膽礬五錢別用青魚膽一個以礬研細入膽內陰乾巴豆七粒去殼朴硝二錢五分另研銅青一錢輕粉五分青黛些少另研上將膽礬同巴豆肉於銅銚內飛過去巴豆合朴硝以下四味再加麝香少許研勻每用一字吹入喉中吐出痰血立愈聖煙筒治喉痹萆麻子取肉捶碎紙卷作筒燒煙吸之祖傳方治喉痹神效馬蘭菊五爪龍草車前草各一握俗名蝦蟆衣上以三物杵汁徐徐飲之又方治喉痹及喉中熱痛等證用上好消梨杵汁頻頻飲之如患者能自嚼咽下亦可多食為良大解熱毒惟金瘡産婦及諸脫血證不可食以其破血故也其餘一應癰疽發背等證多食極妙齒病論內經曰百病之起有生於本者有生於標者夫齒者腎之標骨之餘也足陽明胃之脈貫絡於齒上齦手陽明大腸之脈貫絡於齒下齦手陽明惡寒飲而喜熱飲足陽明惡熱飲而喜寒飲故其為痛有惡寒惡熱之不同也有開口呷風則痛甚者腸胃中有風邪也有開口則穢臭不可近者腸胃中有積熱也或謂痛而齒動搖或謂痛而蟲侵蝕又有齒縫疏豁飲食不便者比比是也大抵齒齦宣露而動搖者腎元虛也治宜滋陰補腎為要憎寒惡熱而口臭穢者胃氣熱也治宜安胃瀉火為良其所謂風邪蟲蝕之證蓋因熱生風而風生蟲也腸胃之火既平更加以擦牙誅蟲之藥以治其標無有不安之理也學者詳之脈法右寸關脈洪數或弦而洪腸胃中有風熱齒痛尺脈洪大而虛者腎虛主齒動搖疏豁相火上炎而痛方法丹溪曰牙痛或出血屬熱胃中有熱有風寒有蟲有濕熱實熱腫痛調胃承氣加黃連又用升麻白芷防風荊芥薄荷甘草桔梗之類外用胡桐淚麝香擦之灸法上片痛灸足三里二穴在足陽明經膝下三寸胻骨外大筋內陷中灸七壯下片痛灸手三間二穴在手大指次指本節後內側陷中手陽明大腸經灸七壯治蟲牙痛用韭菜子以黃蠟包之外以瓦片燒紅將韭子蠟丸置於其上又別糊一紙袋如巨螺樣上以小竹管為袋嘴將袋復於蠟丸上以竹管拄於齒竅中接煙燻之其蟲即死而愈治走馬牙疳方其效如神乾薑南棗各燒存性枯白礬上各等分為末敷之即愈小兒走馬牙疳牙床一齊腐爛即死此方神效婦人尿桶中白垢火煅一錢入銅緑三分麝香一分半敷之立愈以上丹溪方法凡五條麝香散東垣治熱多寒少牙齦露肉脫血出齒動欲落疼痛妨食惡寒少惡熱多熟地黃二分益智仁二分半當歸身生地黃麻黃根酒漢防己人參各五分升麻一錢草豆蔻黃連各一錢五分羊脛骨灰二錢麝香少許上為末先用溫水漱口淨擦之草豆蔻散東垣治寒多熱少牙齒疼痛細辛葉防風各二分羊脛骨灰熟地黃各五分當歸六分草豆蔻黃連各一錢三分升麻二錢五分上為細末如前法擦之羌活散治客寒犯腦及風寒湊襲腦痛項筋急牙齒痛動搖肉齦袒脫疼痛藁本香白芷桂枝各三分蒼朮升麻各五分當歸身六分草豆蔻一錢羌活一錢五分羊脛骨灰二錢麻黃去根節防風去蘆各三錢柴胡五錢細辛少許上為細末如前法擦之立愈白牙散東垣白芷七分升麻一錢石膏一錢五分羊脛骨灰二錢麝香少許上為細末如前法擦之立效獨聖散東垣治一切牙痛風疳等證北地蒺藜不拘多少陰乾上為細末每用刷牙以熱漿水漱牙外用粗末熬漿水刷牙大有神效立效散東垣治牙齒痛不可忍微惡寒飲大惡熱飲其脈上中下三部陰勝陽虛是五臟內盛六腑陽道脈微小小便滑數細辛三分炙甘草五分升麻七分防風一錢草龍膽灑洗三錢上為細末作一服水一盞煎至七分去渣以匙抄在口中漱痛處待少時則止如多惡熱飲更加草龍膽一錢此法不定隨寒熱多少臨時加減若更惡風作痛加豆蔻黃連各五分勿加草龍膽牢牙散東垣治牙齦肉綻有根牙疳腫痛牙齒動搖欲落牙齒不長牙黃口臭羌活一兩草龍膽酒洗一兩五錢羊脛骨灰二兩升麻四兩上為細末臨臥時貼牙齦上清胃散東垣治因服熱藥或食辛熱之物致使上下牙疼痛不可忍牽引頭腦滿面發熱大痛足陽明之別絡入腦喜寒惡熱乃是手陽明經中熱盛而作也其齒喜冷惡熱當歸身黃連夏月倍用生地黃酒製各三分牡丹皮五分升麻一錢上為細末作一服水一盞半煎至一盞濾去渣帶涼服神功丸東垣治多食肉人口臭不可近牙齒疳蝕牙齦肉將脫牙齒落血不止蘭香葉如無藿香代之當歸身藿香葉木香各一錢升麻一錢生地黃酒洗甘草生各三錢黃連酒洗縮砂仁各五錢上共為細末湯浸蒸餅為丸如緑豆大每服一百丸或加至二百丸止白湯下食遠服此藥兼治血痢及血崩及血下不止血下褐色或紫色或黑色及腸澼下血空心服米湯下其脈洪大而緩者及治麻木血氣上衝逆氣上行妄聞妄見者皆效祖傳方治胃有實熱齒痛或上爿痛尤甚者用涼膈散以大黃酒蒸為君加知母石膏升麻為佐頻頻含咽即愈又方治胃熱齒痛口臭穢不可近者用大黃牡荊一二十斤於火上烹瀝入薑汁六分之一時時含咽甚效又擦牙止痛方用黃蠆蜂窠一個以川椒填滿其竅更以白鹽一錢封口燒存性入香白芷羊脛骨灰各一錢同研為細末先以清茶漱口淨然後以此藥擦之及敷痛處如有蟲蛀孔作痛以少許塞於孔中立愈又灸法亦妙列缺二穴在手太陰肺經與陽明經相連叉手取穴中指盡處又看其浮脈丫叉之間灸七壯其痛立止永不再發鼻病論內經曰西方白色入通於肺開竅於鼻又曰鼻者肺之外侯丹溪曰肺之為臟其位高其體脆性惡寒又惡熱是故好飲熱酒者始則傷於肺臟鬱熱久則見於外而為鼻齄淮赤之候得熱愈紅得寒則黑此謂熱極似水之象亢則害承乃制也其或觸冒風寒始則傷於皮毛而成鼻塞不通之候或為濁涕或流清汁久而不已名曰鼻淵此為外寒束內熱之證也原病式曰肺熱則出涕是也又有膽移熱於腦則為辛額鼻淵鼻中濁涕如湧泉下滲而下久而不已則為鼻蔑衄血瘜肉鼻癰等證醫者宜各以類推而治之無忽也脈法右寸脈浮洪而數為鼻衄鼻齄左寸脈浮緩為傷風鼻塞鼻流清涕方法丹溪曰鼻為肺之竅因心肺上病而不利也有寒有熱寒邪傷於皮毛氣不利而壅塞熱壅清道氣不宣通寒則表之麻黃桂枝之類熱則清之芩連梔子之類面鼻紫黑面為陽中之陽鼻居面之中一身之血運到面鼻皆為至清至精之血多酒之人酒氣熏蒸面鼻得酒血為極熱熱血得寒汙濁凝結而不行故色紫黑治宜化滯血生新血四物加片芩酒炒紅花酒浸茯苓陳皮甘草生薑煎調五靈脂末服氣弱者加黃耆酒浸酒齄鼻乃熱血入肺治用前方用梧桐子桐油入黃連以天吊藤燒油熱敷之又方用山硫黃入蘿蔔內煨乳香輕粉烏頭尖酥調敷或用膽礬敷之又方用山梔為末蜜蠟丸如彈子大空心嚼一丸白湯下齆鼻瘜肉乃肺氣盛用枯礬研為末面脂調綿裹塞鼻中數日自消又方木通附子炮細辛蜜和綿裹塞鼻中又用防風通聖散加京三稜山茱萸肉海藻並用酒浸炒為末每服一錢五分酒調服之鼻淵膽移熱於腦則辛頞鼻淵防風通聖散一兩加薄荷黃連各二錢五分水煎服以上丹溪方法凡八條防風湯宣明治鼻淵腦熱滲下濁涕不止久而不已必成衄血之疾黃芩人參甘草炙川芎麥門冬去心各一兩防風去蘆一兩五錢上為細末每服二錢沸湯調服食後服日三服麗澤通氣湯東垣治鼻不聞香臭黃耆八分蒼朮羌活獨活防風升麻葛根各六分炙甘草四分麻黃不去節冬月加川椒白芷各二分上細切作一服加生薑三片棗二枚蔥白三寸水二盞煎至一盞溫服食遠忌一切冷物及風寒涼處坐臥溫肺湯東垣治鼻不聞香臭多眵淚丁香二分防風炙甘草葛根羌活各五分升麻黃耆各七分半麻黃不去節一錢五分上細切作一服水二盞蔥白三根煎至一盞食後溫服禦寒湯治寒氣風邪傷於皮毛令鼻壅塞咳嗽上喘黃連黃柏羌活各二分炙甘草佛耳草款冬花白芷防風各三分升麻人參陳皮各五分蒼朮七分黃耆一錢上細切作一服水二盞煎至一盞去渣食後服祖傳方治鼻中時時流臭黃水甚者腦亦時痛俗名控腦砂有蟲食腦中用絲瓜藤近根三五寸許燒存性為細末酒調服之即愈又治方用白牛毛棖葉如白楊木葉香辣者是焙乾為末吹入鼻中立愈血證論內經曰大怒則形氣絶而血菀於上又曰怒則氣逆甚則吐血又曰陽明厥逆喘咳身熱善驚衄嘔血又曰濕淫汗出為鼽衄又曰脾移熱於肝則為驚衄胞移熱於膀胱則癃而溺血又曰結陰者便血一升再結二升三結三升又曰臥則血歸肝肝受血而能視一云目得血而能視此云肝者蓋目為肝之外候足受血而能步掌受血而能握指受血而能攝又曰心出血肝納血肺出氣腎納氣夫人身之氣血者情性之所依附並行不悖循環無端經曰一息不運則機緘窮一毫不續則穹壤判若夫暴喜傷心則氣緩而心不出血故肝無所受或暴怒傷肝則氣逆而肝不納血故其血無所歸又若房勞過度以致陰火沸騰血從火起故錯經而妄行也是以從肺而上溢於鼻者曰衄血從胃而上溢於口者曰嘔血夫所謂絡血唾血者出於腎也咳血嗽血者出於肺也有痰帶血絲出者或從腎或從肺來也其血出於小便者曰溺血曰血淋出於大便者曰腸風痔血糞前來者曰近血糞後來者曰遠血流結於腸胃之間而成積者曰血瘕血蔑大抵血從下流者為順易治血從上溢者為逆難治丹溪曰口鼻出血皆是陽盛陰虛有升無降血隨氣上越出上竅法當補陰抑陽氣降則血歸經又曰諸見血為熱證正經所謂知其要者一言而終不知其要者流散無窮此之謂也脈法內經曰脈來如懸鉤為衄血常脈脈至而搏血衄身熱者死腸澼下膿血脈懸絶則死滑大則生血溫身熱者死脈經曰脈得諸澀濡弱為亡血脈來輕輕在肌肉尺中自浮目睛暈黃衄血未止暈黃去目睛慧了知衄當止太陽脈大而浮必衄吐血病人面無血色無寒熱脈沉弦者衄也脈浮弱手按之絶者下血煩咳者必吐血脈極虛芤遲為清穀亡血失精脈芤為失血澀為少血脈弦而緊脅痛肝臟傷主有瘀血吐血唾血脈滑小弱者生實大者死唾血脈堅強者死滑濡者生方法丹溪曰口鼻出血皆是陽盛陰虛有升無降血隨氣上越出上竅法當補陰抑陽氣降則血歸經按此語雖見前論蓋一章之大旨故重録以示學者衄血涼血行血為主犀角地黃湯入鬱金一方用荊芥穗研服或用蘿蔔上半段杵汁服又以汁滴入鼻竅中或灸大椎及啞門穴二三壯俱可止之本草衍義以萱草葉洗淨研汁一盞入生薑汁三分之一細細呷之治大熱衄血吐血是火載血上錯經妄行脈必大而芤大則發熱芤則熱失血大法四物湯加炒梔子童便薑汁竹瀝方用韭汁一方凡血逆行或吐血或唾血或見血腥氣用韭汁服之最妙童便薑汁磨入鬱金飲之其血自清如無鬱金以山茶花代之一方用鬱金末以薑汁童便和好酒調服吐血大全良方四生丸甚妙亦治衄血又方童便調香附末服之又方童便二分酒一分擂側柏葉溫飲之吐血亦有因怒而得者經曰怒則氣逆甚則嘔血一方治吐血不止用乾薑炮為末童便調服山梔子最能清胃脘之血有先吐血後有痰者是陰虛火盛四物湯為主加痰火藥若先吐痰而後血多者是積熱降痰火為急有暴吐紫血成塊者是熱傷血結於中吐出為好用四物湯加清熱等藥調之唾血鮮血隨唾而出出於腎亦有瘀血內積肺氣壅遏不能下降用天門冬麥門冬知母貝母桔梗黃柏熟地黃遠志或加乾薑咳血嗽出痰內有血痰盛心熱多是血虛用青黛栝蔞仁訶子貝母海石山梔子為末薑汁蜜丸噙化嗽盛者加杏仁後以八物湯加減調理痰盛者宜更加痰藥咯血用薑汁童便青黛入血藥中用如四物湯地黃膏牛膝膏之類有咯血痰帶血絲出者同治但宜加痰藥舌上無故出血如線用槐花炒為末摻之一方用蒲黃炒焦為末敷之極妙大便下血有熱有虛熱用四物湯加炒山梔子升麻秦艽阿膠虛用四物湯加乾薑炮升麻便血用白芷五倍子為丸服效便血有風邪下陷者蓋風傷肝肝生血故也宜升提之四物湯加防風荊芥升麻柴胡秦艽槐花條芩地榆枳殼煎服有濕傷血者宜行濕清熱蒼朮白朮黃連黃柏當歸川芎芍藥地榆槐花水煎服之因積熱下血用蒼朮陳皮各一兩半連翹五錢黃連黃芩黃柏各七錢半炒為末生地黃膏丸服腸風下血獨在胃與大腸出用黃芩秦艽槐角青黛升麻一方用大黃煨桃仁去尖另研各三錢當歸檳榔皂角仁黃柏荊芥穗枳殼各五錢蝟皮炙黃黃連炒秦艽槐角子各一兩上為末麵糊為丸如梧桐子大每服五十丸白湯送下如鮮血下甚者棕櫚灰蓮房灰各五錢凡經血逆行或血腥或吐血唾血用韭汁服自清以上丹溪方法凡二十七條人參飲子東垣治衄血麥門冬當歸身白芍藥甘草各一錢人參黃耆各一錢五分五味子九枚上細切作一服水一盞半煎至一盞溫服痰涎雜血出於脾葛根黃耆芍藥黃連川歸沉香末甘草水煎服丹溪三黃補血湯東垣治吐血黃耆川歸柴胡各一錢熟地黃川芎各一錢五分芍藥生地黃各二錢牡丹皮升麻各五分上細切作一服水二盞煎至一盞溫服一方治痰嗽吐血紅花杏仁去皮尖另研紫菀茸鹿茸酥炙枇杷葉拭去毛薑汁塗炙黃木通各一兩大黃五錢上為細末蜜丸龍眼大噙化黃耆散東垣治咳血成勞黃耆麥門冬熟地黃桔梗白芍藥各一錢甘草五分上細切作一服水一盞半煎至一盞去渣溫服一方治痰帶血咳出白朮一錢五分川歸芍藥牡丹皮各一錢桃仁五分研梔子七分半炒黑色生甘草三分麥門冬五分上細切水一盞半煎至一盞去渣溫服雞蘇散濟生治勞傷肺經咳嗽有血雞蘇即薄荷黃耆各五分生地黃阿膠珠貝母白茅根各一錢桔梗麥門冬蒲黃炒黑色甘草各五分細切水煎服薏苡仁散東垣治肺損嗽血薏苡仁不拘多少上一味研細末以獖豬肺一個煮熟蘸藥食之又方丹溪用豬心一個竹刀鈚開入沉香末一錢重大半夏七個入在心中紙包數重外以童子小便沃濕煻火煨熟取去半夏吃之嗽血吐血皆效一方丹溪治溺血山梔子飲梔子不拘多少炒黑色上為細末水煎連渣服一方丹溪用小薊根琥珀二味為末水煎服之蓋二物能治下焦熱結血淋又方丹溪治溺血神效生地黃四錢二分小薊根滑石通草炒蒲黃炒淡竹葉藕節當歸酒浸山梔子炒黑色甘草炙各七分上細切作一服水二盞煎至一盞去渣溫服治溺血因血虛者用四物湯加牛膝膏服丹溪一方治溺血用五苓散合四物湯煎服效丹溪凡用血藥不可單行單止又不可純用寒涼藥必加辛溫升藥如加涼藥用酒煮酒炒之類乃寒因熱用之法也丹溪局方一方治小兒尿血用甘草升麻煎湯調益元散犀角地黃湯局方治衄血及吐紅犀角鎊赤芍藥牡丹皮生地黃各一錢上細切作一服水煎食後服四生丸局方治吐血衄血陽乘於陰血熱妄行生荷葉生艾葉生地黃生側柏葉上各等分細研為丸如彈子大每服一丸水煎或鹽湯化下聖餅子丹溪治咯血青黛一錢杏仁四十個以黃蠟煎炒黃色上研杏仁細入青黛捏作餅子用時以柿餅一個破開以藥餅置於柿中合定濕紙包炮煨連柿餅研細米飲調下地榆湯東垣治結陰便血不止漸而極多地榆四錢生甘草一錢五分炙甘草一錢縮砂七枚另研上細切作一服水一盞半煎至一盞溫服結陰丹東垣治結陰腸風臟毒下血等證枳殼炒葳靈仙黃耆陳皮樗根皮何首烏荊芥穗各等分上細末酒糊為丸如梧桐子大每服五七十丸清米飲入醋少許送下椿皮散治血痢及腸風下血神驗樗根白皮二兩槐角仁四兩枯白礬二兩炙甘草一兩上為細末每服三錢清米飲調下烏梅丸治大便下血如神殭蠶一兩炒烏梅肉一兩五錢上為細末醋糊為丸醋湯下三五十丸空心服槐花散本事治腸風臟毒下血槐花炒側柏葉杵荊芥穗枳殼麩炒黃色上各等分為末每服二錢空心米飲調下加減四物湯東垣治腸風下血側柏葉生地黃當歸川芎各八分枳殼麩炒荊芥穗槐花炒甘草炙各四分地榆條黃芩防風各六分烏梅大者一個上細切作一服加生薑三片煎至一盞去渣空心溫服當歸和血散東垣治腸澼濕毒下血槐花炒青皮各六分當歸身升麻各一錢川芎四分荊芥穗熟地黃白朮各六分上為細末每服三錢米飲調下枳殼散東垣曰血清而色鮮者腸風血濁而黯者為臟毒糞前來者為近血糞後來者為遠血此藥並皆治之枳殼十兩麩炒黃色甘草三錢炙上為細末每服一錢空心米飲調送下酒煮黃連丸酒煮黃連丸東垣黃連去須十二兩好酒五升上將黃連細切以銀石器盛酒煮黃連待酒乾盡為度焙乾為末麵糊為丸如梧桐子大每服三十丸空心服祕方枳殼湯局方治大便腸風下血枳殼一兩麩炒黃色黃連二兩以槐花四兩同炒去槐花不用上二味量水煎濃汁食前溫服槐角丸局方治五種腸風下血痔漏脫肛並皆治之槐角二兩炒地榆黃芩當歸防風枳殼麩炒各一兩上為細末酒麵糊為丸如梧桐子大每服五十丸空心清米飲送下升陽去熱和血湯東垣治腸澼下血另作一派其唧唧然出者有力而遠四散如篩腸腹中作痛熱毒所作也陳皮二分熟地黃當歸身蒼朮秦艽肉桂各三分生地黃牡丹皮生甘草各五分升麻七分炙甘草黃耆各一錢白芍藥一錢五分上細切作一服水二盞煎至一盞食前稍熱服升陽補胃湯證治及詳見蘭室祕藏瀉痢門生地黃散治鬱熱衄血咯血吐血等證枸杞子柴胡黃連地骨皮天門冬白芍藥甘草黃芩黃耆生地黃熟地黃各五分上細切作一服水一盞半煎至一盞溫服玉屑膏治熱血黃耆人參上二味各等分為末用蘿蔔大者切片厚一指許四五片蜜淹少時蘸蜜炙乾盡蜜二兩為度勿令焦點藥未吃不拘時仍用鹽湯送下龍骨散治衄血不止凡九竅出血皆可止之龍骨不拘多少上一味細研次入臭中即止麝香散治鼻衄不止白礬枯龍骨各五錢麝香一分半上各另研和勻每用時先以冷水洗鼻孔淨然後用藥吹入孔內或以濕紙捻蘸入亦妙經驗方治瀉血百藥煎一兩以五錢燒灰存性上共研細飯丸如梧桐子大每服三四十丸或以米湯調下末子二三錢亦可又方治前證用乾柿餅燒灰存性清米飲調下二三錢立止桃仁承氣湯治男子婦人血結胸手不可近及中焦蓄血妄言見鬼昏迷如狂及久病胃脘疼痛蓄血等證抵當湯治下部蓄血臍下結痛滿硬等證二方並見傷寒門丹溪活套云凡諸見血證皆是陽盛陰虛君相二火亢甚煎迫其血而出諸竅也悉宜四物湯加知母黃柏補陰降火之劑為主治如衄血咳血或痰帶血絲出者皆從肺中來也本方加酒洗蒲黃黃芩茅花等藥以瀉肺火如嘔血吐血此從胃中來也本方加石膏知母等藥以瀉胃火唾血咯血及潮熱咳血此血從腎中來也本方用梔柏皆當以鹽酒炒更加肉桂一分許以瀉腎火如小便血於溺竅中出澀數成淋成痛或雜尿而出者此從膀胱中來也本方加梔子仁瞿麥牛膝滑石之類以瀉膀胱之火如小便出血不痛者此心移熱於小腸故血從精竅中出也本方加黃連梔子條芩之類以瀉本經之火大便未糞而血先來者謂之近血知其從大腸中來也本方加檳榔枳實槐花條芩之類以瀉大腸之火如大便糞而血來者謂之遠血知其從小腸中來也本方木通萸炒黃連之類以瀉小腸之火夫血出於口鼻者或加犀角芩連之類以清之或加茅花藕節棕櫚灰炒蒲黃之類以止之或加韭汁童便山茶花牡丹皮之類以消之其血出於大便者或加槐花側柏葉條芩之類以清之或加地榆荊芥白芷茅根之類以止之其血出於小便者或加瞿麥麥門冬梔子仁之類以清之或加滑石木通大小薊之類以行之或行之或清之或止之皆當視其證新久緩急而施治之俱以四物為君主之藥也祖傳方治小便溺血用車前草葉金陵草葉俗名墨斗草上二味搗取自然汁一盞空腹飲之立止又發灰丸用小兒胎髮如無以壯年無病人頭髮剪下者為上自落者次之燒灰細研別用新取側柏葉搗汁調糯米粉打糊為丸如梧桐子大每服五十丸白湯送下或煎四物湯送下尤妙空心服之又方治大便下血用䈽竹葉燒灰存性米糊為丸如梧桐子大每服七八十丸空心米飲送下醫案一男子年四十餘素飲酒無度得大便下血證一日入廁二三次每次便血一升許豫以四物湯加條芩防風荊芥白芷槐花等藥連日與服不效後用橡斗燒灰二錢七分調入前藥汁內服之又與灸脊中對臍一穴血遂止而平安其病自此不發痔漏論經曰因而飽食筋脈橫解腸澼為痔又曰脾胃者倉廩之官五味出焉大腸者傳道之官變化出焉若夫飽食太過則脾氣倦甚不能運化精微朝傷暮損清濁混淆故食積下流於大腸之間而為病也蓋脾胃一虛肺氣亦乏而大腸之氣亦從而虛其肝木得以乘虛下流而為腸風病則是皆金失所養木寡於畏之所為耳其為變見名狀種種不同曰牛奶曰鼠奶曰雞心曰雞冠曰蓮花曰翻花曰蜂窠曰穿腸曰外痔雖曰為狀不一而其因則同焉治法以苦寒瀉火芩連梔子槐花之類以辛溫和血川歸川芎桃仁之類風邪在下以秦艽防風升麻之類提之燥熱怫鬱以大黃枳殼麻仁之類潤之遘此疾者自宜慎口節欲依法調治無有不安者也脈法脈沉小實者易治浮洪而軟弱者難愈方法丹溪曰痔病因風熱燥歸於大腸也治血為主大法用條芩涼大腸人參黃連生地黃槐角涼血生血當歸和血川芎升麻枳殼寬腸漏瘡先須用補藥以補氣血參耆歸術為主大劑服之外以附子為末津和作餅子如錢厚以艾多灸之漏大者艾炷亦大漏小者艾炷亦小灸令微熱不可令痛餅乾即易之再和再灸又以補氣血藥作膏藥貼之一方治痔瘡腫痛用蝸牛一名蜒蝣陰乾為末敷之即愈或用香油浸蝸牛月餘而以其油沫敷亦效洗藥用五倍子朴硝桑寄生蓮房煎湯先熏後洗又方治痔瘡風腫疼痛用胡麻子煎湯洗之其腫即消又方用木鱉子五倍子共為細末調敷塞藥用爐甘石煅以童子尿淬之牡蠣煅共為末敷之又方用馬蘭草根研細敷上片時看肉平去藥稍遲恐肉反出腸風獨在胃與大腸出用黃芩秦艽槐角青黛升麻一方用大黃煨桃仁去尖各三錢蝟皮炙黃連秦艽槐角子各一兩當歸檳榔皂角仁黃柏炒荊芥枳殼各五錢為末麵糊為丸如梧桐子大每服五十丸白湯下如下鮮血者加棕櫚灰蓮房灰以上丹溪方法凡十條秦艽羌活湯東垣治痔漏成塊下垂不任其癢羌活一錢二分秦艽黃耆各一錢防風去蘆七分升麻炙甘草麻黃柴胡各五分藁本三分細辛紅花各少許上細切作一服水煎服忌寒風處大小便秦艽蒼朮湯東垣治痔核已破謂之痔漏大便祕澀必作大痛此濕熱風燥四氣合而為病故大腸頭成塊者濕也作大痛者風也大便燥結者兼受火邪也其西方肺金主氣其體收下亦助病為邪須當用破氣藥兼之其效如神秦艽去蘆桃仁去皮尖另研皂角仁燒存性各一錢蒼朮米泔浸防風各七分黃柏酒洗五分當歸梢酒洗澤瀉各三分檳榔二分另研大黃少許雖大便過澀亦不可多用也上件除檳榔桃仁皂角仁三味另研外余藥細切作一服水三盞煎至一盞二分去渣入檳榔等三味末子再上火煎至一盞空心熱服待少時以美膳壓之不犯胃氣也服藥日忌生冷硬物及酒濕面大料椒姜等物若犯之其藥無效如有白膿加白葵花頭五朵去萼心青皮五分入正藥中同煎木香三分為細末同檳榔等三味依前煎服餌古人治此疾多以歲月待除之惟此藥一服即愈秦艽當歸湯東垣治痔漏大便燥結疼痛大黃煨四錢秦艽去蘆枳實各一錢澤瀉當歸梢皂角仁白朮各五分紅花少許桃仁二十個去尖研細上細切作一服水三盞煎主一盞食前服忌如前秦艽防風湯東垣治痔漏每日大便時發疼痛如無疼痛者非痔漏也此藥主之秦艽防風當歸身白朮各一錢五分炙甘草澤瀉各六分黃柏酒洗五分大黃煨陳皮各三分柴胡升麻各二分桃仁三十個去尖另研紅花少許上細切作一服水三盞煎至一盞去渣稍熱空心服之避風寒忌房事酒濕面大辛熱之物當歸郁李仁湯東垣治痔漏大便硬努出大腸頭下血苦痛郁李仁皂角仁各二錢另研枳實七分秦艽去蘆麻仁當歸梢生地黃蒼朮各五分大黃煨澤瀉各三分上細切作一服除皂角仁為末用外水三盞煎至一盞去渣入皂角仁末和勻空心服忌如前紅花桃仁湯東垣治痔漏經年因而飽食筋脈橫解腸澼為痔治法當補北方瀉中央黃柏一錢五分生地黃一錢澤瀉八分蒼朮六分當歸梢漢防己防風梢豬苓各五分麻仁二分紅花少許桃仁十個上細切作一服水三盞煎至一盞去渣稍熱服忌如前七聖丸東垣治大腸疼痛不可忍脈訣云積氣生於脾臟傍大腸疼痛陳難當但令稍瀉三焦火草漫多方立紀綱羌活一兩郁李仁湯浸去皮尖另研一兩五錢大黃八錢煨檳榔桂心木香川芎各五錢上除郁李仁另研施入外其餘共為細末煉蜜為丸如梧桐子大每服三五十丸白湯下食前服取微利一般而愈切禁不得多利大便其痛滋甚秦艽白朮丸東垣治痔疾並漏有膿血大便燥硬疼痛不可忍秦艽去蘆桃仁去皮尖研皂角仁燒存性各一兩當歸梢酒浸澤瀉枳實麩炒黃色白朮各五錢地榆三錢上為細末和桃仁泥再研勻麵糊為丸如雞頭實大令藥光滑焙乾每服五七十丸白湯空心下待少時以美膳壓之忌生冷硬物冷水冷菜之類並酒濕面及辛辣大料熱物犯之則藥無驗也脫肛證肛音工下部病也俗作肛非屬氣血虛與熱氣虛參耆升麻川芎血虛四物湯熱加黃柏外以五倍子為末托而上之一次未收至五次七次必收又方以陳壁土泡湯先熏後洗又方以鱉頭燒存性為末真麻油調敷即收龜頭亦可祖傳方七花丸治腸風下血久痔皆效山茶花芙蓉花石榴花檢漆花白茅花銼各一兩俱燒存性松花一兩燒存性槐花二兩炒焦黑枳殼一兩麩炒黃色甘草炙五錢地榆一錢檳榔二錢五分上為細末醋調麵糊為丸梧桐子大每服七八十丸煎烏梅湯下又方治腸風下血等證乾柿餅燒存性稱灰二兩烏梅燒存性二兩酒瓶箬已酒過一年者或二三年者尤良燒存性二兩槐花五錢炒焦黑百藥煎一兩如無以五倍子炙焦黃代之枳殼五錢麩炒黃色上為細末醋糊為丸如梧桐子大每服七八十丸醋湯下或加檳榔五錢汗證論內經曰心之液為汗原病式曰心熱則出汗東垣曰西南坤土也在人則為脾胃夫人之汗猶天地之雨陰滋其濕則為霧露為雨也據內經獨主於心而東垣又指脾胃而言何也蓋心為君火主熱脾胃屬土主濕濕熱相搏為汗明矣亦如地之濕氣為雲霧而上升其天氣若不下降則不能成霖雨也又如甑中燒酒若非湯火蒸淘則不能成汁液也夫各臟皆能令人出汗獨心與脾胃主濕熱乃總司耳故內經又曰飲食飽甚汗出於胃驚而奪精汗出於心持重遠行汗出於腎疾走恐懼汗出於肝搖體勞苦汗出於脾若夫自汗與盜汗者病似而實不同也其自汗者無時而濈濈然出動則為甚屬陽虛胃氣之所司也盜汗者寐中而通身如浴覺來方知屬陰虛營血之所主也大抵自汗宜補陽調衛盜汗宜補陰降火大法心虛冷汗自出者理宜補肝益火之原以消陰翳也陰虛火炎者法當補骨壯水之主以制陽光也醫者宜詳辨之毋錯脈法脈大而虛浮而濡者汗在寸為自汗在尺為盜汗傷寒脈陰陽俱緊當無汗若自汗者曰亡陽不治方法丹溪曰自汗屬氣虛屬濕與熱盜汗屬血與陰虛火氣上蒸胃中之濕亦能作汗涼膈散主之治自汗用人參黃耆少佐以桂枝陽虛者附子亦可用痰病亦有汗者以上丹溪方法凡四條麥煎湯東垣治諸虛不足及新病暴虛津液虧缺體常自汗夜臥則甚久而不止體瘦心忪驚惕短氣疲倦牡蠣黃耆麻黃根各一錢上細切作一服入小麥百餘粒水煎服調衛湯東垣治濕勝自汗補衛氣虛弱表虛不任風寒證黃耆麻黃根各一錢羌活二分生甘草當歸梢各五分生地黃麥門冬各三分生黃芩半夏各五分豬苓二分蘇木紅花各一分五味子七粒愚恐自汗陽虛之證不應下羌活半夏生薑三味辛散發表之劑恐傳寫之誤姑存之上細切作一服加生薑三片水二盞煎至一盞去渣稍熱服當歸六黃湯河間盜汗之至藥也當歸一錢生地黃熟地黃黃柏各七分黃耆一錢黃連七分黃芩七分上細切作一服水二盞煎至一盞食前溫服小兒減半又曰小兒不須治小兒雖能自愈然不治病恐日甚治之尤妙黃耆建中湯活人治自汗及盜汗皆效方見傷寒門桂枝湯或加浮小麥一撮尤妙四制白朮散治盜汗白朮四兩內一兩以黃耆同炒一兩以石斛同炒一兩以特蠣同炒一兩以麩皮同炒凡同炒者皆去之上取白朮一味為末每服三錢粟米湯調下正氣湯東垣治盜汗黃柏知母各一錢五分甘草炙五分上細切水煎服之白朮散東垣治飲酒中風多汗食即汗出如油漏久不治必成消渴牡蠣三錢炒白朮一兩二錢五分防風二兩五錢上為細末每服一錢溫水調下不計時候如惡風倍防風白朮如多汗面腫倍牡蠣丹溪活套云仲景桂枝湯治外感風邪自汗之聖藥也黃耆建中湯治外感挾氣虛自汗之劑也東垣補中益氣湯治傷寒氣虛自汗之妙劑也甚者六脈浮軟而虛本方加附子以治陽虛其效如鼓應桴如左寸脈浮洪而自汗者心火炎也本方倍參耆加麥門冬五味子黃連各五分如左關脈浮弦而自汗者挾風邪也本方加桂枝芍藥各五分若不陰虛只有桂枝湯可用也右關脈浮洪無力而自汗者只宜本方倍參耆而自愈右尺脈洪數無力而自汗或盜汗者相火挾君火之勢而克伐肺金也本方加黃連黃芩黃柏各五分只用當歸六黃湯左尺脈浮洪無力而自汗者水虧火盛也本方加知母黃柏各五分熟地黃一錢壯水之主以制陽光也凡內傷及一切虛損之證自汗不休者總用補中益氣湯少加附子麻黃根浮小麥其效捷如影響但升麻柴胡俱用蜜水制炒以殺其升發勇悍之性又欲其引參耆等藥至肌表故不可缺也凡上所云皆指內傷虛損自汗之證故皆以補中益氣湯為主治之藥也醫案上湖呂俊文得內傷虛證發熱自汗如雨不止服補中益氣湯十數帖不效豫以前方加減每帖用蜜制黃耆一錢人參一錢白朮甘草陳皮各七分當歸白芍藥各一錢升麻柴胡各一分加桂枝三分麻黃根七分浮小麥一撮炮附子三分三帖而汗止熱亦退而安痓病論內經曰諸痙滑氏曰痙當作痓項強皆屬於濕王注云太陽傷濕也又曰諸暴強直皆屬於風王注云陽內鬱而陰行於外也原病式曰筋徑強直而不柔和也夫肝木屬風而主筋經曰諸暴強直屬風理宜然也其所謂諸痓項強而屬於濕者何歟蓋太陽經濕甚則兼風化亢則害承乃制也是故知痓之為病濕為本風為標耳故仲景有剛柔二痓之分不可不辨蓋剛為陽痓而柔為陰痓也若夫太陽發熱無汗惡寒脈弦長徑急胸滿口噤手足攣急咬牙眼開甚則搐搦角弓反張此為剛痓太陽微熱多汗不惡寒脈遲澀弦細四體不收時時搐搦閉目合口此為柔痓大抵因風濕二氣襲於太陽之經亦有輕重之分其風氣勝者為剛痓風性剛急故也濕氣勝者為柔痓濕性柔和故也外有諸虛之候表虛不任風寒亦能成痓是以或産後或金瘡或跌僕撲傷癰疽潰膿之後一切去血過多之證皆能成此疾也是乃虛為本而風為標耳亦有絶無風邪而亦能使人筋脈攣急而為角弓反張之候者血脫無以養筋故也丹溪甚言不可作風治而用風藥恐反燥其陰血而致不救也可不慎歟脈法脈經曰太陽病發熱其脈沉而細者為痓痓脈來按之築築然而弦直上下行痓家其脈伏堅直上下痓病發其汗已其脈潑潑然如蛇暴腹脹大為欲解脈如故反伏弦者必痓此痓字恐當作死字太陽病其證備身體強𠘧𠘧然脈沉遲此為痓栝蔞桂枝湯主之方法丹溪曰大率與癇相似比癇為虛切不可作風治而純用風藥多屬氣血虛有火有痰宜補兼降痰火參耆芎歸竹瀝之類一方治少年痘瘡靨後成痓口噤不開四肢強直時或繞臍腹痛一陳則冷汗如雨痛定汗止脈極強緊如真弦先因勞倦傷血瘡後血愈虛而又感風寒當用溫藥養血辛涼散風芍藥當歸為君川芎青皮釣鉤藤為臣白朮甘草為佐桂枝木香黃連為使更加紅花少許水煎服愈以上丹溪方法凡二條栝蔞桂枝湯活人治太陽傷寒成痓栝蔞根甘草炙各三兩桂枝芍藥生薑各三兩大棗十二枚上六味細切作一服以水九升煮取三升作三服連飲取微汗如汗不出少頃以熱粥發之葛根湯活人治太陽病無汗而小便反少氣上衝胸口噤不得語欲作剛痓方見傷寒門麻黃葛根湯活人治剛痓無汗惡寒麻黃赤芍藥各三錢乾葛四錢五分豆豉半合上細切作一服水二大盞蔥白三莖煎八分稍熱服大承氣湯活人治剛痓大便實熱方見傷寒門桂枝葛根湯活人治柔痓有汗不惡寒方見傷寒門桂枝栝蔞根湯活人治柔痓通用方見中風門小續命湯金匱治剛柔二痓通用方見中風門防風當歸湯治發汗過多發熱頭搖口噤背反張者宜去風養血防風當歸川芎生地黃各二錢五分上細切作一服水煎服當歸補血湯東垣治一切去血過多因無血養筋令人四肢攣急口噤如痓黃耆一兩當歸五錢酒浸洗淨上細切作一服水二盞煎至一盞溫服如挾風或兼破傷風者加防風羌活各一錢荊芥穗一錢半甘草五分減去黃耆一半煎服舉卿舉敗散活人治新産血虛發痓者汗後中風發熱亦然荊芥穗不拘多少微炒上為末每服三五錢外以大豆黃卷以熱酒沃之去黃卷用汁調下其效如神丹溪活套云昔之所謂剛柔二痓者當以虛實論之是也一屬外感一屬內傷屬外感者為剛痓宜用麻黃葛根湯栝蔞桂枝湯小續命湯在裡者大承氣湯之類屬內傷者為柔痓宜用補中益氣湯八物湯四物湯之類如以風濕二事分剛柔而治恐誤醫者不勝其多今以虛實分治其理昭然無疑矣醫案陶氏婦年三十餘身材小瑣形瘦弱月經後忽一日發痓口噤手足攣縮角弓反張豫知其去血過多風邪乘虛而入用四物湯加防風羌活荊芥少加附子行經二帖病減半六帖病全安厥病論內經曰陽氣衰於下則為寒厥陰氣衰於下則為熱厥又曰寒厥者此人質壯以秋冬奪於所用下氣上爭不能復精氣溢下邪氣因從之而上也氣因於中由陽衰不能滲營其經絡陽氣日損陰氣獨在故手足為之寒也熱厥者此人必醉飽入房精氣中虛酒入於胃則絡脈滿而經脈虛脾主為胃行其津液者也陰氣虛則陽氣入陽氣入則胃不和胃不和則精氣竭精氣竭則不能滲營其四肢也氣聚於脾中不得散酒氣與穀氣相薄熱盛於中故熱遍於身內熱而溺赤也腎氣日衰陽氣獨盛故手足為之熱也又陰氣盛於上則下虛下虛則腹脹滿腹滿則下氣重上而邪氣厥厥則陽氣亂陽氣亂則令人暴僕不知人或至半日遠至一日乃知人也名曰尸厥考之張仲景傷寒論陰陽二厥之證皆指手足逆冷而言也河間原病式曰陰厥者原病脈候皆為陰證身涼不渴脈遲而微陽厥者原病脈候皆為陽證煩渴譫妄身熱而脈數若陽厥極深或失下而至於身冷反見陰證脈微欲絶而死者此為極熱而然俗醫妄謂變成陰證急用熱藥助其陽氣以致十無一生也愚按內經曰寒熱二厥者皆常病虛損證也並宜補益之法但熱厥補陰寒厥當補陽耳正經所謂壯水之主以鎮陽光益火之原以消陰翳也若夫傷寒論所謂陰陽二厥者冰炭殊途治法亦異診察之間死生反掌醫者其可不盡心乎脈法脈經曰寸口沉大而滑沉則為實滑則為氣實氣相搏血氣入於臟則死入於腑則愈此為卒厥不知人唇青身冷為入臟即死如身溫和汗自出為入腑而後自愈活人書云陽厥脈滑而沉實陰厥脈細而沉伏方法丹溪曰厥因氣虛血虛者多氣虛脈細血虛脈大如蔥管熱厥脈數外感脈浮而實有痰者脈弦熱用承氣湯痰用白朮竹瀝外感宜解散藥中加薑汁服以上丹溪方法凡一條活人書曰初得病身熱頭痛大便祕小便赤或畏熱或飲水或揚手擲足煩躁不得安臥譫語昏憒而厥此陽厥也大柴胡湯大小承氣湯治之渴者白虎湯妙手足厥冷脈乍結此邪氣結在胸心下煩滿飢不能食瓜蒂散吐之寒熱而厥面色不澤冒昧兩手忽無脈或一手無脈必是有正汗也多用綿衣包手足急服五味子湯或兼與桂枝麻黃各半湯須臾大汗而解傷寒厥逆心下怔忡者宜先治水茯苓甘草湯主之如得病後四肢逆冷脈沉而細足攣臥而惡寒引衣蓋復不飲水或下利清穀而厥逆者陰厥也四逆湯白通湯厥逆脈不至者通脈四逆湯手足指頭微寒者謂之清理中湯無熱證而厥當歸四逆加茱萸生薑湯喘促脈伏而厥五味子湯吐利手足厥冷煩躁欲死吳茱萸湯五味子湯活人治陽厥脈伏手足厥冷五味子一兩人參麥門冬杏仁陳皮以上各五錢上細切用水三盞生薑十片棗二枚煎至一盞半去渣分作二服桂枝麻黃各半湯方見傷寒門茯苓甘草湯治陽厥怔忡手足厥逆心下有水氣茯苓桂枝各二錢甘草一錢生薑三錢上細切作一服水一盞半煎至一盞去渣溫服通脈四逆湯活人治陰厥下利清穀四肢逆冷脈微甘草六錢五分附子一枚生用乾薑一兩炮如面赤者加蔥九莖嘔者加生薑咽痛加桔梗利止脈不出加人參上用水三大盞煎至一盞半去渣分作二服當歸四逆加茱萸生薑湯活人治無熱證而厥當歸芍藥桂枝細辛各一兩甘草通草各六錢五分吳茱萸三錢生薑六錢上細切水三升煮至一升半分三服吳茱萸湯活人治陰厥吐利手足逆冷煩躁欲死吳茱萸生薑各五錢人參三錢五分上細切作一服水二盞大棗一枚煎至一盞半溫服忌生冷物蘇合香丸局方治卒厥不知人未詳風痰氣厥先與此藥極妙每用一丸以湯調化灌之即醒醒後察脈而用他藥丹溪活套云熱厥四肢煩熱蓋濕熱鬱於脾土之中治用東垣升陽散火湯火鬱湯之類寒厥手足逆冷者多是氣血不足補氣血藥加附子飲酒人或體肥盛人手足熱者濕痰鬱火盛也二陳湯加芩連梔子之類若忽然手足逆冷卒厥不知人者多屬痰火亦有陰先虧而陽暴熱者宜多用參膏兼竹瀝薑汁與之人瘦弱者雖無痰而火亦盛也服竹瀝亦能養血而降火癲狂癇證論內經曰巨陽之厥則腫首頭重足不能行發為眴僕眴搖其目而暴僕也是蓋陽氣逆亂故令人卒然暴僕而不知人氣復則蘇此則癇之類也又曰陽明之厥則癲疾欲走呼腹滿不得臥面赤而熱妄見妄言又曰甚則棄衣而走登高而歌逾垣上屋罵詈不避親疏是蓋得之於陽氣太盛胃與大腸實熱燥火鬱結於中而為之耳此則癲狂之候也曰癲曰狂分而言之亦有異乎難經謂重陰者癲重陽者狂素問注云多喜為癲多怒為狂然則喜屬於心而怒屬於肝乃二臟相火有餘之證難經陰陽之說恐非理也大抵狂為痰火實盛癲為心血不足多為求望高遠不得志者有之癇病獨主乎痰因火動之所作也治法癇宜乎吐狂宜乎下癲則宜乎安神養血兼降痰火雖然此三證者若神脫而目瞪如愚癡者縱有千金我酬吾未如之何也已矣脈法脈大堅疾者癲狂脈虛弦為驚為風癲脈沉數為痰熱脈大滑者自已沉小急疾者死虛而弦急者死寸口沉大而滑沉則為實滑則為氣實氣相搏入臟則死入腑則愈丹溪曰癲狂脈虛易治實者難治方法丹溪曰癇證大率屬痰與火不必分五等大法行痰為主藥用黃連南星栝蔞半夏尋火尋痰分多少治無不愈者有熱者用涼藥以清心有痰者必用吐吐後用東垣安神丸及平肝之藥青黛柴胡川芎之類癲狂原病式所論甚精蓋以世以重陰為癲重陽為狂誤也大概皆是熱耳盧氏曰重陰重陽之分難經之言也河間謂素問注云多喜為癲多怒為狂五志所發皆為熱也心熱甚則多喜火旺制金不得平木則肝實而多怒也又發熱於中則多幹陽明經謂陽明之厥則癲疾又謂服膏粱芳草石藥則熱氣慓悍發為癲狂此原病式本素問之論以明癲狂俱是熱病而重陰之說非也大率多因痰結於心胸間宜開痰鎮心神亦有中邪者以治邪法治之神不守舍狂言妄作經年不愈如心經蓄熱當清心除熱如痰迷心竅當去痰寧心宜大吐大下愈一方治癇證用大蝙蝠一個以硃砂三錢填入腹內以新瓦盛火炙令皮焦酥為度候冷為細末每一個分作四服氣弱及年幼者作五服空心白湯調下以上丹溪方法凡五條龍腦安神丸寶鑑治男女五般癲癇無問遠近發作無時茯神三兩人參地骨皮甘草麥門冬桑白皮各二兩馬牙硝二錢龍腦麝香各三分牛黃五錢硃砂二錢五分烏犀角一兩金箔三十五片上為細末煉蜜為丸如彈子大金箔為衣如風癇病冬月溫水化下夏月涼水化下不拘時二三歲者日進一服大人每服一丸小兒一丸分作二丸服虛勞發熱咳嗽新汲水化下神應丹寶鑑治諸癇辰砂不拘多少研細上以豬心血和得所以蒸餅裹劑蒸熟取出為丸如梧桐子大每服一丸食後臨臥煎人參湯下五色丸錢氏治諸癇硃砂五錢另研水銀二錢五分雄黃一兩熬珍珠一兩另研末鉛三兩用水銀同熬上和勻再研極細麵糊為丸如麻子大每服三四丸別煎金銀薄荷湯送下二白丸元戎治痰涎為病患以致癲癇狂妄驚悸等證白礬一兩輕粉一字或五分量虛實加減上用生蒸餅劑裹蒸熟去皮可丸入輕粉丸如梧桐子大每服二三十丸生薑湯下小兒如黍米大妙香丸拔萃治時毒傷寒解五毒潮熱積熱及小兒驚癇等證辰砂九兩另研龍腦膩粉麝香研各五錢牛黃五錢金箔九十片研巴豆二百二十五粒去皮心及油上合研勻煉蜜為丸每兩分作三十丸米飲下硃砂滾涎丸子和治五癇等證硃砂白礬生用赤石脂硝石各等分上為細末研蒜膏為丸如緑豆大每服三十丸食後荊芥湯下碧霞丹局方治痰涎壅塞牙關緊急目睛上視癲癇狂妄等證石緑五錢研九度飛附子尖烏頭尖蠍稍各二十個上為末入石緑令勻麵糊為丸如雞頭實大每服一丸薄荷湯化下更以溫酒半合飲之須臾吐出痰涎然後隨證以他藥治之如口噤者擀開灌之控涎丹三因治痰迷心竅狂言譫語如有所見方見痰飲門牛黃瀉心湯御藥院方治心經邪熱狂言妄語心神不安腦子另研牛黃另研硃砂另研各一錢五分大黃生一兩上各研為細末和勻再研每服三錢煎生薑蜜水調下牛黃清心丸局方治心氣不足神志不定驚恐癲狂語言譫妄虛煩少睡甚至棄衣而走登高而歌逾垣上屋等證羚羊角末一兩人參去蘆二兩五錢白茯苓一兩二錢川芎一兩二錢半防風去蘆一兩五錢阿膠炒七錢五分乾薑炒七錢五分白朮一兩五錢牛黃研一兩二錢麝香研一兩犀角末二兩雄黃研飛八錢龍腦研一兩金箔一千四百片內除四百片為衣白芍藥一兩五錢柴胡去蘆一兩二錢甘草銼炒五兩乾山藥七兩麥門冬去心一兩五錢桔梗去蘆一兩二錢杏仁去皮尖及雙仁者麩炒黃色一兩二錢半另研黃芩一兩五錢去朽神麯炒二兩五錢大棗一百個蒸熟去皮核研成膏白蘞七錢五分蒲黃炒二兩五錢當歸去頭一兩五錢大豆黃卷一兩七錢半炒肉桂去皮一兩七錢半上除棗杏仁金箔外牛黃龍胸麝香雄黃四味研為細末入余藥和勻煉蜜入棗膏為丸每兩作十丸金箔為衣每服一丸食後溫水化下丹溪活套云五志之火因七情而起鬱而成痰故為癲癇狂妄之證宜以人事制之非藥石所能療也須診察其由以平之怒傷於肝者為狂為癇以憂勝之以恐解之喜傷於心者為癲為癇以恐勝之以怒解之憂傷於肺者為癇為癲以喜勝之以思解之思傷於脾者為癇為癲為狂以怒勝之以喜解之恐傷於腎者為癲為癇以思勝之以憂解之驚傷於膽者為癲以憂勝之以恐解之悲傷於心胞者為癲以恐勝之以怒解之此法惟賢者能之耳祖傳方治癲癇神效九節菖蒲一味不拘多少不聞雞犬聲者佳去毛焙乾上以木臼杵為細末不可犯鐵器用黑獖豬心以竹刀批開沙罐煮湯送下每日空心服二三錢邪祟論內經曰邪氣盛則實正氣奪則虛夫經之所謂邪者風寒暑濕燥火有餘之淫邪耳非若世俗所謂鬼神之妖怪也病有心虛驚惕如醉如癡如為邪鬼所附或陽明內實以致登高而歌棄衣而走皆痰火之所為實非妖邪祟之所迷也古雖有禁咒一科及龍樹咒法之治皆移精變氣之術但可解疑釋惑以使心神之歸正耳何邪祟之可祛哉丹溪曰血氣者心之神也神既衰乏邪因而入理或有之按此恐指山谷間狐魅而言若夫氣血兩虛痰塞心胸妨礙升降不得運行以致十二官各失其職視聽言動皆為虛妄以邪治之其人必死可不審乎脈法脈乍疏乍數乍大乍小或促或結皆邪脈也脈緊而急者遁尸方法丹溪曰俗之沖惡者謂沖斥邪惡鬼祟而病也如病此者未有不因氣血先虧而致者焉以上丹溪方法凡一條素問遺篇曰入憂愁思慮則傷心又驚而奪精汗出於心或遇少陰司天天數不及因而三虛神明失守蓋心為君主之官神明出焉神既失守神光不聚卻遇火不及歲有黑尸鬼見之令人暴亡治法刺手少陽之所過陽池穴也復刺心俞即生人飲食勞倦則傷脾又飲食飽甚汗出於胃醉飽入房汗出於脾或遇太陰司天天數不及因而三虛脾神不守蓋脾者為諫議之官智周出焉神既失守神光不聚卻遇土不及歲有青尸鬼見之令人暴亡可刺足陽明之所過衝陽穴也復刺脾俞即生人久坐濕地強力入水則傷腎又遇持重遠行汗出於腎或遇太陽司天天數不及因而三虛腎神不守蓋腎為作強之官伎巧出焉神既失守神光不聚卻遇水不及歲有黃尸鬼見之令人暴亡可刺足太陽之所過京骨穴也復刺腎俞即生人暴怒氣逆則傷肝又遇疾走恐懼汗出於肝或遇厥陰司天天數不及因而三虛肝神不守蓋肝為將軍之官謀慮出焉神既失守神光不聚卻遇木不及歲有白尸鬼見之令人暴亡可刺足少陽之所過丘墟穴也復刺肝俞即生人形寒飲冷則傷肺復登高疾走汗出於肺或遇陽明司天天數不及因而三虛肺神不守蓋肺為相傳之官治節出焉神既失守神光不聚卻遇金不及歲有赤尸鬼見之令人暴亡可刺手陽明之所過合谷穴也復刺肺俞即生愚按人見五色非常之鬼皆自己精神不守神光不完故耳實非外邪所侮乃元氣極虛之候也因患者親目所視故實信真為邪鬼所迷但當推其同行同坐者不見有物足可以決此疑耳五邪刺法肝虛見白尸鬼而後暴厥不知人名曰卒尸五邪病名並同目中神彩不變四肢雖冷心腹尚溫口中無涎舌不卷卵不縮者可刺之復蘇丘墟二穴在足外踝下如前陷中去臨泣穴五寸足少陽之原也以毫針刺入三分得氣則補留三呼徐徐出針按口中閉氣腹中鳴者可治更刺肝俞肝俞二穴在背第九椎下兩傍各一寸半以毫針刺三分得氣則補留三呼次進二分留三分復取針至三分留一呼徐出針氣反即蘇心虛見黑尸鬼而後暴厥不知人四肢雖冷目中精彩不變氣雖閉絶舌不卷卵不縮未出一時可治刺之復蘇陽池二穴在手表腕陷中手少陽之原也用毫針刺入二分得氣則補留七呼次進一分留三呼復退留一呼徐徐出針手捫其穴即蘇脾虛見青尸鬼而後暴厥不知人四肢冷而身溫唇溫不出一時可治衝陽二穴在足趺上骨間動脈去陷谷三寸足陽明之原以毫針刺入三分得氣則補留三呼次進二分留一呼徐徐退針以手捫之復刺脾俞脾俞二穴在背第十一椎下兩傍各一寸半以毫針刺入三分得氣則補留二呼進二分動氣至徐徐出針即蘇肺虛見赤尸鬼而後暴厥不知人雖無氣手足冷心腹溫鼻微溫目中神彩不變口中無涎舌不卷卵不縮者未出一時可治合谷二穴在手大指次指兩歧骨間手陽明之原也用毫針刺入三分得氣則補留三呼復退一分留一呼徐徐出針以手捫其穴復刺肺俞肺俞二穴在背第三椎下兩傍各一寸半用毫針刺入一寸半得氣則補留三呼次進二分留一呼徐徐出針以手捫穴即蘇腎虛見黃尸鬼而後暴厥不知人氣絶四肢厥冷心腹微溫目中精彩不變唇舌不黑口中無涎可救京骨二穴在足外側大骨下赤白肉際陷中足太陽之原用毫針刺入一分半得氣則補留三呼進至三分留一呼徐徐出針以手捫穴復刺足少陰之俞足少陰之俞在背第十四椎下兩傍各一寸半用毫針刺入三分得氣則補留三呼次又進五分留三呼徐徐出針以手捫其穴即蘇凡以上刺法必先以口含針暖而刺之則經脈之氣無拒逆也丹溪治一婦人如癇或作或輟恍惚不省人事一日略蘇醒診視間忽聞床上有香氣繼又無所知識丹溪曰氣因血虛亦從而虛邪因虛而入理或有之遂以秦承祖灸鬼法灸治即愈秦承祖灸鬼法治一切驚狂譫妄逾垣上屋罵詈不避親疏等證以病者兩手大拇指用細麻繩扎縛定以大艾炷置於其中兩介甲及兩指角肉四處著火一處不著即無效灸七壯神驗還魂丹治中惡已死麻黃三兩桂枝二錢杏仁十二粒上作一服水煎灌下即醒桃奴丸治心氣虛怯有熱尸注魘夢驚癇等證桃奴即桃樹上不落干桃十二月收七個另研辰砂五錢另研桃仁十四個另研玳瑁一兩另研琥珀三錢另研烏犀角五錢石上水磨牛黃一錢另研龍腦二錢另研麝香一錢另研雄黃桃葉煮水飛三錢安息香一兩以無灰酒研飛上以安息香同桃仁琥珀共熬成膏和諸藥末為丸如雞頭實大陰乾每服一丸人參湯化下蘇合香丸治諸般怪疾方見氣門一方治魘死不還用半夏末不拘多少吹入鼻中即醒祖傳方辟邪丹治沖惡怪疾人參茯神遠志鬼箭羽九節菖蒲白朮蒼朮米泔浸當歸各一兩桃奴焙乾五錢雄黃另研辰砂各三錢另研牛黃一錢另研金箔二十葉或加麝香一錢上件以桃奴以上諸藥為細末入雄黃辰砂牛黃三味末子和勻以酒調米粉打糊為丸如龍眼大金箔為衣臨臥以木香湯化下一丸諸邪不敢近體更以絳紗囊盛五七丸懸床帳中尤妙醫案一婦人年二十七美貌得一證如醉如癡頰赤面青略有潮熱飲食不美其脈乍疏乍數而虛一醫與八物湯服數十帖不效召豫治之取膽汁丸安神定志之藥以八物湯吞下服藥十數帖丸藥一料以安其神丸藥用遠志石菖蒲川歸黃連茯神硃砂側柏葉草龍膽等藥怔忡驚悸健忘證論內經曰心者君主之官神明出焉夫怔忡驚悸之候或因怒氣傷肝或因驚氣入膽母能令子虛因而心血為之不足又或遇事繁冗思想無窮則心君亦為之不寧故神明不安而怔忡驚悸之證作矣夫所謂怔忡者心中惕惕然動搖而不得安靜無時而作者是也驚悸者驀然而跳躍驚動而有欲厥之狀有時而作者是也若夫二證之因亦有清痰積飲留結於心胞胃口而為之者又不可固執以為心虛而治醫者自宜以脈證參究其的而藥之毋認非以為是也慎之慎之脈法寸口脈動而弱動為驚弱為悸趺陽脈微而浮浮為胃氣虛微則不能食此恐懼之脈憂迫所致也寸口脈緊趺陽脈浮胃氣則虛是以悸肝脈動暴有所驚駭方法丹溪曰屬血虛有痰有慮便動屬虛時作時止者痰因火動瘦人多是血少肥人只是痰多時覺心跳者亦是血虛怔忡無時悚悸有時而作大法四物湯安神丸之類有痰者用痰藥驚悸者屬血虛用硃砂安神丸最好或有痰迷心竅者宜用治痰藥一方治勞役大虛心跳硃砂另研水飛白芍藥當歸身酒浸側柏葉各三錢川芎甘草陳皮各一錢炒黃連一錢五分上為細末豬心血為丸如黍米大每服五六十丸津唾咽下或少用白湯一口送下食後臨臥服以上丹溪方法凡四條驚悸養血湯局方治肥人因痰火而心惕然跳動驚起黃耆茯神半夏曲川芎各五分遠志去心甘草水浸桂心柏子仁酸棗仁炒五味子人參各二分半甘草四分上細切作一服生薑三片大棗一枚水一盞煎至七分服如停水加茯神檳榔各三分同煎安神丸東垣黃連一錢五分酒洗硃砂一錢另研水飛生地黃酒洗當歸身酒洗甘草炙各五分上為細末湯浸蒸餅為丸如黍米大每服十五丸食後津唾咽下一方硃砂安神丸無地黃當歸用生甘草溫膽湯活人治心膽怯怔忡易驚半夏湯炮七次去皮竹茹枳實各二錢生薑四錢陳皮三錢甘草一錢上細切作一服水二盞煎至一盞去渣食後溫服定志丸治心氣不足恍惚多忘及怔忡驚悸等證人參白茯苓各三錢遠志去心石菖蒲各二兩上為細末煉蜜為丸如梧桐子大硃砂為衣每服五十丸食後白湯下朱雀丸河間治怔忡驚悸等證茯神二兩沉香五錢硃砂五錢另研為衣上為細末蒸餅為丸如梧桐子大每服五十丸人參湯下八物定志丸東垣平補心氣安神鎮驚除膈間痰熱等證遠志去心石菖蒲麥門冬去心茯神去皮白茯苓各一兩白朮五錢人參一兩五錢牛黃二錢另研上煉蜜為丸如梧桐子大硃砂為衣每服二十丸白湯送下歸脾湯治思慮過度勞傷心脾健忘怔忡白朮茯神黃耆蜜炙龍眼肉酸棗仁炒各一錢人參木香各五分甘草炙二分半上細切作一服水二盞加生薑三片大棗一枚煎至一盞去渣溫服祖傳方治憂愁思慮傷心令人惕然心跳動驚悸不安之證川歸酒洗用身生地黃酒洗遠志去心茯神各五錢石菖蒲九節黃連各二錢五分牛黃一錢另研辰砂二錢另研金箔十五片上以前六味研細入牛黃辰砂二味末子豬心血丸如黍米大金箔為衣每服五十丸煎燈心湯送下三消論內經曰二陽結謂之消又曰疸成為消中東垣曰二陽者陽明也手陽明大腸主津液若消則目黃口乾乃津液不足也足陽明胃主血若熱則消穀善飢血中伏火乃血不足也結者津液不足結而不潤皆燥熱為病也此因數食甘美而多肥故其氣上溢轉為消渴治當以蘭除陳氣也不可服膏粱芳草石藥其氣慓悍能助燥熱也岐伯曰脈實病久可治脈弦小病久不可治當分三消而治之高消者舌上赤裂大渴引飲經云心移熱於肺傳為膈消者是也以白虎加人參湯治之中消者善食而瘦自汗大便硬小便數叔和云口乾飲水多食飢虛疸成為消中者是也以調胃承氣湯三黃丸治之下消者煩渴引飲耳輪焦乾小便如膏叔和云焦煩水易虧此腎消也以六味地黃丸治之總録所謂末傳能食者必發腦疽背癰不能食者必傳中滿膨脹皆為不治之證也張潔古分而治之能食而渴者白虎加人參湯不能食而渴者錢氏白朮散倍加葛根治之上中既平不復傳下消矣先哲用藥厥有旨哉然臟腑有遠近亦宜斟酌如心肺位近宜制小其服腎肝位遠宜制大其服皆適其至所為故如過與不及皆誅罰無過之地也如高消中消制之太急速過病所久而成中滿之病正所謂上熱未除中寒復生者也非藥之罪失其緩急之制也治斯疾者宜審焉脈法脈經曰厥陰之為病消渴氣上衝心心中疼熱飢而不欲食食即吐下之不肯止傷寒厥陰篇云食則吐蛔下之利不止寸口脈浮而遲浮則為虛遲則為勞浮則衛氣不足遲則榮氣竭趺陽脈浮而數浮則為氣數則消穀而緊要略作消穀而大堅氣盛則溲數溲數則緊要略作堅緊數相搏則為消渴男子消渴小便反多以飲一斗小便一斗腎氣丸主之心脈滑為渴滑者陽氣勝心脈微小為消疸消疸脈實大病久可治懸小堅急病久不可治脈數大者生沉小者生實而堅大者死細而浮短者死方法丹溪曰養肺降火生血為主分上中下治上消者肺也多飲水而少食大小便如常中消者胃也多飲食而小便赤黃下消者腎也小便濁淋如膏之狀大法黃連天花粉二味為末藕汁人乳汁生地黃汁佐以蜜薑汁為膏和二味留舌上徐徐以白湯少許送下能食者加石膏豬肚丸黃連五兩麥門冬去心知母去毛栝蔞根各四兩上為細末入雄豬肚內縫之蒸熟乘熱於石臼中搗爛如干加煉蜜丸如梧桐子大每服一百丸食後米飲下可以清心止渴一云治消中天花粉治消渴之聖藥也凡消渴藥中大禁半夏及不可發汗三消者瓊玉膏最妙方見咳嗽門以上丹溪方法凡五條和血益氣湯東垣治口乾舌乾小便數舌上赤脈此藥生津液除乾燥生肌肉柴胡炙甘草生甘草麻黃根各三分當歸梢酒洗四分知母酒洗漢防己酒洗羌活各五分石膏六分另研生地黃酒洗黃連酒洗各八分黃柏酒洗升麻各一錢杏仁去皮另研六分紅花少許桃仁去皮另研六分上細切作一服水二盞煎至一盞去渣溫服忌酒醋熱濕面當歸潤燥湯治消渴小便多大便祕澀乾燥結硬燥渴喜好溫飲陰頭退縮舌燥口乾眼澀難開及於黑處見浮雲細辛一分生甘草炙甘草熟地黃各三分柴胡去蘆七分黃柏酒洗知母酒洗石膏桃仁泥當歸身麻仁防風荊芥穗各一錢升麻一錢五分紅花少許杏仁七個另研為泥小椒三粒炒出汗上細切作一服水二盞煎至一盞熱服食遠忌辛熱物生津甘露湯一名清涼飲子東垣治消中能食而瘦口舌乾自汗大便結燥小便頻數升麻四分防風去蘆生甘草漢防己生地黃各三分當歸身六分柴胡羌活炙甘草黃耆酒知母酒黃芩各一錢酒草龍膽石膏黃柏各一錢五分紅花少許桃仁十個另研杏仁十個研上細切作一服水二盞煎至一盞加酒一匙稍熱服辛潤緩肌湯一名清神補氣湯東垣前消渴症才愈止有口乾腹不能努此藥主之生地黃細辛各一分熟地黃石膏各四錢黃柏酒洗黃連生甘草知母各五分柴胡去蘆當歸身荊芥穗各一錢升麻一錢五分桃仁泥防風各一錢紅花少許杏仁六個另研小椒二粒炒出汗上細切作一服水二盞煎至一盞稍熱食遠服生津甘露飲子治消渴上下齒皆麻舌根強硬腫痛食不能下時有腹脹或泄黃如糜名曰飧泄渾身色黃目睛黃甚四肢痿弱前陰如水尻臀腰背寒面生黧色脅下急痛善嚏喜怒不常健忘藿香二分柴胡黃連木香各三分白葵花麥門冬去心當歸身酒洗蘭香各五分蓽澄茄生甘草山梔子白豆仁白芷連翹薑黃各一錢石膏一錢二分杏仁去皮尖酒黃柏各一錢五分炙甘草酒知母升麻人參各二錢桔梗三錢全蠍五個去毒上為細末湯浸蒸餅和勻成劑捏作片子日中曬半乾擦碎如黍米顆大每服一錢津唾下或白湯送下食遠服黃耆飲東垣治三消黃耆蜜炙六兩炙甘草一兩上細切每服二錢水煎服六味地黃丸方見虛損門人參白朮湯東垣治胃膈疸熱煩滿飢不欲食疸成為消中善食而瘦燥熱鬱甚而成消渴多飲水而小便數兼療一切陰虛陽實風熱燥郁頭目昏眩中風偏枯酒過積毒腸胃燥澀並傷寒雜病産後煩渴氣液不得宣通人參白朮當歸芍藥大黃酒浸紙裹煨梔子炒荊芥穗薄荷桔梗知母澤瀉各五錢茯苓去皮連翹栝蔞根乾葛各一兩甘草三兩藿香葉青木香官桂各二錢石膏四兩寒水石二兩白滑石半斤上為細末每服抄五錢水一盞入芒硝半兩生薑三片煎至半盞絞汁入蜜少許溫服漸加至十餘錢得臟腑流利取效如常服以意加減如腸胃鬱結濕熱內甚自利者去大黃芒硝服絳雪散東垣治消渴飲水無度小便數者大有神效黃芩酒炒黃丹炒飛漢防己栝蔞實各等分上為細末每服二錢溫漿水調下臨臥時並進三服即止人參散東垣治腎消善飲而小便頻數白濁如膏人參一分白朮澤瀉栝蔞根桔梗梔子連翹各二分葛根黃芩大黃酒浸紙裹煨薄荷白茯苓各五分甘草七分石膏一錢滑石寒水石各一錢五分縮砂少許上細切作一服為末水一盞半煎至一盞入蜜少許再煎三兩沸腎消食前服上消食後服大黃甘草飲子河間治男子婦人一切消渴不能止者大豆五升先煮二三沸出火去苦水再煮大黃一兩五錢甘草四兩長四指煅捶碎上用井水一桶將前藥同煮三五時如稠黏更添水煮豆軟為度盛於盆中放冷令病人食豆渴飲湯汁無時候食盡如燥渴止罷藥未止依前再煮食之不過三劑其病悉愈麥門冬飲子河間治心移熱於肺名曰膈消心膈有熱久則引飲為消渴麥門冬去心一錢栝蔞根知母甘草五味子生地黃人參葛根茯神各一錢五分上細切作一服加竹葉七片用水一盞煎至七分溫服丹溪活套云三消者多屬血虛不生津液俱宜四物湯為主治上消者本方加人參五味子麥門冬天花粉煎入生藕汁生地黃汁人乳飲酒人加生葛汁中消者本方加知母石膏滑石寒水石以降胃火下消者本方加黃柏知母熟地黃五味子之類以滋腎水又間當飲繅絲湯為上策祖傳方原蠶繭湯治腎消白濁及上中二消飢渴不生肌肉其效如神蓋此物屬火有陰之用大能瀉膀胱中相火引陰水上潮於口而不渴也原蠶即再養晚蠶也其繅絲湯極效如無繅絲湯以繭殼絲綿煎湯皆可代之
