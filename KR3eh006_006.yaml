body:
  text: 卷之六便濁遺精論內經曰諸轉反戾水液渾濁皆屬於熱夫便濁之證因脾胃之濕熱下流滲入膀胱故使便溲或白或赤而渾濁不清也原病式曰如夏月天氣熱甚則水液渾濁林木流津是也血虛而熱甚者則為赤濁此心與小腸主病屬火故也氣虛而熱微者則為白濁肺與大腸主病屬金故也丹溪曰大率多是濕痰流注宜燥中宮之濕又曰治宜燥濕降火兼升舉之法此皆至要之語也外有遺精滑泄之候與濁相類不可一例而推夫遺精者多夢與鬼交而泄名曰夢遺或隨溲溺而出謂之精滑亦有思想無窮所願不遂而得之者治宜安心神以降火又有因好色太過房勞致虛而得之者治法宜滋水臟以復真陰是皆千古不易之定論也學者詳之脈法兩尺脈洪數必便濁失精女人尺脈澀而弱者或洪數而促者皆為便濁白帶心脈短小因心虛所致必遺精便濁方法丹溪曰便濁屬溫熱有痰有虛赤屬血由小腸屬火故也白屬氣由大腸屬金故也大率皆是濕痰流注宜燥中宮之濕赤者乃是濕傷血胃中濁氣下流滲入膀胱肥白人多痰治宜燥濕降火兼升提之大法二陳湯加二朮升柴赤者加白芍藥煎服一人便濁嘗有半年或時夢遺形瘦作心虛主治以珍珠粉丸和定志丸服效方見怔忡門夢遺主熱精滑主濕熱熱則流通故也內傷氣血虛不能固守當補以八物湯加減吞樗木根丸大法用青黛海石黃柏精滑用知母黃柏降火牡蠣蛤粉燥濕白濁同法治一方用良薑三錢芍藥黃柏炒焦各二錢樗根白皮一兩五錢為末糊丸每服三十丸思想而得病在心治當安心神以帶補一法用溫膽湯去竹茹加人參遠志蓮肉酸棗仁茯神煎服一方治便濁丸藥樗白皮黃柏炒青黛乾薑炒滑石蛤粉炒各等分神麯糊為丸服之戴氏曰黃柏治溫熱青黛解熱蛤粉鹹寒入腎滑石利竅炒乾姜味苦斂肺氣下降使陰血生且能監製二陳湯治濁加升提之藥使大便潤而小便長珍珠粉丸治精滑白濁等證黃柏真蛤粉各一斤珍珠三兩一方無此味而有青黛上為末水和丸如梧桐子大每服一百丸空心溫酒下或加樗根白皮滑石青黛等藥半苓丸治白濁神麯半夏燥濕豬苓分水等分曲糊丸服虛勞者用補陰藥胃弱者兼用人參及升麻柴胡升胃中之清氣張子元氣血兩虛有痰便濁陰火痛風人參一兩白朮五錢熟地黃黃柏炒黑色各二兩山藥海石瑣陽各五錢乾薑五錢燒灰存性南星一兩煨裂龜板酥炙二兩上為細末酒麵糊為丸如梧桐子大每服一百丸姜鹽湯下燥濕痰治白濁方如肝脈弦者須以青黛瀉肝大概不可純用涼藥盧氏曰病因濕熱藥的矣然亦不可專用寒涼藥故用炒柏之類又以乾薑之溫而佐之也以上丹溪方法凡十六條妙香散局方治心虛遺精白濁麝香一錢另研人參五分木香二錢五分煨茯苓茯神黃耆遠志去心炒各一兩桔梗甘草各五錢辰砂二錢另研山藥二兩薑汁炙上為細末每服二錢溫酒調服不拘時祕真丸河間治思想無窮所願不遂意淫於外入房太甚宗筋弛縱發為筋痿及為白淫及白物隨溲而下或夢與陰人通泄耳白龍骨一兩另研訶子皮大者五枚縮砂仁五錢去殼硃砂一兩另研以一分為衣上為細末麵糊為丸如緑豆大每服一丸空心溫酒下冷水亦可不可多服太祕或用蔥白茶湯下萆薢分清飲楊氏家傳治真元不足下焦虛寒小便白濁頻數無度漩面如油光彩不定漩腳澄下凝結如膏糊之狀石菖蒲烏藥益智仁川萆薢白茯苓各一錢甘草梢五分上細切作一服水一盞半入鹽一錢煎至一盞空心服治濁固本丸東垣蓮花須黃連炒各二兩白茯苓砂仁益智半夏湯泡七次去皮臍黃柏炒各一兩甘草炙三兩豬苓二兩五錢為末蒸餅為丸空心溫酒下五十丸九龍丹丹溪治精滑枸杞子金櫻子山果子又名山楂蓮肉佛座須連花心也熟地黃芡實白茯苓川歸各等分上為末酒麵糊為丸如梧桐子大每服五十丸或酒或鹽湯送下如精滑便濁者服二三日溺清如水飲食倍常行步輕健婦人厭産者二三服便住孕如仍欲産服通利之藥水陸二仙丹録驗治遺精白濁夢泄脫精等證金櫻子一斗芡實二斤上以芡實去殼杵為細末取金櫻子黃熟者用籃盛於水中杵去刺又於石臼中杵碎去核淨再杵細絞取自然汁煎熬成飴糖和芡實末為丸如梧桐子大每服五七十丸空心姜鹽湯送下定志珍珠粉丸丹溪治心虛夢泄人參白茯苓各三兩遠志去心石菖蒲各二兩海蛤粉黃柏炒焦色各三兩樗根皮二兩青黛二兩上為細末麵糊為丸青黛為衣如梧桐子大每服五十丸空心姜鹽湯下丹溪活套云赤白濁乃胃中痰積下流滲入膀胱宜用二陳湯加升麻柴胡防風之類以提之肥白人屬濕熱加蒼朮白朮炒黃柏黃荊子之類或有挾寒者本方加炒乾薑肉桂甚者加附子有心虛不能固守及平素虛寒之人本方加萆薢石菖蒲益智炒乾薑牡蠣龍骨之類氣虛者本方加黃耆白朮人參或加附子之類赤者多有血虛瘦弱之人得之宜四物湯加酒知母酒炒黃柏煎湯送下珍珠粉丸赤白濁小腹疼痛不可忍者宜作寒治東垣酒煮當歸丸最妙方見婦人門祖傳方祕真丹治好色腎虛遺精夢泄白淫白濁等證菟絲子酒浸炒韭子炒柏子仁各一兩龍骨煅牡蠣煅醋淬山茱萸去核取肉赤石脂各五錢煅補骨脂一兩炒遠志去心巴戟去心覆盆子枸杞子黃柏鹽酒炒黑色山藥各七錢五分芡實去殼杜仲薑汁炒絲斷各一兩金櫻子半青黃者去刺核取肉焙乾二兩乾薑炒黑色一兩鹿角膠一兩五錢炒成珠上為細末煉蜜為丸如梧桐子大每服一百丸空心姜鹽湯下醫案蓮塘朱顯重病遺精潮熱不起床三月矣召豫治脈之左右寸關皆浮虛無力兩尺洪大而軟與補中益氣湯加熟地黃知母黃柏地骨皮煎吞下珍珠粉丸外做小篦籠一個以籠陰莖勿使搭肉服藥三十餘帖一月平安淋閉附關格論內經曰飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱夫膀胱者主足太陽寒水之化其體有下口而無上口者也長生在申是故西方肺金以為之母而資其化也肺金清肅則水道通調而滲營於下耳然肺金又借脾土健旺以資化原而清氣得以上升而歸於肺以運行也故經又曰清陽出上竅濁陰出下竅故清陽不升則濁陰不降而成淋閉之患矣先哲以滴水之器譬之上竅閉則下竅不出此理甚明故東垣使灸百會穴丹溪使吐以提其氣之橫格是皆開上竅之法也原其為病之由皆膏粱之味濕熱之物或燒酒炙肉之類郁遏成痰以致脾土受害乏力不能運化精微清濁相混故使肺金無助而水道不清漸成淋閉之候或謂用心太過房勞無節以致心腎不交水火無制清陽不升濁陰不降而成天地不交之否皆先哲之法言也古方有五淋之別氣砂血膏勞是也若夫氣淋為病小便澀滯常有餘瀝不盡砂淋為病陰莖中有砂石而痛溺不得卒出砂出痛止膏淋為病溺濁如膏勞淋為病遇房勞即發痛引氣衝血淋為病遇熱則發甚則溺血候其鼻準色黃者知其為小便難也東垣分在氣在血而治之以渴與不渴而辨之耳如渴而小便不利者熱在上焦氣分肺金主之宜用淡滲之藥茯苓澤瀉琥珀燈心通草車前子瞿麥萹蓄之類以清肺金之氣瀉其火以滋水之上源也不渴而小便不利者熱在下焦血分腎與膀胱主之宜用氣味俱陰之藥知母黃柏之類滋腎丸是也除其熱泄其閉塞以滋膀胱腎水之下元也治淋之法無越於此學者不可不知脈法脈經曰少陰脈數婦人則陰中生瘡男子則為氣淋脈細而數脈盛大而實者生虛細而澀者死方法丹溪曰淋雖有五皆屬於熱宜解熱利小水山梔子之類不可發汗汗之必便血老人氣虛淋閉參術中帶木通梔子之屬有腎虛極而淋者當補腎精而利小便不可獨用利水藥有死血作淋者用牛膝膏一云牛膝膏能損胃不食宜斟酌用之一方治淋用益元散加梔子仁木通或用梔子一合炒為末白湯調下夏月以茴香煎湯調益元散服效痰熱隔滯中焦淋澀不通二陳湯煎大碗頓服探吐之以提其氣淋澀有血因火燥下焦無血氣不得降而滲泄之令不行也宜補陰降火以四物湯加知母黃柏或用四物湯煎下滋腎丸陰莖痛乃厥陰氣滯兼熱用甘草梢蓋欲緩其氣耳小便因熱鬱成淋不通用赤茯苓黃芩澤瀉車前子麥門冬肉桂滑石木通甘草梢氣虛者加黃耆木香淋痛加黃柏生地黃夏月煎調益元散以上丹溪方法凡九條參苓琥珀湯治小便淋澀莖中痛相引脅下痛不可忍者人參茯苓各五分川楝子去核生甘草梢玄胡索各七分琥珀柴胡川歸尾澤瀉各三分上細切作一服水一盞半加燈心十數莖煎至一盞服琥珀散濟生治五種淋澀疼痛小便有膿血出證琥珀沒藥海金砂蒲黃各一兩上為細末每服三錢空心煎萱草湯調下傷寒後脫陽小便不通用生薑自然汁調茴香末敷貼小腹上又服益智茴香丸調益元散送下丹溪老人氣虛而小便不通四物湯加黃耆人參吞滋腎丸下焦血氣乾者死丹溪小便黃用黃柏如澀數加澤瀉若濕熱流注下焦而小便黃赤澀數用梔子澤瀉切當濕多者宜用滑石利之下焦無血小便澀數而黃者用四物湯加黃柏知母牛膝甘草梢通關丸即滋腎丸東垣治不渴而小便閉熱在下焦血分黃柏酒洗焙乾知母酒洗焙乾各一兩肉桂五分上為細末熟水丸如梧桐子大每服一百丸空心白湯下服後須頓兩足令藥易下行也如小便已利莖中如刀刺痛當有惡物下為驗清肺飲子東垣治渴而小便閉澀不利邪熱在上焦氣分燈心一分通草二分澤瀉瞿麥琥珀各五分萹蓄木通各七分車前子炒另研茯苓去皮豬苓去皮各一錢上細切作一服水一盞半煎至一盞空心稍熱服導氣除燥湯東垣治小便閉塞不通乃血澀致氣不運而竅澀也茯苓去皮滑石各一錢知母去毛酒浸炒澤瀉各一錢五分黃柏二錢酒炒上細切作一服水二盞煎至一盞空心稍熱服腎疸湯東垣治腎疸目黃甚至渾身黃小便赤羌活防風藁本獨活柴胡各五分升麻一錢以上治目黃渾身黃白茯苓二分澤瀉三分豬苓四分白朮五分蒼朮一錢以上治小便赤澀黃柏二分人參三分葛根五分神麯六分甘草五分上細切作一服水二盞煎至一盞食前稍熱服小薊湯東垣治下焦熱結血淋生地黃小薊根通草滑石梔子仁蒲黃炒淡竹葉當歸梢生藕節甘草梢各五分上細切作一服水煎空心服八正散局方治大小便俱閉大黃瞿麥木通滑石萹蓄車前子梔子仁甘草各等分上細切每服五錢重入燈心七莖水煎服牛膝膏用川牛膝一合細切以新汲水五大盞煎耗其四入麝香少許空心服或單以酒煮亦可茯苓湯東垣治胃疸陽明積熱食已輒飢面色黃瘦胸滿脅脹小便閉澀赤茯苓陳皮去白澤瀉桑白皮各三分赤芍藥白朮人參官桂各二分石膏八分病甚者加大黃朴硝各一錢上細切作一服加生薑五片水一盞半煎至一盞溫服倒換散河間治無問久新癃閉大小便不通小腹急痛肛門腫痛大黃小便不通減半荊芥穗大便不通減半各等分上各別研為細末每服二錢溫水調下臨時加減服葵子散河間治小便不通黃蜀葵子研細赤茯苓各二錢上作一服水一盞煎二三沸食前服葵子湯濟生治膀胱實熱小便不通方見疝氣門琥珀散河間治五淋滑石二錢木通當歸木香鬱金萹蓄各一錢琥珀五分研上作一服為末用蘆葦葉同煎水一盞半煎數沸食前溫服鐵服丸河間治大小便不通神效大皂角燒存性上一味不拘多少細研煉蜜丸如梧桐子大每服七十丸白湯下廣濟雞蘇飲子外臺治小便不通雞蘇二握生地黃通草各四兩滑石杏仁去皮尖各二兩冬葵子一兩五錢石葦炙去毛一兩上七味細切以水六升煎至二升半去渣分三服空心進一服如人行四五里又進一服必通又方外臺治小便不通冬葵子滑石各三兩通草赤茯苓各一兩茅根二兩五錢芒硝一兩五錢上細切以水六升煎取二升去渣納芒硝分作三服連進即通集驗方外臺治小便淋瀝不通滑石半斤石葦三兩通草四兩榆莢冬葵子各一斤一方加黃芩三兩上細切以水一斗煎取三升分作三服頓飲石葦散河間治小便不利莖中作痛石葦去毛二兩瞿麥一兩滑石五兩車前子三兩冬葵子二兩上為細末每服方寸匕日三服祖傳方治小便淋閉莖中作痛神效石葦去毛滑石瞿麥萹蓄冬葵子木通王不留行地膚草各等分上為細末每服三錢白湯調下又方治小便溺血立效金陵草一名旱蓮草一名墨斗草車前子俗云蝦蟆衣上二物各等分杵自然汁每服半茶盞空腹服又方治前證用壯年無病人頭髮不拘多少燒灰存性以側柏葉搗汁入糯米糊為丸如梧桐子大每服一百丸白湯下或四物湯下尤妙又方治沙淋乃莖中有砂作痛石首魚腦骨五對火煅出火毒即白鯗腦中骨也滑石五錢上共研為細末分作二服煎木通湯調下未愈再服數劑必待砂出盡乃安又方治孕婦轉胞小便不通及男子小便不通皆效冬葵子五錢山梔子五錢炒研木通三錢滑石五錢研上作一服水一盞半煎八分溫服外以冬葵子滑石梔子為末田螺肉搗膏或生蔥汁調膏貼臍中立通又方治血淋側柏葉藕節車前草各等分上三味同搗取其汁調益元散神效附關格證難經曰關則不得小便格則吐逆脈兩寸俱盛曰關格其證嘔逆而小便不通者是也按素問謂人迎大四倍於氣口名曰格氣口大四倍於人迎名曰關乃二證也蓋有格而不關者亦有關而不格者又或有人迎氣口俱盛而吐逆不便者故丹溪總而言之曰關格者是也丹溪曰寒在上而熱在下故多死法當吐以提其氣之橫格不必在出痰也用二陳湯探而吐之吐中便有降有氣虛不運者補氣藥中升降用補中益氣湯加檳榔使清氣升而濁氣降也治關格證吐逆而小便不利急宜先灸氣海天樞等穴各三七壯其吐必止然後以益元散等藥以利小便祖傳方治關格吐逆小便不通用藿香平胃散合五苓散加薑棗煎服立效醫案豫長兄修德翁年七十秋間患小便不通二十餘日百方不效後得一方取地膚草搗自然汁服之遂通雖至微之物而有回生起死之功故録於此以為濟利之一助云地膚草一云白地芎是也祕結論內經曰北方黑色入通於腎開竅於二陰藏精於腎夫腎主五液故腎實則津液足而大便滋潤腎虛則津液竭而大便結燥原其所由皆房勞過度飲食失節或恣飲酒漿過食辛熱飲食之火起於脾胃淫欲之火起於命門以致火盛水虧津液不生故傳道失常漸成結燥之證是故有風燥有熱燥有陽結有陰結有氣滯結又有年高血少津液枯涸或因有所脫血津液暴竭種種不同固難一例而推焉經云腎惡燥急食辛以潤之以苦泄之陽結者散之陰結者溫之大法治燥者潤之以大黃當歸桃仁麻子仁郁李仁之類風燥者加以防風羌活秦艽皂莢之類為丸以煉蜜取其潤燥以助傳道之勢故結散而疏通矣仍多服補血生津之劑助其真陰固其根本庶無再結之患切弗以巴豆牽牛等峻劑攻下雖暫得通快必致再結愈甚反釀成病根膠固卒難調治或有血虛脈大如蔥管發熱而大便結燥者慎不可發汗汗之則重亡津液閉結而死此醫殺之耳活人書有脾約證謂胃強脾弱約束津液不得四布但輸膀胱故小便數而大便難制脾約丸以下脾之結燥使腸潤結化津流入胃而愈丹溪曰然既曰脾約必陰血枯槁內火燔灼熱傷元氣故肺受火邪而津竭必竅母氣以自救夫金耗則土受木傷脾失轉輸肺失傳化宜其大便閉而難小便數而無藏蓄也理宜滋養陰血使陽火不熾金行清化脾土健旺津液入胃大小腸潤而通矣今以此丸用之於熱甚而氣實與西北人稟賦壯實者無有不安若用之於東南方人與熱雖盛而氣血不實者雖得暫通將見脾愈弱而腸愈燥矣須知在西北以開結為主在東南以潤燥為要學者其可不知此乎脈法脈多沉伏而結陽結脈沉實而數陰結脈伏而遲或結老人虛人便結脈雀啄者不治方法丹溪曰有虛有風有濕有火有津液不足者有寒者有氣結者切不可例用芒硝大黃及巴豆牽牛等利藥久病腹中有實熱大便不通宜用潤腸丸微利之不宜用峻利之劑以上丹溪方法凡二條脾約丸麻仁一兩半用生絹袋盛百沸湯連袋泡浸湯冷出之垂井中與水面差一指許不著水次日曬乾礱之粒粒皆完枳實麩炒黃色厚朴薑製炒芍藥各三兩大黃四兩酒蒸杏仁去皮尖炒另研一兩二錢上為末煉蜜為丸如梧桐子大每服三十丸溫水下通幽湯東垣治大便難幽門不通上衝吸門不開噎塞不便燥閉氣不得下治在幽門以辛潤之炙甘草紅花各一分生地黃熟地黃各五分升麻桃仁泥當歸身各一錢上細切作一服水一盞半煎至一盞去渣調檳榔細末五分食前稍熱服潤燥湯東垣升麻二分生地黃二分熟地黃當歸梢大黃酒濕煨生甘草桃仁泥麻仁各一錢紅花五分上除桃仁麻仁另研細外余細切作一服水一盞半入桃仁麻仁煎至一盞去渣空心稍熱服潤腸丸東垣治脾胃中伏火大便閉澀或乾燥閉塞不通全不思食及風結血閉皆能治之桃仁湯泡去皮略炒麻仁去殼各一兩當歸梢大黃酒濕煨羌活各五錢上除桃仁麻仁另研如泥外其餘杵為極細末煉蜜為丸如梧桐子大每服三五十丸空心白湯下如風濕而大便不行加煨皂角仁大黃秦艽以利之如脈澀覺身有氣澀而大便結者加郁李仁大黃以除氣澀燥麻黃白朮湯東垣治大便不通五日一次小便黃赤渾身腫面上及腹尤甚其色黃麻木身重如山沉困無力四肢痿軟不能舉動喘促不安青皮去穰酒黃連各二分黃耆人參桂枝白朮厚朴薑製柴胡蒼朮豬苓各四分酒黃柏陳皮去白甘草半炙半生升麻各三分吳茱萸去核白茯苓澤瀉各五分白豆蔻炒神麯各六分麻黃一錢不去節杏仁四個上細切分作二服每服水二盞先煎麻黃令沸掠去沫入諸藥同煎至一盞去渣稍熱服升陽瀉熱湯東垣治膈噎不通逆氣裡急大便不行青皮槐子各二分生地黃熟地黃黃柏各三分當歸身甘草梢各四分蒼朮五分升麻七分黃耆一錢桃仁十個去皮尖另研上細切作一服入桃仁泥水二盞煎至一盞食前熱服活血潤燥丸東垣治大便風祕血祕常常燥結當歸梢五錢防風三錢大黃酒煨羌活各一兩皂角仁燒存性一兩五錢桃仁二兩去皮另研麻仁二兩半去殼另研上除桃仁麻仁另研外共為細末煉蜜為丸如梧桐子大每服五十丸白湯下三兩服後須以麻子仁煮粥每日早晚食之大便雖日久再不結燥也此丸藥以瓷罐盛之紙包封毋令見風潤腸湯東垣治大便結燥不通生地黃生甘草各三分大黃煅熟地黃當歸梢各五分升麻桃仁麻子仁各一錢紅花三分上細切作一服水二盞煎至一盞去渣空心服潤體丸東垣能潤血燥治大便不通麻仁當歸梢生地黃桃仁枳殼各等分上為細末煉蜜為丸服備急大黃丸東垣治胃中停滯寒涼之物大便不通腹痛方見內傷門枳殼丸河間治三焦約大小便不通穀氣不得下行枳殼二兩陳皮一兩檳榔五錢木香二錢五分黑醜四兩一半生用一半炒熟杵頭末一兩半余不用上為細末煉蜜為丸如梧桐子大每服五十丸薑湯下枳實導滯丸東垣治傷熱物大便不行氣滯胸腹作痛方見內傷門醫案本邑趙德秀才之母年五十餘身材瘦小得大便燥結不通飲食少進小腹作痛召豫診治六脈皆沉伏而結澀豫作血虛治用四物湯加桃仁麻仁煨大黃等藥數服不通反加滿悶與東垣枳實導滯丸及備急大黃丸等藥下咽片時即吐出蓋胃氣虛而不能久留性速之藥耳遂以備急大黃丸外以黃蠟包之又以細針穿一竅令服三丸蓋以蠟匱者制其不犯胃氣故得出幽門達大小腸取效也明日下燥屎一升許繼以四物湯加減作湯使吞潤腸丸如此調理月餘得大便如常飲食進而平安豫族侄百一通判之子因出痘大便閉結不通兒醫云便實為佳兆自病至痘瘡愈後不入廁者凡二十五日肛門連大腸不勝其痛叫號聲達四鄰外醫及豫二三人議藥調治用皂角末及蜜煎導法服以大小承氣湯及枳實導滯丸備急丸皆不效計無所出豫曰此痘瘡餘毒鬱熱結滯於大小腸之間而然以香油一大盞令飲自朝至暮亦不效豫畫一計令侍婢口含香油以小竹筒一個套入肛門以油吹入肛內過半時許病者自云其油入腸內如蚯蚓漸漸上行再過片時許下黑糞一二升止困睡而安黃疸論內經曰中央黃色入通於脾又曰諸濕腫滿皆屬脾土夫黃疸為病肌肉必虛腫而色黃蓋濕熱鬱積於脾胃之中久而不散故其土色形於面與肌膚也蓋脾主肌肉肺主皮毛母能令子虛母病子亦病矣是故有諸中者必形諸外耳其證有五曰黃汗曰黃疸曰酒疸曰谷疸曰女勞疸雖有五者之分終無寒熱之異丹溪曰不必分五種同是濕熱如盦曲相似正經所謂知其要者一言而終是也外有傷寒熱病陽明內實當下而不得下當汗而不得汗當分利而不得分利故使濕熱怫鬱內甚皆能令人發黃病也先哲制茵蔯五苓散茵蔯湯茯苓滲濕湯之類無不應手獲效故曰治濕不利小便非其治也又曰濕在上宜發汗濕在下宜利小便或二法並用使上下分消其濕則病無有不安者也學者詳之脈法脈經曰凡黃候寸口脈近掌無脈口鼻冷並不可治脈沉渴欲飲水小便不利者必發黃也酒疸者或無熱靖言了了腹滿欲吐鼻燥其脈浮者先吐之沉弦者先下之酒疸下之久久為黑疸目青面黑心頭如噉蒜韭之狀大便正黑皮膚四肢不仁其脈浮弱顏黑微黃故知難治谷疸寸口脈微而弱微則惡寒弱則發熱當發不發骨節疼痛當煩不煩而黃汗出趺陽脈緩而遲胃氣反強飽則煩滿滿則發熱客熱消穀食已則飢谷強肌瘦名曰谷疸陽明病脈遲者食難用飽飽則發煩頭眩者必小便難此欲作谷疸雖下之腹滿如故趺陽脈緊而數數則為熱熱則消穀緊則為寒食則滿也尺脈浮為傷腎趺陽脈緊為傷脾風寒相搏食已則眩穀氣不消胃中苦濁濁氣下流小便不通陰被其寒熱流膀胱身體盡黃名曰谷疸方法丹溪曰不必分五同是濕熱和盦曲相似輕者小溫中丸重者大溫中丸熱多加黃連濕多者茵蔯五苓散加食積藥戴氏曰食積者量其虛實下之其餘但利小便小便清利則黃自退或曰黃疸宜用倒倉法又曰黃疸倦怠脾胃不和食少胃苓湯小便赤加滑石一方治黃疸黃芩黃連梔子茵蔯豬苓澤瀉蒼朮青皮草龍膽各五分谷疸加三稜莪朮縮砂陳皮神麯上細切作一服水煎服之又方治氣實傷濕渾身發黃宜吐法撫芎梔子桔梗各二錢上細切作一服加姜煎入韭汁服探吐之小溫中丸治黃疸與食積又可制肝燥脾脾虛者須以白朮作湯使下針砂十兩醋炒七次令通紅另研苦參夏加冬減山楂各二兩吳茱萸一兩冬加夏減蒼朮半斤白朮五兩川芎夏減神麯各半斤香附米一斤童便浸一宿上為細末醋糊為丸如梧桐子大每服七八十丸食前鹽湯下一方無白朮山楂苦參吳茱萸有梔子大溫中丸針砂十兩如前制陳皮蒼朮青皮厚朴薑汁製三稜醋煮一時莪朮同上制黃連苦參白朮各五兩生甘草二兩香附一斤童便浸一宿上為細末醋糊為丸一方無黃連苦參白朮一方又無甘草名溫中丸調胃承氣湯活人方見傷寒門王叔和曰腹滿舌痿煩躁不得睡屬黃家又曰病黃疸發熱煩喘胸滿口燥者以發病時火劫其汗兩熱相搏然黃家所得從濕故一身盡發熱而黃如肚熱者熱在裡也當下之安用調胃承氣湯又曰黃疸之病當以十八日為期治之十日以上為瘥又劇者為難治又曰病疸而渴者其病難治疸而不渴者其病易治發於陰部其人必嘔發於陽部其人振寒而發熱也師曰諸黃家病但宜利小便假令脈浮當以汗解之宜桂枝加耆湯又名黃耆建中湯方見傷寒門又曰男子黃小便自利當與小建中湯又曰黃疸腹滿小便不利而赤自汗出此為表和裡實當下之用大黃黃柏梔子芒硝湯大黃黃柏梔子芒硝湯叔和黃柏芒硝大黃各四錢梔子三枚上細切作一服水一盞半煎至一盞溫服又曰黃疸病小便色不變欲自利腹滿而喘不可除熱熱除必噦噦者宜服小半夏湯方見傷寒門又曰夫病酒發黃疸必小便不利其候心中熱足下熱是其證也又心中懊憹而熱不能食時欲吐名曰酒疸又曰酒疸心中熱欲嘔者吐之即愈又曰酒疸黃色心中實熱而煩又曰額上黑微汗出手足心熱薄暮則發膀胱急小便自利名曰女勞疸腹如水狀不治又曰黃家日晡所當發熱而反惡寒此為女勞得之膀胱急小腹滿一身盡黃額上黑足下熱因作黑疸其腹脹如水狀大便必黑時溏此女勞之病非水也腹滿者難治硝石礬石散主之硝石礬石散叔和上以二石各等分燒煅為末每服二錢以大麥粥湯和服日三服取汗愈若小腹滿急小便不利用滑石石膏各二錢入粳米一撮同煎服之治酒疸用小柴胡湯加茵蔯豆豉大黃黃連葛根煎服效叔和茯苓湯河間治胃疸消穀善飢面色痿黃心中煩熱胸脅脹滿小便赤澀方見淋祕門一方丹溪治谷疸以柴胡穀芽枳實厚朴梔子大黃等分水煎服效胃苓湯局方治脾胃不和黃腫如小便赤澀加滑石五苓散合平胃散是也腎疸湯東垣治腎疸目黃或渾身黃小便赤澀升麻羌活防風藁本獨活柴胡各五分蒼朮一錢豬苓四分葛根五分澤瀉三分黃芩二分甘草三分神麯炒三分黃柏二分白朮五分人參三分上細切作一服水一盞半煎至一盞去渣溫服茵蔯五苓散活人治傷寒或伏暑發黃小便不利煩渴等證本方倍加茵蔯入薑棗煎服之茵蔯茯苓湯活人治發黃脈沉細數四肢冷小便澀煩躁而渴茯苓桂枝豬苓各一錢滑石一錢五分茵蔯二錢上細切作一服水一盞半煎至一盞服如脈未出加當歸一錢五分梔子大黃湯活人治酒疸心中懊憹或熱而痛梔子十四枚大黃一兩枳實五枚豆豉一升上作一服用水五升煎至二升分三服半溫半熱湯活人治酒疸身黃無熱靖言了了腹滿欲嘔心煩足熱或有癥瘕心中懊憹其脈沉弦緊細半夏茯苓白朮各七分前胡枳殼麩炒黃色甘草炙大戟各五分黃芩茵蔯當歸各三分上細切作一服入生薑三片水二盞煎至一盞溫服茵蔯蒿湯活人治身熱鼻乾汗出陽氣上奔小便赤澀不利濕熱發黃茵蔯蒿一兩大梔子三枚大黃三錢五分上細切作一服水三盞煎盞半溫服茵蔯大黃湯活人治傷寒大熱發黃面目俱黃小便赤澀茵蔯蒿梔子柴胡黃柏黃芩升麻大黃各七分草龍膽三分半上細切作一服水一盞半煎至一盞溫服梔子柏皮湯活人治身熱不去大便利而煩熱身黃梔子黃柏黃連各三錢五分上細切作一服水一盞半煎至一盞溫服茯苓滲濕湯活人治黃疸寒熱嘔吐而渴欲飲冷水身目俱黃小便不利不思飲食方見濕證門小茵蔯湯活人治發黃脈沉細而遲遍身冷附子一枚作八片炮甘草炙一兩茵蔯二兩上細切作三服每服用水二盞煎至一盞溫服茵蔯四逆湯活人治發黃脈沉細而遲肢體逆冷腰以上自汗甘草炙一兩乾薑炮一兩五錢附子一枚作八片炮茵蔯二兩上細切分作四服水煎服葶藶苦參散活人治濕熱內甚小便赤澀大便時祕飲食少進諸藥不效因為久黃苦參黃連瓜蒂黃柏大黃各一兩葶藶子二兩上為細末每服一錢匕清米飲調下以吐利為度隨時看虛實消息加減當歸白朮湯活人治酒疸發黃心下有痃癖堅滿身體沉重妨害飲食小便赤黃此因內虛飲食生冷脾胃痰結所致白朮茯苓各一錢當歸黃芩茵蔯各三分半前胡枳實甘草炙杏仁各六分半夏八分泡透上細切作一服加姜三片水一盞半煎至一盞溫服抵當湯活人治傷寒熱鬱瘀血內結身黃脈沉細狂言譫語小便自利大便黑方見傷寒門針砂丸集驗方治谷疸酒疸濕熱發黃等證針砂半斤醋炒紅蒼朮四兩米泔浸香附四兩童便浸神麯炒微黃茵蔯薑汁炒麥糵麩炒各二兩芍藥當歸酒洗去頭生地黃川芎青皮去穰炒各一兩五錢陳皮去白莪朮醋煮三稜醋煮各二兩梔子去殼炒薑黃升麻乾漆各五錢炒煙盡上為細末醋糊為丸如梧桐子大每服六七十丸薑湯送下緑礬丸集驗治黃腫病最捷五倍子半斤炒黑緑礬四兩薑汁炒白針砂四兩醋炒紅色神麯半斤炒微黃色上為細末生薑汁煮紅棗肉為丸如梧桐子大每服六七十丸溫酒下不能飲酒米湯亦可終身忌食蕎麥麵犯之再發難治棗礬丸寶鑑治食勞身目俱黃者緑礬半斤火煅通紅上研細紅棗肉為丸如梧桐子大每服五十丸或酒或薑湯下祖傳方褪金丸治黃腫絶妙蒼朮米泔浸白朮各二兩五錢甘草炙五錢厚朴薑汁拌炒一兩陳皮去白一兩五錢針砂醋炒紅色香附童便浸各六兩神麯炒黃色麥糵面炒微黃各一兩半有塊加三稜醋煮莪朮醋煮各一兩半上為細末麵糊為丸服忌魚腥濕面生冷水果等物醫案一男子年三十餘得谷疸症求豫治以胃苓湯去桂加茵蔯數十帖黃退自以為安不服藥十數日後至晚目盲不見物豫曰此名雀目蓋濕痰盛而肝火有餘也用獖豬肝煮熟和夜明砂作丸服之目遂明如故來謝豫曰未也不早服制肝補脾消痰之劑必成蠱脹伊不信半月後腹漸脹痞滿復來治豫仍以胃苓湯倍二術加木通麥門冬煎湯下褪金丸一月平安瘡瘍論內經曰諸痛癢瘡瘍皆屬心火又曰膏粱之變足生大疔榮氣不從逆於肉理乃生癰腫東垣謂榮氣即胃氣也蓋胃氣調和則榮衛之氣皆順流而無逆於肉理耳若夫飲食失節肥甘過傷以致濕熱蘊積於腸胃之間燒爍腑臟煎熬真陰此經之所謂陰之五宮傷在五味味傷發熱久而增氣故濕熱之氣聚於下集陰火熾盛蓄於八脈八脈沸騰逆於經隧氣凝血滯故其滋養精微之氣不能如常榮於肉理是以結聚而成癰腫矣經曰熱勝則肉腐是也法當視其所發之地各從其經而處治焉夫發於身之表者其名一十有七曰腦發督脈足太陽經曰背發中屬督脈余皆足太陽經曰鬢髮手足少陽經曰眉發手足太陽經手足少陽經曰頤發手足陽明經曰腮頷發手陽明經曰髭發手足陽明經曰腋發手太陽經曰穿襠發督銜任三脈曰腿發表足三陽裹足三陰曰肝癰足厥陰經曰喉癰任脈陽明經曰臍癰任脈陽明曰乳癰內陽明經外少陽經乳頭足厥陰經曰臀癰足太陽經曰跨馬癰足厥陰經曰囊癰足厥陰經發於腔子之內者其名有四曰內疽曰肺癰手太陰經曰腸癰手太陽經手陽明經曰胃脘癰足陽明經夫十二經有氣血多少之不同癰疽淺深之有異是故為治之法或疏散或消毒或針焙或內托或外消或瀉利或補益是故腫瘍為實宜瀉利潰瘍為虛宜補益浮露而淺者為癰宜外消藏伏而深者為疽宜內托此千古不易之定議也雖然其證有善而易治者為順惡而難消者為逆其為眼白睛黑目緊小者一逆也不能飲食納藥而嘔食不知味二逆也傷痛渴甚三逆也膊項轉動不便四肢沉重四逆也聲嘶色脫唇口青黑面目四肢浮腫五逆也煩躁時咳腹痛甚泄利無度小便如淋六逆也膿血大泄焮腫尤甚膿水臭敗莫近七逆也喘促氣短恍惚嗜臥八逆也未潰先黑陷面青唇黑便汙九逆也又如噫氣痞塞喘咳身冷自汗目瞪耳聾恍惚驚悸語言錯亂皆是惡證若夫動息自寧飲食知味一順也便利調勻二順也神彩精明語聲清朗三順也膿潰腫消色鮮不臭四順也體氣和平五順也凡五順見三則吉九逆見六則危矣先哲垂訓班班可考學者其可不詳察乎脈法脈經曰脈數身無熱內有癰也一云腹無積聚身無熱脈數此為腸中有膿薏苡附子敗醬湯主之諸浮數脈應當發熱而反灑淅惡寒苦有痛處當發癰腫脈微而遲反發熱弱而數反振寒當發癰腫脈浮而數身體無熱形默默胸中微躁不知痛之所在此人當發癰腫脈滑而數數則為熱滑則為實滑則主榮數則主衛榮衛相逢則結為癰熱之所過則為膿也羽林婦病醫者脈之知婦人腸中有膿為下之即愈蓋寸口脈滑而數滑則為實數則為熱滑則為榮數則為衛衛數下降榮滑上升榮衛相干血為濁敗小腹痞堅小便或澀或時汗出或復惡寒膿為已成設脈遲緊聚為瘀血下之即愈腸癰之為病其身體甲錯腹皮急按之軟如腫狀夫腸癰者小腹腫按之則痛小便數如淋時時發熱自汗出復惡寒其脈遲緊者膿未成可下之當有血脈洪數者膿已成不可下也大黃牡丹湯主之方法丹溪曰癰疽因陰陽相滯而生蓋氣陽也血陰也血行脈內氣行脈外相併周流寒與濕搏之則凝泣而行遲為不及熱與火搏之則沸騰而行速為太過氣得邪而鬱津液稠黏為痰為飲積久滲入脈中血為之濁此陰滯於陽也血得邪而鬱隧道阻隔或溢或結積久滲出脈外氣為之亂此陽滯於陰也百病皆由於此又不止於癰疽而已癰疽因積毒在臟腑當先助胃壯氣使根本堅固而以行經活血藥為佐參以經絡時令使毒氣外發施治之早可以內消此內托之意也或問內托之法豫曰河間治腫焮於外根盤不深形證在表其脈多浮病在皮肉非氣盛則必侵於內急須內托宜腹煎散除濕散郁使胃氣和平如或未已再煎半料飲之如大便閉及煩熱少服黃連湯如微利及煩熱已退卻與復煎散如此使榮衛俱行邪氣不能內傷也外科精要謂排膿內補十宣散治未成者速散已成者速潰誠哉是言也若用之於小瘡癤與冬月亦可轉重就輕移深居淺若潰瘍與夏月用之其桂朴之溫散佐以防風白芷吾恐雖有參耆難為倚仗比見世人用此不分輕重時令經絡前後正若盲人騎瞎馬半夜臨深池危哉諸經惟少陽厥陰二經生癰疽宜預防之以其多氣少血也血少而肌肉難長瘡久未合必成死證苟不知此遽用驅逐利藥以伐其陰分之血禍不旋踵腫瘍內外皆壅宜以托裡表散為主如欲用大黃者宜戒猛浪之非潰瘍內外皆虛宜以補接為主如欲用香散者宜戒虛虛之失外科精要一書惟務紀録舊方應酬輕小證候耳癰疽始發即以艾多灸之可使輕淺騎竹馬灸法最妙蓋艾火暢達拔引郁毒此從治之意惟頭為諸陽所聚艾炷宜小而少若身上必痛灸至不痛不痛灸至痛亦有因灸而死者蓋虛甚孤陰將絶其脈必浮數而大且不鼓精神必短而昏無以抵當火氣宜其危也按河間灸刺法曰凡瘡瘍須分經絡部分血氣多少腧穴遠近從背出者當從太陽經五穴選用至陰通谷束骨崑崙委中是也從鬢出者當從少陽經五穴選用竅陰夾溪臨泣陽輔陽陵泉是也從髭出者當從陽明經五穴選用厲兌內庭陷谷衝陽解溪是也從腦出者則以絶骨一穴治之各穴點法俱見銅人針灸經茲不再具蜞針之法可施於輕小證候吮出惡血若積毒在臟腑者徒竭其血於外無益也外施貼藥亦發表之意精要謂貼冷藥有神效夫氣得熱則散得冷敗斂何謂神效經曰發表不遠熱是也貼冷藥惟輕小癤毒可也外科用針烙得膿後服神仙追毒丸此藥能下積取毒無取膿之功若血氣壯實則膿自出當以和氣活血藥佐參耆補劑服之腫瘍用手按之熱則有膿不熱則無膿膿出而反痛者此為虛也宜補之亦有穢氣所觸而作痛者宜和解之風冷所逼者宜溫養之疽發深不痛者胃氣大虛必死肉多而不知痛也腫瘍時嘔者當作毒氣上攻治之潰後當作陰虛補之若年老潰後發嘔不食又宜參耆白朮膏峻補隨證加佐使藥河間謂瘡瘍嘔者濕氣侵於胃也宜倍白朮癰疽發渴乃血氣兩虛用參耆以補氣當歸地黃以養血或忍冬丸黃耆六一湯皆效加味十全大補湯治癰疽潰後補氣血進飲食實為切要凡膿血出多陰陽兩虛此藥有回生起死之功但不分經絡不載時令醫者觸類而長之可也或見腫平痛寬遂以為安漫不知省無補接調養之功愈後虛證復見因而轉為他病而危劇者多矣蒲公英化熱毒消惡腫散結核有奇功田間路側皆有之三四月開黃花似菊花味甘衍義補遺云四時常花花罷飛絮節葉間折之有白汁出者是能解食毒散滯氣可入陽明太陰二經同忍冬藤煎以少酒佐而服之搗爛盦之亦妙白蠟屬金稟收斂堅凝之氣外科之要藥也生肌止血定痛接骨續筋補虛常與合歡皮同入長肉膏藥用之有神效但未試其可服否若合歡皮常服之驗矣萆麻子性善收能追膿取毒亦要藥也癰疽已破未破用皂角刺能鑽引至痛處取剩骨法取久疽久痔漏中朽骨俗名剩骨用烏骨雞脛骨以信砒實之鹽泥固濟火煅通紅地上出火毒用骨研細飯丸如粟米大以皮紙拈送入竅內外以拔毒膏藥封之其骨自出以上丹溪方法凡二十三條惡瘡發背腦疽等證方法升陽益胃湯東垣治一切惡瘡發背腦疽等證羌活一錢五分獨活五分防風五分藁本一錢五分知母一錢生地黃一錢黃芩三錢黃連五分黃柏五分當歸三錢防風梢五分連翹二錢人參五分黃耆一錢五分生甘草一錢陳皮五分當歸梢五分蘇木五分炙甘草一錢五分酒防己五分澤瀉七分桔梗一錢上細切分作二服每服用水二大盞浸半日煎至一盞滴酒數十點去渣臨臥溫服忌飲水再作膿效遲初患二三日者服之立消作膿者立潰隨病上下食前後服一人患腦疽第八日腫硬如拳即日晚服此藥一劑次日便平復腫勢消更不疼痛又服半劑七日全愈如常明之言凡瘡皆陰中之陽陽中之陰二證而已我治此瘡陽藥七分陰藥三分名曰升陽益胃散勝十宣也老人宜之亦名復煎散或加乳香沒藥各一錢尤妙當歸羌活湯治腦疽證黃芩酒炒黃連酒炒各二錢黃柏酒炒一錢澤瀉五分連翹一錢當歸身二錢防風羌活各一錢甘草炙一錢山梔子一錢獨活七分藁本七分上細切作一服水二盞先浸一時許入酒一匙煎至八分去渣食後稍熱服日進二服三日盡六服俱將藥清汁調下後項檳榔散檳榔散東垣大斂瘡口檳榔木香各三錢上為細末用前湯調下或斂瘡口用之決無疼痛以蠟油調塗瘡口生肌斂肉甚速別無惡肉瘡口易合平復膏粱熱瘡所宜用也貧人寒地及寒濕外來之寒瘡禁不可多用背疽方法托裡散千金治背疽並諸惡瘡如三日以里未針灸及利大便者則可消矣羌活一錢五分防風酒洗五分防風梢五分藁本一錢五分當歸身三錢當歸梢五分連翹三錢黃芩酒洗三錢黃耆一錢五分生用人參一錢五分炙甘草一錢五分生甘草五分陳皮五分蘇木五味子酒黃柏酒防己各五分桔梗梔子生地黃酒洗各一錢酒大黃三錢酒黃連一錢木豬苓一錢五分麥門冬二錢上細切分作二服每服用水三大盞浸半日煎至一盞稍熱服後一服如前並渣再煎服忌冷水此方如覺病即便忙服無不效者若瘡勢已發三四日或成膿則不消也崔經歷二次發背疽皆得此方而愈丹溪治背疽方用大黃防風羌活甘草節生地黃當歸身貝母白芷赤芍藥皂角刺黃芩作大劑煎服氣虛加人參黃耆瘡潰後亦宜加之附骨疽方法丹溪曰附骨疽者皆因久得厚味及勞役與酒後涉水得此陽滯於陰之證也又曰環跳穴痛不止防生附骨疽以蒼朮為君佐以黃柏之辛行以青皮冬加桂枝夏加條芩體虛者加杜仲牛膝以生甘草為使作大料煎入薑汁食前飲之痛甚者恐前藥十數帖發不動少加麻黃一二帖又不動者恐疽將成急掘地坑以火煅坑通紅沃以小便令患者赤體坐於坑中以席或綿衣圍抱下體使熱氣熏蒸腠理開氣血通暢而愈羌活防己湯東垣治附骨疽初發於太陽厥陰太陰分者羌活川芎蒼朮防己木香連翹射干甘草白芍藥木通當歸尾蘇木各七分上細切水酒各一大盞煎至七分食前服美膳壓之托裡黃耆湯東垣治附骨疽初發於足少陽陽明分者柴胡一錢二分連翹八分肉桂八分鼠黏子八分黃耆八分當歸尾一錢五分黃柏四分升麻四分甘草炙四分白芷一錢上細切作一服酒一盞水一盞半煎至一大盞空心服美膳壓之內托黃耆酒煎湯東垣治瘡生腿外側或因寒濕得附骨疽於足少陽經分微侵足陽明經堅硬漫腫行步作痛或不能行柴胡六錢五分連翹八分肉桂八分大力子炒黃耆各四錢一作四分當歸尾八錢黃柏五分升麻七分甘草炙五分白芷二錢上細切水酒各一盞煎至一盞食前溫服黃連消毒飲東垣治附骨疽黃連一錢黃芩黃柏各五分生地黃四分知母四分羌活一錢獨活四分防風四分藁本五分當歸尾四分桔梗五分黃耆二分人參二分甘草三分連翹四分蘇木二分防己五分澤瀉二分陳皮三分上細切作一服水煎服一老人年七十因寒濕地氣得附骨疽於左腿外側少陽膽經之分微侵足陽明經分闊六七寸長一小尺堅硬漫腫不辨肉色皮澤但行步作痛以指按至骨大痛與此藥一服即止次日堅軟腫消而愈內托黃耆柴胡湯東垣治附骨疽生地黃五分黃柏三分肉桂二分羌活五分當歸梢七分半土瓜根酒洗柴胡梢各一錢連翹一錢三分黃耆二錢上細切作一服酒一盞水二盞煎至一盞去渣空心熱服賈德茂小男於左大腿近膝股內出附骨疽不辨肉色漫腫光澤木硬瘡勢甚又且左腳乃肝之髀上也更在足厥陰肝經之分少侵足太陰脾經之分其脈左二部細而弦按之洪緩微有力與此藥而安臀癰方法丹溪曰臀癰者臀居小腹之後在下此陰中之陰道遠位僻雖曰太陽多血然氣運不到血亦罕來中年後尤慮患此才有腫痛參之脈證但見虛弱便與滋補血氣可保終吉若無積補之功其禍多在結痂之後或半年已來乃病多致失手慎之慎之內托羌活湯東垣治足太陽經中左右尺脈俱緊按之無力尻臀生癰堅硬腫痛大作羌活黃柏酒炒各二錢防風藁本當歸尾各一錢肉桂三分連翹甘草炙蒼朮陳皮各五分黃耆二錢五分上細切作一服水二盞酒一盞煎至一盞去渣稍熱空心服以衣覆蓋癰上使藥力行去衣內疽方法丹溪曰內疽者皆因飲食之火挾七情之火相鬱而發飲食者陰受之七情者臟腑受之宜其發在腔子而頭向外非干腸胃肓膜也宜以內托之藥托出於外以針開之而愈先用四物湯加桔梗香附生薑煎服膿出後亦用四物湯調理而安肺癰方法丹溪肺癰先須發表千金方曰病咳唾膿血其脈數實或口中咳胸中隱隱痛脈反滑數者為肺癰其脈緊數為膿未成緊去而但數者膿已成也要略治肺癰先以小青龍湯一帖以解表之風寒邪氣然後以葶藶大棗瀉肺湯桔梗湯葦葉湯隨證用之以取膿血此治腫瘍之例也終以葦宙獨行方名黃昏湯以補里之陰氣此治潰瘍之例也黃昏湯録驗治胸中甲錯隱痛知為肺癰合歡木皮一掌大上以水三盞煮取一盞半分二服葶藶大棗瀉肺湯録驗治肺癰或肺脹喘促不得臥葶藶一兩炒黃研為細末煉蜜為丸如彈子大大棗十枚上以水三盞煎大棗至二盞去棗入葶藶一丸再煎至一盞攪勻服之葦葉湯録驗治咳有微熱煩躁胸心甲錯出千金方葦葉二斤薏苡仁半斤桃仁五十個瓜瓣半斤上以水一斗先煮葦葉至五升去渣入諸藥煮取二升分溫再服當吐痰如粥而愈桔梗湯録驗治肺癰心胸氣壅咳嗽膿血神煩悶咽乾多渴兩腳腫滿小便赤黃大便多澀桔梗貝母各一錢當歸栝蔞子各八分枳殼炒五分薏苡仁八分桑白皮五分防己五分甘草節三分黃耆五分杏仁去皮炒另研百合各三分上細切作一服水一盞半加生薑五片煎至八分去渣溫服不拘時若大便祕者加大黃小便澀者加木通又方録驗治前證栝蔞仁當歸桔梗貝母白芷甘草各一錢上細切作一服水一盞煎食後服一方無貝母白芷有葶藶子肺癰已破入風者不治或用太乙膏丸服以搜風湯吐之有吐膿血如肺癰狀口臭他方不應者宜消風散入無病男子發灰清米飲調下可二服而愈祖傳方治肺癰未成膿者立消已成膿者立潰其效如神用樟漆樹葉一名接骨木又名健骨樹又名野黃楊田畔路側皆有之上一味細研略入濾過以酒調服不飲酒人入生薑研服腸癰方法丹溪曰腸癰當作濕熱積治入風難治千金謂腸癰妄治必殺人其病小腹腫強按之則痛小便數淋時時汗出復惡寒身皮甲錯腹皮急如腫狀脈數者微有膿也巢云洪數已有膿脈若遲緊者未有膿甚者腹脹大轉側有水聲或繞臍生瘡或膿自臍出或大便膿血羽林婦證具前脈法下腸癰治法要略以薏苡附子敗醬散千金以大黃牡丹湯丹溪灸法屈兩肘正肘頭鋭骨端灸一百壯下膿血而安薏苡附子敗醬散金匱薏苡仁一錢炮附子一分敗醬三分上為細末每服方寸匕水二盞煎至一盞連渣頓服之小便當下膿血而愈大黃牡丹湯大黃四分牡丹皮一兩桃仁五十枚去皮尖另研芒硝三合栝蔞子半升上細切用水六升煎取一升去渣入芒硝再煎一沸分三服頓服之有膿即下膿無膿即下血醫案東陽呂俊文得潮熱微似瘧狀小腹右邊有一抉大如雞卵作痛右腳不能伸縮一醫作奔豚氣治十餘日不驗召豫診候其脈左寸芤而帶澀右寸芤而洪實兩尺兩關俱洪數豫曰此大小腸之間欲作癰耳幸膿未成猶可治療與五香連翹湯加減與之間以蜈蚣炙黃酒調服之三日內平安乳梗方法丹溪曰乳梗多因乳母不知調養所致蓋乳房陽明所經乳頭厥陰所屬忿怒所逆鬱悶所遏厚味所釀以致厥陰之氣不行故竅閉而汁不通陽明之血沸騰故熱甚而化為膿或因所乳之子膈有滯痰含乳而睡口氣焮熱所吹而成結核初梗忍疼揉令核軟吮令汁透可散否則結成矣治法以青皮疏厥陰之滯石膏清陽明之熱生甘草節行汙濁之血栝蔞子消導腫毒或加沒藥青橘葉皂角刺金銀花當歸身或湯或散須以少酒佐之若加艾火二三壯於痛處灸之尤妙彼粗工便用針刀必成拙病乳癰用蒲公英同忍冬藤入少酒煎服即欲睡是其效也丹溪乳癰未潰以青皮栝蔞仁桃仁連翹川芎橘葉皂角刺甘草節隨證加減煎服已潰以人參黃耆川芎當歸白芍藥青皮連翹栝蔞甘草節煎服升麻托裡湯東垣治婦人兩乳間出黑頭疙瘡頂陷下作黑眼子其脈弦洪按之細小黃柏二分肉桂三分鼠黏子五分黃耆炙甘草節當歸身各一錢連翹升麻葛根各一錢五分上細切作一服水一盞酒半盞同煎至一盞食後熱服奶岩方法石香程氏曰奶岩始有核腫結如鱉棋子大不痛不癢五七年方成瘡初便宜多服疏氣行血之藥須情思如意則可愈如成瘡之後則如巖穴之凹或如人口有唇赤汁膿水浸淫胸脅氣攻疼痛用五灰膏金寶膏去其蠹肉生新肉漸漸收斂此疾多生於憂鬱積忿中年婦人未破者尚可治成瘡者終不可治石香居士程常東陽人丹溪高弟十六味流氣飲局方治奶岩人參黃耆川歸各一錢川芎肉桂厚朴白芷甘草各五分桔梗三分防風烏藥檳榔芍藥枳殼木香各五分紫蘇一錢五分上細切作一服或加青皮一錢水二大盞煎至一盞服單煮青皮湯丹溪治婦人百不如意久積憂鬱乳房內有核如鱉棋子每服用青皮四錢細切以水一盞半煎至一盞日二服以上二方間服至核消住藥橘葉散丹溪治證如前青皮石膏煅沒藥甘草節當歸頭金銀花蒲公英各五分栝蔞子一錢皂角刺一錢五分去尖略炒出汗上細切作一服加青橘葉一小握以酒一盞半煎至一淺盞食後或臥時服丁香散丹溪治乳頭破裂或因小兒吹乳血乾自裂開多痛丁香不拘多少上一味為末干敷裂處如燥唾津調敷囊癰方法丹溪曰囊癰者濕熱下注也有作膿者此濁氣順下將流入滲道因陰道或虧水道不利而然膿儘自安勿藥可也惟在善於調攝耳又有因腹腫漸流入囊腫甚而囊自裂開睪丸懸掛水出以輔炭末敷之外以紫蘇葉包裹仰臥養之癰疽入囊者曾治數人悉由濕熱入肝經處治而用補陰藥佐之雖膿潰皮脫睪丸懸掛者皆不死丹溪一方録驗用野紫蘇葉面青背紅者是也焙乾為細末敷之如燥以香油調敷囊脫無皮者外以青荷葉包之其皮自生丹溪便毒方法便毒是厥陰經濕熱因勞倦而發用射干三寸同生姜煎食前服得利二三行效射干開紫花者是紅花者勿用一方丹溪用破故紙鼠黏子微炒黑牽牛炒大黃酒蒸焙乾各等分為末每服一兩酒調下又方丹溪已結成膿者用大黃酒蒸連翹各五錢枳實三錢厚朴甘草節各三錢桃仁二十一個生薑三片分三服水煎服之石香程氏曰便毒一名跨馬癰此奇經衝任為病而癰見於厥陰經之分野其經多血又名血疝或先有疳瘡而發或卒然起核疼痛而發皆熱鬱血聚而成也初發宜疏利之即散變腫後如常用托裡內補之藥蘇方木散瘡瘍集治便毒木鱉子去殼當歸尾酒浸芍藥白芷粉甘草川芎射干忍冬藤即金銀花大黃銼碎酒浸濕紙包煨穿山甲糠火煨炒黃脆沒藥另研蘇方木各六錢一作六分上細切作一服水酒各一盞煎至一盞食前服玉燭散瘡瘍集治便毒川芎當歸生地黃赤芍藥朴硝大黃依前制甘草炙各八分上細切作一服水煎食前服牡蠣大黃湯精要治同前證大黃依前制牧蠣各二錢五分火煅甘草一錢栝蔞一個去皮上細切作一服水二盞煎至一盞溫服瘰癧方法丹溪曰瘰癧必起於少陽一經不守禁忌延及陽明大抵食味之厚鬱氣之積曰風曰熱皆此二端拓引變換須分虛實實者易治虛者可慮以其屬膽經主決斷有相火且氣多血少婦人見此若月經不作寒熱便生稍久轉為潮熱危矣自非斷欲食淡神仙不治也治瘰癧用立效散與栝蔞散相間服神效丹溪本草云夏枯草大治瘰癧散結氣有補養厥陰血脈之功而經不言觀其能退寒熱虛者可仗若實者以行散之藥佐之外以艾灸亦漸取效治血少馬刀瘰癧肚瀉以四物湯倍酒炒芍藥牡蠣粉陳皮柴胡甘草黃連玄參炒神麯桑椹膏石香程氏曰瘰癧之症內經謂之結核者是也結核有大小如大豆銀杏連串而生者形大如馬刀者謂之馬刀瘡經別為火類夫火亢之甚必兼水化制之其核故堅也凡瘰癧之起始生於耳後足陽明少陽二經浸淫於太陽之經漸隨經流注於腋脅手足皆有也治法以火針刺入核中不可透底納蟾酥膏於中外用緑雲膏貼之三日後取去核中稠膿膿盡取去核外薄膜先破初起之核一枚以絶其源服藥後出者皆愈或不肯收如銀杏者盡皆開了用藥取之其自潰者猶如木果之腐熟肉雖潰而核猶存故膿水淋漓久難得愈治者用鐵烙燒赤烙去其破核猶存者並肉潰處次用金寶膏龍珠膏等藥追去蠹惡之根遂能長肉而愈隨經絡證候服除風熱兼引經之藥以除根本可獲全功也蟾酥膏蟾酥如大豆許白丁香十五枚寒水石些少煅巴豆五粒寒食麵些少上各另研和作一處再研煉蜜為丸如緑豆大每用一丸或二三丸納入針竅中如膿未盡再用數丸以膿盡為度緑雲膏黃連大黃黃芩玄參黃柏木鱉子去殼各一錢上細切用香油一兩同煎焦色去藥入淨松香五兩再煎成膏濾入水中扯拔令金色入銚再熬放溫入後藥豬膽汁三個銅緑三錢醋浸一宿綿去渣上用竹笓帶溫攪勻然後如常攤貼兼治瘡口不幹加乳香沒藥輕粉尤妙金寶膏去腐肉朽肉不傷良肉新肉桑柴灰五碗用沸湯十碗淋汁用草紙一層皮紙二層放羅底次置灰於上淋之穿山甲二兩煨胖信砒二錢另研杏仁七枚去皮同信砒穿山甲研細生地黃二兩辰砂一錢另研粉霜另研麝香各五分上將灰汁濾澄清下鍋煎濃下甲末候焦乾一半下麝香次下粉霜干及九分下辰砂候成膏下炒石灰末以成塊子即收入小罐子內勿見風龍珠膏龍芽草五兩棘棗根五錢海藻二錢五分蘇木五錢上細切量水二十碗煎至十二三碗濾去渣又用桑柴灰二碗半石灰二碗半蒼耳草灰二碗半以草紙二層皮紙二層放籮底次置灰於上用煎湯熱淋取灰汁十碗許澄清入鍋內煎成膏用巴豆霜白丁香石膏麝香輕粉瓷罐子收貯每用取敷核上再敷即去舊藥並靨再上新藥其核即潰而愈根小者但只塗藥於根上其核自潰以上皆石香方救苦化堅湯東垣治瘰癧馬刀挾癭在耳下或耳後下頸至肩上或入缺盆中乃手足少陽之經分其瘰癧在頦下或至頰車乃陽明之經分受心脾之邪而作也今將二證合而治之黃耆一錢護皮毛間補腠理虛及活血氣為瘡家之聖藥又實表補元氣之妙劑也人參三分補肺氣之藥也如氣短不調及喘者宜加之炙甘草五分能調中和諸藥瀉火益胃氣亦能去瘡中之邪真漏蘆升麻各一錢葛根五分此三味俱足陽明本經藥也連翹一錢此一味乃十二經瘡中之藥不可無也能散諸血結氣聚此瘡家之神藥也牡丹皮三分去腸胃中留滯宿血當歸身三分生地黃三分熟地黃三分此三味諸經中和血生血涼血藥也白芍藥三分如夏月倍之其味酸氣寒能補中益氣之虛治腹痛必用之冬寒不可用肉桂二分大辛熱能散結積陰證瘡瘍須當少用之此寒因熱用之意又為寒陰腹蓋其瘡用大辛熱去陰寒之氣如有煩躁者去之柴胡八分功用連翹如瘡不在少陽經則去之鼠黏子三分無腫不用羌活一錢獨活五分防風五分以上三味必問手足太陽症脊痛項強不可回顧腰似折項似拔者是也其防風一味辛溫如瘡在膈以上雖無手足太陽經症亦當用之為能散結去上部風邪昆布二分其味太鹹若堅硬者宜用蓋咸能軟堅也荊三稜炮二分廣朮炮三分此二味若瘡堅硬甚者用之如不甚堅硬者不須用益智二分如唾多者胃不和也或病人吐沫吐食胃中寒者加之無則勿用也麥糵面二錢治腹中縮急又能消食健脾神麯炒二分食不消化者用之黃連三分治煩悶厚朴薑製一錢一分如腹脹者加之黃柏炒三分如有熱或腿腳無力者加之如有煩躁欲去衣者腎中有伏火也更宜加之無則勿用上件共為細末湯浸蒸餅捏作餅子日乾搗如米粒大每服三錢白湯送下如氣不順加橘紅甚者加木香少許量病人虛實臨時斟酌與之毋令藥多妨其飲食此為治之大法也如止在陽明分者去柴胡鼠黏子二味余皆用之如在少陽分為馬刀挾癭者去獨活漏蘆升麻葛根更加瞿麥三分如本人素氣弱其病勢來時氣盛而不短促者不可用考其平素宜作氣盛而從病變之權也宜加黃芩黃連黃柏知母防己之類視邪氣在上中下而用之假令邪氣在上焦加黃芩半酒洗半生用在中焦加黃連半酒洗半生用在下焦則加酒製黃柏知母防己之類選而用之如大便不通而滋其邪盛者加酒製大黃以利之如血燥而大便乾燥者加桃仁泥酒製大黃二味如風結燥不行者加麻仁大黃以潤之如風澀而大便不行者加煨皂角仁大黃秦艽以利之如脈澀覺身有氣澀而大便不通者加郁李仁大黃以除氣燥也如陰寒之病為寒結祕而大便不通以局方中半硫丸或加炮附子乾薑煎水冷服之大抵用藥之法不惟瘡瘍一家諸疾病重人素氣弱者當去苦寒之藥多加人參黃耆甘草之類瀉火而先補其元氣余皆仿此柴胡連翹湯東垣治男子婦人馬刀瘡中桂一分當歸梢五各鼠黏子炒另研炙甘草酒黃柏生地黃各一錢柴胡一錢五分黃芩炒酒知母連翹各一錢五分瞿麥二錢上細切作一服水二盞煎稍熱服消腫湯東垣治馬刀瘡鼠黏子炒五分黃連炒五分當歸梢甘草各七分栝蔞根黃耆各一錢蜜炙生黃芩柴胡去蘆各一錢二分連翹二錢紅花少許上細切作一服水二盞煎至一盞去渣稍熱服柴胡通經湯東垣治小兒項側有核堅而不潰名曰馬刀瘡柴胡去蘆連翹當歸梢生甘草黃芩鼠黏子炒荊三稜醋炒桔梗各二分黃連五分紅花少許上細切作一服水二盞煎至一盞去渣食後稍熱服忌苦藥泄大便散腫潰堅湯東垣治馬刀瘡結硬如石或在耳下至缺盆中或肩上或脅下皆手足少陽經中及瘰癧遍於頦或至頰車堅而不潰在足陽明經中所出或二症瘡已破流膿水並皆治之黃芩八分酒洗半炒半生草龍膽酒洗炒四遍栝蔞根酒洗黃柏酒製炒知母酒炒桔梗去蘆昆布酒洗各五分柴胡四分炙甘草荊三稜酒洗炒廣朮酒拌炒連翹各三分葛根二分白芍藥二分當歸梢二分黃連二分升麻一分上細切作一服水二盞先浸半日煎至一盞去渣食後稍熱服於臥處伸足在高處頭低垂每含一口作十次咽下服畢少頃依常安臥取藥在膈上停蓄故也另攢一料作細末煉蜜為丸如緑豆大每服百餘丸以煎藥湯送下或加海藻五分炒入亦妙以海藻反甘草此東垣用藥妙處世醫莫曉也升陽調經湯東垣治瘰癧繞頸或至頰車此皆出足陽明胃經中來若瘡深遠隱曲肉底是足少陰腎經中來乃戊脾傳於癸腎是夫傳與妻俱作塊子堅硬大小不等並皆治之或作丸亦可升麻八分葛根草龍膽用酒四次制炒黃芩各四分酒製炒連翹五分廣朮荊三稜二味俱酒製炒炙甘草各四分當歸梢三分桔梗五分芍藥三分黃柏酒炒二分知母酒炒一錢黃連酒洗五分黃芩生四分上細切作一服水二盞先浸半日煎至一盞去渣臨臥稍熱服外另稱十帖之數為細末煉蜜為丸如緑豆大每服一百丸服藥時足高去枕仰臥噙一口作十次咽之留一口在後送下丸藥服畢寢臥如常連翹散堅湯東垣治耳下或至缺盆或肩上生瘡堅硬如石動之無根名曰馬刀瘡從手足少陽經中來也或生兩脅下或已流膿作瘡未破並皆治之柴胡一錢二分草龍膽酒製四次土瓜根酒製炒各一錢黃芩酒炒二次七分當歸梢生黃芩廣朮荊三稜酒炒連翹白芍藥各五分炙甘草三分黃連酒炒二次蒼朮米泔浸各二分上細切作一服外另稱十帖之數為細末煉蜜為丸如緑豆大每服百餘丸煎者用水二盞先浸大半日煎至一盞去渣臨臥稍熱服去枕仰臥每口作十次咽下留一口送下丸藥服畢如常安臥更以後藥塗之龍泉散瘡瘍集龍泉粉炒即磨刀石上粉也瓦壟粉廣朮荊三稜酒洗炒昆布各五錢上同為細末煎熟水調塗之用此藥去疾尤速三聖丸濟生治瘰癧神效劫藥丁香五十粒班貓十個去翅及頭足炒麝香一錢另研上為末用鹽豉五十粒湯浸爛研如泥和前藥末丸如緑豆大每服七丸食前溫酒送下日三服至五七日覺小便淋瀝是藥之效便加服或小便下如青筋膜之狀乃病之根也忌濕面毒食立驗大聖散瘡瘍集治瘰癧劫藥班貓大者三十個去頭及翅足用糯米一合同炒米黃色去米用班貓面殭蠶一錢去絲嘴炒黑牽牛半生半炒共三錢取頭末一錢荊芥穗一錢上為細末每服一錢空心無灰老酒下服此藥須忌魚肉酒醋鹽醬及發風動氣等物止可吃菜蔬白粥且如次早服藥隔夜不吃夜粥黃昏煎川木通湯調下玉屑妙靈散二錢重次日五更酒調立驗大聖散一帖如不能飲酒用燈心木通湯調下至日中覺小腹攻痛小便澀痛又用燈心湯調下琥珀末一錢或玉屑妙靈散亦可當利惡物從小便中出如蒲萄肉狀中有凝血一點或未下三日後可再服至日中前用六丁神散一服催之必然自下五六日後再催一服以病根除盡為度如項上有癧一枚取下惡物十枚則盡病根如有小腹攻急莖中澀痛之惱不必驚恐過後便自平腹無事玉屑妙靈散滑石細研為末每服一錢煎川木通湯調下六丁神散瘡瘍集苦丁香六枚或稱五分重白丁香一錢苦參末五分赤小豆一錢磨刀泥青石者佳一名龍泉粉大斑貓七個去頭足炒白殭蠶去絲嘴炒各一錢上共為細末每服一錢重空心無灰酒調下癭瘤方法破結散大成方治石癭氣癭筋癭血癭肉癭馬刀瘰癧等症海藻酒洗淨龍膽草酒洗海蛤粉通草貝母去心昆布酒洗淨礬石枯松蘿各三錢今以桑寄生代效麥曲炒四錢半夏曲二錢上為細末每服二錢熱酒調食後服忌甘草鯽魚雞肉五辛生果有人於項上生癧大如茄子潮熱不食形瘦日久百方不效後得此方去松蘿加真桑寄生一倍服三五日後其瘡軟而散熱退而愈屢醫數人皆效南星散瘡瘍集治皮膚頸項面上生瘤大者如拳小者如粟或軟或硬不癢不痛宜用此藥切不可輒用針灸多致不救生南星大者一枚上細研爛入好醋五七點杵如膏如無生者即以乾者為末醋調如膏先以細針刺患處令氣透卻以膏藥攤貼覺癢則頻換貼取效瘤者氣血凝滯結聚而成或如桃李或如瓜瓠其名有六曰骨瘤曰脂瘤曰膿瘤曰血瘤曰筋瘤曰風瘤以其中各有此物而名之也以上諸瘤通用龍珠膏治之龍珠膏方見前瘰癧條下瘤宜服十六味流氣飲方見前奶岩條下凡癭氣先須斷厚味用海藻一兩黃柏二兩為末置掌中時時舐之以津唾咽下待消三分之二止藥結核方法丹溪曰大凡結核在項在臂在身如腫毒不紅不痛不作膿者多是痰注不散名曰痰核用二陳湯加酒炒大黃連翹桔梗柴胡煎服又方治臂核作痛用二陳湯加連翹川芎皂角刺防風黃芩酒炒蒼朮煎服治耳後頂門各有一核用炒僵蛋酒蒸大黃青黛牛膽南星為末蜜丸噙化疔腫方法石香程氏曰疔腫之症皆蓄熱毒之深而成者也近者多見因食災牛疫馬之肉而成此證其形有十三種皆以形而名之耳一曰麻子疔二曰石疔三曰雄疔四曰雌疔五曰火疔六曰爛疔七曰三十六種疔八曰蛇眼疔九曰鹽膚疔十曰水洗疔十一曰刀鐮疔十二曰浮漚疔十三曰牛狗疔惟三十六種疔最為可畏其狀頭黑浮起形如黑豆四畔大赤色今日生一明日生二後日生三乃至十數猶為可治若滿三十六則為不治之證也夫十三種疔其形狀雖各不同而其所由皆熱毒之甚也治法並急用奪命丹下之去其毒之鋭勢次服化毒丸及內托散二活散雄麝湯隨證經絡病勢緩急用引經藥斟酌施治如無他證有熱即退熱有腫則退腫如身冷自汗嘔逆躁喘狂喝妄語直視者皆毒氣入內不可治矣如疔已拔去用金銀白芷散加減十宣散調之方獲全安也今將十三種疔證候開列於後一曰麻子疔其狀肉起頭如黍米色稍黑四邊微赤多癢忌食麻子近油衣布衣併入麻田中行二曰石疔其狀皮肉相連色如黑豆甚硬刺之不入肉微痛忌瓦礫磚石之屬三曰雄疔其狀皰頭黑靨四畔仰皰漿起有水出色黃大如錢孔形高者忌房事四曰雌疔其狀瘡稍黃向里靨亦似灸瘡四面皰漿起心凹色赤如錢孔者忌房事五曰火疔其狀如湯火燒灼瘡頭黑靨四邊有煙焰又如赤粟米者忌火燒烙六曰爛疔其狀色稍黑有白斑瘡中潰有膿水流出瘡形大小如匙面者忌沸熱食爛物七曰三十六疔其狀頭黑浮起形如黑豆四畔起赤色今日生一明日生二及至十數未滿三十六猶可施治若滿三十六藥所不能治也忌嗔怒蓄積怨恨八曰蛇眼疔其狀瘡頭黑皮浮生形如小豆狀似蛇眼大體硬忌惡眼人看並嫉妒人見忌毒藥九曰鹽膚疔其狀大如匙面四邊皆赤有黑粟粒起大忌食鹽味十曰水洗疔其狀大如錢形中如錢孔瘡頭白里黑靨汁出中硬忌飲漿水水洗渡河十一曰刀鐮疔其狀闊狹如薤葉大長一寸左側肉黑如燒烙忌刺及刀鐮切割鐵刃所傷可以藥治不可亂攻十二曰浮漚疔其狀瘡體曲圓少許不合長而狹如薤葉大內黃外黑黑處刺之不痛黃處刺之痛十三曰牛狗疔其狀內色皰起掐不破上十三種疔瘡初起瘡心先癢後痛先寒後熱熱定則寒多四肢沉重心驚眼花若大重者則嘔逆嘔逆者難治其麻子疔一種始末惟癢初録忌者不得觸犯觸犯者發作難治其浮漚疔牛狗疔兩種無所禁忌縱不愈亦不能殺人其狀寒熱與諸疔不同皆宜將護依法治療禁忌不得觸犯若或觸犯脊強瘡痛極甚不可忍者是也又云疔腫初發時突起如釘故謂之疔令人噁心惡寒四肢強痛一曰瘡變為焦黑色腫大光起根硬刺之不覺痛皆其候也在手足頭面胸背骨節間最急其餘處則可治毒入腹則煩悶恍惚似醉如此者三二日間死矣皆不可不速治也返魂丹經云汗之則瘡愈必用此藥汗之乳香沒藥辰砂雄黃各一錢五分輕粉片腦麝香各五分海羊即蝸牛也不拘多少蟾酥青黛粉草硼砂各一錢上為細末用海羊搗膏為丸如難丸加酒麵糊些少丸如彈子大每服一丸兼生蔥頭二三個細嚼咽下疔腫及癰腫毒氣入膈者得微汗即解一方加銅緑寒水石輕粉枯礬各一錢重按上藥皆非發汗之藥蓋能解毒又能追逐毒氣從腠理為汗化也拔疔法以黑牯牛牽於石塔上必撒糞候糞上生菌取焙乾與豨蘞草葉等分為細末先用竹筒兩頭去節一頭解十字路將不解頭套在疔上以線緊縛竹筒陷入肉內為度以前藥末一匙滴水和之放於筒內少時藥滾起則疔自拔起若一次未效漸加度數其疔必拔也奪命丹巴豆一兩去殼醋煮一伏時黃丹三錢炒硃砂雄黃各三錢乳香鬱金各五錢大黃一兩輕粉二十録蟾酥一錢或五分飛羅面三兩上為細末蠟水糊為丸如緑豆大隨身年分虛實加減丸數服之以下其毒如無奪命丹雄黃丸代之亦效雄黃丸雄黃鬱金各一錢巴豆十四粒去殼麝香少許皂角全蠍各一錢上為細末滴水為丸如緑豆大每服二十丸清茶送下亦看大小虛實斟酌加減丸數化毒丸片腦麝香各五分硇砂硃砂雄黃各二錢輕粉十録蟬蛻二十枚洗去上上為細末新取蟾酥為丸如緑豆大每用一丸放於舌上取涎而愈獨蟾丸並取蟾酥法拿取活蟾即大壯蝦蟆通身有傀壘者俗名癩蝦蟆又名風雞大者重五六兩不拘幾個捉住後腳以大桑葉或油單紙包掩其頭用鐵釘一個括取眉間白汁濺於葉上凝結如濕真粉就丸如緑豆大一蟾或作一丸多者作二丸懸當風處陰乾如患疔腫者即以一二丸置舌尖上仰臥片時其苦水滿口就以此水咽下或以鈹針刺開疔腫頭上納藥一丸於中外以簿皮紙貼護之勿令藥脫落背癰及一切癰腫初起時亦可依此法治之神效以上取蟾酥法切防蟾酥汁入眼人人眼即瞎雄麝湯解疔毒如神凡解毒不可無雄黃硃砂雄黃另研一錢硃砂另研一錢真緑豆粉二錢麝香另研乳香另研各一錢白芷茜草根紫花地丁草各二錢牡蠣殭蠶牛蒡子炒大黃金銀花青木香梔子荊芥穗朴硝甘草各一錢胡桃二十去殼膜上以白芷以後一十四味細切用無灰酒一碗浸少時擂細又加水一碗同煎至一碗去渣及濁腳入前雄黃等五味調勻作一服更審患處經絡分野依東垣引經瀉火藥加之尤妙欲利倍加大黃朴硝二味臨後下茜草即過山龍二活散羌活獨活當歸烏藥赤芍藥金銀花酒洗連翹天花粉甘草節白芷各四錢五分紅花蘇木荊芥蟬蛻乾葛各三錢檀香二錢上為細末每服三錢煎蒼耳湯調下取疔散雄黃硇砂蟾酥信石各一錢巴豆十粒輕粉十録上將疔四畔用針刺破醋調塗敷疔落後用長肉拔毒膏藥貼之以上俱見瘡瘍集驗解毒丸白芷十兩木香五兩硇砂研一錢六分貫衆曬乾杵末稱四兩取新者去皮切朴硝四兩另研蘿蔔子去殼醋浸炒另研末四兩京墨八錢另研上和勻糯米糊丸如龍眼大青黛為衣陰乾每服一丸無灰酒磨化下賀藍先生解毒丸解諸藥毒及山嵐瘴氣災牛馬豬羊肉毒魚腥面菜毒暑熱濕毒傷寒濕毒小兒斑疹喉痹急證紅赤癰腫及諸般無名腫毒黃柏貫衆茯苓藍根葛根生地黃雄黑豆甘草滑石縮砂陰地蕨薄荷各三兩益智大黃寒水石紫荷車即金線重樓馬勃草龍膽殭蠶炒百藥煎山梔子各一兩上為細末煉蜜為丸每一兩分作十丸細嚼新汲水送下小兒驚風薄荷汁下蜜水浸蒸餅為丸亦可或加黃連白芷萬病解毒丸局方射干文蛤即五倍子杏仁石膏續隨子去殼去油蚤休即金線重樓土朱大戟山豆根山茨菰白藥子大黃酒蒸各二兩麝香二錢青黛一兩葳靈仙一兩白芷一兩黃連風化硝各五錢上為末糯米糊為丸如彈子大青黛滑石細研為衣陰乾此藥解一切毒蠱毒及鼠莾河豚魚毒菌毒疫死牛馬肉毒喉痹骨鯁竹木刺毒並用急流水磨下癰疽發背疔腫瘡瘍毒蛇犬咬蜈蚣蜂蠍蠆毒刀斧湯火傷並用井花水磨下並塗傷處婦人鬼胎惡氣積塊蟲積心胸痞滿肚腹膨脹並用好酒磨下漏蘆湯千金治疔腫神效漏蘆連翹黃芩白蘞枳殼升麻麻黃去根節朴硝各一兩另研大黃紫花地丁金銀花各五錢上除朴硝外為細末後入硝和勻每服三錢水一盞半姜三片薄荷三葉煎至七分空心溫服利下惡物止藥地丁即大薊也一云剪刀草開黃花者名黃花地丁開紫花者名紫花地丁取疔腫方瘡瘍集青木香根五錢木香雄黃甘草各一錢上為末湯調下以利去毒氣四五行即愈破毒散瘡瘍集信石硇砂黃丹雄黃乳香各一字斑貓五個去翅足炒麝香少許上為末取新蟾酥和丸如緑豆大以鈹針破開疔頭納藥一丸在內外以膏藥護之如無蟾酥加麵糊些少灸法以大蒜爛搗成膏塗瘡四圍留瘡頂以艾炷灸之以爆為度如不爆稍難愈宜多灸百餘壯無不愈者祖傳方治食災牛馬肉成疔腫欲死者以桕油木葉搗絞取真汁一二碗頓服之得大瀉毒氣而愈如冬月無葉時取嫩根研水服之亦效未利再服以利為度諸瘡方法活魂丹丹溪治一切惡瘡大有神效血竭乳香沒藥銅緑枯白礬黃丹穿山甲煨胖一錢輕粉蟾酥各五分麝香少許上為細末用蝸牛搗膏為丸如緑豆大每服一丸重者二丸用蔥白一寸嚼爛裹藥熱酒送下食前服又方用真殭蠶蟬蛻二味等分為末香油調敷拔疔效治諸般惡瘡經霜芭蕉葉為末香油調敷先用忍冬藤蔥椒蒼耳草煎湯洗瘡淨挹干敷藥外以油紙掩之又方治諸般惡瘡用松木上白蟻泥黃丹各等分炒黑香油調敷用油紙夾上日易後用龍骨沒藥斂瘡口收肉又方治惡瘡用黃丹入香油煎入朴硝抹之天泡瘡服防風通聖散及用蚯蚓糞炒蜜調敷之從肚皮上起者裡熱發外還用通聖散藥妙又方治天泡瘡用野菊花棗木根煎湯洗黃柏滑石末敷治腳上沙瘡清水出者用紫燕窠泥略炒黃柏二味共研為末香油調敷治肷瘡用白膠香一兩黃柏石膏各一兩青黛五錢龍骨五分為末香油調敷治肷瘡方以香油一兩入胎髮如梅大煎焦煬去渣入白膠香黃蠟各一兩煬化入生龍骨赤石脂血竭炒各一兩攪勻候冷瓷器盛捏作薄片貼瘡上外以竹箬包之三日後翻過藥再貼從活血藥煎湯洗之又治肷瘡方用箭箬剪去兩頭以黃柏煮汁令稠和白膠香萆麻子同搗成膏攤箬糙面折縛光面貼之先以清茶放溫洗挹干貼之又方治外肷腳瘡用灶心黃土研極細入黃柏赤石脂黃丹各五錢輕粉乳香沒藥各一錢細研和勻以清油調如膏以油絹攤藥將絹面貼於瘡上外以油紙掩之扎縛定縱癢不可開視數日後未愈再換藥緊縛直待結痂去藥先必以茶清洗瘡淨敷藥桃花散治一切瘡生肌藥白芨白蘞黃柏黃連乳香另研麝香另研黃丹各等分上為細末摻於瘡上二三日生肌平滿如故治火燒及湯泡瘡用經霜桑葉焙乾燒存性為細末香油調敷或干敷二三日結痂平復又方治火燒湯泡瘡時取黃蜀葵花以香油浸之其花日漸煬於油中以此油敷瘡即愈或只收花焙乾為末香油調敷亦妙下疳瘡用青黛海蛤粉蜜陀僧黃連為末敷之又方以雞內金燒存性為末敷之又方治下疳瘡用鳳凰退燒存性研極細香油調敷外看瘡大小剪殼中白膜貼之須靜坐一日不動即結痂矣頭瘡用豬油二錢半生半熟雄黃水銀各二錢五分和勻敷之金絲瘡其狀如繩線巨細不一上下行至心即死可於瘡頭上截經刺之以出血後嚼萍草根敷之立愈手癡瘡用皂角枯礬輕粉黃連黃柏為末敷之砂瘡用塌地藤燒灰敷之諸瘡痛不可忍者用苦寒藥可施於資稟厚者若稟氣薄者宜於補中益氣湯中加苦寒藥也若血熱之人瘡痛宜四物湯加黃芩鼠黏子連翹在下加黃柏若肥人濕熱瘡痛宜防風羌活荊芥白芷蓋風能勝濕故也疥瘡並馬疥瘡用馬鞭草不犯鐵器搗取自然汁半盞飲盡十日內愈神效白癜風癬以小麥攤石上以鐵器燒紅壓出油搽之立效治風癬疙瘩用梓樹葉木綿子羯羊屎鼠屎盦油敷之治癬瘡用浮萍末一兩蒼耳子蒼朮各二兩苦參一兩五錢香附二錢五分黃芩五錢水煎洗之身上虛癢用四物湯加黃芩煎調浮萍末一錢服又方治通身癢用凌霄花為末酒調服一錢祕傳一擦光治疥瘡及婦人陰蝕瘡漆瘡天火丹諸般惡瘡神效蛇床子苦參蕪荑各一兩雄黃五錢枯礬一兩二錢硫黃五錢輕粉二錢樟腦二錢大楓子五錢取肉川椒五錢上為細末生豬油調敷又方治證如前兼小兒癩頭瘡治之蛇床子一兩雄黃五兩硫黃一兩枯礬二兩大楓子五錢取肉川椒五錢黃柏一兩輕粉二錢另拌入牛皮岸熏牛皮煙岸也如無以香爐岸代之一兩黃丹一兩上為細末生豬油調敷以上諸瘡方法皆試效靈驗方凡先哲治癰疽要方俱採托干後以備選用五香連翹湯外科精要治癰疽未成膿者服之可散但當看時令及資稟加減用之乳香木香沉香丁香連翹射干升麻木通桑寄生麝香獨活大黃各等分上細切每服三錢水一大盞煎七分去渣溫服內托復煎散東垣托裡健胃地骨皮黃芩茯苓芍藥人參黃耆白朮桂心甘草防己當歸各五錢防風一兩蒼朮半斤上細切先以蒼朮用水五升煎至三升去朮入前十二味再煎至三四盞取清汁作三四次終日飲之又煎蒼朮渣如前再煎諸藥渣服之白芷升麻湯治手陽明經分臂上生癰左右寸部脈皆短得之俱弦按之洪緩有力此得之八風之變者白芷一錢五分升麻桔梗各一錢甘草炙半錢黃耆四錢酒黃芩四錢生黃芩三錢紅花五分上細切分二服水酒各一盞煎至一盞溫服托裡散瘡瘍集治一切惡瘍發背疔腫便毒始發脈洪數弦實腫甚將作膿者三服消盡大黃牡蠣栝蔞根皂角刺朴硝連翹各六分金銀花當歸各二錢赤芍藥黃芩各四錢上細切作一服水酒各一盞煎至一盞四分服又托裡散瘡瘍集黃耆當歸金銀花甘草各等分上細切每服一兩酒水合煎更詳部位各加引經藥尤妙烏金散瘡瘍集治癰疽疔腫時毒附骨疽諸惡瘡等證若瘡黑陷如石堅四肢冷脈細或時昏冒譫語循衣煩渴危篤服此汗之即瘡起蒼耳頭五月五日午時收採草烏頭火麻頭六月收採木賊去節蝦蟆頭樺皮節酥炙麻黃去根節上曬乾各等分同入瓷器內鹽泥固濟烈火煅從早至申時如黑煤色為度研為末每服二錢病重者三錢熱酒調下未汗再進一服如汗已干卻服解毒疏利之藥如修合此藥必選天時清明好日於靜室中合黃耆六一湯東垣治癰疽發渴黃耆六兩蜜炙甘草一兩炙上細切水煎不拘時服一方精要治一切瘡癤癰疽發背殊效亦能下瘀血大黃三錢甘草辰砂血竭各一錢上為細末酒調服內托護心散精要乳香一兩真緑豆粉四兩一方用二兩上為細末每服二三錢煎甘草湯或新汲水調下小五香湯瘡瘍集木香沉香乳香藿香連翹各二錢麝香另研少許上為細末每服二錢水一盞煎七分溫服復元通氣散局方當歸穿山甲煨脆各五錢川芎天花粉炒青皮陳皮各一兩大黃甘草黑醜取頭末各五錢上為細末每服二錢溫酒調下金銀白芷散東垣黃耆當歸各一錢檳榔川芎各五分甘草一錢天花粉五分乳香沒藥各三分皂角刺去尖炒金銀花各一錢五分防風三分白芷一錢上為細末分三服每服水酒各半盞煎連渣服正鐵箍散瘡瘍集貝母去心五兩白芷蒼耳草灰醋拌曬乾各二兩或加龍骨二錢尤妙上為細末水調或香油調貼瘡上大鐵箍散瘡瘍集芙蓉葉豬卷皮木鱉子各四兩白芷黃柏寒水石各二兩大黃紫荊皮各一兩赤豆白蘞各二兩白芨一兩防風五錢貝母二兩真地青羌活各一兩上為細末涼水調圍癰四畔如肉脆去白芨白蘞加生地黃地榆用芭蕉油調敷熱甚者用三消散三消散瘡瘍集退極熱證赤腫焮赤者朴硝焰硝大黃梔子炒黑色寒水石南星各等分上為末生地黃汁調塗貼芙蓉葉汁調亦可雲母膏瘡瘍集治一切癰疽瘡癤折傷等證蜀椒去目及閉口者略炒白芷沒藥赤芍藥肉桂當歸鹽花菖蒲麒麟竭黃耆白芨芎藭木香龍膽草白蘞防風厚朴麝香桔梗柴胡松脂人參蒼朮黃芩乳香附子茯苓良薑合歡皮各五錢硝石甘草雲母各四兩柏葉桑白皮槐枝柳枝水銀以絹另包待膏成以手細彈鋪在上名養膏母陳皮各二兩清油四十兩黃丹二十兩上除雲母硝石麒麟竭乳香沒藥麝香黃丹鹽花八味另研外余藥並細切入油浸七日文火煎以柳枝不住手攪候匝沸乃下火沸定又上火如此者三次以藥黑色為度去渣再熬後入丹與八味末仍不住手以槐枝攪滴水中成珠不軟不硬為度瓷器收貯候溫將水銀彈上用時先刮去水銀或服或貼隨宜用之其功甚大也太乙膏瘡瘍集治一切癰疽瘡癤貼之神效亦可內服須詳證經絡作湯使送下玄參白芷當歸肉桂大黃赤芍藥生地黃各一兩黃丹真麻油二斤上細切入油浸夏三日冬十日春秋七日文火煎黑色去渣入黃丹再熬以槐柳枝不住手攪滴水中成珠不軟不硬瓷器收貯神異膏治諸般癰腫癤毒殊效露蜂房有蜂兒多者佳一兩玄參五錢黃耆七錢五分金蛇蛻五錢用鹽水洗淨曬乾杏仁一兩去皮尖黃丹五兩飛香油十兩亂髮如雞子大一塊無病少年男子者佳皂角水洗淨上先將香油入亂髮於銚中文火熬候發焦煬盡以杏仁投入候杏仁黑色用真綿濾出渣再將油入銚內然後下黃耆玄參二味文火熬一二時久住火候片時火力稍息漸入露蜂房蛇蛻二味以柳枝不住手攪慢火熬至紫黑色又再用綿濾過去渣入爐中文武火熬下丹急攪千餘轉滴水中成珠子膏即成矣冬月略嫩些夏月略硬些瓷器盛貯隨意攤貼祖傳方萬捶青雲膏録驗治諸般癰腫未成膿者貼散已成膿者拔毒追膿腹中痞塊止瘧疾貼大椎及身柱其效如神白松香一斤去木屑萆麻子三百粒去殼杏仁三百粒去殼銅青三兩乳香一兩五錢沒藥一兩五錢輕粉二錢上共作一處用鐵捶木砧於日中搗成膏如燥少加香油杵之或用石臼木杵搗亦可用瓷器盛緋帛攤貼湯中做不見火一方録驗治背癰附骨疽乳癰及一切癰腫未成膿者發散極效槐花一兩炒焦色胡桃十個新鮮不油者連殼煻火煨熟去殼上二味於沙盆內研爛如泥熱酒調和渣溫服如能飲酒人多飲愈效一醉後而癰腫散矣豨蘞散治癰疽發背及一切癤毒等證效如神豨蘞草其葉長如牛舌其氣如豬臭者小薊根五爪龍即五葉藤生大蒜上四味各等分細研用酒和勻濾去渣服一碗得大汗通身而愈又方治諸般癰腫神效新掘天門冬一味約三五兩洗淨入沙盆內研細以好酒蕩起濾去渣頓服未效再服一二服必愈癘風癘與癩通論內經曰風之傷人也或為寒熱或為熱中或為寒中或為癩風又曰癩者因營衛熱腐其氣不清故使其鼻柱壞而色敗皮膚瘍潰風寒客於脈而不去名曰癘風丹溪曰是受天地間殺物之風故也然近見病此者原其所由都是熱血得寒所致或夏月勞甚而入寒泉澡浴或冬月酒後而乃踢冰履霜及入水取魚由是濕熱鬱於內而不散風寒客於外而不行內外怫鬱既久而漸成肌肉之敗腐矣經所謂熱勝則肉腐是也大抵此症屬肺歸重於手足陽明之經蓋手足陽明者胃與大腸主之脾肺二經之腑也脾主肌肉而肺主皮毛乃腑及於臟病也經又曰腸胃為市無物不受無物不包故其熱毒積於中而形於外耳故治法必先取陽明而後及於太陰亦本而標之之義也又濕熱甚必生風風甚則生蟲如腐草為螢之類又治法必先殺其蟲瀉其火然後生血涼血祛風導滯降湯升陰皆為治之急務也治雖多門大略不越乎此也學者詳之脈法脈兩寸浮而緊或浮而洪陽脈浮弦陰脈實大脈浮緩者易治洪大而數者難愈沉實者難愈脈溢者病在上脈浮者病在下皆為不治之證也方法丹溪曰大風病是受天地間殺物之風古人謂之癘風者以其酷烈暴悍可畏耳人得之分在上在下氣受之則在上血受之則在下氣血俱受則在上覆在下然皆不外乎陽明一經陽明者胃與大腸也無物不受治之者須致意看其疙瘩與瘡上體先見者多者在上也下體先見者多者在下也在上者以醉仙散取涎血於齒縫中出在下者以通天再造散取惡物蟲積於殼道中出後用防風通聖散調之更用三稜針於委中出血夫上下同得者甚重自非醫者神手病者鐵心罕能免此夫從上或從下以漸而來者皆是可治之證人見其病勢之緩多忽之以法治之雖已全愈若不絶味斷欲皆不免再發而終於不救也豫治五人矣其不死者惟一婦人因貧甚無物可食耳余皆三四年後再發孫真人云嘗治四五百人終無一人免於死非真人不能治蓋無一人能守禁忌耳其婦人於本病外又服百餘帖加減四物湯半年之上月經行十分安愈醉仙散須量人大小虛實與之證候重而急者須先以再造散下之候補養得完復與此藥須斷鹽醬醋諸魚椒果煎炒燒炙等物止可淡粥及淡煮熟時菜雖茄亦不可食惟烏梢蛇菜花蛇淡酒蒸熟食之可以助藥力也外科精要為諸瘡立法而不及癘風蓋風為百病之長以其殘害膚體去死不遠一有染此鮮能免者比之瘡瘍治法為難乃不言及夫八方之風起因於八方應其時則物生違其時則殺物人之稟受有殺氣者則感而受之如待虛受物後又因起居飲食男女漸成鬱氣二氣積於厥躬脾先受之乃為濕病溫積之久火氣出焉火氣滋蔓氣濁血汙一云血熱凝結其氣不清化生諸蟲以次傳歷臟腑必死之病而有可生之理其始病者胃氣微傷脾主肌肉流行甚緩傳變以漸或可借醫藥之功而免謂之必死非惟醫不知藥悉是不能禁欲可哀也夫近見粗工用藥佐以大楓子油殊不知此藥性熱有燥痰之功而傷血至有病將愈而先失明者宋洞虛云大風有五黑色不治余皆可治蟲食肝眉落食肺鼻崩食脾聲啞食心足底穿膝虛腫食腎耳鳴啾啾耳弦生瘡或痹或痛如針刺狀食身則皮癢如蟲行自頭面來為順風自足起者為逆風多因感寒熱與瘀濁雜氣而成治法先以雷公散即再造散下之以稀粥養半月勿妄動作勞後以醉仙散中間或吐或利不必怕怯但腮喉頭面腫吞不得下漸出惡水或齒縫中出臭水血絲或言不得或悶而死難以飲食只以稀粥用管灌入或一旬或半月一月面漸白而安重者又與換肌散換肌散治大風年深不愈者以致眉毛脫落鼻梁崩塌服此藥不逾月取效如神黑花蛇白花蛇皆蘄黃來者並用酒浸一宿地龍去土各三兩當歸細辛白芷天麻蔓荊子葳靈仙荊芥穗甘菊花苦參紫參沙參木賊不灰木炙甘草白蒺黎天門冬赤芍藥定風草按本草即天麻也今皆用野天麻即益母草未知可否再宜審之何首烏石菖蒲胡麻子草烏頭去皮臍蒼朮米泔浸去皮川芎木鱉子各二兩上為細末每服五錢溫酒調下酒多為妙醉仙散胡麻子牛蒡子蔓荊子枸杞子四味俱炒紫色白蒺藜苦參栝蔞根防風各五錢寶鑑前四味各一兩上為細末每一兩五錢入輕粉一錢拌勻每服一錢茶清調下晨午夕各一服後五七日先於牙縫內出臭涎渾身疼痛昏悶如醉後利下膿血惡臭屎為效通天再造散鬱金五錢皂角刺獨生黑大者去尖大黃泡各一兩白醜頭末六錢半生半炒上為末每服五錢日未出時以無灰酒調面東服之當日必利下惡物或臭膿或蟲如蟲口黑色乃是多年赤色乃是近者數日後又進一服無蟲積乃止愈風丹治癘疾手足麻木毛落眉脫遍身瘡疹皮膚瘙癢爬之成瘡及一切疥癬風疾皆效苦參一斤研取頭末四兩土桃蛇一條酒浸二三日去骨取肉日乾烏梢蛇白花蛇各一條並同上制上為細末以皂角一斤銼長寸許段無灰酒浸一宿去酒以新水一碗操取濃汁去渣銀石器內熬膏和前末丸如梧桐子大每服六七十丸煎防風通聖散送下粥飯壓之日三服三日浴以大汗出為應再三日又浴取大汗三浴乃安浴法見後條一法用桃柳桑槐楮五般枝濃煎湯大缸浸坐沒頸一日俟湯如油安矣本草治惡疾遍身生瘡濃煎萍湯浴浸半日大效此神方也又以荊芥穗大黃梔子蔚金地黃杜仲防風羌活獨活白蒺藜等分為細末以大楓子油入熟蜜丸如梧桐子大每服茶清送下四五十丸一日三服一法以苦參五斤好酒三斗漬一月每服一合日三服常與不絶覺脾既安細末服之亦良尤治癮疹方出圖經陶隱居以酒漬飲治惡瘡久服輕身日華子以為殺蟲本草除伏熱養肝膽氣豫嘗以蒼耳葉為君以此物為佐更以酒煮烏蠡魚代補蛇之或缺研細糊丸如梧桐子大每服五六十丸加至七八十丸熱茶清送下日三服一二月而安若入紫萍尤捷紫萍多水蛭須寒月于山沼取之淨洗去泥略蒸透乾用一法治手指攣曲節間痛甚漸至斬落用萆麻子去殼黃連銼如豌豆大各一兩水一升小瓶浸春夏三日秋冬五日取萆麻片瓜破平旦時面東以浸藥水服一粒漸加至四五粒微利不妨忌豬肉魚腥宜茹淡纍護神效一法先服加減通聖散大瀉惡毒穢積又用三稜針看肉黑處及委中紫脈刺出死血不可令出太過恐損真氣後服神仙紫花丸以上丹溪方法凡十三條加減通聖散防風五錢去蘆連翹三錢去蒂川芎五錢白芍藥二錢當歸三錢酒浸洗薄荷二錢荊芥穗五錢麻黃三錢去根節湯泡梔子三錢去殼桔梗五錢枳殼去穰麵炒石膏各五錢甘草三錢滑石三錢黃芩三錢去朽柴胡五錢黃連五錢黃柏三錢生地黃三錢五分酒製羌活五錢熟地黃三錢五分酒製錦紋大黃六兩芒硝一兩皂角刺一兩獨生者去尖上細切分八服每服用水一碗半煎至一碗空心服日進二服五六日後又進二服待補養完又行二次然後服後丸藥神仙紫花丸外録試驗方治癘風及諸般惡瘡風瘡其效如神但要藥真無有不效者輕者一料可愈重者二三料除根白花蛇一具出蘄黃州黑質白紋龍頭虎口背上二十四個方勝花尾尖有一佛指甲新鮮者佳蛀腐者不堪用去頭尾各四五寸並一兩為率連皮骨用一兩五錢何首烏荊芥穗葳靈仙各四錢麻黃連根節二錢胡麻子一錢蛇床子二錢上六味細切同蛇用無灰酒一大碗浸一宿去蛇皮骨通曬乾仍還原酒內再浸再曬酒盡為度待曬極干共為細末另包木香沉香各二錢五分人參一兩當歸七錢五分明天麻豬牙皂角各五錢麝香一錢五分鼻塞聲重者倍之乳香沒藥各一錢明雄黃辰砂各五分大塊者佳肉豆蔻一枚煨定風草二錢半即天麻還瞳子即草決明一兩上麝至辰砂五味各另研極細不見火其餘草木味亦另研細羅過連前五味和勻另包防風去蘆羌活甘草細辛川芎獨活蒼朮米泔浸一宿枇杷葉去毛筋焙乾白芍藥白蒺藜金銀花五加皮香白芷苦參各五錢胡麻子白附子米泔浸炒麻黃川牛膝草烏頭米泔浸炮川烏米泔浸炮石菖蒲各二錢五分上為細末另包總合法治用大楓子三斤新鮮者佳去油黃色者不堪用去殼以瓷罐一個盛之少入無灰酒以皮紙竹箬重重包口勿令泄氣頓滾湯中勿令沒罐口外以物蓋鍋口密封固文武火蒸候黑爛為度杵無渣滓成油分作三分每一分入第二號藥八錢重第一號藥六錢重第三號藥一兩五錢重和勻加糯米飯搗極膠黏丸如梧桐子大曬乾勿見火每服二十丸漸加至五六十丸雞鳴時午時臨臥時各一服茶清送下忌房勞鹹酸酒醋糟淹豬羊雞馬驢肉魚腥煎煿水果五辛姜椒大料辛辣熱物蕎麥緑豆之類若不忌口斷欲則藥無功雖愈再發其餘肉味病愈後一年可食但豬羊雞肉終身用忌此法乃治癩之神方也不可輕忽跌傷方法治跌撲損傷用蘇木以活血黃連以降火白朮以和中童便煎為妙在下者可下瘀血但先須補托在上者宜飲韭汁或和粥吃切不可飲冷水蓋血得寒則凝但一絲血入心即死丹溪骨損者用古文錢五分醋淬乳香沒藥各一錢酒研服或用接骨散丹溪接骨丹元戎沒藥乳香當歸川椒自然銅火煅醋淬赤芍藥骨碎補酒炙敗龜板酥炙虎脛骨酥炙白芷千金藤即郁李仁以上各等分上為細末化蠟五錢丸如彈子大每服一丸好酒半升化開煎用向東南柳枝攪散熱服一方加龍骨川芎凡治損傷妙在補氣血俗工不知惟在速效多用自然銅以接骨然此藥必煅煉方可服新出火者其火毒與金毒相扇挾香熱藥毒雖有接骨之功其燥散之禍甚於刀劍戒之戒之丹溪治金瘡急以石灰厚敷裹之如瘡深不宜速合者加滑石末敷之又方老杉木皮為末敷之凡跌撲損傷腹痛者知有瘀血用桃仁承氣湯加蘇木紅花下之當歸導滯湯東垣治跌撲損傷瘀滯不行等證大黃當歸在上用頭在中用身在下用尾通身痛者全用酒浸洗焙乾上細切等分每服一兩重酒煎服雞鳴散大成方治從高墜下及木石所壓一切損傷瘀血凝積痛不可忍並以此藥推陳致新大黃一兩杏仁二十一粒去皮尖另研上研為末酒大碗煎七分濾去渣雞鳴時服至曉必取下瘀血即愈愚接此方用杏仁而不用桃仁者蓋跌乃血入氣分故用杏仁以行氣中之血矣沒藥乳香散河間治跌撲損傷痛不可忍白朮炒五兩當歸焙甘草炙白芷沒藥另研各一兩五錢肉桂去粗皮乳香另研各一兩上為末和勻再研極細每服二錢溫酒調下杖丹膏藥方外録驗方治受杖責後如死血壅腫宜先刺出惡血然後以此膏貼之三四日平復或早失調理成癰者貼之即散及治諸般癰疽瘡癤毒已潰未漬貼之無不神效甘草肉桂蛇蛻蟬蛻露蜂房連翹白芷白芨白蘞白朮蒼朮人參玄參苦參芍藥南星升麻厚朴梔子百合金銀花天花粉川歸川芎穿山甲煨胖另末羌活獨活黃連黃芩黃柏大黃生地黃紅花蘇木柴胡鱉甲酥炙為末青木香何首烏防風荊芥穗藿香雲母石花蕊石各一兩亂髮壯年無病男子者一塊乾蟾一隻即風雞鳳凰胎一隻即殼中不轉頭雞黃也陰乾用桃柳桑枝各五莖上各細切用香油六斤重浸藥三五日入鍋內熬黑色去渣入黃丹三斤別用槐柳枝不住手攪膏成候溫入後藥末乳香沒藥龍骨各一兩輕粉五錢血竭一兩麝香二錢上攪勻瓷器收貯臨期看瘡大小攤貼沒藥散録驗治刀箭傷止血住痛定粉風化石灰各一兩枯白礬二錢另研乳香五分另研沒藥另研一字上各研為細末同和勻再研乾摻之破傷風論內經曰風者百病之始也清淨則腠理閉拒雖有大風苛毒而弗能為害也若夫破傷風證因事擊破皮肉往往視為尋常殊不知風邪乘虛而客襲之漸至變為惡候又諸瘡久不合口風邪亦能內襲或用湯淋洗或著艾焚灸其湯火之毒氣亦與破傷風邪無異其為證也皆能傳播經絡燒爍真氣是以寒熱間作甚則口噤目斜身體強直如角弓反張之狀死在旦夕誠可哀憫治之之法當同傷寒處治因其有在表在裡半表半裡三者之不同故不離乎汗下和三法也是故在表汗之在裡者下之在表裡之間者宜和解之又不可過其法也閭閻野人多不識此證殺人之易早不求醫治療而袖手待斃哀哉脈法表脈浮而無力太陽也脈長有力陽明也脈浮而弦小者少陽也河間曰太陽宜汗陽明宜下少陽宜和解若能明此三法而治不中病者未之有也愚按河間先生論破傷風脈證詳明甚矣何其但云三陽而不及於三陰蓋風邪在於三陽之經便宜按法早治而愈若待傳入三陰其證已危或腹滿自利口燥咽乾舌卷卵縮皆無可生之證故置而弗論也方法丹溪曰破傷風同傷寒壞證治看在何經而用本經藥驅逐之誤則殺人劉河間有法有方宜選而用之以上丹溪方法凡一條羌活防風湯河間治破傷風邪初傳在表羌活防風川芎藁本當歸芍藥各一錢甘草地榆細辛各五分上細切作一服水一盞半煎至一盞去渣熱服不拘時候量緊慢加減用之熱則加大黃一錢大便祕只加大黃五分緩緩令通白朮防風湯河間若服前藥太過令自汗者宜服此藥白朮一錢防風二錢黃耆一錢五分上細切作一服水一盞半煎至一盞溫服不拘時臟腑和而有自汗可用此藥破傷風臟腑祕小便赤自汗不止者因服熱藥汗出不休者故知無寒也宜速下之先用小芎黃湯二三服後用大芎黃湯下之小芎黃湯河間川芎二錢黃芩一錢五分甘草五分上細切作一服水一盞半煎至一盞溫服不拘時候三服即止再用後藥大芎黃湯河間川芎一錢羌活黃芩大黃各一錢五分上細切作一服水一盞溫服宜和為度發表雄黃散河間雄黃一錢防風二錢草烏一錢泡裂上為細末每服一字溫酒調下里和至愈可服里未和不可服大蜈蚣散河間蜈蚣黃赤足各一條江鰾五錢即魚膠炒左蟠龍五錢炒煙盡為度即野鴿糞上為細末每服一錢清酒調下治法依前用里和至愈可服但有里證不可服次當下之用蜈蚣散四錢巴豆霜五分飯丸如緑豆大每服一丸漸加至六七丸清酒調蜈蚣散少許送下宣利為度內外風去可服羌活湯緩緩而治不拘時候服之羌活湯者治半在表半在裡之藥也大羌活湯羌活菊花麻黃川芎石膏煅另研防風前胡黃芩細辛甘草枳殼白茯苓蔓荊子各四分薄荷白芷各二分上細切作一服入生薑五片水一盞半煎至一盞稍熱服不拘時日進二服防風湯河間治破傷風同傷寒表證未傳入里宜服此藥防風羌活獨活川芎各一錢二分上細切作一服水一盞半煎至一盞溫服小蜈蚣散蜈蚣黃赤足各一條江鰾三錢上為細末用防風湯調下如前藥解表不已覺傳入里當服左龍丸漸漸看大便軟硬加巴豆霜服之左龍丸河間左蟠龍五錢炒白殭蠶五錢炒江鰾五錢炒雄黃一錢上同為細末飯丸如梧桐子大每服十五丸溫酒下如里證不已當於左龍丸末一半內入巴豆霜半錢飯丸如梧桐子大每服一丸漸加至以利為度若利後更服後藥若搐痙不已亦宜服後藥羌活湯也小羌活湯河間治搐痙不止羌活獨活防風地榆各一錢二分上細切作一服水一盞半煎至一盞溫服如有熱加黃芩有痰加半夏若病日久氣血漸虛邪氣入胃全在養血為度養血當歸地黃湯河間當歸地黃芍藥川芎藁本防風白芷各一錢細辛五分上細切作一服水一盞半煎至一盞服雄黃散河間治表藥南星三錢泡半夏五錢泡七次去臍天麻五錢雄黃二錢五分上為細末每服一錢溫酒調下如有涎於此藥中加大黃為下藥地榆防風散河間治破傷風中風半在表半在裡頭微汗身無汗不可發汗宜以表裡治之地榆防風地丁草馬齒莧各等分上為細末每服三錢溫米飲調下白朮湯治破傷風大汗不止筋攣手足搐搦白朮葛根各二錢升麻黃芩酒炒各一錢芍藥四錢甘草五分上細切作一服水一盞半煎至一盞溫服不拘時候江鰾丸河間治破傷風驚而發搐臟腑祕澀知病在裡宜以此藥下之江鰾銼炒五錢野鴿糞炒五錢雄黃一錢白殭蠶五錢炒蜈蚣黃赤足一對天麻五錢上為細末分作三分用二分以燒飯為丸如梧桐子大硃砂為衣用一分入巴豆霜一錢同和亦以燒飯為丸如梧桐子大不用硃砂為衣每服以前硃砂衣丸子二十丸巴豆霜丸一丸第二服二丸加至利為度再單服硃砂衣丸子病愈止藥祖傳方治初破傷風發熱紅腫風邪將欲傳播經絡而未入深者屢驗杏仁去皮研細羅白麵各等分上以二味和勻用新汲水調和如膏敷傷處腫消熱退一方治破傷風發熱用蟬蛻略炒研細酒調一錢七服效醫案安文陳珍四兄因勸鬥毆眉稜骨被打破得破傷風頭面大腫發熱豫適在彼家以九味羌活湯服取汗外用杏仁搗爛入白麵少許新汲水調敷瘡上腫消熱退而愈後以此法治若干人皆驗附翻花瘡一名綿花瘡一名廣東瘡川芎天花粉各五錢輕粉二錢五分雄黃一錢一分半辰砂一錢一分半麝香五分上為細末蒸餅丸如緑豆大每服八分溫酒下日三服一方無川芎天花粉二味亦效
