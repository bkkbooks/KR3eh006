body:
  text: 醫學正傳後再敘天有六氣曰陰曰陽曰風曰雨曰晦曰明淫則為災有寒疾熱疾末疾腹疾惑疾心疾而人之氣血流注有循有經有至有抵有會有過有行有達而又有三百六十有五之絲絡六百四十有七之隧穴醫非淺於其學者之所能盡其祕也今天下之言醫者衆矣安得有如至靈默契陰陽之大小明決六脈二經之周流變化者而與之論素問諸經方藥之宜攻補之功虛實之變針灸之法耶蓋嘗思其人不可作矣以醫名多以名醫名少也醫學正傳待御東崖虞公叔祖恆德老人所著也觀其書可以知其人矣東崖即其書校之侍御枳田蔣公序之豫喜其書而閲之以為得其人矣閲之且久以為非恆德老人所著也老人之志欲自附於名家之後故其書集諸家之成而會之一者也夫天下之事皆可以試其能而醫則不可以自用其明者自羲農至今不知歷幾千百代及幾人之手而其書始大行皆相祖述傳習增減異同殆未有自售其能者故曰醫不三世不服其藥是書也使其盡出於恆德老人之手則發揮出於胸憶湯液持以己見豫未敢以為盡然也惟其參之諸家之祕而斷之以聰明之真則所以握氣機佐陰陽疏脈絡者皆有所受而立言垂後可與諸經並傳無疑也醫學正傳豫固喜其學之博而擇之精也學之博則有所據擇之精則有所見有所據則方藥必求其當有所見則攻療必速其功天下之病率不能出其範圍之內而世之習其書傳其方者未有不收十全之功矣則是書可以傳矣東崖屬豫言子為之書其概以質於今之醫之名者明嘉靖辛卯仲春之吉莆田史梧識醫學正傳者恆德老人承丹溪先生之遺流而述作之書也一溪翁信之貴之故豫為門下生講讀之字畫謬誤檢諸書正之文簡漏脫鑑數部補之猶羞多闕失後來好生之士改革之幸甚也日本慶長九年龍集甲辰秋九月望日延壽玄朔
